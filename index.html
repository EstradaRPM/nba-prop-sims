const { useState, useCallback, useMemo } = React;

// ── Monte Carlo Engine ──────────────────────────────────────────────
function randn() {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
}

function simulateStat(mean, stdDev, n) {
  const results = new Float64Array(n);
  for (let i = 0; i < n; i++) results[i] = Math.max(0, mean + stdDev * randn());
  return results;
}

// Log-normal: same mean/stdDev parameterization, but right-skewed and always non-negative.
// Better fit for pts/reb/ast/threes — matches empirical right skew in NBA game logs
// and substantially more accurate for alt lines beyond ~1.5 SD above the mean.
function simulateStatLogNormal(mean, stdDev, n) {
  const m = parseFloat(mean) || 0;
  const s = parseFloat(stdDev) || 0;
  if (m <= 0 || s <= 0) return new Float64Array(n);
  const cv2 = (s / m) ** 2;
  const sigmaL = Math.sqrt(Math.log(1 + cv2));
  const muL = Math.log(m) - (sigmaL * sigmaL) / 2;
  const results = new Float64Array(n);
  for (let i = 0; i < n; i++) results[i] = Math.exp(muL + sigmaL * randn());
  return results;
}

// Poisson: discrete rare-event model for stl/blk.
// Correct distribution for integer count data — avoids the ~10-15pp probability
// error that truncated normal produces on common 0.5-line props.
function randPoisson(lambda) {
  if (lambda <= 0) return 0;
  const L = Math.exp(-lambda);
  let k = 0, p = 1;
  do { k++; p *= Math.random(); } while (p > L);
  return k - 1;
}

function simulateStatPoisson(mean, n) {
  const lambda = Math.max(0, parseFloat(mean) || 0);
  const results = new Float64Array(n);
  for (let i = 0; i < n; i++) results[i] = randPoisson(lambda);
  return results;
}

// ── Negative Binomial sampler (Gamma-Poisson mixture) ────────────────────────
// NegBin(μ, r): mean = μ, variance = μ + μ²/r. Reduces to Poisson as r → ∞.
// Used for stl/blk/threes when CV mode is active and player is overdispersed
// (observed CV > 1/√mean). Captures the higher frequency of both zero-count
// games and outlier-high games that Poisson underestimates for variable players.
// Implementation: λ ~ Gamma(r, μ/r), count ~ Poisson(λ). Uses existing randGamma.
function randNegBin(mu, r) {
  const lambda = randGamma(r, mu / r);
  return randPoisson(lambda);
}

function simulateStatNegBin(mean, cvPct, n) {
  const mu = Math.max(0.01, parseFloat(mean) || 0);
  const cv = (parseFloat(cvPct) || 0) / 100;
  const poissonCV = 1 / Math.sqrt(mu);
  // Fall back to Poisson if underdispersed or Poisson-equivalent
  if (cv <= poissonCV) return simulateStatPoisson(mu, n);
  const r = 1 / (cv * cv - 1 / mu);
  const results = new Float64Array(n);
  for (let i = 0; i < n; i++) results[i] = randNegBin(mu, r);
  return results;
}

// ── Single-draw helpers + buildKDEModel (for projection uncertainty outer loop) ─
// buildKDEModel: precomputes the recency-weighted CDF and bandwidth once, so
// the projection uncertainty outer loop can reuse it without O(n²) rebuilding.
function buildKDEModel(etrMean, rawScores, historicalMean, targetStd) {
  const m = parseFloat(etrMean) || 0;
  const hm = parseFloat(historicalMean) || 0;
  if (m <= 0 || hm <= 0 || !rawScores || rawScores.length < 5) return null;
  const k = rawScores.length;
  const LAMBDA = 0.9;
  const cdf = new Float64Array(k);
  let wSum = 0;
  for (let i = 0; i < k; i++) { cdf[i] = Math.pow(LAMBDA, k - 1 - i); wSum += cdf[i]; }
  let cumul = 0;
  for (let i = 0; i < k; i++) { cumul += cdf[i] / wSum; cdf[i] = cumul; }
  let wMean = 0;
  for (let i = 0; i < k; i++) {
    const wi = i === 0 ? cdf[0] : cdf[i] - cdf[i - 1];
    wMean += wi * rawScores[i];
  }
  const scale = wMean > 0 ? m / wMean : m / hm;
  let wVar = 0;
  for (let i = 0; i < k; i++) {
    const wi = i === 0 ? cdf[0] : cdf[i] - cdf[i - 1];
    wVar += wi * (rawScores[i] - wMean) ** 2;
  }
  let wSqSum = 0;
  for (let i = 0; i < k; i++) wSqSum += Math.pow(LAMBDA, 2 * (k - 1 - i));
  const kEff = (wSum * wSum) / wSqSum;
  const hSilverman = 1.06 * Math.sqrt(wVar) * Math.pow(kEff, -0.2);
  let h = hSilverman;
  if (targetStd > 0) {
    const bootstrapVar = wVar * scale * scale;
    const targetVar    = targetStd * targetStd;
    if (targetVar > bootstrapVar) {
      const hCal = Math.sqrt(targetVar / (scale * scale) - wVar);
      h = Math.max(hCal, hSilverman);
    }
  }
  return { cdf, rawScores, scale, h, wMean };
}

function sampleSingleKDE(model) {
  const { cdf, rawScores, scale, h } = model;
  const k = rawScores.length;
  const u = Math.random();
  let lo = 0, hi = k - 1;
  while (lo < hi) { const mid = (lo + hi) >> 1; if (cdf[mid] < u) lo = mid + 1; else hi = mid; }
  return Math.max(0, (rawScores[lo] + h * randn()) * scale);
}

function sampleSingleLogNormal(mean, std) {
  if (mean <= 0 || std <= 0) return Math.max(0, mean);
  const cv  = std / mean;
  const mu  = Math.log(mean / Math.sqrt(1 + cv * cv));
  const sig = Math.sqrt(Math.log(1 + cv * cv));
  return Math.exp(mu + sig * randn());
}

function sampleSingleGamma(alpha, beta) {
  return randGamma(alpha) * beta;
}

// ── Gamma distribution sampler (Marsaglia-Tsang 2000) ────────────────────────
// Used for pts when empirical KDE data is unavailable.
// Parameterization: shape α, scale β. Mean = α×β, Variance = α×β².
// For pts from CV: α = 1/CV², β = mean×CV².
// Validation vs 20 NBA players showed Gamma is better calibrated than log-normal
// for near-mean prop lines (MAE 4.56% vs 5.43%).
function randGamma(alpha, beta) {
  if (alpha <= 0 || beta <= 0) return 0;
  if (alpha < 1) return randGamma(1 + alpha, beta) * Math.pow(Math.random(), 1 / alpha);
  const d = alpha - 1 / 3;
  const c = 1 / Math.sqrt(9 * d);
  for (;;) {
    let x, v;
    do { x = randn(); v = 1 + c * x; } while (v <= 0);
    v = v * v * v;
    const u = Math.random();
    if (u < 1 - 0.0331 * (x * x) * (x * x)) return d * v * beta;
    if (Math.log(u) < 0.5 * x * x + d * (1 - v + Math.log(v))) return d * v * beta;
  }
}

function simulateStatGamma(mean, cvPct, n) {
  const m = parseFloat(mean) || 0;
  const cv = (parseFloat(cvPct) || 30) / 100;
  if (m <= 0 || cv <= 0) return new Float64Array(n);
  const alpha = 1 / (cv * cv);
  const beta  = m * cv * cv;
  const results = new Float64Array(n);
  for (let i = 0; i < n; i++) results[i] = randGamma(alpha, beta);
  return results;
}

// ── KDE hybrid sampler for pts/reb/ast ───────────────────────────────────────
// Primary model when historical raw game scores are available from cv_data.json.
// No parametric shape assumption — uses the player's actual empirical distribution.
//
// Per trial:
//   1. Pick a random historical score x_i (bootstrap, recency-weighted)
//   2. Add Gaussian noise: bandwidth h (see below)
//   3. Multiplicative recentering: × (etrMean / wMean)
//
// Bandwidth calibration (targetStd):
//   Raw game totals (e.g. rebounds as integers 3,4,5...) have lower variance than
//   what the per-36 CV implies, because per-36 normalization amplifies game-to-game
//   rate differences via the minutes denominator. Silverman's rule on raw scores
//   would produce a bandwidth far too small, making the distribution unrealistically
//   peaked (e.g. 88% over 3.5 and 30% over 4.5 for a 4.3-mean player).
//
//   Output variance formula: Var(output) = scale² × (wVar + h²)
//   → h_calibrated = sqrt(max(0, targetStd²/scale² − wVar))
//
//   h = max(h_calibrated, h_silverman) so we never smooth less than Silverman.
//   If bootstrap variance already exceeds targetStd (rare), falls back to Silverman.
//
// Returns null if inputs are invalid (triggers parametric fallback in runSimulation).
function simulateStatKDE(etrMean, rawScores, historicalMean, n, targetStd) {
  const m = parseFloat(etrMean) || 0;
  const hm = parseFloat(historicalMean) || 0;
  if (m <= 0 || hm <= 0 || !rawScores || rawScores.length < 5) return null;
  const k = rawScores.length;
  const LAMBDA = 0.9; // recency decay — rawScores is oldest-first; index k-1 = most recent

  // Build exponential-decay weights and CDF (oldest score = lowest weight)
  const cdf = new Float64Array(k);
  let wSum = 0;
  for (let i = 0; i < k; i++) { cdf[i] = Math.pow(LAMBDA, k - 1 - i); wSum += cdf[i]; }
  // Normalize to CDF
  let cumul = 0;
  for (let i = 0; i < k; i++) { cumul += cdf[i] / wSum; cdf[i] = cumul; }

  // Weighted mean and variance.
  // scale uses wMean (recency-weighted) as the denominator — not the unweighted historicalMean —
  // because the bootstrap samples according to the same recency weights. Using the unweighted
  // mean would inflate the effective output mean whenever recent games diverge from the season
  // average (e.g. a player on a usage spike), violating E[output] = etrMean.
  let wMean = 0;
  for (let i = 0; i < k; i++) {
    const wi = i === 0 ? cdf[0] : cdf[i] - cdf[i - 1];
    wMean += wi * rawScores[i];
  }
  const scale = wMean > 0 ? m / wMean : m / hm;
  let wVar = 0;
  for (let i = 0; i < k; i++) {
    const wi = i === 0 ? cdf[0] : cdf[i] - cdf[i - 1];
    wVar += wi * (rawScores[i] - wMean) ** 2;
  }
  // Effective sample size: k_eff = (Σw)² / Σ(w²) — accounts for weight concentration
  let wSqSum = 0;
  for (let i = 0; i < k; i++) wSqSum += Math.pow(LAMBDA, 2 * (k - 1 - i));
  const kEff = (wSum * wSum) / wSqSum;
  const hSilverman = 1.06 * Math.sqrt(wVar) * Math.pow(kEff, -0.2);

  // Calibrate h to match targetStd (effective CV std dev) when provided.
  // Var(output) = scale²×(wVar + h²) → h_cal = sqrt(targetVar/scale² − wVar)
  let h = hSilverman;
  if (targetStd > 0) {
    const bootstrapVar = wVar * scale * scale; // variance from pure bootstrap (no noise)
    const targetVar    = targetStd * targetStd;
    if (targetVar > bootstrapVar) {
      const hCal = Math.sqrt(targetVar / (scale * scale) - wVar);
      h = Math.max(hCal, hSilverman);
    }
    // If bootstrapVar >= targetVar we cannot reduce h below 0; keep Silverman.
  }

  // Weighted bootstrap via CDF binary search
  const results = new Float64Array(n);
  for (let i = 0; i < n; i++) {
    const u = Math.random();
    let lo = 0, hi = k - 1;
    while (lo < hi) { const mid = (lo + hi) >> 1; if (cdf[mid] < u) lo = mid + 1; else hi = mid; }
    results[i] = Math.max(0, (rawScores[lo] + h * randn()) * scale);
  }
  return results;
}

// Distribution routing: which model each stat uses.
// pts/reb/ast use KDE hybrid (empirical) when raw data available, with parametric fallbacks.
// threes/stl/blk use Poisson (discrete integer counts). pts/reb/ast use KDE hybrid with parametric fallbacks.
const LOG_NORMAL_STATS = new Set([]);
const POISSON_STATS    = new Set(['stl', 'blk', 'threes']);
const KDE_STATS        = new Set(['pts', 'reb', 'ast']);

function runSimulation(stats, numSims, ptsRawData, rebRawData, astRawData, projSDs = {}) {
  const rawDataMap = { pts: ptsRawData, reb: rebRawData, ast: astRawData };
  const simResults = {};
  Object.keys(stats).forEach((key) => {
    const { mean, stdDev, cvMode, cvValue } = stats[key];
    // Guard: a manually-entered stdDev of 0 produces a degenerate distribution where every
    // sample equals the mean, collapsing all probability mass to a single point and returning
    // 0% for any line that isn't exactly the mean. Fall back to auto estimate instead.
    const effectiveStd = parseFloat(stdDev) > 0 ? parseFloat(stdDev) : estimateStdDev(key, mean);
    const sigmaProj = projSDs && projSDs[key] > 0 ? projSDs[key] : 0;

    // Projection Uncertainty: sample μ ~ N(ETR, σ_proj) in 50 chunks.
    // Each chunk uses a perturbed mean, approximating the Bayesian mixture
    // P(X) = ∫ P(X|μ) P(μ) dμ. Performance: 50 sampler calls vs numSims—negligible overhead.
    if (sigmaProj > 0) {
      const etrMean = parseFloat(mean) || 0;
      const CHUNKS = 50;
      const chunkSize = Math.ceil(numSims / CHUNKS);
      const combined = new Float64Array(numSims);
      let offset = 0;
      // Precompute KDE model for reuse across chunks (avoids O(n²) CDF rebuilding)
      const rawData = rawDataMap[key];
      const kdeModel = (KDE_STATS.has(key) && rawData)
        ? buildKDEModel(etrMean, rawData.rawScores, rawData.historicalMean, effectiveStd)
        : null;
      const cvPct_nb = cvMode && cvValue ? parseFloat(cvValue) : null;
      for (let c = 0; c < CHUNKS && offset < numSims; c++) {
        const mu_i = Math.max(0, etrMean + sigmaProj * randn());
        const n_c  = Math.min(chunkSize, numSims - offset);
        let chunk;
        if (POISSON_STATS.has(key)) {
          chunk = (cvPct_nb > 0) ? simulateStatNegBin(mu_i, cvPct_nb, n_c) : simulateStatPoisson(mu_i, n_c);
        } else if (KDE_STATS.has(key)) {
          if (kdeModel) {
            chunk = new Float64Array(n_c);
            // Build a scaled KDE model for this perturbed mean
            const scaledModel = { ...kdeModel, scale: kdeModel.wMean > 0 ? mu_i / kdeModel.wMean : kdeModel.scale };
            for (let j = 0; j < n_c; j++) chunk[j] = sampleSingleKDE(scaledModel);
          } else if (key === 'pts') {
            const cvP = cvMode && cvValue ? parseFloat(cvValue) : STD_RATIOS['pts'] * 100;
            chunk = simulateStatGamma(mu_i, cvP, n_c);
          } else {
            chunk = simulateStatLogNormal(mu_i, Math.max(0.001, mu_i * (effectiveStd / Math.max(etrMean, 0.001))), n_c);
          }
        } else {
          chunk = simulateStatLogNormal(mu_i, Math.max(0.001, mu_i * (effectiveStd / Math.max(etrMean, 0.001))), n_c);
        }
        combined.set(chunk, offset);
        offset += n_c;
      }
      // Fisher-Yates shuffle for uniform blending across chunks
      for (let i = numSims - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const tmp = combined[i]; combined[i] = combined[j]; combined[j] = tmp;
      }
      simResults[key] = combined;
      return;
    }

    if (POISSON_STATS.has(key)) {
      const cvPct = cvMode && cvValue ? parseFloat(cvValue) : null;
      simResults[key] = (cvPct > 0)
        ? simulateStatNegBin(mean, cvPct, numSims)
        : simulateStatPoisson(mean, numSims);
    } else if (KDE_STATS.has(key)) {
      // Fallback chain for pts/reb/ast:
      // 1. KDE hybrid — empirical shape from historical scores, recentered to ETR mean
      // 2. Gamma (pts) / log-normal (reb, ast) — parametric fallback
      const rawData = rawDataMap[key];
      if (rawData) {
        const kde = simulateStatKDE(mean, rawData.rawScores, rawData.historicalMean, numSims, effectiveStd);
        if (kde !== null) {
          // Blend 20% log-normal to prevent KDE tail collapse on extreme alt lines.
          // KDE bootstraps from observed scores and cannot project beyond the observed
          // range + bandwidth; log-normal provides a probability floor at 2+ SD extremes.
          const lnCount = Math.round(numSims * 0.20);
          const lnSamples = simulateStatLogNormal(mean, effectiveStd, lnCount);
          for (let i = 0; i < lnCount; i++) kde[numSims - lnCount + i] = lnSamples[i];
          // Fisher-Yates shuffle so the 20% log-normal blend is uniformly distributed
          // across the array. DistBar reads only the first 5k elements; without shuffling
          // it would never display the tail blend while calcProbability uses all samples —
          // causing the histogram to visually misrepresent the distribution used for odds.
          for (let i = numSims - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const tmp = kde[i]; kde[i] = kde[j]; kde[j] = tmp;
          }
          simResults[key] = kde;
          return;
        }
      }
      if (key === 'pts') {
        const cvPct = cvMode && cvValue ? parseFloat(cvValue) : STD_RATIOS['pts'] * 100;
        simResults[key] = simulateStatGamma(mean, cvPct, numSims);
      } else {
        simResults[key] = simulateStatLogNormal(mean, effectiveStd, numSims);
      }
    } else if (LOG_NORMAL_STATS.has(key)) {
      simResults[key] = simulateStatLogNormal(mean, effectiveStd, numSims);
    } else {
      simResults[key] = simulateStat(parseFloat(mean) || 0, parseFloat(stdDev) || 0, numSims);
    }
  });
  return simResults;
}

function calcProbability(simValues, propLine) {
  const line = parseFloat(propLine);
  if (isNaN(line) || simValues.length === 0) return null;
  let over = 0, push = 0;
  for (let i = 0; i < simValues.length; i++) {
    if (simValues[i] > line) over++;
    else if (simValues[i] === line) push++;
  }
  return {
    over: over / simValues.length,
    under: (simValues.length - over - push) / simValues.length,
    push: push / simValues.length,
  };
}

// Counts simulation trials where every leg hits simultaneously.
// legs: array of { simValues: Float64Array, propLine: number, side: 'over'|'under' }
// Returns joint probability as a fraction in [0,1].
// Uses trial-level correlation already embedded in the Float64Arrays (same game per trial).
function calcParlayProb(legs) {
  if (!legs.length) return null;
  const n = legs[0].simValues?.length;
  if (!n) return null;
  let hits = 0;
  for (let i = 0; i < n; i++) {
    let allHit = true;
    for (const { simValues, propLine, side } of legs) {
      const v = simValues[i];
      if (side === 'over' ? v <= propLine : v >= propLine) { allHit = false; break; }
    }
    if (allHit) hits++;
  }
  return hits / n;
}

function calcCombo(simResults, keys) {
  const n = simResults[keys[0]]?.length || 0;
  const combined = new Float64Array(n);
  for (let i = 0; i < n; i++) {
    let sum = 0;
    for (const key of keys) sum += simResults[key]?.[i] || 0;
    combined[i] = sum;
  }
  return combined;
}

// Returns half-integer prop lines for the alt line ladder.
// Points: 5-unit intervals centred on mean. Others: 1-unit. STL/BLK: fixed 0.5–4.5.
function getAltLines(key, mean) {
  const m = parseFloat(mean) || 0;
  if (m <= 0) return [];
  if (key === 'pts') {
    const center = Math.round(m / 5) * 5;
    const lines = [];
    for (let l = Math.max(5, center - 15); l <= center + 20; l += 5) lines.push(l - 0.5);
    return lines;
  }
  if (key === 'stl' || key === 'blk') {
    // Dynamic: start at 0.5, extend to at least 4.5 or higher for elite players
    const end = Math.max(4.5, Math.floor(m + 2.5) + 0.5);
    const lines = [];
    for (let l = 0.5; l <= end; l += 1) lines.push(parseFloat(l.toFixed(1)));
    return lines;
  }
  if (key === 'threes') {
    const top = Math.max(4.5, Math.ceil(m + 3) - 0.5);
    const lines = [];
    for (let l = 0.5; l <= top; l += 1) lines.push(parseFloat(l.toFixed(1)));
    return lines;
  }
  // Combo props
  if (key === 'pra' || key === 'pr' || key === 'pa') {
    // Wide combos (typical range 20–60): 2.5pt intervals, ±5 rungs from rounded center
    const center = Math.round(m / 2.5) * 2.5;
    const lines = [];
    for (let i = -5; i <= 5; i++) { const v = center + i * 2.5; if (v > 0) lines.push(v - 0.5); }
    return lines;
  }
  if (key === 'ra') {
    // Medium combo (typical range 6–20): 1pt intervals, mean ±4
    const start = Math.max(0.5, Math.floor(m - 3) + 0.5);
    const end   = Math.floor(m + 5) + 0.5;
    const lines = [];
    for (let l = start; l <= end; l += 1) lines.push(parseFloat(l.toFixed(1)));
    return lines;
  }
  if (key === 'sb') {
    // SB = STL+BLK, so wider range; extend to at least 5.5 or higher
    const end = Math.max(5.5, Math.floor(m + 2.5) + 0.5);
    const lines = [];
    for (let l = 0.5; l <= end; l += 1) lines.push(parseFloat(l.toFixed(1)));
    return lines;
  }
  // reb, ast: 1-unit intervals, mean ±4
  const start = Math.max(0.5, Math.floor(m - 3) + 0.5);
  const end   = Math.floor(m + 5) + 0.5;
  const lines = [];
  for (let l = start; l <= end; l += 1) lines.push(parseFloat(l.toFixed(1)));
  return lines;
}

// ── Odds Utilities ──────────────────────────────────────────────────
function probToAmerican(prob) {
  if (prob <= 0 || prob >= 1) return "—";
  if (prob >= 0.5) return Math.round((-prob / (1 - prob)) * 100);
  return "+" + Math.round(((1 - prob) / prob) * 100);
}

function americanToProb(odds) {
  const o = parseFloat(odds);
  if (isNaN(o) || o === 0) return null;
  if (o < 0) return Math.abs(o) / (Math.abs(o) + 100);
  return 100 / (o + 100);
}

// Returns vig-free implied probabilities by normalizing both sides to sum to 1.0.
// When both over and under odds are provided, removes the book's vig.
// Falls back to raw americanToProb when only one side is available.
// Example: -110/-110 raw → 52.38%/52.38%; vig-free → 50%/50%.
function vigFreeProb(overOdds, underOdds) {
  const overRaw  = americanToProb(overOdds);
  const underRaw = americanToProb(underOdds);
  if (overRaw && underRaw) {
    const total = overRaw + underRaw;
    return { over: overRaw / total, under: underRaw / total };
  }
  return { over: overRaw, under: underRaw };
}

function americanToDecimal(odds) {
  const o = parseFloat(odds);
  if (isNaN(o) || o === 0) return null;
  if (o < 0) return 1 + (100 / Math.abs(o));
  return 1 + (o / 100);
}

function calcKelly(modelProb, americanOdds) {
  const dec = americanToDecimal(americanOdds);
  if (!dec || dec <= 1) return null;
  const b = dec - 1;
  const p = modelProb;
  const q = 1 - p;
  const kelly = (b * p - q) / b;
  return kelly > 0 ? kelly : 0;
}

// Simultaneous independent-event Kelly: stake_i = κ_i × ∏(1 − κ_j, j≠i)
// allBets: array of { key, side, kelly } for each active (best-edge, positive-Kelly) bet.
// Returns { 'key_side': portfolioFactor } where portfolioFactor = ∏(1−κ_j, j≠i).
function calcPortfolioFactors(allBets) {
  if (allBets.length === 0) return {};
  const totalProd = allBets.reduce((p, { kelly }) => p * (1 - kelly), 1.0);
  const factors = {};
  allBets.forEach(({ key, side, kelly }) => {
    factors[`${key}_${side}`] = totalProd / (1 - kelly);
  });
  return factors;
}

const JOURNAL_KEY = 'nbaSimJournal';

function generateBetId() {
  return Date.now().toString(36).slice(-6) + Math.random().toString(36).slice(2, 8);
}

function loadJournal() {
  try { return JSON.parse(localStorage.getItem(JOURNAL_KEY) || '[]'); }
  catch { return []; }
}

// CLV: positive = you beat the closing line (favorable).
// fairOdds / closingOdds in American. Returns % or null.
function calcCLV(fairOdds, closingOdds) {
  const fairDec    = americanToDecimal(parseFloat(fairOdds));
  const closingDec = americanToDecimal(parseFloat(closingOdds));
  if (!fairDec || !closingDec || closingDec <= 1) return null;
  return ((fairDec - closingDec) / closingDec) * 100;
}

// P&L in dollars (positive = profit, negative = loss)
function calcPnL(stake, bookOdds, result) {
  if (!stake || !bookOdds || !result) return null;
  const dec = americanToDecimal(parseFloat(bookOdds));
  if (!dec) return null;
  if (result === 'won')  return Math.round(stake * (dec - 1) * 100) / 100;
  if (result === 'lost') return -Math.abs(stake);
  if (result === 'push') return 0;
  return null;
}

function buildJournalCSV(entries) {
  const headers = [
    'ID','Logged At','Game Date','Player','Stat','Side','Line',
    'Book Odds','Book','Model Prob%','Fair Odds','Edge%','Stake $',
    'Status','Closing Line','Closing Odds','CLV%','Result','P&L $','Notes'
  ];
  const esc = v => { const s = String(v ?? ''); return (s.includes(',') || s.includes('"')) ? `"${s.replace(/"/g,'""')}"` : s; };
  const rows = entries.map(e => [
    e.id, e.loggedAt, e.gameDate, e.player, e.statLabel, e.side,
    e.propLine, fmtOdds(e.bookOdds), e.bookName || '',
    e.modelProb != null ? (e.modelProb * 100).toFixed(1) : '',
    fmtOdds(e.fairOdds), e.edgePct != null ? e.edgePct.toFixed(1) : '',
    e.stake ?? '', e.status, e.closingLine ?? '',
    e.closingOdds ? fmtOdds(e.closingOdds) : '',
    e.clv != null ? e.clv.toFixed(1) : '',
    e.result ?? '', e.pnl ?? '', e.notes || ''
  ]);
  return [headers.map(esc).join(','), ...rows.map(r => r.map(esc).join(','))].join('\n');
}

// Groups settled bets by 7 probability buckets; computes model avg vs actual hit rate
function computeCalibrationBuckets(entries) {
  const buckets = [
    { label: '<35%',   min: 0,    max: 0.35 },
    { label: '35-45',  min: 0.35, max: 0.45 },
    { label: '45-55',  min: 0.45, max: 0.55 },
    { label: '55-65',  min: 0.55, max: 0.65 },
    { label: '65-75',  min: 0.65, max: 0.75 },
    { label: '75-85',  min: 0.75, max: 0.85 },
    { label: '85%+',   min: 0.85, max: 1.01 },
  ];
  const settled = entries.filter(e => e.result === 'won' || e.result === 'lost');
  return buckets.map(b => {
    const inB  = settled.filter(e => e.modelProb >= b.min && e.modelProb < b.max);
    const wins = inB.filter(e => e.result === 'won').length;
    const n    = inB.length;
    return {
      label: b.label, n,
      modelAvg:   n > 0 ? inB.reduce((s, e) => s + e.modelProb, 0) / n : null,
      actualRate: n > 0 ? wins / n : null,
    };
  });
}

function fmtOdds(o) {
  const n = parseFloat(o);
  if (isNaN(n)) return "";
  return n > 0 ? `+${n}` : `${n}`;
}

function getEdgeColor(edge) {
  if (edge >= 5)   return "#22c55e";
  if (edge >= 3)   return "#4ade80";
  if (edge >= 1.5) return "#86efac";
  if (edge >= 0)   return "#94a3b8";
  return "#ef4444";
}

function getEdgeLabel(edge) {
  if (edge >= 5)   return "STRONG";
  if (edge >= 3)   return "SOLID";
  if (edge >= 1.5) return "MARGINAL";
  return "NO EDGE";
}

function getProbColor(prob) {
  if (prob >= 0.65) return "#22c55e";
  if (prob >= 0.55) return "#86efac";
  if (prob >= 0.45) return "#94a3b8";
  if (prob >= 0.35) return "#fca5a5";
  return "#ef4444";
}

  'Charlotte Hornets': 'CHA', 'Chicago Bulls': 'CHI', 'Cleveland Cavaliers': 'CLE',

function normalizeOddsName(name) {
  return (name || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .toLowerCase().trim()
    .replace(/\bjr\.?$/i, 'jr').replace(/\bsr\.?$/i, 'sr')
    .replace(/\bii$/i, 'ii').replace(/\biii$/i, 'iii').replace(/\biv$/i, 'iv');
}

function bigramSimilarity(a, b) {
  if (a.length < 2 || b.length < 2) return a === b ? 1 : 0;
  const bigrams = s => { const set = new Set(); for (let i = 0; i < s.length - 1; i++) set.add(s.slice(i, i + 2)); return set; };
  const ab = bigrams(a), bb = bigrams(b);
  let intersection = 0;
  ab.forEach(g => { if (bb.has(g)) intersection++; });
  return (2 * intersection) / (ab.size + bb.size);
}

function findFuzzyOddsMatch(oddsIndex, normName, threshold = 0.72) {
  let best = null, bestScore = 0;
  for (const key of Object.keys(oddsIndex)) {
    const score = bigramSimilarity(key, normName);
    if (score > bestScore) { bestScore = score; best = key; }
  }
  return bestScore >= threshold ? oddsIndex[best] : null;
}

// Best American odds = numerically highest price (higher = better value for bettor)
function bestAmericanOdds(prices) {
  if (!prices || prices.length === 0) return null;
  return prices.reduce((best, p) => {
    if (!best) return p;
    const curr = parseFloat(p.price), b = parseFloat(best.price);
    return (!isNaN(curr) && (isNaN(b) || curr > b)) ? p : best;
  }, null);
}

async function fetchNbaGames(apiKey) {
  const now = new Date();
  const from = now.toISOString().slice(0, 10) + 'T00:00:00Z';
  const to = new Date(now.getTime() + 30 * 60 * 60 * 1000).toISOString().slice(0, 19) + 'Z';
  const url = `${ODDS_API_BASE}/sports/basketball_nba/events?apiKey=${apiKey}&commenceTimeFrom=${from}&commenceTimeTo=${to}`;
  const r = await fetch(url);
  if (!r.ok) { const txt = await r.text().catch(() => ''); throw new Error(`Odds API ${r.status}: ${txt.slice(0, 120)}`); }
  return { games: await r.json(), remainingRequests: r.headers.get('x-requests-remaining') };
}

async function fetchGameLines(apiKey, eventIds) {
  if (!eventIds || eventIds.length === 0) return { lines: {}, remainingRequests: null };
  const url = `${ODDS_API_BASE}/sports/basketball_nba/odds?apiKey=${apiKey}&regions=us&markets=spreads,totals&oddsFormat=american&eventIds=${eventIds.join(',')}`;
  const r = await fetch(url);
  if (!r.ok) return { lines: {}, remainingRequests: null };
  const data = await r.json();
  const lines = {};
  data.forEach(event => {
    let total = null, spread = null, favoriteTeam = null;
    (event.bookmakers || []).forEach(bk => {
      (bk.markets || []).forEach(mkt => {
        if (mkt.key === 'totals' && total == null) {
          const ov = mkt.outcomes?.find(o => o.name === 'Over');
          if (ov) total = ov.point;
        }
        if (mkt.key === 'spreads' && spread == null) {
          const away = mkt.outcomes?.find(o => o.name === event.away_team);
          if (away) { spread = away.point; favoriteTeam = away.point < 0 ? event.away_team : event.home_team; }
        }
      });
    });
    lines[event.id] = { total, spread, favoriteTeam, homeTeam: event.home_team, awayTeam: event.away_team };
  });
  return { lines, remainingRequests: r.headers.get('x-requests-remaining') };
}

async function fetchEventProps(apiKey, eventId) {
  const markets = Object.values(ODDS_MARKET_MAP).join(',');
  const url = `${ODDS_API_BASE}/sports/basketball_nba/events/${eventId}/odds?apiKey=${apiKey}&regions=us&markets=${markets}&oddsFormat=american`;
  const r = await fetch(url);
  if (!r.ok) return { bookmakers: [], remainingRequests: null };
  const data = await r.json();
  return { bookmakers: data.bookmakers || [], remainingRequests: r.headers.get('x-requests-remaining') };
}

// Builds { normalizedPlayerName → { pts: { line, overOdds, underOdds, overBook, underBook, allBooks[] }, ... } }
function buildOddsIndex(allPropsData, selectedBooks) {
  const index = {};
  allPropsData.forEach(({ bookmakers }) => {
    (bookmakers || []).forEach(bk => {
      if (selectedBooks.length > 0 && !selectedBooks.includes(bk.key)) return;
      (bk.markets || []).forEach(mkt => {
        const statKey = Object.keys(ODDS_MARKET_MAP).find(k => ODDS_MARKET_MAP[k] === mkt.key);
        if (!statKey) return;
        (mkt.outcomes || []).forEach(outcome => {
          const normName = normalizeOddsName(outcome.description || '');
          if (!normName) return;
          if (!index[normName]) index[normName] = {};
          if (!index[normName][statKey]) index[normName][statKey] = { allBooks: [] };
          const entry = index[normName][statKey];
          const side = (outcome.name || '').toLowerCase();
          entry.allBooks.push({ book: bk.key, bookLabel: bk.title, price: outcome.price, point: outcome.point, side });
        });
      });
    });
  });
  Object.keys(index).forEach(player => {
    Object.keys(index[player]).forEach(statKey => {
      const entry = index[player][statKey];
      // Determine principal line: the point value most frequently offered across all books/sides.
      // This ensures entry.line, entry.overOdds, and entry.underOdds all refer to the same line.
      const pointCounts = {};
      entry.allBooks.forEach(b => {
        if (b.point != null) {
          const k = String(b.point);
          pointCounts[k] = (pointCounts[k] || 0) + 1;
        }
      });
      const sortedPoints = Object.keys(pointCounts).sort((a, b) => {
        const diff = pointCounts[b] - pointCounts[a]; // descending by count
        return diff !== 0 ? diff : parseFloat(a) - parseFloat(b); // ascending by value on tie
      });
      const principalLine = sortedPoints.length > 0 ? parseFloat(sortedPoints[0]) : null;
      entry.line = principalLine;
      // Only compare odds at the principal line so prices and line always match
      const overPrices  = entry.allBooks.filter(b => b.side === 'over'  && b.point === principalLine);
      const underPrices = entry.allBooks.filter(b => b.side === 'under' && b.point === principalLine);
      const bestOver  = bestAmericanOdds(overPrices);
      const bestUnder = bestAmericanOdds(underPrices);
      if (bestOver)  { entry.overOdds  = bestOver.price;  entry.overBook  = bestOver.bookLabel;  }
      if (bestUnder) { entry.underOdds = bestUnder.price; entry.underBook = bestUnder.bookLabel; }
    });
  });
  return index;
}

// Maps team abbreviation → { opponent, total, spread, favoriteTeam, homeTeam, awayTeam }
function buildGameIndex(games, gameLines) {
  const index = {};
  games.forEach(game => {
    const toAbbr = t => NBA_TEAM_ABBR[t] || (t || '').split(' ').pop().toUpperCase();
    const homeAbbr = toAbbr(game.home_team), awayAbbr = toAbbr(game.away_team);
    const gl = gameLines[game.id] || {};
    const favAbbr = gl.favoriteTeam ? toAbbr(gl.favoriteTeam) : null;
    const ctx = { homeTeam: homeAbbr, awayTeam: awayAbbr, total: gl.total, spread: gl.spread, favoriteTeam: favAbbr };
    if (homeAbbr) index[homeAbbr] = { ...ctx, opponent: awayAbbr };
    if (awayAbbr) index[awayAbbr] = { ...ctx, opponent: homeAbbr };
  });
  return index;
}

async function fetchFullSlate(apiKey, selectedBooks) {
  const { games, remainingRequests: rr0 } = await fetchNbaGames(apiKey);
  if (!games || games.length === 0) throw new Error('No NBA games found for today — lines may not be posted yet.');
  const { lines: gameLines } = await fetchGameLines(apiKey, games.map(g => g.id));
  const allPropsData = [];
  let lastRR = rr0;
  for (const game of games) {
    const { bookmakers, remainingRequests } = await fetchEventProps(apiKey, game.id);
    allPropsData.push({ gameId: game.id, bookmakers });
    if (remainingRequests != null) lastRR = remainingRequests;
    await new Promise(res => setTimeout(res, 150));
  }
  return {
    oddsIndex: buildOddsIndex(allPropsData, selectedBooks),
    gameIndex:  buildGameIndex(games, gameLines),
    remainingRequests: lastRR != null ? parseInt(lastRR) : null,
    gamesCount: games.length,
  };
}

const STD_RATIOS = { pts: 0.30, reb: 0.42, ast: 0.40, stl: 0.65, blk: 0.75, threes: 0.52 };

function estimateStdDev(statKey, mean) {
  const m = parseFloat(mean);
  if (isNaN(m) || m <= 0) return 0;
  return Math.round(m * (STD_RATIOS[statKey] || 0.35) * 10) / 10;
}

// ── Distribution Bar ────────────────────────────────────────────────
function DistBar({ simValues, propLine }) {
  if (!simValues || simValues.length === 0) return null;
  const line = parseFloat(propLine);
  if (isNaN(line)) return null;
  const N = Math.min(simValues.length, 5000);
  let min = Infinity, max = -Infinity;
  for (let i = 0; i < N; i++) {
    if (simValues[i] < min) min = simValues[i];
    if (simValues[i] > max) max = simValues[i];
  }
  const buckets = 40, counts = new Array(buckets).fill(0), range = max - min || 1;
  for (let i = 0; i < N; i++) {
    const idx = Math.min(buckets - 1, Math.max(0, Math.floor(((simValues[i] - min) / range) * buckets)));
    counts[idx]++;
  }
  const maxC = Math.max(...counts);
  const linePos = Math.min(100, Math.max(0, ((line - min) / range) * 100));
  return (
    <div style={{ position: "relative", height: 32, width: "100%", display: "flex", alignItems: "flex-end", gap: 1 }}>
      {counts.map((c, i) => (
        <div key={i} style={{
          flex: 1, height: `${(c / maxC) * 100}%`, minHeight: c > 0 ? 2 : 0,
          backgroundColor: ((i / buckets) * range + min) > line ? "rgba(34,197,94,0.5)" : "rgba(239,68,68,0.35)",
          borderRadius: "1px 1px 0 0",
        }} />
      ))}
      <div style={{ position: "absolute", left: `${linePos}%`, top: 0, bottom: 0, width: 2, backgroundColor: "#f8fafc", opacity: 0.9 }} />
    </div>
  );
}

// ── Edge Box ────────────────────────────────────────────────────────
// kellyFraction: 0.25=¼K, 0.333=⅓K, 0.5=½K, 1.0=Full K
// unitSize: dollar value of 1 unit (e.g. 20 → $20/unit)
// ladderMode: splits stake into 3 rungs (40/35/25% of total budget)
function EdgeBox({ modelProb, bookOdds, otherSideOdds = null, bankroll, portfolioFactor = null, kellyFraction = 0.25, unitSize = "20", ladderMode = false, onLogBet = null, side = null }) {
  const bookProbRaw = americanToProb(bookOdds);
  if (!bookProbRaw) return null;
  // Vig-free: normalize using both sides when available; fall back to raw otherwise
  const otherRaw = otherSideOdds != null ? americanToProb(otherSideOdds) : null;
  const vigRemoved = !!(bookProbRaw && otherRaw);
  const bookProb = vigRemoved ? bookProbRaw / (bookProbRaw + otherRaw) : bookProbRaw;
  const edge = (modelProb - bookProb) * 100;           // primary: vig-free when possible
  const rawEdge = (modelProb - bookProbRaw) * 100;     // secondary reference
  const color = getEdgeColor(edge);
  const kelly = calcKelly(modelProb, bookOdds);
  const isolatedKF = kelly ? kelly * kellyFraction : 0;
  const isPortfolio = portfolioFactor !== null && portfolioFactor < 0.9999;
  // Portfolio adjustment: scale the fractional stake by portfolio factor
  const portfolioKF = isPortfolio ? kelly * portfolioFactor * kellyFraction : isolatedKF;
  const br = parseFloat(bankroll);
  const hasBankroll = !isNaN(br) && br > 0;
  const us = parseFloat(unitSize);
  const hasUnitSize = !isNaN(us) && us > 0;
  // True EV per dollar wagered: (modelProb × decimalOdds − 1) × 100
  const decimal = americanToDecimal(bookOdds);
  const ev = decimal != null ? (modelProb * decimal - 1) * 100 : null;

  // Derive stake and unit label
  const stakeAmt = hasBankroll ? Math.round(br * portfolioKF) : null;
  const unitAmt = (hasBankroll && hasUnitSize && stakeAmt != null)
    ? Math.round((stakeAmt / us) * 2) / 2  // round to nearest 0.5U
    : null;

  // Kelly fraction label for display
  const kfLabel = kellyFraction >= 1.0 ? "K" : kellyFraction >= 0.5 ? "½K" : kellyFraction >= 0.333 ? "⅓K" : "¼K";

  // Ladder rungs: Rung1=40%, Rung2=35%, Rung3=25% of total stakeAmt
  // Rung 1 must independently have Kelly > 0 (it does by definition when edge > 0)
  const ladderRungs = (ladderMode && kelly > 0 && hasBankroll && stakeAmt > 0) ? [
    { label: "R1 Entry", pct: 0.40, amt: Math.round(stakeAmt * 0.40) },
    { label: "R2 Add",   pct: 0.35, amt: Math.round(stakeAmt * 0.35) },
    { label: "R3 Top",   pct: 0.25, amt: Math.round(stakeAmt * 0.25) },
  ] : null;

  return (
    <div style={{
      marginTop: 6, padding: "6px 8px",
      backgroundColor: edge >= 1.5 ? `${color}11` : "rgba(15,23,42,0.4)",
      border: `1px solid ${edge >= 1.5 ? color + "44" : "rgba(148,163,184,0.1)"}`,
      borderRadius: 5,
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ fontSize: 9, color: "#64748b", fontFamily: "'JetBrains Mono', monospace" }}>
          BOOK {fmtOdds(bookOdds)} → {(bookProbRaw * 100).toFixed(1)}%{vigRemoved ? ` (vf ${(bookProb * 100).toFixed(1)}%)` : ""}
        </div>
        <div style={{ fontSize: 9, fontWeight: 800, letterSpacing: 1, color, fontFamily: "'JetBrains Mono', monospace" }}>
          {getEdgeLabel(edge)}
        </div>
      </div>
      <div style={{ display: "flex", alignItems: "baseline", gap: 6, marginTop: 3 }}>
        <span style={{ fontSize: 18, fontWeight: 800, fontFamily: "'JetBrains Mono', monospace", color: edge >= 1.5 ? color : "#475569" }}>
          {edge >= 0 ? "+" : ""}{edge.toFixed(1)}%
        </span>
        <span style={{ fontSize: 10, color: "#64748b", fontFamily: "'JetBrains Mono', monospace" }}>{vigRemoved ? "VF EDGE" : "EDGE"}</span>
        {vigRemoved && (
          <span style={{ fontSize: 10, color: "#475569", fontFamily: "'JetBrains Mono', monospace" }}>
            · raw {rawEdge >= 0 ? "+" : ""}{rawEdge.toFixed(1)}%
          </span>
        )}
        {ev != null && (
          <span style={{ fontSize: 10, color: ev >= 0 ? "#64748b" : "#ef444488", fontFamily: "'JetBrains Mono', monospace", marginLeft: 4 }}>
            · EV {ev >= 0 ? "+" : ""}{ev.toFixed(1)}%
          </span>
        )}
      </div>
      {kelly > 0 && (
        <div style={{ marginTop: 4, paddingTop: 4, borderTop: "1px solid rgba(148,163,184,0.20)" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 9, color: "#64748b", fontFamily: "'JetBrains Mono', monospace" }}>
              {isPortfolio ? "P" : ""}{kfLabel}: {(portfolioKF * 100).toFixed(2)}%
              {stakeAmt != null ? ` → $${stakeAmt}` : ""}
              {unitAmt != null ? ` (${unitAmt}U)` : ""}
            </span>
            <span style={{ fontSize: 8, color: "#475569", fontFamily: "'JetBrains Mono', monospace" }}>
              FULL: {(kelly * 100).toFixed(1)}%
            </span>
          </div>
          {isPortfolio && (
            <div style={{ fontSize: 8, color: "#475569", fontFamily: "'JetBrains Mono', monospace", marginTop: 2 }}>
              ISO{kfLabel}: {(isolatedKF * 100).toFixed(2)}%
            </div>
          )}
          {ladderRungs && (
            <div style={{ marginTop: 4, paddingTop: 4, borderTop: "1px solid rgba(167,139,250,0.12)" }}>
              <div style={{ fontSize: 8, color: "#a78bfa", fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, marginBottom: 3, letterSpacing: 0.5 }}>
                LADDER — total ${stakeAmt}
              </div>
              {ladderRungs.map(({ label: rl, pct, amt }) => {
                const ru = (hasUnitSize && us > 0) ? Math.round((amt / us) * 2) / 2 : null;
                return (
                  <div key={rl} style={{ display: "flex", justifyContent: "space-between", fontSize: 8, color: "#94a3b8", fontFamily: "'JetBrains Mono', monospace", marginBottom: 1 }}>
                    <span style={{ color: "#a78bfa" }}>{rl}</span>
                    <span>${amt}{ru != null ? ` · ${ru}U` : ""} <span style={{ color: "#475569" }}>({(pct * 100).toFixed(0)}%)</span></span>
                  </div>
                );
              })}
              <div style={{ fontSize: 7, color: "#475569", fontFamily: "'JetBrains Mono', monospace", marginTop: 3, fontStyle: "italic" }}>
                R1 must be EV+ standalone · R2/R3 on improved line or steam
              </div>
            </div>
          )}
        </div>
      )}
      {onLogBet && edge >= 1.5 && (
        <div style={{ marginTop: 5, paddingTop: 5, borderTop: "1px solid rgba(148,163,184,0.08)" }}>
          <button
            onClick={() => onLogBet({ side, modelProb, bookOdds, fairOdds: probToAmerican(modelProb), edgePct: edge, stake: stakeAmt })}
            style={{ width: "100%", padding: "4px 0", borderRadius: 4, fontWeight: 700, fontSize: 8, fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1, cursor: "pointer", border: "1px solid rgba(245,158,11,0.35)", background: "rgba(245,158,11,0.08)", color: "#f59e0b" }}>
            + LOG BET
          </button>
        </div>
      )}
    </div>
  );
}

// ── Result Row ──────────────────────────────────────────────────────
const DIST_MODEL_STYLE = {
  KDE:       { color: "#22d3ee", bg: "rgba(34,211,238,0.08)", border: "rgba(34,211,238,0.25)" },
  Gamma:     { color: "#f59e0b", bg: "rgba(245,158,11,0.08)",  border: "rgba(245,158,11,0.25)"  },
  LogNormal: { color: "#60a5fa", bg: "rgba(96,165,250,0.08)",  border: "rgba(96,165,250,0.25)"  },
  NegBin:    { color: "#a78bfa", bg: "rgba(167,139,250,0.08)", border: "rgba(167,139,250,0.25)" },
  Poisson:   { color: "#fb923c", bg: "rgba(251,146,60,0.08)",  border: "rgba(251,146,60,0.25)"  },
  Direct:    { color: "#34d399", bg: "rgba(52,211,153,0.08)",  border: "rgba(52,211,153,0.25)"  },
  Summed:    { color: "#94a3b8", bg: "rgba(148,163,184,0.06)", border: "rgba(148,163,184,0.18)" },
};

function ResultRow({ label, prob, propLine, simValues, overOdds, underOdds, bankroll, portfolioFactorOver = null, portfolioFactorUnder = null, distModel = null, kellyFraction = 0.25, unitSize = "20", ladderMode = false, onLogBetOver = null, onLogBetUnder = null, ciOver = null, ciUnder = null, projUncertaintyMode = false }) {
  if (!prob) return null;
  const overPct = (prob.over * 100).toFixed(1);
  const underPct = (prob.under * 100).toFixed(1);

  const hasOver = overOdds !== "" && !isNaN(parseFloat(overOdds));
  const hasUnder = underOdds !== "" && !isNaN(parseFloat(underOdds));

  // Use vig-free book probabilities when both sides are available
  const vfProbs = (hasOver && hasUnder) ? vigFreeProb(parseFloat(overOdds), parseFloat(underOdds)) : null;
  const overBookProb  = hasOver  ? (vfProbs ? vfProbs.over  : americanToProb(parseFloat(overOdds)))  : null;
  const underBookProb = hasUnder ? (vfProbs ? vfProbs.under : americanToProb(parseFloat(underOdds))) : null;
  const overEdge  = overBookProb  != null ? (prob.over  - overBookProb)  * 100 : null;
  const underEdge = underBookProb != null ? (prob.under - underBookProb) * 100 : null;
  const bestEdge = Math.max(overEdge ?? -999, underEdge ?? -999);
  const bestSide = (overEdge ?? -999) >= (underEdge ?? -999) ? "OVER" : "UNDER";
  const modelStyle = distModel ? (DIST_MODEL_STYLE[distModel] ?? DIST_MODEL_STYLE.LogNormal) : null;

  return (
    <div style={{
      backgroundColor: "rgba(15,23,42,0.6)",
      border: bestEdge >= 3 ? `1px solid ${getEdgeColor(bestEdge)}33` : "1px solid rgba(148,163,184,0.12)",
      borderRadius: 8, padding: "12px 16px", marginBottom: 8,
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 13, color: "#e2e8f0", letterSpacing: 1 }}>
            {label}
          </span>
          <span style={{ fontSize: 12, color: "#64748b" }}>LINE {propLine}</span>
          {modelStyle && (
            <span style={{
              fontSize: 8, fontWeight: 700, letterSpacing: 0.8, fontFamily: "'JetBrains Mono', monospace",
              color: modelStyle.color, backgroundColor: modelStyle.bg,
              border: `1px solid ${modelStyle.border}`,
              borderRadius: 3, padding: "1px 5px",
            }}>
              {distModel}
            </span>
          )}
        </div>
        {bestEdge >= 1.5 && (
          <div style={{
            padding: "2px 8px", borderRadius: 4,
            backgroundColor: getEdgeColor(bestEdge) + "22",
            border: `1px solid ${getEdgeColor(bestEdge)}44`,
            fontSize: 10, fontWeight: 700, fontFamily: "'JetBrains Mono', monospace",
            color: getEdgeColor(bestEdge),
          }}>
            {bestSide} +{bestEdge.toFixed(1)}%
          </div>
        )}
      </div>

      <DistBar simValues={simValues} propLine={propLine} />

      <div style={{ display: "flex", gap: 12, marginTop: 10 }}>
        <div style={{ flex: 1 }}>
          <div style={{
            backgroundColor: "rgba(34,197,94,0.08)", border: `1px solid ${getProbColor(prob.over)}33`,
            borderRadius: 6, padding: "8px 12px", textAlign: "center",
          }}>
            <div style={{ fontSize: 11, color: "#94a3b8", marginBottom: 2, fontFamily: "'JetBrains Mono', monospace" }}>OVER</div>
            <div style={{ fontSize: 20, fontWeight: 700, color: getProbColor(prob.over), fontFamily: "'JetBrains Mono', monospace" }}>
              {overPct}%
            </div>
            <div style={{ fontSize: 12, color: "#94a3b8", fontFamily: "'JetBrains Mono', monospace" }}>
              Fair: {probToAmerican(prob.over)}
            </div>
            {ciOver && projUncertaintyMode && (
              <div style={{ fontSize: 7, color: "#475569", fontFamily: "'JetBrains Mono', monospace", marginTop: 1 }}>
                ±{((ciOver.hi - ciOver.lo) / 2 * 100).toFixed(1)}pp
              </div>
            )}
          </div>
          {hasOver ? <EdgeBox modelProb={prob.over} bookOdds={parseFloat(overOdds)} otherSideOdds={hasUnder ? parseFloat(underOdds) : null} bankroll={bankroll} portfolioFactor={portfolioFactorOver} kellyFraction={kellyFraction} unitSize={unitSize} ladderMode={ladderMode} onLogBet={onLogBetOver} side="over" /> : (
            <div style={{ marginTop: 6, fontSize: 9, color: "#475569", fontFamily: "'JetBrains Mono', monospace", textAlign: "center", fontStyle: "italic" }}>
              No over odds entered
            </div>
          )}
        </div>

        <div style={{ flex: 1 }}>
          <div style={{
            backgroundColor: "rgba(239,68,68,0.06)", border: `1px solid ${getProbColor(prob.under)}33`,
            borderRadius: 6, padding: "8px 12px", textAlign: "center",
          }}>
            <div style={{ fontSize: 11, color: "#94a3b8", marginBottom: 2, fontFamily: "'JetBrains Mono', monospace" }}>UNDER</div>
            <div style={{ fontSize: 20, fontWeight: 700, color: getProbColor(prob.under), fontFamily: "'JetBrains Mono', monospace" }}>
              {underPct}%
            </div>
            <div style={{ fontSize: 12, color: "#94a3b8", fontFamily: "'JetBrains Mono', monospace" }}>
              Fair: {probToAmerican(prob.under)}
            </div>
            {ciUnder && projUncertaintyMode && (
              <div style={{ fontSize: 7, color: "#475569", fontFamily: "'JetBrains Mono', monospace", marginTop: 1 }}>
                ±{((ciUnder.hi - ciUnder.lo) / 2 * 100).toFixed(1)}pp
              </div>
            )}
          </div>
          {hasUnder ? <EdgeBox modelProb={prob.under} bookOdds={parseFloat(underOdds)} otherSideOdds={hasOver ? parseFloat(overOdds) : null} bankroll={bankroll} portfolioFactor={portfolioFactorUnder} kellyFraction={kellyFraction} unitSize={unitSize} ladderMode={ladderMode} onLogBet={onLogBetUnder} side="under" /> : (
            <div style={{ marginTop: 6, fontSize: 9, color: "#475569", fontFamily: "'JetBrains Mono', monospace", textAlign: "center", fontStyle: "italic" }}>
              No under odds entered
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Alt Line Ladder ──────────────────────────────────────────────────
function LadderTable({ statKey, mean, simValues, primaryLine, open, onToggle }) {
  if (!simValues || simValues.length === 0) return null;
  const rungs = getAltLines(statKey, mean);
  if (rungs.length === 0) return null;

  const interval =
    statKey === 'pts'                                           ? '5pt'   :
    (statKey === 'pra' || statKey === 'pr' || statKey === 'pa') ? '2.5pt' :
    statKey === 'sb'                                            ? '0.5pt' : '1pt';
  const primaryLineNum = parseFloat(primaryLine);

  return (
    <div style={{ marginBottom: 8, marginTop: -4 }}>
      {/* Toggle header */}
      <div
        onClick={onToggle}
        style={{
          display: "flex", alignItems: "center", gap: 6, padding: "4px 10px",
          cursor: "pointer", borderRadius: "0 0 6px 6px",
          backgroundColor: "rgba(15,23,42,0.35)",
          border: "1px solid rgba(148,163,184,0.20)", borderTop: "none",
        }}
      >
        <span style={{ fontSize: 8, fontWeight: 700, letterSpacing: 1, color: "#475569", fontFamily: "'JetBrains Mono', monospace" }}>
          {open ? "▲" : "▼"} ALT LINES · {interval} intervals
        </span>
      </div>

      {/* Ladder table */}
      {open && (
        <div style={{
          backgroundColor: "rgba(15,23,42,0.25)",
          border: "1px solid rgba(148,163,184,0.20)", borderTop: "none",
          borderRadius: "0 0 8px 8px", overflow: "hidden",
        }}>
          {/* Column headers */}
          <div style={{
            display: "grid", gridTemplateColumns: "60px 1fr 80px 1fr 80px",
            padding: "4px 10px", borderBottom: "1px solid rgba(148,163,184,0.20)",
          }}>
            {["LINE", "OVER %", "FAIR", "UNDER %", "FAIR"].map((h, i) => (
              <div key={i} style={{ fontSize: 7, fontWeight: 700, color: "#475569", fontFamily: "'JetBrains Mono', monospace", letterSpacing: 0.8, textAlign: i === 0 ? "left" : "center" }}>
                {h}
              </div>
            ))}
          </div>

          {/* Rung rows */}
          {rungs.map((rung) => {
            const p = calcProbability(simValues, rung);
            if (!p) return null;
            const isPrimary = !isNaN(primaryLineNum) && Math.abs(rung - primaryLineNum) < 0.01;
            const overColor  = getProbColor(p.over);
            const underColor = getProbColor(p.under);
            return (
              <div
                key={rung}
                style={{
                  display: "grid", gridTemplateColumns: "60px 1fr 80px 1fr 80px",
                  padding: "4px 10px", alignItems: "center",
                  backgroundColor: isPrimary ? "rgba(99,102,241,0.10)" : "transparent",
                  borderBottom: "1px solid rgba(148,163,184,0.04)",
                  borderLeft: isPrimary ? "2px solid rgba(99,102,241,0.5)" : "2px solid transparent",
                }}
              >
                <div style={{ fontSize: 11, fontWeight: isPrimary ? 700 : 500, color: isPrimary ? "#a5b4fc" : "#94a3b8", fontFamily: "'JetBrains Mono', monospace" }}>
                  {rung.toFixed(1)}
                </div>
                <div style={{ textAlign: "center", fontSize: 11, fontWeight: 600, color: overColor, fontFamily: "'JetBrains Mono', monospace" }}>
                  {(p.over * 100).toFixed(1)}%
                </div>
                <div style={{ textAlign: "center", fontSize: 9, color: "#64748b", fontFamily: "'JetBrains Mono', monospace" }}>
                  {probToAmerican(p.over)}
                </div>
                <div style={{ textAlign: "center", fontSize: 11, fontWeight: 600, color: underColor, fontFamily: "'JetBrains Mono', monospace" }}>
                  {(p.under * 100).toFixed(1)}%
                </div>
                <div style={{ textAlign: "center", fontSize: 9, color: "#64748b", fontFamily: "'JetBrains Mono', monospace" }}>
                  {probToAmerican(p.under)}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Batch Results Table ──────────────────────────────────────────────
function BatchResultsTable({ results, sortCol, sortDir, onSort, minEdge, setMinEdge,
  statFilter, setStatFilter, positiveOnly, setPositiveOnly,
  bankroll, onExport, csvData, csvCopied, onCopyCsv }) {
  const { useMemo } = React;

  const filtered = useMemo(() => {
    return results
      .filter(r =>
        (!positiveOnly || r.edge > 0) &&
        r.edge >= minEdge &&
        statFilter.has(r.stat)
      )
      .sort((a, b) => {
        const mult = sortDir === 'desc' ? -1 : 1;
        const av = a[sortCol] ?? (typeof a[sortCol] === 'string' ? '' : -Infinity);
        const bv = b[sortCol] ?? (typeof b[sortCol] === 'string' ? '' : -Infinity);
        if (typeof av === 'string') return mult * av.localeCompare(bv);
        return mult * (av - bv);
      });
  }, [results, positiveOnly, minEdge, statFilter, sortCol, sortDir]);

  const cols = [
    { key: 'player',    label: 'PLAYER',   style: { minWidth: 100, textAlign: 'left'   } },
    { key: 'team',      label: 'TM',       style: { width: 30,    textAlign: 'center' } },
    { key: 'statLabel', label: 'STAT',     style: { width: 32,    textAlign: 'center' } },
    { key: 'propLine',  label: 'LINE',     style: { width: 38,    textAlign: 'right'  } },
    { key: 'side',      label: 'SIDE',     style: { width: 40,    textAlign: 'center' } },
    { key: 'bookOdds',  label: 'ODDS',     style: { width: 42,    textAlign: 'right'  } },
    { key: 'modelProb', label: 'MODEL%',   style: { width: 52,    textAlign: 'right'  } },
    { key: 'edge',      label: 'EDGE%',    style: { width: 52,    textAlign: 'right'  } },
    { key: 'edgeLabel', label: 'RATING',   style: { width: 60,    textAlign: 'center' } },
    { key: 'kellyPct',  label: '¼K%',      style: { width: 42,    textAlign: 'right'  } },
    { key: 'gameTotal', label: 'O/U',      style: { width: 40,    textAlign: 'right'  } },
    { key: 'spread',    label: 'SPRD',     style: { width: 44,    textAlign: 'right'  } },
  ];

  const hdrStyle = {
    fontSize: 8, fontWeight: 700, color: '#64748b',
    fontFamily: "'JetBrains Mono', monospace", letterSpacing: 0.8,
    padding: '5px 4px', cursor: 'pointer', userSelect: 'none',
    borderBottom: '1px solid rgba(148,163,184,0.12)',
    position: 'sticky', top: 0,
    backgroundColor: 'rgba(11,15,26,0.97)',
    whiteSpace: 'nowrap',
  };
  const cellStyle = {
    fontSize: 10, fontFamily: "'JetBrains Mono', monospace",
    padding: '4px 4px', borderBottom: '1px solid rgba(148,163,184,0.04)',
    whiteSpace: 'nowrap', overflow: 'hidden',
  };

  const strongCount   = results.filter(r => r.edge >= 5).length;
  const solidCount    = results.filter(r => r.edge >= 3 && r.edge < 5).length;
  const marginalCount = results.filter(r => r.edge >= 1.5 && r.edge < 3).length;

  const allStats = ['pts','reb','ast','stl','blk','threes'];
  const statLabels = { pts:'PTS', reb:'REB', ast:'AST', stl:'STL', blk:'BLK', threes:'3PM' };

  return (
    <div>
      {/* Filter row */}
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 10, alignItems: 'center', marginBottom: 10 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <span style={{ fontSize: 9, color: '#64748b', fontFamily: "'JetBrains Mono', monospace", whiteSpace: 'nowrap' }}>
            MIN EDGE
          </span>
          <input type="range" min={-10} max={10} step={0.5} value={minEdge}
            onChange={e => setMinEdge(parseFloat(e.target.value))}
            style={{ width: 80, accentColor: '#6366f1' }} />
          <span style={{ fontSize: 9, color: '#94a3b8', fontFamily: "'JetBrains Mono', monospace", minWidth: 32 }}>
            {minEdge >= 0 ? '+' : ''}{minEdge.toFixed(1)}%
          </span>
        </div>
        <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
          {allStats.map(s => (
            <button key={s} onClick={() => {
              setStatFilter(prev => {
                const next = new Set(prev);
                if (next.has(s)) next.delete(s); else next.add(s);
                return next;
              });
            }} style={{
              padding: '2px 7px', borderRadius: 4, fontSize: 8, fontWeight: 700,
              fontFamily: "'JetBrains Mono', monospace", cursor: 'pointer',
              border: statFilter.has(s) ? '1px solid rgba(99,102,241,0.5)' : '1px solid rgba(148,163,184,0.15)',
              background: statFilter.has(s) ? 'rgba(99,102,241,0.15)' : 'rgba(15,23,42,0.4)',
              color: statFilter.has(s) ? '#a5b4fc' : '#475569',
            }}>{statLabels[s]}</button>
          ))}
        </div>
        <button onClick={() => setPositiveOnly(p => !p)} style={{
          padding: '2px 8px', borderRadius: 4, fontSize: 8, fontWeight: 700,
          fontFamily: "'JetBrains Mono', monospace", cursor: 'pointer',
          border: positiveOnly ? '1px solid rgba(34,197,94,0.4)' : '1px solid rgba(148,163,184,0.15)',
          background: positiveOnly ? 'rgba(34,197,94,0.1)' : 'rgba(15,23,42,0.4)',
          color: positiveOnly ? '#4ade80' : '#475569',
        }}>+EV ONLY</button>
      </div>

      {/* Summary + export row */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
        <div style={{ display: 'flex', gap: 10 }}>
          <span style={{ fontSize: 9, color: '#64748b', fontFamily: "'JetBrains Mono', monospace" }}>
            {filtered.length} rows
          </span>
          {strongCount > 0 && <span style={{ fontSize: 9, color: '#22c55e', fontFamily: "'JetBrains Mono', monospace", fontWeight: 700 }}>
            {strongCount} STRONG
          </span>}
          {solidCount > 0 && <span style={{ fontSize: 9, color: '#4ade80', fontFamily: "'JetBrains Mono', monospace", fontWeight: 700 }}>
            {solidCount} SOLID
          </span>}
          {marginalCount > 0 && <span style={{ fontSize: 9, color: '#86efac', fontFamily: "'JetBrains Mono', monospace" }}>
            {marginalCount} MARGINAL
          </span>}
        </div>
        <button onClick={onExport}
          style={{ padding: '4px 12px', borderRadius: 4, border: '1px solid rgba(148,163,184,0.2)',
            background: 'rgba(15,23,42,0.5)', color: '#94a3b8',
            fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 9,
            cursor: 'pointer' }}>
          EXPORT CSV
        </button>
      </div>

      {/* Table */}
      <div style={{ overflowX: 'auto', borderRadius: 6, border: '1px solid rgba(148,163,184,0.20)' }}>
        <div style={{ minWidth: 580 }}>
          {/* Header */}
          <div style={{ display: 'flex' }}>
            {cols.map(c => (
              <div key={c.key} style={{ ...hdrStyle, ...c.style }} onClick={() => onSort(c.key)}>
                {c.label}{sortCol === c.key ? (sortDir === 'desc' ? ' ↓' : ' ↑') : ''}
              </div>
            ))}
          </div>
          {/* Body */}
          <div style={{ maxHeight: 520, overflowY: 'auto' }}>
            {filtered.length === 0 ? (
              <div style={{ padding: '20px', textAlign: 'center', fontSize: 10,
                color: '#475569', fontFamily: "'JetBrains Mono', monospace" }}>
                No results match current filters
              </div>
            ) : filtered.map((r, i) => {
              const edgeColor = getEdgeColor(r.edge);
              const rowBg = r.edge >= 5 ? 'rgba(34,197,94,0.07)'
                : r.edge >= 3 ? 'rgba(34,197,94,0.03)' : 'transparent';
              return (
                <div key={i} style={{ display: 'flex', backgroundColor: rowBg }}>
                  <div style={{ ...cellStyle, ...cols[0].style, color: '#e2e8f0',
                    overflow: 'hidden', textOverflow: 'ellipsis' }}>
                    {r.player}
                  </div>
                  <div style={{ ...cellStyle, ...cols[1].style, color: '#64748b' }}>{r.team}</div>
                  <div style={{ ...cellStyle, ...cols[2].style, color: '#94a3b8' }}>{r.statLabel}</div>
                  <div style={{ ...cellStyle, ...cols[3].style, color: '#94a3b8' }}>{r.propLine}</div>
                  <div style={{ ...cellStyle, ...cols[4].style,
                    color: r.side === 'OVER' ? '#4ade80' : '#f87171',
                    fontWeight: 700, fontSize: 9 }}>
                    {r.side}
                  </div>
                  <div style={{ ...cellStyle, ...cols[5].style, color: '#94a3b8' }}>
                    {fmtOdds(r.bookOdds)}
                  </div>
                  <div style={{ ...cellStyle, ...cols[6].style, color: getProbColor(r.modelProb) }}>
                    {(r.modelProb * 100).toFixed(1)}%
                  </div>
                  <div style={{ ...cellStyle, ...cols[7].style, color: edgeColor, fontWeight: 700 }}>
                    {r.edge >= 0 ? '+' : ''}{r.edge.toFixed(1)}%
                  </div>
                  <div style={{ ...cellStyle, ...cols[8].style }}>
                    <span style={{ fontSize: 8, color: edgeColor, fontWeight: 700,
                      backgroundColor: `${edgeColor}18`, border: `1px solid ${edgeColor}30`,
                      padding: '1px 4px', borderRadius: 3 }}>
                      {r.edgeLabel}
                    </span>
                  </div>
                  <div style={{ ...cellStyle, ...cols[9].style, color: '#64748b' }}>
                    {r.kellyPct > 0 ? r.kellyPct.toFixed(2) + '%' : '—'}
                  </div>
                  <div style={{ ...cellStyle, ...cols[10].style, color: '#64748b' }}>
                    {r.gameTotal ?? '—'}
                  </div>
                  <div style={{ ...cellStyle, ...cols[11].style, color: '#64748b' }}>
                    {r.spread != null ? (r.spread > 0 ? '+' : '') + r.spread : '—'}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* CSV export section */}
      {csvData && (
        <div style={{ marginTop: 10, padding: '8px 10px', borderRadius: 6,
          backgroundColor: 'rgba(15,23,42,0.6)', border: '1px solid rgba(148,163,184,0.10)' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
            <span style={{ fontSize: 9, color: '#94a3b8', fontFamily: "'JetBrains Mono', monospace", fontWeight: 700 }}>
              BATCH CSV
            </span>
            <button onClick={onCopyCsv} style={{ padding: '3px 10px', borderRadius: 4,
              border: csvCopied ? '1px solid rgba(34,197,94,0.4)' : '1px solid rgba(99,102,241,0.4)',
              background: csvCopied ? 'rgba(34,197,94,0.12)' : 'rgba(99,102,241,0.12)',
              color: csvCopied ? '#22c55e' : '#a5b4fc',
              fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 9,

}

// ── CSV Export ───────────────────────────────────────────────────────
function buildCSV(playerName, numSims, statResults, comboResults, timestamp, bankroll, portfolioFactors = {}, kellyFraction = 0.25, unitSize = "20") {
  const kfLabel = kellyFraction >= 1.0 ? "K" : kellyFraction >= 0.5 ? "½K" : kellyFraction >= 0.333 ? "⅓K" : "¼K";
  const headers = [
    "Timestamp", "Date", "Player", "Stat", "Projection", "Std Dev", "SD Method", "CV %",
    "Prop Line", "Book Over Odds", "Book Under Odds",
    "Model Over %", "Model Under %",
    "Fair Over Odds", "Fair Under Odds",
    "Over Edge %", "Under Edge %",
    "Best Side", "Best Edge %", "Edge Rating",
    `${kfLabel} %`, "Stake $", "Units",
    "Simulations"
  ];

  const rows = [];
  const dateStr = new Date().toLocaleDateString("en-US");
  const br = parseFloat(bankroll);
  const hasBr = !isNaN(br) && br > 0;

  const addRow = (stat, label, prob, propLine, overOdds, underOdds, mean, std, stdMethod, cvValue) => {
    if (!prob) return;
    const overProb = prob.over;
    const underProb = prob.under;
    const bookOverProbRaw  = americanToProb(parseFloat(overOdds));
    const bookUnderProbRaw = americanToProb(parseFloat(underOdds));
    // Use vig-free probabilities when both sides are available
    const vfP = (bookOverProbRaw && bookUnderProbRaw)
      ? { over: bookOverProbRaw / (bookOverProbRaw + bookUnderProbRaw), under: bookUnderProbRaw / (bookOverProbRaw + bookUnderProbRaw) }
      : null;
    const bookOverProb  = vfP ? vfP.over  : bookOverProbRaw;
    const bookUnderProb = vfP ? vfP.under : bookUnderProbRaw;
    const overEdge  = bookOverProb  ? ((overProb  - bookOverProb)  * 100) : "";
    const underEdge = bookUnderProb ? ((underProb - bookUnderProb) * 100) : "";
    const bestEdgeVal = Math.max(
      typeof overEdge === "number" ? overEdge : -999,
      typeof underEdge === "number" ? underEdge : -999
    );
    const bestSide = bestEdgeVal === -999 ? "" :
      (overEdge >= underEdge ? "OVER" : "UNDER");
    const bestEdgeStr = bestEdgeVal === -999 ? "" : bestEdgeVal.toFixed(1);
    const rating = bestEdgeVal >= 5 ? "STRONG" : bestEdgeVal >= 3 ? "SOLID" :
      bestEdgeVal >= 1.5 ? "MARGINAL" : "NO EDGE";

    // Portfolio-adjusted Kelly for best side (using user-selected kellyFraction)
    let kfKelly = "";
    let stake = "";
    let units = "";
    const us = parseFloat(unitSize);
    const hasUs = !isNaN(us) && us > 0;
    if (bestSide === "OVER" && overOdds) {
      const k = calcKelly(overProb, parseFloat(overOdds));
      if (k && k > 0) {
        const pf = portfolioFactors[`${stat}_over`] ?? null;
        const adj = pf !== null ? k * pf : k;
        const adjKF = adj * kellyFraction;
        kfKelly = (adjKF * 100).toFixed(2);
        const stakeAmt = hasBr ? Math.round(br * adjKF) : null;
        stake = stakeAmt ?? "";
        units = (stakeAmt != null && hasUs) ? (Math.round((stakeAmt / us) * 2) / 2).toString() : "";
      }
    } else if (bestSide === "UNDER" && underOdds) {
      const k = calcKelly(underProb, parseFloat(underOdds));
      if (k && k > 0) {
        const pf = portfolioFactors[`${stat}_under`] ?? null;
        const adj = pf !== null ? k * pf : k;
        const adjKF = adj * kellyFraction;
        kfKelly = (adjKF * 100).toFixed(2);
        const stakeAmt = hasBr ? Math.round(br * adjKF) : null;
        stake = stakeAmt ?? "";
        units = (stakeAmt != null && hasUs) ? (Math.round((stakeAmt / us) * 2) / 2).toString() : "";
      }
    }

    rows.push([
      timestamp, dateStr, playerName, label,
      mean ?? "", std ?? "", stdMethod || "", cvValue || "",
      propLine, overOdds || "", underOdds || "",
      (overProb * 100).toFixed(1), (underProb * 100).toFixed(1),
      probToAmerican(overProb), probToAmerican(underProb),
      typeof overEdge === "number" ? overEdge.toFixed(1) : "",
      typeof underEdge === "number" ? underEdge.toFixed(1) : "",
      bestSide, bestEdgeStr, bestEdgeVal > -999 ? rating : "",
      kfKelly, stake, units,
      numSims,
    ]);
  };

  if (statResults) {
    STAT_CONFIG.forEach(({ key, label }) => {
      const r = statResults[key];
      if (r) addRow(key, label, r.prob, r.propLine, r.overOdds, r.underOdds, r.mean, r.std, r.stdMethod, r.cvValue);
    });
  }
  if (comboResults) {
    COMBO_CONFIG.forEach(({ key, label }) => {
      const r = comboResults[key];
      if (r) addRow(key, label, r.prob, r.propLine, r.overOdds, r.underOdds, "", "", "Combo", "");
    });
  }

  const escape = (v) => {
    const s = String(v ?? "");
    return s.includes(",") || s.includes('"') ? `"${s.replace(/"/g, '""')}"` : s;
  };
  return [headers.map(escape).join(","), ...rows.map(r => r.map(escape).join(","))].join("\n");
}

// ── Batch CSV Export ─────────────────────────────────────────────────
function buildBatchCSV(batchResults, timestamp) {
  const headers = [

  const rows = batchResults.map(r => [

// ── ETR Projections Parser ───────────────────────────────────────────
function parseETRProjections(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  if (lines.length < 2) return { error: "Need at least a header row and one data row." };

  // Detect delimiter: prefer tabs (TSV copy/paste) over commas (CSV)
  const firstLine = lines[0];
  const isTSV = (firstLine.match(/\t/g) || []).length >= (firstLine.match(/,/g) || []).length;

  const splitRow = isTSV
    ? (line) => line.split('\t').map(s => s.trim())
    : (line) => {
        const result = []; let inQ = false, cur = '';
        for (const ch of line) {
          if (ch === '"') { inQ = !inQ; }
          else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
          else { cur += ch; }
        }
        result.push(cur.trim());
        return result;
      };

  const headers = splitRow(lines[0]).map(h => h.toLowerCase().replace(/[^a-z0-9 ]/g, '').trim());
  const col = (...names) => {
    for (const name of names) {
      const idx = headers.findIndex(h => h.includes(name));
      if (idx >= 0) return idx;
    }
    return -1;
  };

  const idxPlayer = col('player'); const idxPts    = col('point');
  const idxReb    = col('rebound'); const idxAst    = col('assist');
  const idxStl    = col('steal');  const idxBlk    = col('block');
  const idxThrees = col('three');  const idxPRA    = col('pra');
  const idxMin    = col('minute'); const idxTeam   = col('team');
  const idxOpp    = col('opponent'); const idxPos  = col('position');

  if (idxPlayer < 0 || idxPts < 0) return { error: "Could not find Player or Points columns. Check format." };

  const players = [];
  for (let i = 1; i < lines.length; i++) {
    const row = splitRow(lines[i]);
    const name = row[idxPlayer] || '';
    if (!name || name.toLowerCase() === 'player') continue;
    const pts = parseFloat(row[idxPts]);
    if (isNaN(pts)) continue;
    players.push({
      name,
      team:   idxTeam   >= 0 ? (row[idxTeam]   || '') : '',
      opp:    idxOpp    >= 0 ? (row[idxOpp]    || '') : '',
      pos:    idxPos    >= 0 ? (row[idxPos]    || '') : '',
      pts,
      reb:    idxReb    >= 0 ? parseFloat(row[idxReb])    || 0 : 0,
      ast:    idxAst    >= 0 ? parseFloat(row[idxAst])    || 0 : 0,
      stl:    idxStl    >= 0 ? parseFloat(row[idxStl])    || 0 : 0,
      blk:    idxBlk    >= 0 ? parseFloat(row[idxBlk])    || 0 : 0,
      threes: idxThrees >= 0 ? parseFloat(row[idxThrees]) || 0 : 0,
      pra:    idxPRA    >= 0 ? parseFloat(row[idxPRA])    || 0 : 0,
      min:    idxMin    >= 0 ? parseFloat(row[idxMin])    || 0 : 0,
    });
  }
  if (players.length === 0) return { error: "No valid player rows found. Check that headers include Player and Points." };
  players.sort((a, b) => a.name.localeCompare(b.name));
  return { players };
}

// ── Batch Sim: Build Stats Object Per Player ─────────────────────────
// Pure function — no state access. Builds the stats object runSimulation() expects,
// from a projection row + oddsData entry + cvDatabase entry.
// CV replicates handleLoadCv's sqrt(cvPer36² + cvMin²) effective CV formula.
// KDE raw data is intentionally omitted — batch uses parametric fallback for speed.
function buildPlayerStatsForSim(projection, playerOdds, cvData) {
  const CV_WINDOW = 'last20';
  const stats = {};
  STAT_CONFIG.forEach(({ key }) => {
    const mean = parseFloat(projection[key]) || 0;
    const oddsEntry = playerOdds?.[key];
    let cvMode = false, cvValue = '';
    if (cvData?.cv?.[key]?.[CV_WINDOW] != null && mean > 0) {
      const cvPer36 = cvData.cv[key][CV_WINDOW];
      const cvMin   = cvData.cv_minutes?.[CV_WINDOW] ?? null;
      const effective = cvMin != null
        ? Math.round(Math.sqrt(cvPer36 ** 2 + cvMin ** 2) * 10) / 10
        : Math.round(cvPer36 * 10) / 10;
      cvMode = true;
      cvValue = String(effective);
    }
    const stdDev = cvMode
      ? Math.round(mean * (parseFloat(cvValue) / 100) * 10) / 10
      : estimateStdDev(key, mean);
    stats[key] = {
      mean:        String(mean),
      stdDev,
      propLine:    oddsEntry?.line != null ? String(oddsEntry.line) : '',
      overOdds:    oddsEntry?.overOdds  != null ? String(Math.round(oddsEntry.overOdds))  : '',
      underOdds:   oddsEntry?.underOdds != null ? String(Math.round(oddsEntry.underOdds)) : '',
      cvMode,
      cvValue,
      stdOverride: false,
    };
  });
  return stats;
}

              </div>
              <div style={{ width: 70, fontSize: 8, color: '#94a3b8', fontFamily: "'JetBrains Mono', monospace", flexShrink: 0 }}>

              </div>
              <div style={{ width: 30, fontSize: 7, color: '#475569', fontFamily: "'JetBrains Mono', monospace", flexShrink: 0, textAlign: 'right' }}>n={b.n}</div>

}

  const [batchSortDir,      setBatchSortDir]       = useState('desc');
  const [batchMinEdge,      setBatchMinEdge]       = useState(0);
  const [batchStatFilter,   setBatchStatFilter]    = useState(new Set(['pts','reb','ast','stl','blk','threes']));
  const [batchPositiveOnly, setBatchPositiveOnly]  = useState(true);
  const [batchCsvData,      setBatchCsvData]       = useState(null);
  const [batchCsvCopied,    setBatchCsvCopied]     = useState(false);
  const [batchOpen,         setBatchOpen]          = useState(false);
  // Parlay odds inputs for correlated signal banner (3-leg PTS+REB+AST)
  const [parlayOdds, setParlayOdds] = useState({ over: "", under: "" });

  // Odds API state
  const [oddsApiKey, setOddsApiKey] = useState(() => localStorage.getItem('oddsApiKey') || '');
  const [selectedBooks, setSelectedBooks] = useState(() => {
    try { return JSON.parse(localStorage.getItem('selectedBooks') || '["draftkings","fanduel","betmgm","caesars","betrivers","espnbet"]'); }
