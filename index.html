// ── Game Slate View ───────────────────────────────────────────────────
// Groups filtered batch rows by game, surfacing matchup context, directional
// game-lean signals, and per-player multi-leg grouping.
function GameSlateView({ filtered, gameData, tracked, onToggleTrack }) {
  const { useMemo } = React;

  function fmtTipTime(isoStr) {
    if (!isoStr) return null;
    try {
      return new Date(isoStr).toLocaleTimeString('en-US', {
        hour: 'numeric', minute: '2-digit', timeZone: 'America/New_York', hour12: true,
      }) + ' ET';
    } catch { return null; }
  }

  const gameGroups = useMemo(() => {
    const groups = new Map();
    filtered.forEach(r => {
      const key = r.eventId || r.commenceTime || '__unknown__';
      if (!groups.has(key)) {
        const teamCtx = gameData?.[r.team?.toUpperCase()];
        groups.set(key, {
          key,
          commenceTime: r.commenceTime,
          gameTotal: r.gameTotal,
          spread: r.spread,
          homeTeam: teamCtx?.homeTeam ?? null,
          awayTeam: teamCtx?.awayTeam ?? null,
          rows: [],
        });
      }
      groups.get(key).rows.push(r);
    });

    const result = [];
    groups.forEach(g => {
      // Directional signal: look at plays with meaningful edge (≥ 1.5%)
      const qualPlays = g.rows.filter(r => r.edge >= 1.5);
      const overCount  = qualPlays.filter(r => r.side === 'OVER').length;
      const underCount = qualPlays.filter(r => r.side === 'UNDER').length;
      const totalQual  = qualPlays.length;
      let signal = null;
      if (totalQual >= 3) {
        const overFrac = overCount / totalQual;
        if (overFrac >= 0.65) signal = 'OVER';
        else if (overFrac <= 0.35) signal = 'UNDER';
      }

      // Group rows by player; sort each player's legs by edge desc
      const playerMap = new Map();
      g.rows.forEach(r => {
        if (!playerMap.has(r.player)) playerMap.set(r.player, []);
        playerMap.get(r.player).push(r);
      });
      const players = [...playerMap.entries()]
        .map(([name, pRows]) => ({
          name,
          team: pRows[0].team,
          rows: pRows.sort((a, b) => b.edge - a.edge),
        }))
        .sort((a, b) => b.rows[0].edge - a.rows[0].edge); // game-best-player first

      // Build matchup string
      let matchup;
      if (g.awayTeam && g.homeTeam) {
        matchup = `${g.awayTeam} @ ${g.homeTeam}`;
      } else if (g.key === '__unknown__') {
        matchup = 'Game Context Unavailable';
      } else {
        const teams = [...new Set(g.rows.map(r => r.team).filter(Boolean))];
        matchup = teams.length >= 2 ? teams.join(' / ') : (teams[0] || 'Unknown');
      }

      result.push({ ...g, players, overCount, underCount, totalQual, signal, matchup });
    });

    result.sort((a, b) => {
      if (!a.commenceTime && !b.commenceTime) return 0;
      if (!a.commenceTime) return 1;
      if (!b.commenceTime) return -1;
      return new Date(a.commenceTime) - new Date(b.commenceTime);
    });
    return result;
  }, [filtered, gameData]);

  const cellSt = { fontSize: 10, fontFamily: "'JetBrains Mono', monospace", padding: '2px 5px', whiteSpace: 'nowrap' };

  if (gameGroups.length === 0) {
    return (
      <div style={{ padding: '20px', textAlign: 'center', fontSize: 10,
        color: '#475569', fontFamily: "'JetBrains Mono', monospace" }}>
        No results match current filters
      </div>
    );
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
      {gameGroups.map(game => {
        const tipTime = fmtTipTime(game.commenceTime);
        const signalColor = game.signal === 'OVER' ? '#22c55e' : game.signal === 'UNDER' ? '#ef4444' : null;
        const leanCount = game.signal === 'OVER' ? game.overCount : game.underCount;

        return (
          <div key={game.key} style={{
            borderRadius: 8,
            border: `1px solid ${signalColor ? signalColor + '30' : 'rgba(148,163,184,0.12)'}`,
            backgroundColor: 'rgba(15,23,42,0.5)',
            overflow: 'hidden',
          }}>
            {/* ── Game header ── */}
            <div style={{
              padding: '7px 12px',
              backgroundColor: 'rgba(11,15,26,0.7)',
              borderBottom: '1px solid rgba(148,163,184,0.08)',
              display: 'flex', flexWrap: 'wrap', gap: 8, alignItems: 'center',
            }}>
              <span style={{ fontSize: 11, fontWeight: 700, color: '#e2e8f0',
                fontFamily: "'JetBrains Mono', monospace", letterSpacing: 0.3 }}>
                {game.matchup}
              </span>
              {tipTime && (
                <span style={{ fontSize: 9, color: '#475569',
                  fontFamily: "'JetBrains Mono', monospace" }}>
                  {tipTime}
                </span>
              )}
              {game.gameTotal != null && (
                <span style={{ fontSize: 9, color: '#94a3b8',
                  fontFamily: "'JetBrains Mono', monospace",
                  background: 'rgba(148,163,184,0.07)',
                  padding: '1px 5px', borderRadius: 3 }}>
                  O/U {game.gameTotal}
                </span>
              )}
              {game.spread != null && (
                <span style={{ fontSize: 9, color: '#94a3b8',
                  fontFamily: "'JetBrains Mono', monospace",
                  background: 'rgba(148,163,184,0.07)',
                  padding: '1px 5px', borderRadius: 3 }}>
                  {game.spread > 0 ? '+' : ''}{game.spread}
                </span>
              )}
              <span style={{ fontSize: 9, color: '#475569',
                fontFamily: "'JetBrains Mono', monospace" }}>
                {game.rows.length} {game.rows.length === 1 ? 'play' : 'plays'}
              </span>
              {/* Directional lean badge */}
              {game.signal && (
                <span style={{
                  fontSize: 9, fontWeight: 700, color: signalColor,
                  fontFamily: "'JetBrains Mono', monospace",
                  background: `${signalColor}12`,
                  border: `1px solid ${signalColor}35`,
                  padding: '1px 6px', borderRadius: 3,
                }}>
                  ⚠ LEANS {game.signal} · {leanCount}/{game.totalQual}
                </span>
              )}
            </div>

            {/* ── Players within this game ── */}
            <div style={{ padding: '4px 0' }}>
              {game.players.map((player, pi) => (
                <div key={player.name} style={{
                  borderTop: pi > 0 ? '1px solid rgba(148,163,184,0.05)' : 'none',
                  paddingTop: pi > 0 ? 4 : 0,
                  paddingBottom: 2,
                }}>
                  {/* Player sub-header */}
                  <div style={{
                    padding: '3px 12px',
                    display: 'flex', alignItems: 'center', gap: 6,
                  }}>
                    <span style={{ fontSize: 10, fontWeight: 700, color: '#cbd5e1',
                      fontFamily: "'Outfit', sans-serif" }}>
                      {player.name}
                    </span>
                    <span style={{ fontSize: 8, color: '#475569',
                      fontFamily: "'JetBrains Mono', monospace" }}>
                      {player.team}
                    </span>
                    {player.rows.length > 1 && (
                      <span style={{
                        fontSize: 8, color: '#818cf8',
                        fontFamily: "'JetBrains Mono', monospace",
                        background: 'rgba(99,102,241,0.1)',
                        border: '1px solid rgba(99,102,241,0.22)',
                        padding: '0px 4px', borderRadius: 3,
                      }}>
                        {player.rows.length} legs
                      </span>
                    )}
                  </div>

                  {/* Prop rows for this player */}
                  {player.rows.map((r, ri) => {
                    const edgeColor = getEdgeColor(r.edge);
                    const isTracked = tracked && tracked.has(r.betId);
                    return (
                      <div key={ri} style={{
                        display: 'flex', alignItems: 'center',
                        padding: '2px 12px',
                        borderLeft: `2px solid ${r.edge >= 5 ? '#22c55e44' : r.edge >= 3 ? '#22c55e22' : 'transparent'}`,
                        backgroundColor: isTracked ? 'rgba(245,158,11,0.06)'
                          : r.edge >= 5 ? 'rgba(34,197,94,0.05)'
                          : r.edge >= 3 ? 'rgba(34,197,94,0.02)'
                          : 'transparent',
                      }}>
                        {/* Track checkbox */}
                        <div style={{ width: 18, flexShrink: 0, cursor: 'pointer', paddingRight: 2 }}
                          onClick={() => onToggleTrack && onToggleTrack(r.betId)}>
                          <div style={{
                            width: 11, height: 11, borderRadius: 2,
                            border: `1px solid ${isTracked ? 'rgba(245,158,11,0.8)' : 'rgba(148,163,184,0.22)'}`,
                            background: isTracked ? 'rgba(245,158,11,0.7)' : 'transparent',
                            display: 'flex', alignItems: 'center', justifyContent: 'center',
                          }}>
                            {isTracked && <span style={{ fontSize: 7, color: '#0b0f1a', fontWeight: 900, lineHeight: 1 }}>✓</span>}
                          </div>
                        </div>
                        {/* STAT */}
                        <span style={{ ...cellSt, width: 30, color: '#64748b', fontSize: 9 }}>{r.statLabel}</span>
                        {/* SIDE */}
                        <span style={{ ...cellSt, width: 40, fontWeight: 700, fontSize: 9,
                          color: r.side === 'OVER' ? '#4ade80' : '#f87171' }}>
                          {r.side}
                        </span>
                        {/* LINE */}
                        <span style={{ ...cellSt, width: 36, color: '#94a3b8', textAlign: 'right' }}>{r.propLine}</span>
                        {/* ODDS */}
                        <span style={{ ...cellSt, width: 44, color: '#64748b', textAlign: 'right' }}>{fmtOdds(r.bookOdds)}</span>
                        {/* MODEL% */}
                        <span style={{ ...cellSt, width: 50, color: getProbColor(r.modelProb), textAlign: 'right' }}>
                          {(r.modelProb * 100).toFixed(1)}%
                        </span>
                        {/* EDGE */}
                        <span style={{ ...cellSt, width: 50, color: edgeColor, fontWeight: 700, textAlign: 'right' }}>
                          {r.edge >= 0 ? '+' : ''}{r.edge.toFixed(1)}%
                        </span>
                        {/* RATING badge */}
                        <span style={{ ...cellSt, width: 64 }}>
                          <span style={{
                            fontSize: 8, color: edgeColor, fontWeight: 700,
                            background: `${edgeColor}18`, border: `1px solid ${edgeColor}30`,
                            padding: '1px 4px', borderRadius: 3,
                          }}>
                            {r.edgeLabel}
                          </span>
                        </span>
                        {/* ¼K% */}
                        {r.kellyPct > 0 && (
                          <span style={{ ...cellSt, color: '#475569', fontSize: 9 }}>
                            ¼K {r.kellyPct.toFixed(2)}%
                          </span>
                        )}
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── CSV Export ───────────────────────────────────────────────────────
function buildCSV(playerName, numSims, statResults, comboResults, timestamp, bankroll, portfolioFactors = {}, kellyFraction = 0.25, unitSize = "20") {
  const kfLabel = kellyFraction >= 1.0 ? "K" : kellyFraction >= 0.5 ? "½K" : kellyFraction >= 0.333 ? "⅓K" : "¼K";
  const headers = [
    "Timestamp", "Date", "Player", "Stat", "Projection", "Std Dev", "SD Method", "CV %",
    "Prop Line", "Book Over Odds", "Book Under Odds",
    "Model Over %", "Model Under %",
    "Fair Over Odds", "Fair Under Odds",
    "Over Edge %", "Under Edge %",
    "Best Side", "Best Edge %", "Edge Rating",
    `${kfLabel} %`, "Stake $", "Units",
    "Simulations"
  ];

  const rows = [];
  const dateStr = new Date().toLocaleDateString("en-US");
  const br = parseFloat(bankroll);
  const hasBr = !isNaN(br) && br > 0;

  const addRow = (stat, label, prob, propLine, overOdds, underOdds, mean, std, stdMethod, cvValue) => {
    if (!prob) return;
    const overProb = prob.over;
    const underProb = prob.under;
    const bookOverProbRaw  = americanToProb(parseFloat(overOdds));
    const bookUnderProbRaw = americanToProb(parseFloat(underOdds));
    // Use vig-free probabilities when both sides are available
    const vfP = (bookOverProbRaw && bookUnderProbRaw)
      ? { over: bookOverProbRaw / (bookOverProbRaw + bookUnderProbRaw), under: bookUnderProbRaw / (bookOverProbRaw + bookUnderProbRaw) }
      : null;
    const bookOverProb  = vfP ? vfP.over  : bookOverProbRaw;
    const bookUnderProb = vfP ? vfP.under : bookUnderProbRaw;
    const overEdge  = bookOverProb  ? ((overProb  - bookOverProb)  * 100) : "";
    const underEdge = bookUnderProb ? ((underProb - bookUnderProb) * 100) : "";
    const bestEdgeVal = Math.max(
      typeof overEdge === "number" ? overEdge : -999,
      typeof underEdge === "number" ? underEdge : -999
    );
    const bestSide = bestEdgeVal === -999 ? "" :
      (overEdge >= underEdge ? "OVER" : "UNDER");
    const bestEdgeStr = bestEdgeVal === -999 ? "" : bestEdgeVal.toFixed(1);
    const rating = bestEdgeVal >= 5 ? "STRONG" : bestEdgeVal >= 3 ? "SOLID" :
      bestEdgeVal >= 1.5 ? "MARGINAL" : "NO EDGE";

    // Portfolio-adjusted Kelly for best side (using user-selected kellyFraction)
    let kfKelly = "";
    let stake = "";
    let units = "";
    const us = parseFloat(unitSize);
    const hasUs = !isNaN(us) && us > 0;
    if (bestSide === "OVER" && overOdds) {
      const k = calcKelly(overProb, parseFloat(overOdds));
      if (k && k > 0) {
        const pf = portfolioFactors[`${stat}_over`] ?? null;
        const adj = pf !== null ? k * pf : k;
        const adjKF = adj * kellyFraction;
        kfKelly = (adjKF * 100).toFixed(2);
        const stakeAmt = hasBr ? Math.round(br * adjKF) : null;
        stake = stakeAmt ?? "";
        units = (stakeAmt != null && hasUs) ? (Math.round((stakeAmt / us) * 4) / 4).toString() : "";
      }
    } else if (bestSide === "UNDER" && underOdds) {
      const k = calcKelly(underProb, parseFloat(underOdds));
      if (k && k > 0) {
        const pf = portfolioFactors[`${stat}_under`] ?? null;
        const adj = pf !== null ? k * pf : k;
        const adjKF = adj * kellyFraction;
        kfKelly = (adjKF * 100).toFixed(2);
        const stakeAmt = hasBr ? Math.round(br * adjKF) : null;
        stake = stakeAmt ?? "";
        units = (stakeAmt != null && hasUs) ? (Math.round((stakeAmt / us) * 4) / 4).toString() : "";
      }
    }

    rows.push([
      timestamp, dateStr, playerName, label,
      mean ?? "", std ?? "", stdMethod || "", cvValue || "",
      propLine, overOdds || "", underOdds || "",
      (overProb * 100).toFixed(1), (underProb * 100).toFixed(1),
      probToAmerican(overProb), probToAmerican(underProb),
      typeof overEdge === "number" ? overEdge.toFixed(1) : "",
      typeof underEdge === "number" ? underEdge.toFixed(1) : "",
      bestSide, bestEdgeStr, bestEdgeVal > -999 ? rating : "",
      kfKelly, stake, units,
      numSims,
    ]);
  };

  if (statResults) {
    STAT_CONFIG.forEach(({ key, label }) => {
      const r = statResults[key];
      if (r) addRow(key, label, r.prob, r.propLine, r.overOdds, r.underOdds, r.mean, r.std, r.stdMethod, r.cvValue);
    });
  }
  if (comboResults) {
    COMBO_CONFIG.forEach(({ key, label }) => {
      const r = comboResults[key];
      if (r) addRow(key, label, r.prob, r.propLine, r.overOdds, r.underOdds, "", "", "Combo", "");
    });
  }

  const escape = (v) => {
    const s = String(v ?? "");
    return s.includes(",") || s.includes('"') ? `"${s.replace(/"/g, '""')}"` : s;
  };
  return [headers.map(escape).join(","), ...rows.map(r => r.map(escape).join(","))].join("\n");
}

// ── Batch CSV Export ─────────────────────────────────────────────────
function buildBatchCSV(batchResults, timestamp) {
  const headers = [
    'Timestamp','Date','Player','Team','Stat','Line','Side',
    'Book Odds','Model%','Book%','Edge%','Edge Rating','¼Kelly%',
    'Game Total','Spread',
    'Bet ID','ETR Projection','Dist Model','Model Fair Over','Model Fair Under','Games (CV)'
  ];
  const dateStr = new Date().toLocaleDateString('en-US');
  const escape = v => { const s = String(v ?? ''); return s.includes(',') || s.includes('"') ? `"${s.replace(/"/g,'""')}"` : s; };
  const rows = batchResults.map(r => [
    timestamp, dateStr, r.player, r.team ?? '', r.statLabel, r.propLine,
    r.side, fmtOdds(r.bookOdds),
    (r.modelProb * 100).toFixed(1), (r.bookProb * 100).toFixed(1),
    r.edge.toFixed(1), r.edgeLabel,
    r.kellyPct > 0 ? r.kellyPct.toFixed(2) : '',
    r.gameTotal ?? '', r.spread != null ? r.spread : '',
    r.betId ?? '',
    r.projection != null ? r.projection.toFixed(1) : '',
    r.distModel ?? '',
    r.fairOverOdds ?? '', r.fairUnderOdds ?? '',
    r.gamesAvailable ?? ''
  ]);
  return [headers.map(escape).join(','), ...rows.map(r => r.map(escape).join(','))].join('\n');
}

// ── ETR Projections Parser ───────────────────────────────────────────
function parseETRProjections(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  if (lines.length < 2) return { error: "Need at least a header row and one data row." };

  // Detect delimiter: prefer tabs (TSV copy/paste) over commas (CSV)
  const firstLine = lines[0];
  const isTSV = (firstLine.match(/\t/g) || []).length >= (firstLine.match(/,/g) || []).length;

  const splitRow = isTSV
    ? (line) => line.split('\t').map(s => s.trim())
    : (line) => {
        const result = []; let inQ = false, cur = '';
        for (const ch of line) {
          if (ch === '"') { inQ = !inQ; }
          else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
          else { cur += ch; }
        }
        result.push(cur.trim());
        return result;
      };

  const headers = splitRow(lines[0]).map(h => h.toLowerCase().replace(/[^a-z0-9 ]/g, '').trim());
  const col = (...names) => {
    for (const name of names) {
      const idx = headers.findIndex(h => h.includes(name));
      if (idx >= 0) return idx;
    }
    return -1;
  };

  const idxPlayer = col('player'); const idxPts    = col('point');
  const idxReb    = col('rebound'); const idxAst    = col('assist');
  const idxStl    = col('steal');  const idxBlk    = col('block');
  const idxThrees = col('three');  const idxPRA    = col('pra');
  const idxMin    = col('minute'); const idxTeam   = col('team');
  const idxOpp    = col('opponent'); const idxPos  = col('position');

  if (idxPlayer < 0 || idxPts < 0) return { error: "Could not find Player or Points columns. Check format." };

  const players = [];
  for (let i = 1; i < lines.length; i++) {
    const row = splitRow(lines[i]);
    const name = row[idxPlayer] || '';
    if (!name || name.toLowerCase() === 'player') continue;
    const pts = parseFloat(row[idxPts]);
    if (isNaN(pts)) continue;
    players.push({
      name,
      team:   idxTeam   >= 0 ? (row[idxTeam]   || '') : '',
      opp:    idxOpp    >= 0 ? (row[idxOpp]    || '') : '',
      pos:    idxPos    >= 0 ? (row[idxPos]    || '') : '',
      pts,
      reb:    idxReb    >= 0 ? parseFloat(row[idxReb])    || 0 : 0,
      ast:    idxAst    >= 0 ? parseFloat(row[idxAst])    || 0 : 0,
      stl:    idxStl    >= 0 ? parseFloat(row[idxStl])    || 0 : 0,
      blk:    idxBlk    >= 0 ? parseFloat(row[idxBlk])    || 0 : 0,
      threes: idxThrees >= 0 ? parseFloat(row[idxThrees]) || 0 : 0,
      pra:    idxPRA    >= 0 ? parseFloat(row[idxPRA])    || 0 : 0,
      min:    idxMin    >= 0 ? parseFloat(row[idxMin])    || 0 : 0,
    });
  }
  if (players.length === 0) return { error: "No valid player rows found. Check that headers include Player and Points." };
  players.sort((a, b) => a.name.localeCompare(b.name));
  return { players };
}

// ── Batch Sim: Build Stats Object Per Player ─────────────────────────
// Pure function — no state access. Builds the stats object runSimulation() expects,
// from a projection row + oddsData entry + cvDatabase entry.
// Uses the same auto-blend CV logic as handleLoadCv (weighted across all 4 windows)
// and extracts KDE raw data arrays for pts/reb/ast — giving batch the same accuracy
// as individual simulation instead of falling back to parametric-only.
// Returns { stats, ptsRawData, rebRawData, astRawData }.
function buildPlayerStatsForSim(projection, playerOdds, cvData) {
  // Auto-blend weights — identical to handleLoadCv
  const BLEND_N = { last5: 5, last10: 10, last20: 20, season: cvData?.games_available || 30 };
  const BLEND_R = { last5: 3.0, last10: 2.0, last20: 1.5, season: 1.0 };
  const blendCv = (cvByWindow) => {
    let wSum = 0, wVal = 0;
    ['last5', 'last10', 'last20', 'season'].forEach(w => {
      const v = cvByWindow?.[w];
      if (v == null) return;
      const weight = BLEND_N[w] * BLEND_R[w];
      wSum += weight; wVal += weight * v;
    });
    return wSum > 0 ? wVal / wSum : null;
  };

  const cvMinRaw = blendCv(cvData?.cv_minutes);

  const stats = {};
  STAT_CONFIG.forEach(({ key }) => {
    const mean = parseFloat(projection[key]) || 0;
    const oddsEntry = playerOdds?.[key];
    let cvMode = false, cvValue = '';
    if (cvData?.cv?.[key] != null && mean > 0) {
      const cvPer36 = blendCv(cvData.cv[key]);
      if (cvPer36 != null) {
        const effective = cvMinRaw != null
          ? Math.round(Math.sqrt(cvPer36 ** 2 + cvMinRaw ** 2) * 10) / 10
          : Math.round(cvPer36 * 10) / 10;
        cvMode = true;
        cvValue = String(effective);
      }
    }
    const stdDev = cvMode
      ? Math.round(mean * (parseFloat(cvValue) / 100) * 10) / 10
      : estimateStdDev(key, mean);
    stats[key] = {
      mean:        String(mean),
      stdDev,
      propLine:    oddsEntry?.line != null ? String(oddsEntry.line) : '',
      overOdds:    oddsEntry?.overOdds  != null ? String(Math.round(oddsEntry.overOdds))  : '',
      underOdds:   oddsEntry?.underOdds != null ? String(Math.round(oddsEntry.underOdds)) : '',
      cvMode,
      cvValue,
      stdOverride: false,
    };
  });

  // KDE raw data — use largest available window (same logic as handleLoadCv auto mode).
  // simulateStatKDE applies LAMBDA=0.9 recency decay internally so more data = better
  // bandwidth estimation without sacrificing recency accuracy.
  const kdeWin = ['season', 'last20', 'last10', 'last5']
    .find(w => (cvData?.['pts_raw']?.[w]?.length ?? 0) >= 5) || 'last20';
  const loadRaw = (rawKey, meanKey) => {
    const scores = cvData?.[rawKey]?.[kdeWin];
    const hMean  = cvData?.[meanKey]?.[kdeWin];
    return (scores != null && hMean != null && scores.length >= 5)
      ? { rawScores: scores, historicalMean: hMean }
      : null;
  };

  return {
    stats,
    ptsRawData: loadRaw('pts_raw', 'pts_mean_raw'),
    rebRawData: loadRaw('reb_raw', 'reb_mean_raw'),
    astRawData: loadRaw('ast_raw', 'ast_mean_raw'),
  };
}

// ── Calibration Tracker ──────────────────────────────────────────────
const CALIBRATION_KEY = 'nbaSimCalibration';

function loadCalibration() {
  try { return JSON.parse(localStorage.getItem(CALIBRATION_KEY) || '[]'); }
  catch { return []; }
}

// Fetch closing odds from Odds API historical endpoint (5 min before tip).
// The historical endpoint wraps the response in { data: { bookmakers: [...] } }.
async function fetchHistoricalProps(apiKey, eventId, commenceTime) {
  const tipMs  = new Date(commenceTime).getTime();
  const dateTs = new Date(tipMs - 5 * 60 * 1000).toISOString();
  const markets = Object.values(ODDS_MARKET_MAP).join(',');
  const url = `${ODDS_API_BASE}/historical/sports/basketball_nba/events/${eventId}/odds?apiKey=${apiKey}&regions=us&markets=${markets}&oddsFormat=american&date=${dateTs}`;
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    const json = await r.json();
    const eventData = json.data || json;
    return { bookmakers: eventData.bookmakers || [], remainingRequests: r.headers.get('x-requests-remaining') };
  } catch { return null; }
}

// Pull closing odds for a single tracked entry — returns { closingOdds, closingLine } or null.
function extractClosingOdds(bookmakers, normName, statKey, side, selectedBooks) {
  let bestPrice = null;
  let bestLine  = null;
  const marketKey = ODDS_MARKET_MAP[statKey];
  if (!marketKey) return null;
  (bookmakers || []).forEach(bk => {
    if (selectedBooks.length > 0 && !selectedBooks.includes(bk.key)) return;
    (bk.markets || []).forEach(mkt => {
      if (mkt.key !== marketKey) return;
      (mkt.outcomes || []).forEach(outcome => {
        const oNorm = normalizeOddsName(outcome.description || '');
        const sim   = bigramSimilarity(oNorm, normName);
        if (sim < 0.72) return;
        if ((outcome.name || '').toLowerCase() !== side.toLowerCase()) return;
        const p = parseFloat(outcome.price);
        if (isNaN(p)) return;
        if (bestPrice === null || p > bestPrice) { bestPrice = p; bestLine = outcome.point ?? null; }
      });
    });
  });
  return bestPrice !== null ? { closingOdds: bestPrice, closingLine: bestLine } : null;
}

// ── Calibration Analysis Engine ───────────────────────────────────────
function computeCalibrationStats(entries) {
  const settled = entries.filter(e => e.result === 'won' || e.result === 'lost' || e.result === 'push');
  if (settled.length === 0) return null;

  const wins  = settled.filter(e => e.result === 'won').length;
  const losses= settled.filter(e => e.result === 'lost').length;
  const pushes= settled.filter(e => e.result === 'push').length;
  const wl    = settled.filter(e => e.result !== 'push');

  const avgModelProb = wl.length > 0 ? wl.reduce((s, e) => s + e.modelProb, 0) / wl.length : null;
  const actualRate   = wl.length > 0 ? wl.filter(e => e.result === 'won').length / wl.length : null;

  // ROI helpers
  const computeROI = (group) => {
    const sl = group.filter(e => e.result !== 'push');
    if (sl.length === 0) return { kellyROI: null, unitROI: null, kellyPnL: null, unitPnL: null, totalKellyStake: 0, totalUnitStake: 0 };
    let kStake = 0, kPnL = 0, uStake = 0, uPnL = 0;
    sl.forEach(e => {
      const dec   = americanToDecimal(e.bookOdds);
      const kAmt  = e.kellyStake  ?? 0;
      const uAmt  = e.unitStake   ?? 0;
      kStake += kAmt;
      uStake += uAmt;
      if (dec) {
        kPnL += e.result === 'won' ? kAmt * (dec - 1) : -kAmt;
        uPnL += e.result === 'won' ? uAmt * (dec - 1) : -uAmt;
      }
    });
    return {
      kellyROI:        kStake > 0 ? (kPnL / kStake) * 100 : null,
      unitROI:         uStake > 0 ? (uPnL / uStake) * 100 : null,
      kellyPnL:        Math.round(kPnL * 100) / 100,
      unitPnL:         Math.round(uPnL * 100) / 100,
      totalKellyStake: Math.round(kStake * 100) / 100,
      totalUnitStake:  Math.round(uStake * 100) / 100,
    };
  };

  // Bucket helpers
  const groupStats = (group) => {
    const sl = group.filter(e => e.result !== 'push');
    if (sl.length === 0) return null;
    const w = sl.filter(e => e.result === 'won').length;
    return {
      n: sl.length,
      wins: w,
      hitRate:       w / sl.length,
      modelAvg:      sl.reduce((s, e) => s + e.modelProb, 0) / sl.length,
      ...computeROI(sl),
    };
  };

  // Wilson score 95% CI for a proportion: handles small-n buckets correctly.
  // Returns { lo, hi } — tighter than normal approx at extremes, avoids negative bounds.
  const wilsonCI = (wins, n, z = 1.96) => {
    if (n === 0) return null;
    const p = wins / n;
    const denom = 1 + z * z / n;
    const center = (p + z * z / (2 * n)) / denom;
    const margin = z * Math.sqrt(p * (1 - p) / n + z * z / (4 * n * n)) / denom;
    return { lo: Math.max(0, center - margin), hi: Math.min(1, center + margin) };
  };

  // By probability bucket (finer than before)
  const probBuckets = [
    { label: '<45%',   min: 0,    max: 0.45 },
    { label: '45-50',  min: 0.45, max: 0.50 },
    { label: '50-55',  min: 0.50, max: 0.55 },
    { label: '55-60',  min: 0.55, max: 0.60 },
    { label: '60-65',  min: 0.60, max: 0.65 },
    { label: '65-70',  min: 0.65, max: 0.70 },
    { label: '70-75',  min: 0.70, max: 0.75 },
    { label: '75%+',   min: 0.75, max: 1.01 },
  ].map(b => {
    const grp = groupStats(wl.filter(e => e.modelProb >= b.min && e.modelProb < b.max));
    const wins = (grp != null && grp.n != null) ? Math.round(grp.hitRate * grp.n) : 0;
    const ci = (grp != null && grp.n != null) ? wilsonCI(wins, grp.n) : null;
    return { ...b, ...(grp || {}), wilsonCI: ci };
  });

  // Expected Calibration Error (ECE): weighted mean absolute deviation of hit rate from model prob.
  // Lower is better. A perfectly calibrated model has ECE = 0.
  const calibratedBuckets = probBuckets.filter(b => b.n > 0 && b.hitRate != null && b.modelAvg != null);
  const totalN = calibratedBuckets.reduce((s, b) => s + b.n, 0);
  const ece = totalN > 0
    ? calibratedBuckets.reduce((s, b) => s + b.n * Math.abs(b.hitRate - b.modelAvg), 0) / totalN
    : null;

  // By stat (individual + combo)
  const allStats = ['pts','reb','ast','stl','blk','threes','pra','pr','pa','ra','sb'];
  const byStat = {};
  allStats.forEach(s => { byStat[s] = groupStats(wl.filter(e => e.stat === s)); });

  // By side
  const bySide = {
    OVER:  groupStats(wl.filter(e => e.side === 'OVER')),
    UNDER: groupStats(wl.filter(e => e.side === 'UNDER')),
  };

  // By edge label
  const byEdge = {};
  ['MARGINAL','SOLID','STRONG'].forEach(lbl => {
    byEdge[lbl] = groupStats(wl.filter(e => e.edgeLabel === lbl));
  });

  // By odds bucket — both tails split into 4 sub-brackets each to identify efficiency cliffs
  const oddsBuckets = [
    { label: '≤-176',          filter: e => e.bookOdds <= -176 },
    { label: '-175 to -151',   filter: e => e.bookOdds >= -175 && e.bookOdds <= -151 },
    { label: '-150 to -136',   filter: e => e.bookOdds >= -150 && e.bookOdds <= -136 },
    { label: '-135 to -121',   filter: e => e.bookOdds >= -135 && e.bookOdds <= -121 },
    { label: '-120 to -106',   filter: e => e.bookOdds >= -120 && e.bookOdds <= -106 },
    { label: '-105 to +100',   filter: e => e.bookOdds >= -105 && e.bookOdds <= 100  },
    { label: '+101 to +125',   filter: e => e.bookOdds >= 101  && e.bookOdds <= 125  },
    { label: '+126 to +150',   filter: e => e.bookOdds >= 126  && e.bookOdds <= 150  },
    { label: '+151 to +175',   filter: e => e.bookOdds >= 151  && e.bookOdds <= 175  },
    { label: '≥+176',          filter: e => e.bookOdds >= 176 },
  ].map(b => ({ label: b.label, ...groupStats(wl.filter(b.filter)) }));

  // By game total (O/U) — track whether high-pace vs. low-pace slates hit differently
  const totalBuckets = [
    { label: '<220',    filter: e => e.gameTotal != null && e.gameTotal < 220 },
    { label: '220–229', filter: e => e.gameTotal != null && e.gameTotal >= 220 && e.gameTotal < 230 },
    { label: '230–239', filter: e => e.gameTotal != null && e.gameTotal >= 230 && e.gameTotal < 240 },
    { label: '240+',    filter: e => e.gameTotal != null && e.gameTotal >= 240 },
  ].map(b => ({ label: b.label, ...groupStats(wl.filter(b.filter)) }));
  const totalWithData = wl.filter(e => e.gameTotal != null).length;

  // By spread magnitude — track whether lopsided games hurt prop model accuracy
  // Uses absolute value so direction (fav/dog) doesn't matter; only competitiveness does.
  const spreadBuckets = [
    { label: '0–3.5',  filter: e => e.spread != null && Math.abs(e.spread) <= 3.5 },
    { label: '4–7',    filter: e => e.spread != null && Math.abs(e.spread) > 3.5 && Math.abs(e.spread) <= 7 },
    { label: '8–11.5', filter: e => e.spread != null && Math.abs(e.spread) > 7   && Math.abs(e.spread) <= 11.5 },
    { label: '12+',    filter: e => e.spread != null && Math.abs(e.spread) > 11.5 },
  ].map(b => ({ label: b.label, ...groupStats(wl.filter(b.filter)) }));
  const spreadWithData = wl.filter(e => e.spread != null).length;

  // By time before game start — segments when the bet was placed relative to tip-off
  // Uses commenceTime (from Odds API context) and loggedAt (ISO timestamp of log action).
  // Entries without commenceTime are excluded from buckets; timeWithData tracks coverage.
  const getMinsBefore = e => {
    if (!e.commenceTime || !e.loggedAt) return null;
    const diff = new Date(e.commenceTime) - new Date(e.loggedAt);
    return diff / 60000; // milliseconds → minutes
  };
  const timeBuckets = [
    { label: '>3h',    min: 180,  max: Infinity },
    { label: '1–3h',   min: 60,   max: 180 },
    { label: '30–60m', min: 30,   max: 60 },
    { label: '<30m',   min: -Infinity, max: 30 },
  ].map(b => {
    const mins = e => { const m = getMinsBefore(e); return m !== null && m >= b.min && m < b.max; };
    return { label: b.label, ...groupStats(wl.filter(mins)) };
  });
  const timeWithData = wl.filter(e => getMinsBefore(e) !== null).length;

  // CLV analysis (only entries with closing odds)
  const withCLV = settled.filter(e => e.closingOdds != null && e.result !== 'push');
  const clvData = withCLV.length > 0 ? (() => {
    const clvVals = withCLV.map(e => {
      const td = americanToDecimal(e.bookOdds);
      const cd = americanToDecimal(e.closingOdds);
      return (td && cd && cd > 1) ? ((td - cd) / cd) * 100 : null;
    }).filter(v => v !== null);
    const avgCLV  = clvVals.length > 0 ? clvVals.reduce((a, b) => a + b, 0) / clvVals.length : null;
    const pos = withCLV.filter((e, i) => clvVals[i] > 0);
    const neg = withCLV.filter((e, i) => clvVals[i] <= 0);
    return {
      n: withCLV.length,
      avgCLV,
      posClvHitRate: pos.length > 0 ? pos.filter(e => e.result === 'won').length / pos.length : null,
      negClvHitRate: neg.length > 0 ? neg.filter(e => e.result === 'won').length / neg.length : null,
      posN: pos.length, negN: neg.length,
    };
  })() : null;

  // Rolling trend: last-20 hit rate in chronological order
  const chronological = [...settled].filter(e => e.result !== 'push').sort((a, b) => new Date(a.loggedAt) - new Date(b.loggedAt));
  const trend = chronological.length >= 10 ? (() => {
    const window = 10;
    const points = [];
    for (let i = window - 1; i < chronological.length; i++) {
      const slice = chronological.slice(i - window + 1, i + 1);
      points.push({ idx: i, rate: slice.filter(e => e.result === 'won').length / slice.length });
    }
    return points;
  })() : null;

  // By distribution model — separates KDE era (PTS/REB/AST post-3/17) from earlier batch math
  const byDistModel = {};
  ['KDE','LogNormal','NegBin','Poisson','Direct','Summed','Gamma'].forEach(m => {
    const grp = groupStats(wl.filter(e => e.distModel === m));
    if (grp) byDistModel[m] = grp;
  });

  // By projected minutes — bench variance leakage check
  const minutesBuckets = [
    { label: '<22 min',   filter: e => e.projectedMinutes != null && e.projectedMinutes < 22 },
    { label: '22–28 min', filter: e => e.projectedMinutes != null && e.projectedMinutes >= 22 && e.projectedMinutes < 28 },
    { label: '28–34 min', filter: e => e.projectedMinutes != null && e.projectedMinutes >= 28 && e.projectedMinutes < 34 },
    { label: '34+ min',   filter: e => e.projectedMinutes != null && e.projectedMinutes >= 34 },
  ].map(b => ({ label: b.label, ...groupStats(wl.filter(b.filter)) }));
  const minutesWithData = wl.filter(e => e.projectedMinutes != null).length;

  // By CV sample size — thin data bets are less reliable; gamesAvailable from cv_data.json
  const cvSampleBuckets = [
    { label: '<20 games',   filter: e => e.gamesAvailable != null && e.gamesAvailable < 20 },
    { label: '20–35 games', filter: e => e.gamesAvailable != null && e.gamesAvailable >= 20 && e.gamesAvailable <= 35 },
    { label: '36+ games',   filter: e => e.gamesAvailable != null && e.gamesAvailable > 35 },
  ].map(b => ({ label: b.label, ...groupStats(wl.filter(b.filter)) }));
  const cvSampleWithData = wl.filter(e => e.gamesAvailable != null).length;

  // By line gap in sigma units: (propLine − projection) / (projection × cvValue/100)
  // Negative = line below ETR (model leans OVER); Positive = line above ETR (model leans UNDER)
  // Reveals whether model edge is real or just noise when book and ETR most disagree
  const lineGapBuckets = [
    { label: '< −1σ (OVER)',     min: -Infinity, max: -1.0 },
    { label: '−1σ to −0.3σ',    min: -1.0,      max: -0.3 },
    { label: '±0.3σ consensus',  min: -0.3,      max:  0.3 },
    { label: '+0.3σ to +1σ',    min:  0.3,      max:  1.0 },
    { label: '> +1σ (UNDER)',    min:  1.0,      max: Infinity },
  ].map(b => {
    const grp = groupStats(wl.filter(e => {
      if (e.projection == null || e.propLine == null) return false;
      // Prefer directly-stored std; fall back to cvValue-derived estimate for legacy entries
      const std = e.std ?? (e.cvValue ? e.projection * (e.cvValue / 100) : null);
      if (!std || std <= 0) return false;
      const sigma = (parseFloat(e.propLine) - e.projection) / std;
      return sigma >= b.min && sigma < b.max;
    }));
    return { label: b.label, ...(grp || {}) };
  });
  const lineGapWithData = wl.filter(e => {
    if (e.projection == null || e.propLine == null) return false;
    const std = e.std ?? (e.cvValue ? e.projection * (e.cvValue / 100) : null);
    return std != null && std > 0;
  }).length;

  // Stat × Direction cross-tab — e.g. PTS OVER vs PTS UNDER (individual + combo)
  const statSideRows = [];
  ['pts','reb','ast','stl','blk','threes','pra','pr','pa','ra','sb'].forEach(stat => {
    ['OVER','UNDER'].forEach(side => {
      const grp = groupStats(wl.filter(e => e.stat === stat && e.side === side));
      if (grp) statSideRows.push({ label: `${stat.toUpperCase()} ${side}`, stat, side, ...grp });
    });
  });

  // By game date — last 7 days with settled bets, newest first
  const getGameDate = e => {
    const ts = e.commenceTime || e.loggedAt;
    if (!ts) return null;
    return new Date(ts).toLocaleDateString('en-CA'); // YYYY-MM-DD (locale-independent ISO format)
  };
  const dateMap = {};
  settled.forEach(e => {
    const d = getGameDate(e);
    if (!d) return;
    if (!dateMap[d]) dateMap[d] = [];
    dateMap[d].push(e);
  });
  const recentDays = Object.entries(dateMap)
    .sort((a, b) => b[0].localeCompare(a[0]))
    .slice(0, 7)
    .map(([dateStr, entries]) => {
      const g = groupStats(entries); // groupStats already excludes pushes
      const label = new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      return { dateStr, label, ...(g || {}) };
    })
    .filter(d => d.n > 0);

  // PTS OVER / UNDER per day — same day windows as recentDays but filtered to pts
  const ptsDays = Object.entries(dateMap)
    .sort((a, b) => b[0].localeCompare(a[0]))
    .slice(0, 7)
    .map(([dateStr, entries]) => {
      const pts = entries.filter(e => e.stat === 'pts');
      const label = new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const over  = groupStats(pts.filter(e => e.side === 'OVER'));
      const under = groupStats(pts.filter(e => e.side === 'UNDER'));
      return { dateStr, label, over, under };
    })
    .filter(d => d.over || d.under);

  // BY TIER — Play Selector tier segmentation
  const byTier = {};
  [1, 2].forEach(t => {
    const g = groupStats(wl.filter(e => e.tier === t));
    if (g) byTier[`Tier ${t}`] = g;
  });
  const noTier = groupStats(wl.filter(e => e.tier == null));
  if (noTier) byTier['No Tier'] = noTier;

  // BY MODEL VERSION — segmented by model version tag
  const byModelVersion = {};
  const versions = [...new Set(wl.map(e => e.modelVersion ?? 1))].sort();
  versions.forEach(v => {
    const g = groupStats(wl.filter(e => (e.modelVersion ?? 1) === v));
    if (g) byModelVersion[`v${v}`] = g;
  });

  return {
    total: settled.length, wins, losses, pushes,
    avgModelProb, actualRate,
    overall: computeROI(wl),
    probBuckets,
    ece,
    byStat,
    bySide,
    byEdge,
    oddsBuckets,
    totalBuckets,    totalWithData,
    spreadBuckets,   spreadWithData,
    timeBuckets,     timeWithData,
    clvData,
    trend,
    byDistModel,
    minutesBuckets,  minutesWithData,
    cvSampleBuckets, cvSampleWithData,
    lineGapBuckets,  lineGapWithData,
    statSideRows,
    recentDays,
    ptsDays,
    byTier,
    byModelVersion,
  };
}

// ── CalibrationPanel component ────────────────────────────────────────
// ── Strategy Filter Definitions ─────────────────────────────────────
// Rebuilt 2026-03-22 from scratch. Two independent hypotheses for isolating genuine edge vs noise.
// Previous strategies (B/C/D) compensated for model bugs now fixed at the model level.
// New strategies test orthogonal dimensions: B = directional asymmetry, C = calibration zone.
//
// Data basis (N=2211 tracked bets):
//   OVER: N=742, HIT%=48.0, MODEL%=54.4, DIFF=-6.4pp, ROI=-4.4%
//   UNDER: N=1469, HIT%=57.7, MODEL%=58.8, DIFF=-1.1pp, ROI=+7.4%
//   Poisson: N=184, -6.3pp, -4.6% ROI · LogNormal: N=22, -11.5pp, -6.5% ROI
//   55-60% prob bucket: N=546, DIFF=-6.0pp, ROI=-1.7% (max overconfidence zone)
//
// Strategy B — "Side Purity: UNDER Edge"
// Hypothesis: Right-skewed distributions (log-normal, KDE, NegBin) systematically inflate
// right-tail probability, making OVER edge unreliable. UNDER predictions are more accurate
// because the left tail is bounded by zero, constraining probability estimation error.
// BLK OVER (+10.9% ROI, N=83) is the one anomaly but N is too small for significance
// (Wilson 95% CI: [32.8%, 54.5%]). Will revisit if pattern persists at N>200.
// Also excludes Poisson/LogNormal: parametric fallbacks without CV data, both unprofitable.
const STRATEGY_B_FILTER = e => {
  if (e.side !== 'UNDER')                       return false;  // core: UNDER only
  const dm = e.distModel ?? '';
  if (dm === 'Poisson' || dm === 'LogNormal')   return false;  // require CV/empirical-backed model
  return true;
};

// Strategy C — "Calibration Zone: Exclude Overconfidence Band"
// Hypothesis: The 55-60% model probability zone is where perceived edge is almost entirely
// calibration error: model says 57.3% but reality is 51.3% (-6.0pp). At typical -120 to -140
// odds in this zone, the vig requires ~55-58% to break even, so 51.3% is a consistent loss.
// Outside this zone: <55% is well-calibrated at plus-money odds (+7.0% ROI combined),
// 60-72% has true probability high enough to profit despite miscalibration (+4.1% ROI).
// PROB_CEILING (0.72) already handles the 72%+ zone at the model level.
// Independent from Strategy B: no directional filter. Tests calibration quality only.
const STRATEGY_C_FILTER = e => {
  const prob = e.modelProb ?? 0;
  if (prob >= 0.55 && prob < 0.60)              return false;  // exclude overconfidence dead zone
  return true;
};

// ── Play Selector: Tier Classification & Slate Builder ─────────────
// Replaces ad-hoc Strategy B/C/D for actionable play selection.
// Tier 1 = high-confidence core. Market-structure gates only (model bugs fixed at model level).
// Tier 2 = positive EV with relaxed CV gate but higher edge bar.
// Stat-specific exclusions removed (2026-03-22): KDE+ and MODEL_BIAS address root causes.
// OVER ≥5% edge gate kept as market structure (OVER genuinely harder to predict).

function isTier1(e) {
  const edge = e.edgePct ?? e.edge ?? 0;
  const games = e.gamesAvailable ?? 0;
  const odds = e.bookOdds ?? 0;
  if (games < 36)                                return false;  // CV sample gate
  if (edge < 1.5)                                return false;  // minimum edge
  if (odds >= 176)                               return false;  // long-shot exclusion
  if (e.side === 'OVER' && edge < 5)             return false;  // OVER needs higher edge (market structure)
  if (e.distModel === 'Poisson')                 return false;  // require CV-backed model
  const prob = e.modelProb ?? 0;
  if (prob > PROB_CEILING)                       return false;  // ceiling check
  return true;
}

function isTier2(e) {
  const edge = e.edgePct ?? e.edge ?? 0;
  const games = e.gamesAvailable ?? 0;
  const odds = e.bookOdds ?? 0;
  if (games < 20)                                return false;  // relaxed CV gate
  if (edge < 3)                                  return false;  // higher edge required
  if (odds >= 176)                               return false;  // long-shot exclusion
  if (e.side === 'OVER' && edge < 5)             return false;  // OVER needs 5%+ edge (market structure)
  const prob = e.modelProb ?? 0;
  if (prob > PROB_CEILING)                       return false;  // ceiling check
  return true;
}

function classifyTier(e) {
  if (isTier1(e)) return 1;
  if (isTier2(e)) return 2;
  return null;
}

function scorePlay(e) {
  const edge = e.edgePct ?? e.edge ?? 0;
  let score = edge;  // base: vig-free edge %

  // Line gap bonus: book line 0.3–1σ above projection (UNDER signal)
  // +19.4% ROI in calibration data
  const std = e.std ?? (e.projection > 0 && e.cvValue ? e.projection * (e.cvValue / 100) : null);
  if (std > 0 && e.projection > 0) {
    const sigma = ((e.propLine ?? 0) - e.projection) / std;
    if (sigma >= 0.3 && sigma <= 1.0) score += 2.0;
  }

  // Spread bonus: 12+ point games (+20.6% ROI in Strat B)
  if (e.spread != null && Math.abs(e.spread) >= 12) score += 1.0;

  // Tier 1 preferred over Tier 2
  if (e.tier === 1) score += 1.0;

  // Solid edge sweet spot: 3–5% outperforms 5%+ in calibration (+12.5% vs -2.6% ROI)
  if (edge >= 3 && edge < 5) score += 0.5;

  // OVER penalty (even when allowed via Tier 2 or REB exemption)
  if (e.side === 'OVER') score -= 1.5;

  // NegBin model bonus (+9.7% ROI vs other models)
  if (e.distModel === 'NegBin') score += 0.5;

  return score;
}

// Build a bankroll-safe slate from batch results, merging with existing plays.
// Deduplicates by player+stat+side, keeping the version with best edge.
// Applies exposure caps and scales stakes if total Kelly exceeds bankroll limit.
function buildSlate(newBatchResults, existingSlate, config, sessionNum) {
  // Wave cap map: session 1 → wave1Cap, session 2 → wave2Cap, session 3+ → wave3Cap
  const waveCaps = [
    config.wave1Cap ?? 7,
    config.wave2Cap ?? 5,
    config.wave3Cap ?? 3,
  ];
  const getWaveCap = s => waveCaps[Math.min(s - 1, waveCaps.length - 1)] ?? 3;

  // 1. Gate: reject any incoming play from a game that has already tipped
  const pendingResults = newBatchResults.filter(r => !gameIsActive(r.commenceTime));

  // 2. Optionally restrict to Tier 1 only for this add operation
  const tierFiltered = (config.addTier1Only)
    ? pendingResults.filter(r => isTier1(r))
    : pendingResults;

  // 3. Classify and score new results
  const newPlays = tierFiltered
    .map(r => ({ ...r, tier: classifyTier(r) }))
    .filter(r => r.tier !== null)
    .map(r => ({ ...r, score: scorePlay(r), session: sessionNum, addedAt: new Date().toISOString() }));

  // 4. Per-wave cap check: how much kelly has this session already committed?
  const sessionKellyExisting = existingSlate
    .filter(p => p.session === sessionNum)
    .reduce((s, p) => s + (p.kellyPct || 0), 0);
  const waveCap = getWaveCap(sessionNum);
  const waveHeadroom = Math.max(0, waveCap - sessionKellyExisting);

  // 5. Merge with existing slate (dedup: keep best edge)
  const merged = [...existingSlate];
  for (const play of newPlays) {
    const key = `${play.player}|${play.stat}|${play.side}`;
    const existingIdx = merged.findIndex(m => `${m.player}|${m.stat}|${m.side}` === key);
    if (existingIdx >= 0) {
      const existingEdge = merged[existingIdx].edgePct ?? merged[existingIdx].edge ?? 0;
      const newEdge = play.edgePct ?? play.edge ?? 0;
      if (newEdge > existingEdge) {
        merged[existingIdx] = { ...play, _updated: true };
      }
    } else {
      merged.push(play);
    }
  }

  // Rescore all (tier may have changed after merge)
  merged.forEach(p => { p.score = scorePlay(p); });

  // 6. Sort by score descending
  merged.sort((a, b) => b.score - a.score);

  // 7. Apply exposure caps
  const perPlayer = {}, perGame = {};
  const selected = [], overflow = [];
  let newSessionKelly = 0;
  for (const play of merged) {
    const pKey = play.player ?? '__';
    const gKey = play.eventId ?? play.commenceTime ?? '__';
    const atPlayerCap = (perPlayer[pKey] ?? 0) >= (config.maxPerPlayer || 2);
    const atGameCap   = (perGame[gKey]   ?? 0) >= (config.maxPerGame || 3);
    const atSlateCap  = selected.length >= (config.maxPlays || 18);
    // Per-wave cap: only applies to new plays in the current session
    const isNewThisSession = play.session === sessionNum && !play._updated &&
      !existingSlate.some(e => `${e.player}|${e.stat}|${e.side}` === pKey + '|' + play.stat + '|' + play.side);
    const atWaveCap = isNewThisSession && (newSessionKelly + (play.kellyPct || 0) > waveHeadroom);

    if (atSlateCap || atPlayerCap || atGameCap || atWaveCap) {
      const reason = atSlateCap ? 'slate full' : atPlayerCap ? `max ${config.maxPerPlayer}/player`
        : atGameCap ? `max ${config.maxPerGame}/game` : `W${sessionNum} cap`;
      overflow.push({ ...play, _cutReason: reason });
      continue;
    }
    selected.push(play);
    perPlayer[pKey] = (perPlayer[pKey] ?? 0) + 1;
    perGame[gKey]   = (perGame[gKey]   ?? 0) + 1;
    if (isNewThisSession) newSessionKelly += (play.kellyPct || 0);
  }

  // 8. Global bankroll cap — only rescale pending (pre-tip) plays; committed plays are already placed
  const totalKelly = selected.reduce((s, p) => s + (p.kellyPct || 0), 0);
  let scaleFactor = 1;
  if (totalKelly > (config.maxBankrollPct || 15)) {
    // Separate active (committed) from pending plays
    const activePlays  = selected.filter(p => gameIsActive(p.commenceTime));
    const pendingPlays = selected.filter(p => !gameIsActive(p.commenceTime));
    const activeKelly  = activePlays.reduce((s, p) => s + (p.kellyPct || 0), 0);
    const pendingKelly = pendingPlays.reduce((s, p) => s + (p.kellyPct || 0), 0);
    const budgetForPending = Math.max(0, (config.maxBankrollPct || 15) - activeKelly);
    if (pendingKelly > budgetForPending && pendingKelly > 0) {
      scaleFactor = budgetForPending / pendingKelly;
      pendingPlays.forEach(p => { p.kellyPct = (p.kellyPct || 0) * scaleFactor; p._scaled = true; });
    }
  }

  const totalKellyFinal = selected.reduce((s, p) => s + (p.kellyPct || 0), 0);
  // Compute per-wave kelly totals for display
  const waveKelly = {};
  selected.forEach(p => {
    const s = p.session ?? 1;
    waveKelly[s] = (waveKelly[s] ?? 0) + (p.kellyPct || 0);
  });

  return { selected, overflow, totalKelly: totalKellyFinal, scaleFactor, newCount: newPlays.length, waveKelly, waveCaps };
}

                        : analysisStrategy === 'c'
                        ? `Strategy C has ${strategySettledN} settled plays — need at least 5 for analysis.`
                        : 'Need at least 5 settled plays for analysis.'}
                    </div>
                  )}
                </div>
              )}
            </>
          )}
        </div>
      )}
    </div>
  );
}

// Returns { n, hitRate } if ≥minN settled bets exist for player/stat/side; else null
function getHistoricalBias(calibration, player, stat, side, minN = 5) {
  const settled = calibration.filter(e =>
    e.player === player &&
    e.stat === stat &&
    e.side === side.toUpperCase() &&
    (e.result === 'WON' || e.result === 'LOST')
  );
  if (settled.length < minN) return null;
  const wins = settled.filter(e => e.result === 'WON').length;
  return { n: settled.length, hitRate: wins / settled.length };
}

        if (prev[key].cvMode && prev[key].cvValue !== "") {
          const cv = parseFloat(prev[key].cvValue);
          const m = parseFloat(value);
          if (!isNaN(cv) && !isNaN(m)) updated[key].stdDev = Math.round(m * (cv / 100) * 10) / 10;

  const resetStdDev = useCallback((key) => {
    setStats((prev) => ({

  }, []);

  const handleLoadCv = useCallback(() => {
    if (!cvDatabase) return;
    const normalized = playerName.trim().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    const playerData = cvDatabase[normalized];
    if (!playerData) {
      setCvLoadStatus('notfound');
      return;
    }
    const win = cvWindow;
    const isAuto = win === 'auto';

    // ── Auto-blend helpers ─────────────────────────────────────────────
    // Weights: sample-size × recency multiplier. last5 is noisiest but most
    // predictive; season is stable but may lag role changes. Blending gives
    // principled weight to all windows, reducing both bias and variance vs.
    // picking a single window manually.
    const BLEND_N = { last5: 5, last10: 10, last20: 20, season: playerData.games_available || 30 };
    const BLEND_R = { last5: 3.0, last10: 2.0, last20: 1.5, season: 1.0 };
    const blendCv = (cvByWindow) => {
      let wSum = 0, wVal = 0;
      ['last5', 'last10', 'last20', 'season'].forEach(w => {
        const v = cvByWindow?.[w];
        if (v == null) return;
        const weight = BLEND_N[w] * BLEND_R[w];
        wSum += weight; wVal += weight * v;
      });
      return wSum > 0 ? wVal / wSum : null;
    };

    // Minutes CV — blended or single window
    const cvMinRaw = isAuto ? blendCv(playerData.cv_minutes) : playerData.cv_minutes?.[win];

    setStats(prev => {
      const updated = { ...prev };
      STAT_CONFIG.forEach(({ key }) => {
        const cvPer36 = isAuto ? blendCv(playerData.cv?.[key]) : playerData.cv?.[key]?.[win];
        if (cvPer36 == null) return;
        // Combine per-36 rate variance with minutes variance when available.
        // If cv_minutes absent (stale data), use per-36 CV alone — still far better than hardcoded ratios.
        const effectiveCV = (cvMinRaw != null)
          ? Math.round(Math.sqrt(cvPer36 ** 2 + cvMinRaw ** 2) * 10) / 10
          : Math.round(cvPer36 * 10) / 10;
        const m = parseFloat(prev[key].mean);
        const std = m > 0 ? Math.round(m * (effectiveCV / 100) * 10) / 10 : 0;
        updated[key] = { ...prev[key], cvMode: true, cvValue: String(effectiveCV), stdDev: std, stdOverride: false };
      });
      return updated;
    });
    // CV Window Divergence: flag stats where last5 and season CVs disagree significantly.
    // A ratio > 1.5 suggests a recent role change or usage spike; < 0.67 suggests player locked in.
    // Auto-blend silently averages these conflicting signals — this alert tells the user when to
    // scrutinize the model's input quality more carefully.
    const divergence = {};
    ['pts', 'reb', 'ast', 'stl', 'blk', 'threes'].forEach(stat => {
      const last5 = playerData.cv?.[stat]?.last5;
      const season = playerData.cv?.[stat]?.season;
      if (last5 == null || season == null || season === 0) return;
      const ratio = last5 / season;
      if (ratio > 1.5) divergence[stat] = { ratio: Math.round(ratio * 10) / 10, dir: 'up' };
      else if (ratio < 0.67) divergence[stat] = { ratio: Math.round(ratio * 10) / 10, dir: 'down' };
    });
    setCvDivergence(divergence);

    // PRA / PR / PA / RA: store effective CV for direct simulation.
    // Direct simulation uses the empirical combo CV (which already encodes within-game
    // correlations between component stats) rather than summing independently-drawn distributions.
    const setComboDirectCv = (comboKey, setter) => {
      const cvPer36 = isAuto ? blendCv(playerData.cv?.[comboKey]) : playerData.cv?.[comboKey]?.[win];
      if (cvPer36 != null) {
        const effectiveCV = (cvMinRaw != null)
          ? Math.round(Math.sqrt(cvPer36 ** 2 + cvMinRaw ** 2) * 10) / 10
          : Math.round(cvPer36 * 10) / 10;
        setter(effectiveCV);
      } else {
        setter(null);
      }
    };
    setComboDirectCv('pra', setPraDirectCv);
    setComboDirectCv('pr',  setPrDirectCv);
    setComboDirectCv('pa',  setPaDirectCv);
    setComboDirectCv('ra',  setRaDirectCv);
    setComboDirectCv('sb',  setSbDirectCv);
    // pts/reb/ast raw: load historical game scores for KDE hybrid sampler.
    // In auto-blend mode, prefer the season window (most data) since the KDE
    // sampler already applies LAMBDA=0.9 recency decay internally — using a
    // larger raw dataset gives better bandwidth estimation without sacrificing recency.
    const kdeWin = isAuto
      ? (['season', 'last20', 'last10', 'last5'].find(w => (playerData['pts_raw']?.[w]?.length ?? 0) >= 5) || 'last20')
      : win;
    const loadRawData = (rawKey, meanKey, setter) => {
      const scores = playerData[rawKey]?.[kdeWin];
      const hMean  = playerData[meanKey]?.[kdeWin];
      if (scores != null && hMean != null && scores.length >= 5) {
        setter({ rawScores: scores, historicalMean: hMean });
      } else {
        setter(null);
      }
    };
    loadRawData('pts_raw', 'pts_mean_raw', setPtsRawData);
    loadRawData('reb_raw', 'reb_mean_raw', setRebRawData);
    loadRawData('ast_raw', 'ast_mean_raw', setAstRawData);
    // Unfiltered raw scores (includes tail games filtered out of pts_raw).
    // kdeWin same selection logic — season preferred for bandwidth estimation.
    loadRawData('pts_raw_all', 'pts_mean_raw_all', setPtsRawDataAll);
    loadRawData('reb_raw_all', 'reb_mean_raw_all', setRebRawDataAll);
    loadRawData('ast_raw_all', 'ast_mean_raw_all', setAstRawDataAll);
    setCvLoadStatus(isAuto ? 'found_auto' : cvMinRaw != null ? 'found' : 'found_partial');
  }, [cvDatabase, cvWindow, playerName]);

  const handleParseProjections = useCallback((textOverride) => {

    setProjError(null);
    setProjFromCache(false);

    setProjOpen(false);
  }, [projPasteText]);

  const handleProjFile = useCallback((e) => {
    const file = e.target.files?.[0];

  const handleSelectProjection = useCallback((name) => {
    const p = projections?.find(pl => pl.name === name);

    setPtsRawData(null);
    setRebRawData(null);
    setAstRawData(null);
    setPtsRawDataAll(null);
    setRebRawDataAll(null);
    setAstRawDataAll(null);
    setCvDivergence({});
    // Clear stale combo lines from previous player — will re-populate from component sums below if oddsData is loaded
    setComboLines(() => {
      const init = {};
      COMBO_CONFIG.forEach(({ key }) => { init[key] = { line: "", overOdds: "", underOdds: "" }; });
      return init;
    });
    // Full reset of all player-specific state — clears propLine, odds, CV, and std override
    // from the previous player. This prevents stale CV/propLine from corrupting the new
    // player's simulation, especially after a batch EV run populates cvMode across many players.
    // oddsData setStats below re-populates propLine and odds from the API response.
    setStats(prev => {
      const updated = { ...prev };
      ['pts', 'reb', 'ast', 'stl', 'blk', 'threes'].forEach(key => {
        const newMean = p[key] ?? 0;
        updated[key] = {
          ...prev[key],
          mean:        String(newMean),
          stdDev:      estimateStdDev(key, newMean),
          propLine:    "",
          overOdds:    "",
          underOdds:   "",

          cvValue:     "",
          stdOverride: false,
          projSD:      "",
        };
      });

    // Auto-populate prop lines + odds from Odds API if available
    if (oddsData) {
      const normName = normalizeOddsName(p.name);
      const playerOdds = oddsData[normName] || findFuzzyOddsMatch(oddsData, normName);
      if (playerOdds) {
        setStats(prev => {
          const next = { ...prev };
          STAT_CONFIG.forEach(({ key }) => {
            const o = playerOdds[key];
            if (!o) return;
            const patch = {};
            if (o.line != null)      patch.propLine  = String(o.line);
            if (o.overOdds  != null) patch.overOdds  = String(Math.round(o.overOdds));
            if (o.underOdds != null) patch.underOdds = String(Math.round(o.underOdds));
            if (Object.keys(patch).length > 0) next[key] = { ...next[key], ...patch };
          });
          return next;
        });
        // Auto-populate combo prop lines from component sums — zero additional API calls.
        // Component lines are already on the 0.5 grid so the sum lands on a valid line.
        // Odds are intentionally left blank: defaulting to -110 would show fake edge before
        // the user has confirmed the actual market price.
        setComboLines(() => {
          const next = {};
          COMBO_CONFIG.forEach(({ key }) => { next[key] = { line: "", overOdds: "", underOdds: "" }; });
          COMBO_CONFIG.forEach(({ key, parts }) => {
            if (!parts.every(pk => playerOdds[pk]?.line != null)) return;
            const sum = parts.reduce((s, pk) => s + playerOdds[pk].line, 0);
            if (sum <= 0) return;
            next[key] = { line: String(Math.round(sum * 2) / 2), overOdds: "", underOdds: "" };
          });
          return next;
        });
      }
    }
  }, [projections, oddsData]);

  const handleClearPlayer = useCallback(() => {
    setPlayerName("Player Name");
    setStats(() => {
      const init = {};
      STAT_CONFIG.forEach(({ key, defaultMean }) => {
        init[key] = { mean: "", stdDev: "", propLine: "", overOdds: "", underOdds: "", stdOverride: false, cvMode: false, cvValue: "", projSD: "" };
      });
      return init;
    });
    setComboLines(() => {
      const init = {};
      COMBO_CONFIG.forEach(({ key }) => { init[key] = { line: "", overOdds: "", underOdds: "" }; });
      return init;
    });
    setResults(null);
    setCsvData(null);
    setPraDirectCv(null); setPrDirectCv(null); setPaDirectCv(null); setRaDirectCv(null); setSbDirectCv(null);
    setPtsRawData(null);
    setRebRawData(null);
    setAstRawData(null);
    setPtsRawDataAll(null);
    setRebRawDataAll(null);
    setAstRawDataAll(null);
    setCvLoadStatus(null);
    setLadderOpen({});
  }, []);

  const handleSimulate = useCallback(() => {
    const t0 = performance.now();
    const ts = new Date().toISOString();
    // Build projection uncertainty σ map when PROJ σ mode is active
    const projSDs = {};
    if (projUncertaintyMode) {
      const defaults = { pts: 4.0, reb: 1.5, ast: 1.5, stl: 0.5, blk: 0.5, threes: 1.0 };
      STAT_CONFIG.forEach(({ key }) => {
        const sd = parseFloat(stats[key].projSD);
        projSDs[key] = isNaN(sd) || sd <= 0 ? defaults[key] : sd;
      });
    }
    const simResults = runSimulation(stats, numSims, ptsRawData, rebRawData, astRawData, projUncertaintyMode ? projSDs : {}, ptsRawDataAll, rebRawDataAll, astRawDataAll);

    const statProbs = {};
    STAT_CONFIG.forEach(({ key }) => {
      if (stats[key].propLine !== "") {
        const cvPctForLabel = POISSON_STATS.has(key) && stats[key].cvMode && stats[key].cvValue ? parseFloat(stats[key].cvValue) : null;
        const poissonCVThreshold = POISSON_STATS.has(key) ? (1 / Math.sqrt(Math.max(0.01, parseFloat(stats[key].mean) || 0))) * 100 : null;
        const usingNegBin = cvPctForLabel > 0 && poissonCVThreshold !== null && cvPctForLabel > poissonCVThreshold;
        // "KDE+" = unfiltered raw data used (full empirical dist incl. tail games)
        // "KDE"  = situation-filtered raw data (legacy path, missing tail games)
        // All count stats now use NegBin (player CV or league-avg fallback); "NegBin*" = league-avg CV
        const distModel = POISSON_STATS.has(key) ? (usingNegBin ? "NegBin" : "NegBin*")
          : key === 'pts' ? (ptsRawDataAll && computeEmpiricalStd(ptsRawDataAll.rawScores, parseFloat(stats[key].mean) || 0) !== null ? "KDE+" : ptsRawData ? "KDE" : "Gamma")
          : key === 'reb' ? (rebRawDataAll && computeEmpiricalStd(rebRawDataAll.rawScores, parseFloat(stats[key].mean) || 0) !== null ? "KDE+" : rebRawData ? "KDE" : "LogNormal")
          : key === 'ast' ? (astRawDataAll && computeEmpiricalStd(astRawDataAll.rawScores, parseFloat(stats[key].mean) || 0) !== null ? "KDE+" : astRawData ? "KDE" : "Gamma")
          : LOG_NORMAL_STATS.has(key) ? "LogNormal" : "Normal";
        const method = POISSON_STATS.has(key) ? `CV/${distModel}`
          : stats[key].cvMode ? `CV/${distModel}` : stats[key].stdOverride ? `Manual/${distModel}` : `Auto/${distModel}`;
        const prob_raw  = calcProbability(simResults[key], stats[key].propLine);
        const prob_calc = applyModelCorrections(prob_raw, key);
        const seOver_s  = Math.sqrt(prob_calc.over  * (1 - prob_calc.over)  / numSims);
        const seUnder_s = Math.sqrt(prob_calc.under * (1 - prob_calc.under) / numSims);
        // Discrete probability table for count stats (STL/BLK/THREES)
        const discreteDist = POISSON_STATS.has(key) ? calcDiscreteDist(simResults[key]) : null;
        // Projection sensitivity: over% at ETR ±5%/±10% adjustments (zero resimulation cost)
        const meanF = parseFloat(stats[key].mean);
        const sensitivity = meanF > 0 ? calcSensitivity(simResults[key], stats[key].propLine, meanF) : null;
        // NegBin dispersion parameter r — computed from same CV used in sampler
        let negBinR = null;
        if (usingNegBin && cvPctForLabel > 0 && meanF > 0) {
          const cv = cvPctForLabel / 100;
          const r = 1 / (cv * cv - 1 / meanF);
          negBinR = r > 0 ? Math.round(r * 10) / 10 : null;
        }
        statProbs[key] = {
          prob: prob_calc,
          simValues: simResults[key],
          propLine: stats[key].propLine,
          overOdds: stats[key].overOdds,
          underOdds: stats[key].underOdds,
          mean: stats[key].mean,
          std: stats[key].stdDev,
          stdMethod: method,
          cvValue: stats[key].cvMode ? stats[key].cvValue : "",
          distModel,
          discreteDist,
          sensitivity,
          negBinR,
          betIdOver:     generateBetId(),
          betIdUnder:    generateBetId(),
          fairOverOdds:  probToAmerican(prob_calc.over),
          fairUnderOdds: probToAmerican(prob_calc.under),
          ciOver:  { lo: Math.max(0, prob_calc.over  - 1.96 * seOver_s),  hi: Math.min(1, prob_calc.over  + 1.96 * seOver_s)  },
          ciUnder: { lo: Math.max(0, prob_calc.under - 1.96 * seUnder_s), hi: Math.min(1, prob_calc.under + 1.96 * seUnder_s) },
        };
      }
    });

    const comboProbs = {};
    COMBO_CONFIG.forEach(({ key, parts }) => {
      if (comboLines[key].line !== "") {
        let comboVals;
        // Prefer direct combo simulation using empirical CV from cv_data.json — avoids the
        // independence assumption error from summing separately-drawn component distributions.
        // The empirical combo CV already encodes real within-game correlations (pts/reb/ast
        // all move together with minutes). Falls back to element-wise sum when CV unavailable.
        const directCvMap = { pra: praDirectCv, pr: prDirectCv, pa: paDirectCv, ra: raDirectCv, sb: sbDirectCv };
        const directCv = directCvMap[key];
        if (directCv != null) {
          const meanCombo = parts.reduce((sum, k) => sum + (parseFloat(stats[k]?.mean) || 0), 0);
          const stdCombo = meanCombo * (directCv / 100);
          comboVals = simulateStatLogNormal(meanCombo, stdCombo, numSims);
        } else {
          comboVals = calcCombo(simResults, parts);
        }
        const cProbRaw = calcProbability(comboVals, comboLines[key].line);
        // Apply ceiling to combo probs (no per-stat bias correction for combos)
        const cProb = applyModelCorrections(cProbRaw, null);
        const comboMean = comboVals.reduce((a, b) => a + b, 0) / numSims;
        const comboSensitivity = comboMean > 0 ? calcSensitivity(comboVals, comboLines[key].line, comboMean) : null;
        comboProbs[key] = {
          prob: cProb,
          simValues: comboVals,
          propLine: comboLines[key].line,
          overOdds: comboLines[key].overOdds,
          underOdds: comboLines[key].underOdds,
          mean: comboMean,
          std: directCv != null ? meanCombo * (directCv / 100) : null,
          distModel: directCv != null ? 'Direct' : 'Summed',
          sensitivity: comboSensitivity,
          betIdOver:     generateBetId(),
          betIdUnder:    generateBetId(),
          fairOverOdds:  probToAmerican(cProb.over),
          fairUnderOdds: probToAmerican(cProb.under),
        };
      }
    });

    // Simultaneous Kelly: collect best-side active bets across all stats and combos
    const portfolioBets = [];
    [...STAT_CONFIG.map(({ key }) => ({ key, r: statProbs[key] })),
     ...COMBO_CONFIG.map(({ key }) => ({ key, r: comboProbs[key] }))
    ].forEach(({ key, r }) => {
      if (!r) return;
      const overK  = r.overOdds  && r.overOdds  !== "" ? (calcKelly(r.prob.over,  parseFloat(r.overOdds))  || 0) : 0;
      const underK = r.underOdds && r.underOdds !== "" ? (calcKelly(r.prob.under, parseFloat(r.underOdds)) || 0) : 0;
      const bestK = Math.max(overK, underK);
      if (bestK > 0) portfolioBets.push({ key, side: overK >= underK ? 'over' : 'under', kelly: bestK });
    });
    const portfolioFactors = calcPortfolioFactors(portfolioBets, kellyFraction);

    // Auto-open ladder for every stat/combo that has a prop line entered
    const newLadderOpen = {};
    STAT_CONFIG.forEach(({ key }) => { newLadderOpen[key] = stats[key].propLine !== ""; });
    COMBO_CONFIG.forEach(({ key }) => { newLadderOpen[key] = comboLines[key].line !== ""; });
    setLadderOpen(newLadderOpen);

    setSimTime(Math.round(performance.now() - t0));
    setSimTimestamp(ts);
    setResults({ stats: statProbs, combos: comboProbs, portfolioFactors });
    setResultsAreStale(false);
  }, [stats, comboLines, numSims, kellyFraction, ptsRawData, rebRawData, astRawData, projUncertaintyMode, praDirectCv, prDirectCv, paDirectCv, raDirectCv, sbDirectCv]);

  // ── Calibration Handlers ─────────────────────────────────────────────
  // Toggle a single betId in/out of the batchTracked selection set
  const handleToggleTrack = useCallback((betId) => {
    setBatchTracked(prev => {
      const next = new Set(prev);
      if (next.has(betId)) next.delete(betId); else next.add(betId);
      return next;
    });
  }, []);

  // Convert all selected batch rows into calibration tracker entries and reset selection
  const handleTrackSelected = useCallback(() => {
    if (!batchResults || batchTracked.size === 0) return;
    const bank = parseFloat(bankroll) || 0;
    const unit = parseFloat(unitSize) || 20;
    const newEntries = [];
    batchResults.forEach(r => {
      if (!batchTracked.has(r.betId)) return;
      const kFull  = calcKelly(r.modelProb, r.bookOdds) || 0;
      const kStake = bank > 0 ? Math.round(bank * kFull * kellyFraction * 100) / 100 : null;
      newEntries.push({
        id:             r.betId,
        loggedAt:       new Date().toISOString(),
        player:         r.player,
        stat:           r.stat,
        statLabel:      r.statLabel,
        side:           r.side,
        propLine:       r.propLine,
        bookOdds:       r.bookOdds,
        modelProb:      r.modelProb,
        fairOdds:       r.side === 'OVER'
                          ? (parseFloat(r.fairOverOdds)  || null)
                          : (parseFloat(r.fairUnderOdds) || null),
        edgePct:        r.edge,
        edgeLabel:      r.edgeLabel,
        kellyStake:     kStake,
        unitStake:      unit,
        eventId:        r.eventId      ?? null,
        commenceTime:   r.commenceTime ?? null,
        result:         null,
        closingOdds:    null,
        closingLine:    null,
        // Model metadata (batch already computes these — pass them through)
        projection:       r.projection       ?? null,
        distModel:        r.distModel        ?? null,
        cvValue:          null,  // batch CV is embedded in modelProb; not stored separately
        std:              r.std              ?? null,
        gamesAvailable:   r.gamesAvailable   ?? null,
        gameTotal:        r.gameTotal        ?? null,
        spread:           r.spread           ?? null,
        otherSideOdds:    r.otherSideOdds    ?? null,
        projectedMinutes: r.projectedMinutes ?? null,
      });
    });
    if (newEntries.length === 0) return;
    setCalibration(prev => {
      const existingIds = new Set(prev.map(e => e.id));
      const fresh = newEntries.filter(e => !existingIds.has(e.id));
      const next = [...fresh, ...prev];
      if (JSON.stringify(next).length > 4 * 1024 * 1024) {
        alert('Calibration log approaching storage limit. Export and clear some entries first.');
        return prev;
      }
      return next;
    });
    setBatchTracked(new Set());
    setCalibrationOpen(true);
  }, [batchResults, batchTracked, bankroll, unitSize, kellyFraction]);

  // Batch-log all rows >= threshold% edge, deduplicating by player+stat+side+line per game date.
  // Same bet at drifted odds (-110 → -115) is skipped — odds don't affect model calibration.
  // A line move (24.5 → 25.0) produces a different key and is logged as a new calibration event.
  const handleLogAllAboveThreshold = useCallback((threshold = 3) => {
    if (!batchResults) return;
    const today = new Date().toISOString().slice(0, 10);
    const bank  = parseFloat(bankroll) || 0;
    const unit  = parseFloat(unitSize) || 20;

    // Semantic keys from entries already recorded today
    const existingKeys = new Set(
      calibration
        .filter(e => (e.loggedAt || '').slice(0, 10) === today)
        .map(e => `${e.player}|${e.stat}|${e.side}|${e.propLine}`)
    );

    const candidates = batchResults.filter(r => typeof r.edge === 'number' && r.edge >= threshold);
    let skipped = 0;
    const newEntries = [];
    const seenThisRun = new Set(); // intra-batch dedup: same player+stat+side+line twice in one batch

    for (const r of candidates) {
      const key = `${r.player}|${r.stat}|${r.side}|${r.propLine}`;
      if (existingKeys.has(key) || seenThisRun.has(key)) { skipped++; continue; }
      seenThisRun.add(key);
      const kFull  = calcKelly(r.modelProb, r.bookOdds) || 0;
      const kStake = bank > 0 ? Math.round(bank * kFull * kellyFraction * 100) / 100 : null;
      newEntries.push({
        id:               r.betId,
        loggedAt:         new Date().toISOString(),
        player:           r.player,
        stat:             r.stat,
        statLabel:        r.statLabel,
        side:             r.side,
        propLine:         r.propLine,
        bookOdds:         r.bookOdds,
        modelProb:        r.modelProb,
        fairOdds:         r.side === 'OVER' ? (parseFloat(r.fairOverOdds)  || null)
                                             : (parseFloat(r.fairUnderOdds) || null),
        edgePct:          r.edge,
        edgeLabel:        r.edgeLabel,
        kellyStake:       kStake,
        unitStake:        unit,
        eventId:          r.eventId          ?? null,
        commenceTime:     r.commenceTime      ?? null,
        result:           null,
        closingOdds:      null,
        closingLine:      null,
        projection:       r.projection        ?? null,
        distModel:        r.distModel         ?? null,
        cvValue:          null,
        std:              r.std               ?? null,
        gamesAvailable:   r.gamesAvailable    ?? null,
        gameTotal:        r.gameTotal         ?? null,
        spread:           r.spread            ?? null,
        otherSideOdds:    r.otherSideOdds     ?? null,
        projectedMinutes: r.projectedMinutes  ?? null,
        modelVersion:     MODEL_VERSION,
      });
    }

    const msg = newEntries.length === 0
      ? `All ${skipped} already recorded today`
      : `Logged ${newEntries.length}${skipped > 0 ? ` | Skipped ${skipped} (already today)` : ''}`;

    if (newEntries.length > 0) {
      setCalibration(prev => {
        const next = [...newEntries, ...prev];
        if (JSON.stringify(next).length > 4 * 1024 * 1024) {
          alert('Calibration log approaching storage limit. Export and clear some entries first.');
          return prev;
        }
        return next;
      });
      setCalibrationOpen(true);
    }
    setBatchLogMsg(msg);
    setTimeout(() => setBatchLogMsg(null), 5000);
  }, [batchResults, calibration, bankroll, unitSize, kellyFraction]);

  // ── Play Selector handlers ────────────────────────────────────────
  const handleAddPlaysToSlate = useCallback(() => {
    if (!batchResults || slateLocked) return;
    const result = buildSlate(batchResults, slate, slateConfig, slateSession);
    setSlate(result.selected);
    setSlateOverflow(result.overflow);
    setSlateTotalKelly(result.totalKelly);
    setSlateScaleFactor(result.scaleFactor);
    setSlateWaveKelly(result.waveKelly ?? {});
  }, [batchResults, slate, slateConfig, slateSession, slateLocked]);

  const handleNewSlateRun = useCallback(() => {
    if (slateLocked) return;
    setSlateSession(prev => prev + 1);
  }, [slateLocked]);

  const handleLockSlate = useCallback(() => {
    setSlateLocked(prev => !prev);
  }, []);

  const handleClearSlate = useCallback(() => {
    setSlate([]);
    setSlateOverflow([]);
    setSlateSession(1);
    setSlateLocked(false);
    setSlateTotalKelly(0);
    setSlateScaleFactor(1);
    setSlateWaveKelly({});

  const handleLogSlate = useCallback(() => {
    if (slate.length === 0) return;
    const today = new Date().toISOString().slice(0, 10);
