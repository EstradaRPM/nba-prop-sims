  const [oddsLoading, setOddsLoading]     = useState(false);
  const [oddsError, setOddsError]         = useState(null);
  const [oddsLastFetched, setOddsLastFetched]   = useState(null);
  const [oddsRequestsLeft, setOddsRequestsLeft] = useState(null);
  const [showOddsPanel, setShowOddsPanel] = useState(false);
  const [openBooksPanel, setOpenBooksPanel] = useState(null); // stat key with expanded multi-book view

  React.useEffect(() => {
    fetch('./cv_data.json')
      .then(r => r.json())
      .then(data => { setCvDatabase(data.players); setCvGeneratedAt(data.generated_at || null); })
      .catch(() => {}); // degrade gracefully — CV lookup is optional
  }, []);

  React.useEffect(() => { localStorage.setItem('oddsApiKey', oddsApiKey); }, [oddsApiKey]);
  React.useEffect(() => { localStorage.setItem('selectedBooks', JSON.stringify(selectedBooks)); }, [selectedBooks]);

  // ── Bet Journal state ──────────────────────────────────────────────
  const [journal,             setJournal]             = useState(() => loadJournal());
  const [journalOpen,         setJournalOpen]         = useState(false);
  const [journalFilter,       setJournalFilter]       = useState('all');
  const [logBetDraft,         setLogBetDraft]         = useState(null);
  const [editingBet,          setEditingBet]          = useState(null);
  const [journalCsvCopied,    setJournalCsvCopied]    = useState(false);
  // ── Projection Uncertainty state ───────────────────────────────────
  const [projUncertaintyMode, setProjUncertaintyMode] = useState(false);

  React.useEffect(() => {
    localStorage.setItem(JOURNAL_KEY, JSON.stringify(journal));
  }, [journal]);

  const handleFetchLines = useCallback(async () => {
    if (!oddsApiKey.trim()) { setOddsError('Enter your Odds API key first.'); setShowOddsPanel(true); return; }
    setOddsLoading(true); setOddsError(null);
    try {
      const result = await fetchFullSlate(oddsApiKey.trim(), selectedBooks);
      setOddsData(result.oddsIndex);
      setGameData(result.gameIndex);
      setOddsLastFetched(new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }));
      setOddsRequestsLeft(result.remainingRequests);
      setShowOddsPanel(false);
    } catch(e) {
      setOddsError(e.message || 'Fetch failed — check API key and network.');
    } finally {
      setOddsLoading(false);
    }
  }, [oddsApiKey, selectedBooks]);

  const updateStat = useCallback((key, field, value) => {
    setStats((prev) => {
      const updated = { ...prev, [key]: { ...prev[key], [field]: value } };
      if (field === "mean") {
        // Recalc auto std dev if not overridden and not in CV mode
        if (!prev[key].stdOverride && !prev[key].cvMode) {
          updated[key].stdDev = estimateStdDev(key, value);
        }
        // If in CV mode, recalc stdDev from CV × new mean
        if (prev[key].cvMode && prev[key].cvValue !== "") {
          const cv = parseFloat(prev[key].cvValue);
          const m = parseFloat(value);
          if (!isNaN(cv) && !isNaN(m)) updated[key].stdDev = Math.round(m * (cv / 100) * 10) / 10;
        }
      }
      if (field === "stdDev" && !prev[key].cvMode) updated[key].stdOverride = true;
      if (field === "cvValue") {
        const cv = parseFloat(value);
        const m = parseFloat(prev[key].mean);
        if (!isNaN(cv) && !isNaN(m) && m > 0) {
          updated[key].stdDev = Math.round(m * (cv / 100) * 10) / 10;
        }
      }
      return updated;
    });
  }, []);

  const toggleCvMode = useCallback((key) => {
    setStats((prev) => {
      const cur = prev[key];
      if (cur.cvMode) {
        // Switching OFF CV mode → back to auto
        return { ...prev, [key]: { ...cur, cvMode: false, cvValue: "", stdOverride: false, stdDev: estimateStdDev(key, cur.mean) } };
      } else {
        // Switching ON CV mode → compute CV from current std/mean as starting point
        const m = parseFloat(cur.mean);
        const s = parseFloat(cur.stdDev);
        const startCV = (m > 0 && s > 0) ? Math.round((s / m) * 100) : "";
        return { ...prev, [key]: { ...cur, cvMode: true, cvValue: String(startCV), stdOverride: false } };
      }
    });
  }, []);

  const resetStdDev = useCallback((key) => {
    setStats((prev) => ({
      ...prev, [key]: { ...prev[key], stdDev: estimateStdDev(key, prev[key].mean), stdOverride: false, cvMode: false, cvValue: "" },
    }));
  }, []);

  const handleLoadCv = useCallback(() => {
    if (!cvDatabase) return;
    const normalized = playerName.trim().normalize('NFD');
    const playerData = cvDatabase[normalized];
    if (!playerData) {
      setCvLoadStatus('notfound');
      return;
    }
    const win = cvWindow;
    const cvMin = playerData.cv_minutes?.[win]; // null if data predates cv_minutes field
    setStats(prev => {
      const updated = { ...prev };
      STAT_CONFIG.forEach(({ key }) => {
        const cvPer36 = playerData.cv?.[key]?.[win];
        if (cvPer36 == null) return;
        // Combine per-36 rate variance with minutes variance when available.
        // If cv_minutes absent (stale data), use per-36 CV alone — still far better than hardcoded ratios.
        const effectiveCV = (cvMin != null)
          ? Math.round(Math.sqrt(cvPer36 ** 2 + cvMin ** 2) * 10) / 10
          : Math.round(cvPer36 * 10) / 10;
        const m = parseFloat(prev[key].mean);
        const std = m > 0 ? Math.round(m * (effectiveCV / 100) * 10) / 10 : 0;
        updated[key] = { ...prev[key], cvMode: true, cvValue: String(effectiveCV), stdDev: std, stdOverride: false };
      });
      return updated;
    });
    // PRA / PR / PA / RA: store effective CV for direct simulation.
    // Direct simulation uses the empirical combo CV (which already encodes within-game
    // correlations between component stats) rather than summing independently-drawn distributions.
    const setComboDirectCv = (comboKey, setter) => {
      const cvPer36 = playerData.cv?.[comboKey]?.[win];
      if (cvPer36 != null) {
        const effectiveCV = (cvMin != null)
          ? Math.round(Math.sqrt(cvPer36 ** 2 + cvMin ** 2) * 10) / 10
          : Math.round(cvPer36 * 10) / 10;
        setter(effectiveCV);
      } else {
        setter(null);
      }
    };
    setComboDirectCv('pra', setPraDirectCv);
    setComboDirectCv('pr',  setPrDirectCv);
    setComboDirectCv('pa',  setPaDirectCv);
    setComboDirectCv('ra',  setRaDirectCv);
    // pts/reb/ast raw: load historical game scores for KDE hybrid sampler
    const loadRawData = (rawKey, meanKey, setter) => {
      const scores = playerData[rawKey]?.[win];
      const hMean  = playerData[meanKey]?.[win];
      if (scores != null && hMean != null && scores.length >= 5) {
        setter({ rawScores: scores, historicalMean: hMean });
      } else {
        setter(null);
      }
    };
    loadRawData('pts_raw', 'pts_mean_raw', setPtsRawData);
    loadRawData('reb_raw', 'reb_mean_raw', setRebRawData);
    loadRawData('ast_raw', 'ast_mean_raw', setAstRawData);
    setCvLoadStatus(cvMin != null ? 'found' : 'found_partial');
  }, [cvDatabase, cvWindow, playerName]);

  const handleParseProjections = useCallback((textOverride) => {
    const text = textOverride !== undefined ? textOverride : projPasteText;
    if (!text?.trim()) { setProjError("Paste or upload projection data first."); return; }
    const result = parseETRProjections(text);
    if (result.error) { setProjError(result.error); return; }
    setProjections(result.players);
    setProjError(null);
    setProjUpdatedAt(new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }));
    setProjOpen(false);
  }, [projPasteText]);

  const handleProjFile = useCallback((e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const text = ev.target.result;
      setProjPasteText(text);
      handleParseProjections(text);
    };
    reader.readAsText(file);
    e.target.value = ''; // allow re-uploading same file
  }, [handleParseProjections]);

  const handleSelectProjection = useCallback((name) => {
    const p = projections?.find(pl => pl.name === name);
    if (!p) return;
    setPlayerName(p.name);
    setCvLoadStatus(null);
    setPraDirectCv(null);
    setPtsRawData(null);
    setRebRawData(null);
    setAstRawData(null);
    setStats(prev => {
      const updated = { ...prev };
      ['pts', 'reb', 'ast', 'stl', 'blk', 'threes'].forEach(key => {
        const newMean = p[key];
        const cur = prev[key];
        if (cur.cvMode && cur.cvValue !== '') {
          // Preserve CV mode: recalc std from existing CV × new mean
          const cv = parseFloat(cur.cvValue);
          const std = !isNaN(cv) && newMean > 0 ? Math.round(newMean * (cv / 100) * 10) / 10 : 0;
          updated[key] = { ...cur, mean: String(newMean), stdDev: std };
        } else if (!cur.stdOverride) {
          updated[key] = { ...cur, mean: String(newMean), stdDev: estimateStdDev(key, newMean) };
        } else {
          updated[key] = { ...cur, mean: String(newMean) };
        }
      });
      return updated;
    });
    // Auto-populate prop lines + odds from Odds API if available
    if (oddsData) {
      const normName = normalizeOddsName(p.name);
      const playerOdds = oddsData[normName] || findFuzzyOddsMatch(oddsData, normName);
      if (playerOdds) {
        setStats(prev => {
          const next = { ...prev };
          STAT_CONFIG.forEach(({ key }) => {
            const o = playerOdds[key];
            if (!o) return;
            const patch = {};
            if (o.line != null)      patch.propLine  = String(o.line);
            if (o.overOdds  != null) patch.overOdds  = String(Math.round(o.overOdds));
            if (o.underOdds != null) patch.underOdds = String(Math.round(o.underOdds));
            if (Object.keys(patch).length > 0) next[key] = { ...next[key], ...patch };
          });
          return next;
        });
      }
    }
  }, [projections, oddsData]);

  const handleClearPlayer = useCallback(() => {
    setPlayerName("Player Name");
    setStats(() => {
      const init = {};
      STAT_CONFIG.forEach(({ key, defaultMean }) => {

    setComboLines(() => {
      const init = {};

    setResults(null);
    setCsvData(null);
    setPraDirectCv(null);
    setPtsRawData(null);

    setAstRawData(null);

  const handleSimulate = useCallback(() => {
    const t0 = performance.now();
    const ts = new Date().toISOString();
    // Build projection uncertainty σ map when PROJ σ mode is active
    const projSDs = {};
    if (projUncertaintyMode) {
      const defaults = { pts: 4.0, reb: 1.5, ast: 1.5, stl: 0.5, blk: 0.5, threes: 1.0 };
      STAT_CONFIG.forEach(({ key }) => {
        const sd = parseFloat(stats[key].projSD);
        projSDs[key] = isNaN(sd) || sd <= 0 ? defaults[key] : sd;
      });
    }
    const simResults = runSimulation(stats, numSims, ptsRawData, rebRawData, astRawData, projUncertaintyMode ? projSDs : {});

    const statProbs = {};
    STAT_CONFIG.forEach(({ key }) => {
      if (stats[key].propLine !== "") {
        const cvPctForLabel = POISSON_STATS.has(key) && stats[key].cvMode && stats[key].cvValue ? parseFloat(stats[key].cvValue) : null;
        const poissonCVThreshold = POISSON_STATS.has(key) ? (1 / Math.sqrt(Math.max(0.01, parseFloat(stats[key].mean) || 0))) * 100 : null;
        const usingNegBin = cvPctForLabel > 0 && poissonCVThreshold !== null && cvPctForLabel > poissonCVThreshold;
        const distModel = POISSON_STATS.has(key) ? (usingNegBin ? "NegBin" : "Poisson")
          : key === 'pts' ? (ptsRawData ? "KDE" : "Gamma")
          : key === 'reb' ? (rebRawData ? "KDE" : "LogNormal")
          : key === 'ast' ? (astRawData ? "KDE" : "LogNormal")
          : LOG_NORMAL_STATS.has(key) ? "LogNormal" : "Normal";
        const method = POISSON_STATS.has(key) ? (usingNegBin ? `CV/${distModel}` : "Poisson")
          : stats[key].cvMode ? `CV/${distModel}` : stats[key].stdOverride ? `Manual/${distModel}` : `Auto/${distModel}`;
        const prob_calc = calcProbability(simResults[key], stats[key].propLine);
        const seOver_s  = Math.sqrt(prob_calc.over  * (1 - prob_calc.over)  / numSims);
        const seUnder_s = Math.sqrt(prob_calc.under * (1 - prob_calc.under) / numSims);
        statProbs[key] = {
          prob: prob_calc,
          simValues: simResults[key],
          propLine: stats[key].propLine,
          overOdds: stats[key].overOdds,
          underOdds: stats[key].underOdds,
          mean: stats[key].mean,
          std: stats[key].stdDev,
          stdMethod: method,
          cvValue: stats[key].cvMode ? stats[key].cvValue : "",
          distModel,
          betIdOver:     generateBetId(),
          betIdUnder:    generateBetId(),
          fairOverOdds:  probToAmerican(prob_calc.over),
          fairUnderOdds: probToAmerican(prob_calc.under),
          ciOver:  { lo: Math.max(0, prob_calc.over  - 1.96 * seOver_s),  hi: Math.min(1, prob_calc.over  + 1.96 * seOver_s)  },
          ciUnder: { lo: Math.max(0, prob_calc.under - 1.96 * seUnder_s), hi: Math.min(1, prob_calc.under + 1.96 * seUnder_s) },
        };
      }
    });

    const comboProbs = {};
    COMBO_CONFIG.forEach(({ key, parts }) => {
      if (comboLines[key].line !== "") {
        let comboVals;
        // Prefer direct combo simulation using empirical CV from cv_data.json — avoids the
        // independence assumption error from summing separately-drawn component distributions.
        // The empirical combo CV already encodes real within-game correlations (pts/reb/ast
        // all move together with minutes). Falls back to element-wise sum when CV unavailable.
        const directCvMap = { pra: praDirectCv, pr: prDirectCv, pa: paDirectCv, ra: raDirectCv };
        const directCv = directCvMap[key];
        if (directCv != null) {
          const meanCombo = parts.reduce((sum, k) => sum + (parseFloat(stats[k]?.mean) || 0), 0);
          const stdCombo = meanCombo * (directCv / 100);
          comboVals = simulateStatLogNormal(meanCombo, stdCombo, numSims);
        } else {
          comboVals = calcCombo(simResults, parts);
        }
        const cProb = calcProbability(comboVals, comboLines[key].line);
        comboProbs[key] = {
          prob: cProb,
          simValues: comboVals,
          propLine: comboLines[key].line,
          overOdds: comboLines[key].overOdds,
          underOdds: comboLines[key].underOdds,
          mean: comboVals.reduce((a, b) => a + b, 0) / numSims,
          distModel: directCv != null ? 'Direct' : 'Summed',
          betIdOver:     generateBetId(),
          betIdUnder:    generateBetId(),
          fairOverOdds:  probToAmerican(cProb.over),
          fairUnderOdds: probToAmerican(cProb.under),
        };
      }
    });

    // Simultaneous Kelly: collect best-side active bets across all stats and combos
    const portfolioBets = [];
    [...STAT_CONFIG.map(({ key }) => ({ key, r: statProbs[key] })),
     ...COMBO_CONFIG.map(({ key }) => ({ key, r: comboProbs[key] }))
    ].forEach(({ key, r }) => {
      if (!r) return;
      const overK  = r.overOdds  && r.overOdds  !== "" ? (calcKelly(r.prob.over,  parseFloat(r.overOdds))  || 0) : 0;
      const underK = r.underOdds && r.underOdds !== "" ? (calcKelly(r.prob.under, parseFloat(r.underOdds)) || 0) : 0;
      const bestK = Math.max(overK, underK);
      if (bestK > 0) portfolioBets.push({ key, side: overK >= underK ? 'over' : 'under', kelly: bestK });
    });
    const portfolioFactors = calcPortfolioFactors(portfolioBets);

    // Auto-open ladder for every stat/combo that has a prop line entered
    const newLadderOpen = {};
    STAT_CONFIG.forEach(({ key }) => { newLadderOpen[key] = stats[key].propLine !== ""; });
    COMBO_CONFIG.forEach(({ key }) => { newLadderOpen[key] = comboLines[key].line !== ""; });
    setLadderOpen(newLadderOpen);

    setSimTime(Math.round(performance.now() - t0));
    setSimTimestamp(ts);
    setResults({ stats: statProbs, combos: comboProbs, portfolioFactors });
  }, [stats, comboLines, numSims]);

  // ── Bet Journal Handlers ─────────────────────────────────────────────

  // ── Batch EV Hunt ───────────────────────────────────────────────────
  // Loops all ETR projections that have odds, runs 10k sims each (parametric only —
  // no KDE raw data in batch), and accumulates a flat ranked edge list.
  // Zero additional API calls — all data is already in state.
  const runBatchSimulation = useCallback(async () => {
    if (!projections || !oddsData) return;
    setBatchRunning(true);
    setBatchResults(null);
    setBatchCsvData(null);

    // Filter to players with at least one stat that has an odds line.
    // Also gate out players whose CV database sample is too thin to trust (< MIN_BATCH_GAMES).
    // Players absent from the CV DB entirely still pass through (new/recent players).
    const eligible = projections.filter(p => {
      const normName = normalizeOddsName(p.name);
      const playerOdds = oddsData[normName] || findFuzzyOddsMatch(oddsData, normName);
      if (!playerOdds) return false;
      const cvKey = p.name.trim().normalize('NFD');
      const cvEntry = cvDatabase?.[cvKey];
      if (cvEntry && cvEntry.games_available < MIN_BATCH_GAMES) return false;
      return STAT_CONFIG.some(({ key }) => playerOdds[key]?.line != null);
    });

    setBatchProgress({ current: 0, total: eligible.length });
    const allRows = [];
    const BATCH_SIMS = 10000;
    const MIN_BATCH_GAMES = 10; // require ≥10 CV-db games to trust the distribution shape
    const BATCH_PROJ_FLOORS = { pts: 6, reb: 2, ast: 1.5, stl: 0.5, blk: 0.3, threes: 0.5 };

    for (let i = 0; i < eligible.length; i++) {
      const p = eligible[i];
      const normName = normalizeOddsName(p.name);
      // NFD-normalize for cvDatabase lookup (case-preserved, same as handleLoadCv line 1144)
      const cvKey = p.name.trim().normalize('NFD');
      const playerOdds = oddsData[normName] || findFuzzyOddsMatch(oddsData, normName);
      const cvData = cvDatabase?.[cvKey];
      const gameCtx = gameData?.[p.team?.toUpperCase()] || null;

      // Build stats object — reuses the exact same CV formula as handleLoadCv
      const statsForSim = buildPlayerStatsForSim(p, playerOdds, cvData);

      // runSimulation with null raw data → safe parametric fallback (confirmed ~line 202-215)
      const simResults = runSimulation(statsForSim, BATCH_SIMS, null, null, null);

      STAT_CONFIG.forEach(({ key, label }) => {
        const s = statsForSim[key];
        if (!s || s.propLine === '') return; // no line for this stat

        // Projection floor: skip tiny-projection props — the edge is projection uncertainty, not alpha
        const projValue = parseFloat(p[key]);
        if (isNaN(projValue) || projValue < (BATCH_PROJ_FLOORS[key] ?? 0)) return;

        const prob = calcProbability(simResults[key], s.propLine);
        const fairOverOdds  = probToAmerican(prob.over);
        const fairUnderOdds = probToAmerican(prob.under);

        ['over', 'under'].forEach(side => {
          const rawOdds      = side === 'over' ? s.overOdds : s.underOdds;
          const otherRawOdds = side === 'over' ? s.underOdds : s.overOdds;
          const bookOdds = parseFloat(rawOdds);
          if (isNaN(bookOdds)) return;
          const modelProb    = prob[side];
          const bookProbRaw  = americanToProb(bookOdds);
          if (!bookProbRaw) return;
          // Vig-free when both sides available
          const otherRaw = americanToProb(parseFloat(otherRawOdds));
          const bookProb = (otherRaw) ? bookProbRaw / (bookProbRaw + otherRaw) : bookProbRaw;
          const edge      = (modelProb - bookProb) * 100;
          const kelly     = calcKelly(modelProb, bookOdds) || 0;
          allRows.push({
            player:    p.name,
            team:      p.team || '',
            stat:      key,
            statLabel: label,
            propLine:  parseFloat(s.propLine),
            side:      side.toUpperCase(),
            bookOdds,
            bookProb,
            modelProb,
            edge,
            edgeLabel: getEdgeLabel(edge),
            kellyPct:  kelly * 25, // ¼ Kelly displayed
            gameTotal: gameCtx?.total ?? null,
            spread:    gameCtx?.spread ?? null,
            // Backtest / CLV tracking columns
            projection:     projValue,
            fairOverOdds,
            fairUnderOdds,
            gamesAvailable: cvData?.games_available ?? null,
            betId: Date.now().toString(36).slice(-4) + Math.random().toString(36).slice(2, 6),
          });
        });
      });

      setBatchProgress({ current: i + 1, total: eligible.length });
      // Yield to browser — allows progress counter to re-render between players
      await new Promise(resolve => setTimeout(resolve, 0));
    }

    // Default sort: best edge first
    allRows.sort((a, b) => b.edge - a.edge);
    setBatchResults(allRows);
    setBatchProgress(null);
    setBatchRunning(false);
  }, [projections, oddsData, cvDatabase, gameData]);

      <div style={{ maxWidth: 720, margin: "0 auto", padding: "24px 16px 80px" }}>

                  {oddsRequestsLeft != null && <span style={{ color: "#64748b" }}> · {oddsRequestsLeft} req left</span>}

            </div>

                            const thresh = isPoissonStat && m > 0 ? Math.round(100 / Math.sqrt(m)) : null;
                            const negBinActive = thresh !== null && !isNaN(enteredCV) && enteredCV > thresh;
                            const borderColor = isPoissonStat
                              ? (negBinActive ? "rgba(168,85,247,0.7)" : "rgba(245,158,11,0.6)")

                            const badgeColor = isPoissonStat ? (negBinActive ? "#a855f7" : "#f59e0b") : "#a855f7";

                                  ? `NegBin active — CV ${stats[key].cvValue}% > Poisson threshold ${thresh}%`

                              : `CV ${stats[key].cvValue}% → SD ${stats[key].stdDev}`;
                            return (
                              <>
                                <input type="number" step="1" placeholder="CV%" value={stats[key].cvValue}

                                  borderRadius: 2, fontFamily: "'JetBrains Mono', monospace", cursor: "pointer",

                              </>
                            );

                        </>
                      ) : (

                          <input type="number" step="0.1" value={stats[key].stdDev}

                            <div onClick={() => toggleCvMode(key)} style={{
                              position: "absolute", top: -5, right: 3, fontSize: 6, fontWeight: 700,
                              color: "#22c55e", backgroundColor: "rgba(15,23,42,0.95)", padding: "0 2px",
                              borderRadius: 2, fontFamily: "'JetBrains Mono', monospace", cursor: "pointer",

                          ) : (
                            <div onClick={() => resetStdDev(key)} style={{
                              position: "absolute", top: -5, right: 3, fontSize: 6, fontWeight: 700,
                              color: "#fbbf24", backgroundColor: "rgba(15,23,42,0.95)", padding: "0 2px",
                              borderRadius: 2, fontFamily: "'JetBrains Mono', monospace", cursor: "pointer",
                            }} title="Reset to auto">↺</div>
                          )}
                        </>
                      )}
                    </div>
                    <input type="number" step="0.5" placeholder="—" value={stats[key].propLine}
                      onChange={(e) => updateStat(key, "propLine", e.target.value)}
                      style={{ ...inputStyle, flex: 1, borderColor: stats[key].propLine ? "rgba(99,102,241,0.4)" : "rgba(148,163,184,0.2)" }} />
                    <input type="number" step="1" placeholder="-110" value={stats[key].overOdds}
                      onChange={(e) => updateStat(key, "overOdds", e.target.value)}
                      style={{ ...inputStyle, flex: 1, borderColor: stats[key].overOdds ? "rgba(34,197,94,0.35)" : "rgba(148,163,184,0.2)" }} />
                    <input type="number" step="1" placeholder="-110" value={stats[key].underOdds}
                      onChange={(e) => updateStat(key, "underOdds", e.target.value)}
                      style={{ ...inputStyle, flex: 1, borderColor: stats[key].underOdds ? "rgba(239,68,68,0.3)" : "rgba(148,163,184,0.2)" }} />
                    {/* Multi-book toggle — always reserves space; hidden when no odds data exists */}
                    <div onClick={statOdds ? () => setOpenBooksPanel(booksOpen ? null : key) : undefined}
                      style={{ flexShrink: 0, fontSize: 7, fontWeight: 700, padding: "2px 4px",
                        borderRadius: 3, fontFamily: "'JetBrains Mono', monospace",
                        visibility: statOdds ? "visible" : "hidden",
                        cursor: statOdds ? "pointer" : "default",
                        color: booksOpen ? "#0b0f1a" : "#4ade80",
                        backgroundColor: booksOpen ? "#4ade80" : "rgba(34,197,94,0.1)",
                        border: "1px solid rgba(34,197,94,0.3)" }}
                      title={statOdds ? "Show all books" : ""}>
                      SHOP
                    </div>
                  </div>
                  {/* Multi-book comparison panel */}
                  {booksOpen && statOdds && statOdds.allBooks && (
                    <div style={{ marginLeft: 30, marginTop: 3, padding: "6px 8px",
                      backgroundColor: "rgba(15,23,42,0.6)", border: "1px solid rgba(34,197,94,0.15)",
                      borderRadius: 5 }}>
                      <div style={{ display: "grid", gridTemplateColumns: "auto 1fr 1fr 1fr", gap: "2px 8px",
                        fontSize: 8, fontFamily: "'JetBrains Mono', monospace" }}>
                        <div style={{ color: "#475569" }}>Book</div>
                        <div style={{ color: "#475569", textAlign: "center" }}>Line</div>
                        <div style={{ color: "#4ade80", textAlign: "center" }}>Over</div>
                        <div style={{ color: "#f87171", textAlign: "center" }}>Under</div>
                        {SUPPORTED_BOOKS.filter(b =>
                          statOdds.allBooks.some(ab => ab.book === b.key)
                        ).map(b => {
                          const overEntry  = statOdds.allBooks.find(ab => ab.book === b.key && ab.side === 'over');
                          const underEntry = statOdds.allBooks.find(ab => ab.book === b.key && ab.side === 'under');
                          const isTopOver  = overEntry  && overEntry.price  === statOdds.overOdds;
                          const isTopUnder = underEntry && underEntry.price === statOdds.underOdds;
                          return (
                            <React.Fragment key={b.key}>
                              <div style={{ color: "#94a3b8" }}>{b.label}</div>
                              <div style={{ color: "#64748b", textAlign: "center" }}>
                                {overEntry?.point ?? underEntry?.point ?? "—"}
                              </div>
                              <div onClick={() => {
                                  if (overEntry?.point != null) updateStat(key, 'propLine', String(overEntry.point));
                                  if (overEntry?.price != null) updateStat(key, 'overOdds', String(Math.round(overEntry.price)));
                                }}
                                style={{ color: isTopOver ? "#22c55e" : "#64748b", textAlign: "center",
                                  cursor: overEntry ? "pointer" : "default", fontWeight: isTopOver ? 700 : 400 }}
                                title={overEntry ? "Click to use this over line" : ""}>
                                {overEntry ? fmtOdds(Math.round(overEntry.price)) : "—"}
                              </div>
                              <div onClick={() => {
                                  if (underEntry?.point != null) updateStat(key, 'propLine', String(underEntry.point));
                                  if (underEntry?.price != null) updateStat(key, 'underOdds', String(Math.round(underEntry.price)));
                                }}
                                style={{ color: isTopUnder ? "#f87171" : "#64748b", textAlign: "center",
                                  cursor: underEntry ? "pointer" : "default", fontWeight: isTopUnder ? 700 : 400 }}
                                title={underEntry ? "Click to use this under line" : ""}>
                                {underEntry ? fmtOdds(Math.round(underEntry.price)) : "—"}
                              </div>
                            </React.Fragment>
                          );
                        })}
                      </div>
                      <div style={{ fontSize: 7, color: "#475569", marginTop: 4, fontFamily: "'JetBrains Mono', monospace" }}>
                        Highlighted = best available · Click any odds to apply to input
                      </div>
                    </div>
                  )}
                </div>
              );
            });
          })()}

          <div style={{
            marginTop: 8, padding: "6px 10px", backgroundColor: "rgba(34,197,94,0.04)",
            border: "1px solid rgba(34,197,94,0.1)", borderRadius: 6, fontSize: 8,
            color: "#64748b", lineHeight: 1.5, fontFamily: "'JetBrains Mono', monospace",
          }}>
            Enter best available <span style={{ color: "#4ade80" }}>OVER</span> and <span style={{ color: "#f87171" }}>UNDER</span> odds
            from any book — can be different books. Edge is calculated independently per side.
            Click <span style={{ color: "#22c55e" }}>AUTO</span> to switch to <span style={{ color: "#a855f7" }}>CV%</span> mode (enter player's CV from your library, std dev auto-computes from mean × CV).
          </div>
        </div>

        {/* Combos */}
        <div style={{ backgroundColor: "rgba(15,23,42,0.4)", border: "1px solid rgba(148,163,184,0.20)", borderRadius: 12, padding: "16px 12px", marginBottom: 16 }}>
          <div style={{ ...labelStyle, marginBottom: 12, fontSize: 11, paddingLeft: 4 }}>Combo Props</div>
          <div style={{ display: "flex", gap: 4, marginBottom: 6, paddingLeft: 95 }}>
            <div style={{ ...tinyLabel, flex: 1 }}>Line</div>
            <div style={{ ...tinyLabel, flex: 1 }}>Over Odds</div>
            <div style={{ ...tinyLabel, flex: 1 }}>Under Odds</div>
          </div>
          {COMBO_CONFIG.map(({ key, label }) => (
            <div key={key} style={{ display: "flex", gap: 4, marginBottom: 6, alignItems: "center" }}>
              <div style={{ width: 90, fontFamily: "'JetBrains Mono', monospace", fontWeight: 600, fontSize: 9, color: "#94a3b8", textAlign: "right", flexShrink: 0 }}>{label}</div>
              <input type="number" step="0.5" placeholder="—" value={comboLines[key].line}
                onChange={(e) => setComboLines(p => ({ ...p, [key]: { ...p[key], line: e.target.value } }))}
                style={{ ...inputStyle, flex: 1, borderColor: comboLines[key].line ? "rgba(99,102,241,0.4)" : "rgba(148,163,184,0.2)" }} />
              <input type="number" step="1" placeholder="-110" value={comboLines[key].overOdds}
                onChange={(e) => setComboLines(p => ({ ...p, [key]: { ...p[key], overOdds: e.target.value } }))}
                style={{ ...inputStyle, flex: 1, borderColor: comboLines[key].overOdds ? "rgba(34,197,94,0.35)" : "rgba(148,163,184,0.2)" }} />
              <input type="number" step="1" placeholder="-110" value={comboLines[key].underOdds}
                onChange={(e) => setComboLines(p => ({ ...p, [key]: { ...p[key], underOdds: e.target.value } }))}
                style={{ ...inputStyle, flex: 1, borderColor: comboLines[key].underOdds ? "rgba(239,68,68,0.3)" : "rgba(148,163,184,0.2)" }} />
            </div>
          ))}
        </div>

        {/* Buttons */}
        <div style={{ display: "flex", gap: 10, marginBottom: 24 }}>
          <button onClick={handleSimulate} disabled={!hasAnyLine} style={{
            flex: 3, padding: "14px 24px", borderRadius: 10, border: "none",
            background: hasAnyLine ? "linear-gradient(135deg, #4f46e5, #6366f1)" : "rgba(51,65,85,0.5)",
            color: hasAnyLine ? "#fff" : "#475569",
            fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 13, letterSpacing: 1.5,
            cursor: hasAnyLine ? "pointer" : "not-allowed",
            boxShadow: hasAnyLine ? "0 4px 24px rgba(79,70,229,0.25)" : "none",
          }}>
            {hasAnyLine ? "RUN SIMULATION" : "ENTER A PROP LINE TO BEGIN"}
          </button>
          {results && (
            <button onClick={handleExport} style={{
              flex: 1, padding: "14px 12px", borderRadius: 10, border: "1px solid rgba(148,163,184,0.2)",
              background: "rgba(15,23,42,0.6)", color: "#94a3b8",
              fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 11,
              letterSpacing: 1, cursor: "pointer", transition: "all 0.2s",
            }}>
              EXPORT CSV
            </button>
          )}
        </div>

        {/* CSV Modal */}
        {csvData && (
          <div style={{
            marginBottom: 20, backgroundColor: "rgba(15,23,42,0.7)",
            border: "1px solid rgba(148,163,184,0.15)", borderRadius: 10, padding: 16,
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <span style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 12, color: "#e2e8f0", letterSpacing: 1 }}>
                  CSV EXPORT
                </span>
                <label style={{ display: "flex", alignItems: "center", gap: 5, cursor: "pointer" }}>
                  <input type="checkbox" checked={includeHeaders}
                    onChange={(e) => {
                      setIncludeHeaders(e.target.checked);
                      // Re-generate CSV with new setting
                      if (results) {
                        const fullCsv = buildCSV(playerName, numSims, results.stats, results.combos, simTimestamp, bankroll, results.portfolioFactors ?? {}, kellyFraction, unitSize);
                        setCsvData(e.target.checked ? fullCsv : fullCsv.split("\n").slice(1).join("\n"));
                      }
                    }}
                    style={{ accentColor: "#6366f1", width: 14, height: 14, cursor: "pointer" }} />
                  <span style={{ fontSize: 9, color: "#94a3b8", fontFamily: "'JetBrains Mono', monospace", fontWeight: 600 }}>
                    HEADERS
                  </span>
                </label>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={handleCopyCSV} style={{
                  padding: "6px 14px", borderRadius: 6,
                  border: copied ? "1px solid rgba(34,197,94,0.4)" : "1px solid rgba(99,102,241,0.4)",
                  background: copied ? "rgba(34,197,94,0.15)" : "rgba(99,102,241,0.15)",
                  color: copied ? "#22c55e" : "#a5b4fc",
                  fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 10,
                  letterSpacing: 1, cursor: "pointer",
                }}>
                  {copied ? "COPIED ✓" : "COPY ALL"}
                </button>
                <button onClick={() => setCsvData(null)} style={{
                  padding: "6px 10px", borderRadius: 6,
                  border: "1px solid rgba(148,163,184,0.2)",
                  background: "transparent", color: "#64748b",
                  fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 10,
                  cursor: "pointer",
                }}>
                  ✕
                </button>
              </div>
            </div>
            <textarea
              id="csv-output"
              readOnly
              value={csvData}
              onFocus={(e) => e.target.select()}
              style={{
                width: "100%", height: 120, resize: "vertical",
                backgroundColor: "rgba(0,0,0,0.3)", border: "1px solid rgba(148,163,184,0.1)",
                borderRadius: 6, padding: 10, color: "#94a3b8",
                fontFamily: "'JetBrains Mono', monospace", fontSize: 10, lineHeight: 1.5,
                outline: "none",
              }}
            />
            <div style={{ marginTop: 6, fontSize: 9, color: "#475569", fontFamily: "'JetBrains Mono', monospace" }}>
              Paste into Google Sheets or a .csv file. Include headers on your first paste, then uncheck for subsequent players.
            </div>
          </div>
        )}

        {/* Results */}
        {results && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <div>
                <span style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 15, color: "#f8fafc" }}>
                  {playerName}
                </span>
                <span style={{ color: "#475569", fontSize: 12, marginLeft: 8, fontFamily: "'JetBrains Mono', monospace" }}>RESULTS</span>
              </div>
              <span style={{ color: "#475569", fontSize: 11, fontFamily: "'JetBrains Mono', monospace" }}>
                {numSims.toLocaleString()} sims · {simTime}ms
              </span>
            </div>

            {/* Correlated Signal Detection + Parlay EV */}
            {(() => {
              const coreStats = ["pts", "reb", "ast"];
              const overSignals = coreStats.filter(k => {
                const r = results.stats[k];
                if (!r || !r.overOdds || r.overOdds === "") return false;
                const vfP = (r.overOdds && r.underOdds && r.underOdds !== "")
                  ? vigFreeProb(parseFloat(r.overOdds), parseFloat(r.underOdds))
                  : null;
                const bookProb = vfP ? vfP.over : americanToProb(parseFloat(r.overOdds));
                return bookProb && (r.prob.over - bookProb) * 100 >= 1.5;
              });
              const underSignals = coreStats.filter(k => {
                const r = results.stats[k];
                if (!r || !r.underOdds || r.underOdds === "") return false;
                const vfP = (r.overOdds && r.overOdds !== "" && r.underOdds)
                  ? vigFreeProb(parseFloat(r.overOdds), parseFloat(r.underOdds))
                  : null;
                const bookProb = vfP ? vfP.under : americanToProb(parseFloat(r.underOdds));
                return bookProb && (r.prob.under - bookProb) * 100 >= 1.5;
              });

              // Build parlay display for the triggered direction
              const renderParlayPanel = (direction) => {
                const isOver = direction === 'over';
                const accentColor  = isOver ? "#22c55e" : "#f87171";
                const mutedColor   = isOver ? "#86efac" : "#fca5a5";
                const bgGrad       = isOver
                  ? "linear-gradient(135deg, rgba(34,197,94,0.12), rgba(34,197,94,0.04))"
                  : "linear-gradient(135deg, rgba(239,68,68,0.12), rgba(239,68,68,0.04))";
                const borderColor  = isOver ? "rgba(34,197,94,0.3)" : "rgba(239,68,68,0.3)";

                // Pull simValues + propLines for the 3 core stats
                const sv = {
                  pts: results.stats.pts?.simValues,
                  reb: results.stats.reb?.simValues,
                  ast: results.stats.ast?.simValues,
                };
                const pl = {
                  pts: parseFloat(results.stats.pts?.propLine),
                  reb: parseFloat(results.stats.reb?.propLine),
                  ast: parseFloat(results.stats.ast?.propLine),
                };
                const hasAllSims = sv.pts && sv.reb && sv.ast &&
                  !isNaN(pl.pts) && !isNaN(pl.reb) && !isNaN(pl.ast);

                // 3-leg joint probability
                const p3 = hasAllSims ? calcParlayProb([
                  { simValues: sv.pts, propLine: pl.pts, side: direction },
                  { simValues: sv.reb, propLine: pl.reb, side: direction },
                  { simValues: sv.ast, propLine: pl.ast, side: direction },
                ]) : null;

                // 2-leg joint probabilities
                const p2_pr = hasAllSims ? calcParlayProb([
                  { simValues: sv.pts, propLine: pl.pts, side: direction },
                  { simValues: sv.reb, propLine: pl.reb, side: direction },
                ]) : null;
                const p2_pa = hasAllSims ? calcParlayProb([
                  { simValues: sv.pts, propLine: pl.pts, side: direction },
                  { simValues: sv.ast, propLine: pl.ast, side: direction },
                ]) : null;
                const p2_ra = hasAllSims ? calcParlayProb([
                  { simValues: sv.reb, propLine: pl.reb, side: direction },
                  { simValues: sv.ast, propLine: pl.ast, side: direction },
                ]) : null;

                // Independent product (uncorrelated baseline)
                const indep3 = hasAllSims
                  ? results.stats.pts.prob[direction] * results.stats.reb.prob[direction] * results.stats.ast.prob[direction]
                  : null;

                // Book parlay odds + EV for 3-leg
                const bookOddsVal = parseFloat(parlayOdds[direction]);
                const hasBookOdds = !isNaN(bookOddsVal) && bookOddsVal !== 0;
                const parlayDecimal = hasBookOdds ? americanToDecimal(bookOddsVal) : null;
                const parlayEV = (p3 != null && parlayDecimal != null)
                  ? (p3 * parlayDecimal - 1) * 100
                  : null;
                const parlayEdge = (p3 != null && hasBookOdds)
                  ? (p3 - americanToProb(bookOddsVal)) * 100
                  : null;
                const parlayKelly = (p3 != null && hasBookOdds)
                  ? calcKelly(p3, bookOddsVal)
                  : null;
                const br = parseFloat(bankroll);
                const hasBr = !isNaN(br) && br > 0;

                const dirLabel = direction.toUpperCase();

                return (
                  <div style={{
                    marginBottom: 12, padding: "12px 14px", borderRadius: 8,
                    background: bgGrad, border: `1px solid ${borderColor}`,
                  }}>
                    {/* Header */}
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                      <div style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 11, color: accentColor, letterSpacing: 1 }}>
                        ⚡ CORRELATED {dirLabel} SIGNAL — PTS + REB + AST
                      </div>
                      <div style={{ fontSize: 9, color: "#475569", fontFamily: "'JetBrains Mono', monospace" }}>
                        {numSims.toLocaleString()} trials
                      </div>
                    </div>

                    {/* 3-leg parlay row */}
                    {p3 != null && (
                      <div style={{
                        backgroundColor: "rgba(0,0,0,0.2)", borderRadius: 6, padding: "8px 10px", marginBottom: 8,
                        border: `1px solid ${borderColor}`,
                      }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 }}>
                          <span style={{ fontSize: 9, fontWeight: 700, color: accentColor, fontFamily: "'JetBrains Mono', monospace", letterSpacing: 0.8 }}>
                            3-LEG PARLAY
                          </span>
                          <span style={{ fontSize: 9, color: "#64748b", fontFamily: "'JetBrains Mono', monospace" }}>
                            PTS {dirLabel} {pl.pts} · REB {dirLabel} {pl.reb} · AST {dirLabel} {pl.ast}
                          </span>
                        </div>
                        <div style={{ display: "flex", alignItems: "baseline", gap: 10, flexWrap: "wrap" }}>
                          <div>
                            <span style={{ fontSize: 20, fontWeight: 800, color: accentColor, fontFamily: "'JetBrains Mono', monospace" }}>
                              {(p3 * 100).toFixed(1)}%
                            </span>
                            <span style={{ fontSize: 9, color: "#64748b", fontFamily: "'JetBrains Mono', monospace", marginLeft: 4 }}>JOINT</span>
                          </div>
                          <div style={{ fontSize: 12, color: mutedColor, fontFamily: "'JetBrains Mono', monospace" }}>
                            Fair: {probToAmerican(p3)}
                          </div>
                          {indep3 != null && (
                            <div style={{ fontSize: 9, color: "#475569", fontFamily: "'JetBrains Mono', monospace" }}>
                              indep: {(indep3 * 100).toFixed(1)}% ({probToAmerican(indep3)})
                            </div>
                          )}
                        </div>

                        {/* Book odds input + EV */}
                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 7, paddingTop: 7, borderTop: `1px solid ${borderColor}` }}>
                          <span style={{ fontSize: 9, color: "#64748b", fontFamily: "'JetBrains Mono', monospace", whiteSpace: "nowrap" }}>
                            Book parlay odds:
                          </span>
                          <input
                            type="text" inputMode="numeric" placeholder="+500"
                            value={parlayOdds[direction]}
                            onChange={e => setParlayOdds(prev => ({ ...prev, [direction]: e.target.value }))}
                            style={{
                              width: 64, padding: "2px 6px", borderRadius: 4, fontSize: 11,
                              fontFamily: "'JetBrains Mono', monospace", fontWeight: 700,
                              backgroundColor: "rgba(0,0,0,0.3)", border: "1px solid rgba(148,163,184,0.2)",
                              color: "#e2e8f0", outline: "none", textAlign: "center",
                            }}
                          />
                          {parlayEV != null && (
                            <div style={{ display: "flex", gap: 8, alignItems: "baseline", flexWrap: "wrap" }}>
                              <span style={{
                                fontSize: 13, fontWeight: 800, fontFamily: "'JetBrains Mono', monospace",
                                color: parlayEV >= 0 ? accentColor : "#ef4444",
                              }}>
                                EV {parlayEV >= 0 ? "+" : ""}{parlayEV.toFixed(1)}%
                              </span>
                              {parlayEdge != null && (
                                <span style={{ fontSize: 10, color: "#64748b", fontFamily: "'JetBrains Mono', monospace" }}>
                                  · edge {parlayEdge >= 0 ? "+" : ""}{parlayEdge.toFixed(1)}%
                                </span>
                              )}
                              {parlayKelly != null && parlayKelly > 0 && (
                                <span style={{ fontSize: 10, color: "#64748b", fontFamily: "'JetBrains Mono', monospace" }}>
                                  · ¼K {(parlayKelly * 25).toFixed(2)}%
                                  {hasBr ? ` → $${Math.round(br * parlayKelly * 0.25)}` : ""}
                                </span>
                              )}
                            </div>
                          )}
                          {!hasBookOdds && (
                            <span style={{ fontSize: 9, color: "#475569", fontFamily: "'JetBrains Mono', monospace", fontStyle: "italic" }}>
                              enter book odds for EV
                            </span>
                          )}
                        </div>
                      </div>
                    )}

                    {/* 2-leg combos */}
                    {(p2_pr != null || p2_pa != null || p2_ra != null) && (
                      <div>
                        <div style={{ fontSize: 8, color: "#475569", fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, letterSpacing: 0.8, marginBottom: 4 }}>
                          2-LEG COMBOS
                        </div>
                        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                          {[
                            { label: `PTS+REB ${dirLabel}`, p: p2_pr },
                            { label: `PTS+AST ${dirLabel}`, p: p2_pa },
                            { label: `REB+AST ${dirLabel}`, p: p2_ra },
                          ].map(({ label, p }) => p != null && (
                            <div key={label} style={{
                              backgroundColor: "rgba(0,0,0,0.15)", borderRadius: 5,
                              padding: "4px 8px", border: `1px solid ${borderColor}`,
                            }}>
                              <div style={{ fontSize: 8, color: "#475569", fontFamily: "'JetBrains Mono', monospace" }}>{label}</div>
                              <div style={{ fontSize: 13, fontWeight: 700, color: mutedColor, fontFamily: "'JetBrains Mono', monospace" }}>
                                {(p * 100).toFixed(1)}%
                              </div>
                              <div style={{ fontSize: 9, color: "#64748b", fontFamily: "'JetBrains Mono', monospace" }}>
                                Fair: {probToAmerican(p)}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                );
              };

              if (overSignals.length >= 3) return renderParlayPanel('over');
              if (underSignals.length >= 3) return renderParlayPanel('under');
              return null;
            })()}

            {STAT_CONFIG.map(({ key, label }, i) =>
              results.stats[key] ? (
                <div key={key} className="result-row" style={{ animationDelay: `${i * 60}ms` }}>
                  <ResultRow label={label} prob={results.stats[key].prob}
                    propLine={results.stats[key].propLine} simValues={results.stats[key].simValues}
                    overOdds={results.stats[key].overOdds} underOdds={results.stats[key].underOdds}
                    bankroll={bankroll}
                    portfolioFactorOver={results.portfolioFactors?.[`${key}_over`] ?? null}
                    portfolioFactorUnder={results.portfolioFactors?.[`${key}_under`] ?? null}
                    distModel={results.stats[key].distModel}
                    kellyFraction={kellyFraction} unitSize={unitSize} ladderMode={ladderMode}
                    ciOver={results.stats[key].ciOver} ciUnder={results.stats[key].ciUnder}
                    projUncertaintyMode={projUncertaintyMode}
                    onLogBetOver={(data) => setLogBetDraft({ ...data, player: playerName, stat: key, statLabel: label, propLine: parseFloat(results.stats[key].propLine), betId: results.stats[key].betIdOver, fairOdds: results.stats[key].fairOverOdds, gameDate: new Date().toISOString().slice(0, 10) })}
                    onLogBetUnder={(data) => setLogBetDraft({ ...data, player: playerName, stat: key, statLabel: label, propLine: parseFloat(results.stats[key].propLine), betId: results.stats[key].betIdUnder, fairOdds: results.stats[key].fairUnderOdds, gameDate: new Date().toISOString().slice(0, 10) })}
                  />
                  <LadderTable
                    statKey={key}
                    mean={results.stats[key].mean}
                    simValues={results.stats[key].simValues}
                    primaryLine={results.stats[key].propLine}
                    open={!!ladderOpen[key]}
                    onToggle={() => setLadderOpen(prev => ({ ...prev, [key]: !prev[key] }))}
                  />
                </div>
              ) : null
            )}

            {COMBO_CONFIG.map(({ key, label }, i) =>
              results.combos[key] ? (
                <div key={key} className="result-row" style={{ animationDelay: `${(STAT_CONFIG.length + i) * 60}ms` }}>
                  <ResultRow label={label} prob={results.combos[key].prob}
                    propLine={results.combos[key].propLine} simValues={results.combos[key].simValues}
                    overOdds={results.combos[key].overOdds} underOdds={results.combos[key].underOdds}
                    bankroll={bankroll}
                    portfolioFactorOver={results.portfolioFactors?.[`${key}_over`] ?? null}
                    portfolioFactorUnder={results.portfolioFactors?.[`${key}_under`] ?? null}
                    distModel={results.combos[key].distModel}
                    kellyFraction={kellyFraction} unitSize={unitSize} ladderMode={ladderMode}
                    onLogBetOver={(data) => setLogBetDraft({ ...data, player: playerName, stat: key, statLabel: label, propLine: parseFloat(results.combos[key].propLine), betId: results.combos[key].betIdOver, fairOdds: results.combos[key].fairOverOdds, gameDate: new Date().toISOString().slice(0, 10) })}
                    onLogBetUnder={(data) => setLogBetDraft({ ...data, player: playerName, stat: key, statLabel: label, propLine: parseFloat(results.combos[key].propLine), betId: results.combos[key].betIdUnder, fairOdds: results.combos[key].fairUnderOdds, gameDate: new Date().toISOString().slice(0, 10) })}
                  />
                  <LadderTable
                    statKey={key}
                    mean={results.combos[key].mean}
                    simValues={results.combos[key].simValues}
                    primaryLine={results.combos[key].propLine}
                    open={!!ladderOpen[key]}
                    onToggle={() => setLadderOpen(prev => ({ ...prev, [key]: !prev[key] }))}
                  />
                </div>
              ) : null
            )}

            <div style={{
              marginTop: 24, padding: "12px 14px",
              backgroundColor: "rgba(15,23,42,0.3)", border: "1px solid rgba(148,163,184,0.06)",
              borderRadius: 8, fontSize: 10, color: "#475569", lineHeight: 1.8,
              fontFamily: "'JetBrains Mono', monospace",
            }}>
              <strong style={{ color: "#64748b" }}>Edge Scale:</strong>{" "}
              <span style={{ color: "#ef4444" }}>NO EDGE</span> {"< 2%  ·  "}
              <span style={{ color: "#86efac" }}>MARGINAL</span> 2-4%{" · "}
              <span style={{ color: "#4ade80" }}>SOLID</span> 4-7%{" · "}
              <span style={{ color: "#22c55e" }}>STRONG</span> 7%+
              <br />
              <strong style={{ color: "#64748b" }}>Edge</strong> = your model probability minus book implied probability (from raw odds).
              <br />
              <strong style={{ color: "#64748b" }}>¼K</strong> = quarter Kelly stake. Enter bankroll above to see dollar amounts.
              <br />
              Over and under odds are compared independently — use best available from any book.
            </div>
          </div>
        )}
      </div>

      {/* Bet Journal Modals */}
      {logBetDraft && (
        <LogBetModal
          draft={logBetDraft}
          onConfirm={handleConfirmLogBet}
          onCancel={() => setLogBetDraft(null)}
        />
      )}
      {editingBet && (
        <CloseOutModal
          bet={editingBet}
          onSave={(updates) => handleCloseOutBet(editingBet.id, updates)}
          onCancel={() => setEditingBet(null)}
        />
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<NBASimulator />);
  </script>
</body>
</html>
