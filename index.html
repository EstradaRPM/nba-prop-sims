// ── Discrete Bar ─────────────────────────────────────────────────────
// Replaces DistBar for count stats (STL/BLK/THREES). Shows each integer
// value (0,1,2,...7+) as a separate bar, which is honest for discrete
// NegBin/Poisson samples that a continuous 40-bucket histogram misrepresents.
function DiscreteBar({ simValues, propLine }) {
  if (!simValues || simValues.length === 0) return null;
  const line = parseFloat(propLine);
  if (isNaN(line)) return null;
  const N = Math.min(simValues.length, 5000);
  const MAX_K = 7;
  const counts = new Array(MAX_K + 1).fill(0);
  for (let i = 0; i < N; i++) {
    const v = Math.round(simValues[i]);
    if (v < 0) continue;
    if (v >= MAX_K) counts[MAX_K]++;
    else counts[v]++;
  }
  const maxC = Math.max(...counts, 1);
  const lineFloor = Math.floor(line);
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: 3, height: 52, paddingBottom: 14, position: "relative" }}>
      {counts.map((c, k) => {
        const isUnder = k <= lineFloor;
        const pct = (c / N * 100).toFixed(1);
        const showLabel = (c / N) >= 0.02;
        return (
          <div key={k} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-end", height: "100%", position: "relative" }}>
            {showLabel && (
              <div style={{ fontSize: 7, color: "#94a3b8", fontFamily: "'JetBrains Mono', monospace", marginBottom: 1, lineHeight: 1 }}>
                {pct}%
              </div>
            )}
            <div style={{
              width: "100%", height: `${(c / maxC) * 100}%`, minHeight: c > 0 ? 3 : 0,
              backgroundColor: isUnder ? "rgba(239,68,68,0.5)" : "rgba(34,197,94,0.6)",
              borderRadius: "2px 2px 0 0",
            }} />
            <div style={{ fontSize: 8, color: "#475569", fontFamily: "'JetBrains Mono', monospace", marginTop: 2, position: "absolute", bottom: 0, lineHeight: 1 }}>
              {k === MAX_K ? `${MAX_K}+` : k}
            </div>
          </div>
        );
      })}
      {/* Divider line between floor(line) and ceil(line) */}
      {lineFloor >= 0 && lineFloor < MAX_K && (
        <div style={{
          position: "absolute",
          left: `${((lineFloor + 1) / (MAX_K + 1)) * 100}%`,
          top: 0, bottom: 14, width: 2,
          backgroundColor: "#f8fafc", opacity: 0.85,
          borderRadius: 1,
        }} />
      )}
    </div>
  );
}

// ── Discrete Count Table ──────────────────────────────────────────────
// Shows P(X=k) for k=0,1,...,maxK+ for count stats. Each cell is color-coded
// by whether it's under (red) or over (green) the prop line. Cumulative splits
// at the prop line show fair American odds for each side.
function DiscreteCountTable({ discreteDist, propLine }) {
  if (!discreteDist) return null;
  const line = parseFloat(propLine);
  if (isNaN(line)) return null;
  const lineFloor = Math.floor(line);
  const keys = Object.keys(discreteDist).map(k => k === '6+' ? '6+' : parseInt(k, 10));
  // Cumulative over probability = P(X > line) = P(X >= ceil(line))
  const overProb = keys.reduce((sum, k) => {
    const kNum = k === '6+' ? 6 : k;
    return kNum > lineFloor ? sum + discreteDist[k === '6+' ? '6+' : k] : sum;
  }, 0);
  const underProb = 1 - overProb;
  return (
    <div style={{ marginTop: 6 }}>
      <div style={{ fontSize: 8, color: "#475569", fontFamily: "'JetBrains Mono', monospace", marginBottom: 3, letterSpacing: 0.5 }}>
        P(X=k) EXACT DISTRIBUTION
      </div>
      <div style={{ display: "flex", gap: 2 }}>
        {Object.entries(discreteDist).map(([k, p]) => {
          const kNum = k === '6+' ? 99 : parseInt(k, 10);
          const isOver = kNum > lineFloor;
          const pct = (p * 100).toFixed(1);
          const isActive = p >= 0.005;
          return (
            <div key={k} style={{
              flex: 1, textAlign: "center", padding: "3px 2px",
              backgroundColor: isOver ? "rgba(34,197,94,0.12)" : "rgba(239,68,68,0.12)",
              border: `1px solid ${isOver ? "rgba(34,197,94,0.2)" : "rgba(239,68,68,0.2)"}`,
              borderRadius: 3, opacity: isActive ? 1 : 0.45,
            }}>
              <div style={{ fontSize: 7, color: "#64748b", fontFamily: "'JetBrains Mono', monospace", lineHeight: 1.2 }}>{k}</div>
              <div style={{ fontSize: 9, fontWeight: 700, color: isOver ? "#4ade80" : "#fca5a5", fontFamily: "'JetBrains Mono', monospace", lineHeight: 1.3 }}>
                {pct}%
              </div>
            </div>
          );
        })}
      </div>
      {/* Cumulative split summary */}
      <div style={{ display: "flex", gap: 6, marginTop: 4 }}>
        <div style={{ flex: 1, backgroundColor: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.18)", borderRadius: 3, padding: "3px 6px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontSize: 8, color: "#94a3b8", fontFamily: "'JetBrains Mono', monospace" }}>P(≤{lineFloor}) UNDER</span>
          <span style={{ fontSize: 10, fontWeight: 700, color: "#fca5a5", fontFamily: "'JetBrains Mono', monospace" }}>
            {(underProb * 100).toFixed(1)}% · {probToAmerican(underProb)}
          </span>
        </div>
        <div style={{ flex: 1, backgroundColor: "rgba(34,197,94,0.08)", border: "1px solid rgba(34,197,94,0.18)", borderRadius: 3, padding: "3px 6px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontSize: 8, color: "#94a3b8", fontFamily: "'JetBrains Mono', monospace" }}>P(≥{lineFloor+1}) OVER</span>
          <span style={{ fontSize: 10, fontWeight: 700, color: "#4ade80", fontFamily: "'JetBrains Mono', monospace" }}>
            {(overProb * 100).toFixed(1)}% · {probToAmerican(overProb)}
          </span>
        </div>
      </div>
    </div>
  );
}

// ── Sensitivity Bar ───────────────────────────────────────────────────
// Shows model over% if ETR projection is ±5% or ±10% off, color-coded vs
// the vig-free book probability. Zero resimulation cost — uses existing simValues.
function SensitivityBar({ sensitivity, bookOverProb, bookUnderProb }) {
  if (!sensitivity) return null;
  const { m10, m5, base, p5, p10 } = sensitivity;
  const cells = [
    { label: "−10%", val: m10, tip: "If ETR is 10% too high" },
    { label: "−5%",  val: m5,  tip: "If ETR is 5% too high" },
    { label: "BASE", val: base, tip: "Current projection" },
    { label: "+5%",  val: p5,  tip: "If ETR is 5% too low" },
    { label: "+10%", val: p10, tip: "If ETR is 10% too low" },
  ];
  // Use best-side book prob to color cells
  const overBook = bookOverProb ?? 0.5;
  const getColor = (v) => {
    if (v == null) return "#475569";
    if (v > overBook + 0.015) return "#22c55e";
    if (v > overBook) return "#86efac";
    return "#ef4444";
  };
  return (
    <div style={{ marginTop: 6, padding: "5px 8px", backgroundColor: "rgba(15,23,42,0.5)", border: "1px solid rgba(148,163,184,0.1)", borderRadius: 5 }}>
      <div style={{ fontSize: 8, color: "#475569", fontFamily: "'JetBrains Mono', monospace", marginBottom: 4, letterSpacing: 0.5 }}>
        ETR SENSITIVITY (OVER %)
      </div>
      <div style={{ display: "flex", gap: 3 }}>
        {cells.map(({ label, val, tip }) => (
          <div key={label} title={tip} style={{ flex: 1, textAlign: "center" }}>
            <div style={{ fontSize: 7, color: "#64748b", fontFamily: "'JetBrains Mono', monospace", marginBottom: 1, lineHeight: 1 }}>{label}</div>
            <div style={{
              fontSize: 10, fontWeight: 700, fontFamily: "'JetBrains Mono', monospace",
              color: getColor(val),
              backgroundColor: label === "BASE" ? "rgba(148,163,184,0.08)" : "transparent",
              borderRadius: 2, padding: "1px 0",
            }}>
              {val != null ? `${(val * 100).toFixed(1)}%` : "—"}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Distribution Bar ────────────────────────────────────────────────
function DistBar({ simValues, propLine }) {
  if (!simValues || simValues.length === 0) return null;
  const line = parseFloat(propLine);
  if (isNaN(line)) return null;
  const N = Math.min(simValues.length, 5000);
  let min = Infinity, max = -Infinity;
  for (let i = 0; i < N; i++) {
    if (simValues[i] < min) min = simValues[i];
    if (simValues[i] > max) max = simValues[i];
  }
  const buckets = 40, counts = new Array(buckets).fill(0), range = max - min || 1;
  for (let i = 0; i < N; i++) {
    const idx = Math.min(buckets - 1, Math.max(0, Math.floor(((simValues[i] - min) / range) * buckets)));
    counts[idx]++;
  }
  const maxC = Math.max(...counts);
  const linePos = Math.min(100, Math.max(0, ((line - min) / range) * 100));
  return (
    <div style={{ position: "relative", height: 32, width: "100%", display: "flex", alignItems: "flex-end", gap: 1 }}>
      {counts.map((c, i) => (
        <div key={i} style={{
          flex: 1, height: `${(c / maxC) * 100}%`, minHeight: c > 0 ? 2 : 0,
          backgroundColor: ((i / buckets) * range + min) > line ? "rgba(34,197,94,0.5)" : "rgba(239,68,68,0.35)",
          borderRadius: "1px 1px 0 0",
        }} />
      ))}
      <div style={{ position: "absolute", left: `${linePos}%`, top: 0, bottom: 0, width: 2, backgroundColor: "#f8fafc", opacity: 0.9 }} />
    </div>
  );
}

// ── Edge Box ────────────────────────────────────────────────────────
// kellyFraction: 0.25=¼K, 0.333=⅓K, 0.5=½K, 1.0=Full K
// unitSize: dollar value of 1 unit (e.g. 20 → $20/unit)
// ladderMode: splits stake into 3 rungs (40/35/25% of total budget)
function EdgeBox({ modelProb, bookOdds, otherSideOdds = null, bankroll, portfolioFactor = null, kellyFraction = 0.25, unitSize = "20", ladderMode = false, onLogBet = null, side = null, historicalBias = null }) {
  const bookProbRaw = americanToProb(bookOdds);
  if (!bookProbRaw) return null;
  // Vig-free: normalize using both sides when available; fall back to raw otherwise
  const otherRaw = otherSideOdds != null ? americanToProb(otherSideOdds) : null;
  const vigRemoved = !!(bookProbRaw && otherRaw);
  const bookProb = vigRemoved ? bookProbRaw / (bookProbRaw + otherRaw) : bookProbRaw;
  const edge = (modelProb - bookProb) * 100;           // primary: vig-free when possible
  const rawEdge = (modelProb - bookProbRaw) * 100;     // secondary reference
  const color = getEdgeColor(edge);
  const kelly = calcKelly(modelProb, bookOdds);
  const isolatedKF = kelly ? kelly * kellyFraction : 0;
  const isPortfolio = portfolioFactor !== null && portfolioFactor < 0.9999;
  // Portfolio adjustment: scale the fractional stake by portfolio factor
  const portfolioKF = isPortfolio ? kelly * portfolioFactor * kellyFraction : isolatedKF;
  const br = parseFloat(bankroll);
  const hasBankroll = !isNaN(br) && br > 0;
  const us = parseFloat(unitSize);
  const hasUnitSize = !isNaN(us) && us > 0;
  // True EV per dollar wagered: (modelProb × decimalOdds − 1) × 100
  const decimal = americanToDecimal(bookOdds);
  const ev = decimal != null ? (modelProb * decimal - 1) * 100 : null;

  // Derive stake and unit label
  const stakeAmt = hasBankroll ? Math.round(br * portfolioKF) : null;
  const unitAmt = (hasBankroll && hasUnitSize && stakeAmt != null)
    ? Math.round((stakeAmt / us) * 4) / 4  // round to nearest 0.25U
    : null;

  // Kelly fraction label for display
  const kfLabel = kellyFraction >= 1.0 ? "K" : kellyFraction >= 0.5 ? "½K" : kellyFraction >= 0.333 ? "⅓K" : "¼K";

  // Ladder rungs: Rung1=40%, Rung2=35%, Rung3=25% of total stakeAmt
  // Rung 1 must independently have Kelly > 0 (it does by definition when edge > 0)
  const ladderRungs = (ladderMode && kelly > 0 && hasBankroll && stakeAmt > 0) ? [
    { label: "R1 Entry", pct: 0.40, amt: Math.round(stakeAmt * 0.40) },
    { label: "R2 Add",   pct: 0.35, amt: Math.round(stakeAmt * 0.35) },
    { label: "R3 Top",   pct: 0.25, amt: Math.round(stakeAmt * 0.25) },
  ] : null;

  return (
    <div style={{
      marginTop: 6, padding: "6px 8px",
      backgroundColor: edge >= 1.5 ? `${color}11` : "rgba(15,23,42,0.4)",
      border: `1px solid ${edge >= 1.5 ? color + "44" : "rgba(148,163,184,0.1)"}`,
      borderRadius: 5,
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ fontSize: 9, color: "#64748b", fontFamily: "'JetBrains Mono', monospace" }}>
          BOOK {fmtOdds(bookOdds)} → {(bookProbRaw * 100).toFixed(1)}%{vigRemoved ? ` (vf ${(bookProb * 100).toFixed(1)}%)` : ""}
        </div>
        <div style={{ fontSize: 9, fontWeight: 800, letterSpacing: 1, color, fontFamily: "'JetBrains Mono', monospace" }}>
          {getEdgeLabel(edge)}
        </div>
      </div>
      <div style={{ display: "flex", alignItems: "baseline", gap: 6, marginTop: 3 }}>
        <span style={{ fontSize: 18, fontWeight: 800, fontFamily: "'JetBrains Mono', monospace", color: edge >= 1.5 ? color : "#475569" }}>
          {edge >= 0 ? "+" : ""}{edge.toFixed(1)}%
        </span>
        <span style={{ fontSize: 10, color: "#64748b", fontFamily: "'JetBrains Mono', monospace" }}>{vigRemoved ? "VF EDGE" : "EDGE"}</span>
        {vigRemoved && (
          <span style={{ fontSize: 10, color: "#475569", fontFamily: "'JetBrains Mono', monospace" }}>
            · raw {rawEdge >= 0 ? "+" : ""}{rawEdge.toFixed(1)}%
          </span>
        )}
        {ev != null && (
          <span style={{ fontSize: 10, color: ev >= 0 ? "#64748b" : "#ef444488", fontFamily: "'JetBrains Mono', monospace", marginLeft: 4 }}>
            · EV {ev >= 0 ? "+" : ""}{ev.toFixed(1)}%
          </span>
        )}
      </div>
      {kelly > 0 && (
        <div style={{ marginTop: 4, paddingTop: 4, borderTop: "1px solid rgba(148,163,184,0.20)" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 9, color: "#64748b", fontFamily: "'JetBrains Mono', monospace" }}>
              {isPortfolio ? "P" : ""}{kfLabel}: {(portfolioKF * 100).toFixed(2)}%
              {stakeAmt != null ? ` → $${stakeAmt}` : ""}
              {unitAmt != null ? ` (${unitAmt}U)` : ""}
            </span>
            <span style={{ fontSize: 8, color: "#475569", fontFamily: "'JetBrains Mono', monospace" }}>
              FULL: {(kelly * 100).toFixed(1)}%
            </span>
          </div>
          {isPortfolio && (
            <div style={{ fontSize: 8, color: "#475569", fontFamily: "'JetBrains Mono', monospace", marginTop: 2 }}>
              ISO{kfLabel}: {(isolatedKF * 100).toFixed(2)}%
            </div>
          )}
          {ladderRungs && (
            <div style={{ marginTop: 4, paddingTop: 4, borderTop: "1px solid rgba(167,139,250,0.12)" }}>
              <div style={{ fontSize: 8, color: "#a78bfa", fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, marginBottom: 3, letterSpacing: 0.5 }}>
                LADDER — total ${stakeAmt}
              </div>
              {ladderRungs.map(({ label: rl, pct, amt }) => {
                const ru = (hasUnitSize && us > 0) ? Math.round((amt / us) * 4) / 4 : null;
                return (
                  <div key={rl} style={{ display: "flex", justifyContent: "space-between", fontSize: 8, color: "#94a3b8", fontFamily: "'JetBrains Mono', monospace", marginBottom: 1 }}>
                    <span style={{ color: "#a78bfa" }}>{rl}</span>
                    <span>${amt}{ru != null ? ` · ${ru}U` : ""} <span style={{ color: "#475569" }}>({(pct * 100).toFixed(0)}%)</span></span>
                  </div>
                );
              })}
              <div style={{ fontSize: 7, color: "#475569", fontFamily: "'JetBrains Mono', monospace", marginTop: 3, fontStyle: "italic" }}>
                R1 must be EV+ standalone · R2/R3 on improved line or steam
              </div>
            </div>
          )}
        </div>
      )}
      {edge >= 1.5 && historicalBias && Math.abs(modelProb - historicalBias.hitRate) * 100 >= 10 && (
        <div style={{ marginTop: 4, padding: "3px 6px", borderRadius: 3, background: "rgba(245,158,11,0.08)", border: "1px solid rgba(245,158,11,0.22)" }}>
          <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 8, color: "#f59e0b" }}>
            ⚠ HIST {(historicalBias.hitRate * 100).toFixed(0)}% HIT (n={historicalBias.n}) vs MODEL {(modelProb * 100).toFixed(0)}%
          </span>
        </div>
      )}
      {onLogBet && edge >= 1.5 && (
        <div style={{ marginTop: 5, paddingTop: 5, borderTop: "1px solid rgba(148,163,184,0.08)" }}>
          <button
            onClick={() => onLogBet({ side, modelProb, bookOdds, otherSideOdds: otherSideOdds ?? null, fairOdds: probToAmerican(modelProb), edgePct: edge, stake: stakeAmt })}
            style={{ width: "100%", padding: "4px 0", borderRadius: 4, fontWeight: 700, fontSize: 8, fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1, cursor: "pointer", border: "1px solid rgba(245,158,11,0.35)", background: "rgba(245,158,11,0.08)", color: "#f59e0b" }}>
            + LOG BET
          </button>
        </div>
      )}
    </div>
  );
}

// ── Result Row ──────────────────────────────────────────────────────
const DIST_MODEL_STYLE = {
  "KDE+":    { color: "#34d399", bg: "rgba(52,211,153,0.08)",  border: "rgba(52,211,153,0.25)"  }, // unfiltered KDE — full empirical dist
  KDE:       { color: "#22d3ee", bg: "rgba(34,211,238,0.08)", border: "rgba(34,211,238,0.25)" },
  Gamma:     { color: "#f59e0b", bg: "rgba(245,158,11,0.08)",  border: "rgba(245,158,11,0.25)"  },
  LogNormal: { color: "#60a5fa", bg: "rgba(96,165,250,0.08)",  border: "rgba(96,165,250,0.25)"  },
  NegBin:    { color: "#a78bfa", bg: "rgba(167,139,250,0.08)", border: "rgba(167,139,250,0.25)" },
  "NegBin*": { color: "#c4b5fd", bg: "rgba(196,181,253,0.06)", border: "rgba(196,181,253,0.2)"  }, // league-avg CV fallback
  Poisson:   { color: "#fb923c", bg: "rgba(251,146,60,0.08)",  border: "rgba(251,146,60,0.25)"  },
  Direct:    { color: "#34d399", bg: "rgba(52,211,153,0.08)",  border: "rgba(52,211,153,0.25)"  },
  Summed:    { color: "#94a3b8", bg: "rgba(148,163,184,0.06)", border: "rgba(148,163,184,0.18)" },
};

function ResultRow({ label, prob, propLine, simValues, overOdds, underOdds, bankroll, portfolioFactorOver = null, portfolioFactorUnder = null, distModel = null, kellyFraction = 0.25, unitSize = "20", ladderMode = false, onLogBetOver = null, onLogBetUnder = null, ciOver = null, ciUnder = null, projUncertaintyMode = false, statKey = null, discreteDist = null, sensitivity = null, negBinR = null, divergence = null, historicalBiasOver = null, historicalBiasUnder = null }) {
  if (!prob) return null;
  const overPct = (prob.over * 100).toFixed(1);
  const underPct = (prob.under * 100).toFixed(1);

  const hasOver = overOdds !== "" && !isNaN(parseFloat(overOdds));
  const hasUnder = underOdds !== "" && !isNaN(parseFloat(underOdds));

  // Use vig-free book probabilities when both sides are available
  const vfProbs = (hasOver && hasUnder) ? vigFreeProb(parseFloat(overOdds), parseFloat(underOdds)) : null;
  const overBookProb  = hasOver  ? (vfProbs ? vfProbs.over  : americanToProb(parseFloat(overOdds)))  : null;
  const underBookProb = hasUnder ? (vfProbs ? vfProbs.under : americanToProb(parseFloat(underOdds))) : null;
  const overEdge  = overBookProb  != null ? (prob.over  - overBookProb)  * 100 : null;
  const underEdge = underBookProb != null ? (prob.under - underBookProb) * 100 : null;
  const bestEdge = Math.max(overEdge ?? -999, underEdge ?? -999);
  const bestSide = (overEdge ?? -999) >= (underEdge ?? -999) ? "OVER" : "UNDER";
  const modelStyle = distModel ? (DIST_MODEL_STYLE[distModel] ?? DIST_MODEL_STYLE.LogNormal) : null;
  const isPoissonStat = statKey && ['stl', 'blk', 'threes'].includes(statKey);

  return (
    <div style={{
      backgroundColor: "rgba(15,23,42,0.6)",
      border: bestEdge >= 3 ? `1px solid ${getEdgeColor(bestEdge)}33` : "1px solid rgba(148,163,184,0.12)",
      borderRadius: 8, padding: "12px 16px", marginBottom: 8,
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 13, color: "#e2e8f0", letterSpacing: 1 }}>
            {label}
          </span>
          <span style={{ fontSize: 12, color: "#64748b" }}>LINE {propLine}</span>
          {modelStyle && (
            <span style={{
              fontSize: 8, fontWeight: 700, letterSpacing: 0.8, fontFamily: "'JetBrains Mono', monospace",
              color: modelStyle.color, backgroundColor: modelStyle.bg,
              border: `1px solid ${modelStyle.border}`,
              borderRadius: 3, padding: "1px 5px",
            }}>
              {distModel}{negBinR != null && (
                <span style={{ fontWeight: 400, marginLeft: 3, color: negBinR < 1 ? "#ef4444" : negBinR < 3 ? "#f59e0b" : "#94a3b8" }}>
                  r={negBinR}
                </span>
              )}
            </span>
          )}
          {divergence && (
            <span style={{
              fontSize: 8, fontWeight: 600, letterSpacing: 0.5, fontFamily: "'JetBrains Mono', monospace",
              color: divergence.dir === 'up' ? "#f59e0b" : "#2dd4bf",
              backgroundColor: divergence.dir === 'up' ? "rgba(245,158,11,0.12)" : "rgba(45,212,191,0.12)",
              border: `1px solid ${divergence.dir === 'up' ? "rgba(245,158,11,0.3)" : "rgba(45,212,191,0.3)"}`,
              borderRadius: 3, padding: "1px 5px",
            }} title={divergence.dir === 'up' ? `Last 5 CV is ${divergence.ratio}× season — possible role/usage change` : `Last 5 CV is ${divergence.ratio}× season — player more locked in recently`}>
              L5 {divergence.ratio}×{divergence.dir === 'up' ? '↑' : '↓'}
            </span>
          )}
        </div>
        {bestEdge >= 1.5 && (
          <div style={{
            padding: "2px 8px", borderRadius: 4,
            backgroundColor: getEdgeColor(bestEdge) + "22",
            border: `1px solid ${getEdgeColor(bestEdge)}44`,
            fontSize: 10, fontWeight: 700, fontFamily: "'JetBrains Mono', monospace",
            color: getEdgeColor(bestEdge),
          }}>
            {bestSide} +{bestEdge.toFixed(1)}%
          </div>
        )}
      </div>

      {isPoissonStat
        ? <DiscreteBar simValues={simValues} propLine={propLine} />
        : <DistBar simValues={simValues} propLine={propLine} />
      }
      {isPoissonStat && discreteDist && (
        <DiscreteCountTable discreteDist={discreteDist} propLine={propLine} />
      )}

      <div style={{ display: "flex", gap: 12, marginTop: 10 }}>
        <div style={{ flex: 1 }}>
          <div style={{
            backgroundColor: "rgba(34,197,94,0.08)", border: `1px solid ${getProbColor(prob.over)}33`,
            borderRadius: 6, padding: "8px 12px", textAlign: "center",
          }}>
            <div style={{ fontSize: 11, color: "#94a3b8", marginBottom: 2, fontFamily: "'JetBrains Mono', monospace" }}>OVER</div>
            <div style={{ fontSize: 20, fontWeight: 700, color: getProbColor(prob.over), fontFamily: "'JetBrains Mono', monospace" }}>
              {overPct}%
            </div>
            <div style={{ fontSize: 12, color: "#94a3b8", fontFamily: "'JetBrains Mono', monospace" }}>
              Fair: {probToAmerican(prob.over)}
            </div>
            {ciOver && projUncertaintyMode && (
              <div style={{ fontSize: 7, color: "#475569", fontFamily: "'JetBrains Mono', monospace", marginTop: 1 }}>
                95% CI ±{((ciOver.hi - ciOver.lo) / 2 * 100).toFixed(1)}pp
              </div>
            )}
          </div>
          {hasOver ? <EdgeBox modelProb={prob.over} bookOdds={parseFloat(overOdds)} otherSideOdds={hasUnder ? parseFloat(underOdds) : null} bankroll={bankroll} portfolioFactor={portfolioFactorOver} kellyFraction={kellyFraction} unitSize={unitSize} ladderMode={ladderMode} onLogBet={onLogBetOver} side="over" historicalBias={historicalBiasOver} /> : (
            <div style={{ marginTop: 6, fontSize: 9, color: "#475569", fontFamily: "'JetBrains Mono', monospace", textAlign: "center", fontStyle: "italic" }}>
              No over odds entered
            </div>
          )}
        </div>

        <div style={{ flex: 1 }}>
          <div style={{
            backgroundColor: "rgba(239,68,68,0.06)", border: `1px solid ${getProbColor(prob.under)}33`,
            borderRadius: 6, padding: "8px 12px", textAlign: "center",
          }}>
            <div style={{ fontSize: 11, color: "#94a3b8", marginBottom: 2, fontFamily: "'JetBrains Mono', monospace" }}>UNDER</div>
            <div style={{ fontSize: 20, fontWeight: 700, color: getProbColor(prob.under), fontFamily: "'JetBrains Mono', monospace" }}>
              {underPct}%
            </div>
            <div style={{ fontSize: 12, color: "#94a3b8", fontFamily: "'JetBrains Mono', monospace" }}>
              Fair: {probToAmerican(prob.under)}
            </div>
            {ciUnder && projUncertaintyMode && (
              <div style={{ fontSize: 7, color: "#475569", fontFamily: "'JetBrains Mono', monospace", marginTop: 1 }}>
                95% CI ±{((ciUnder.hi - ciUnder.lo) / 2 * 100).toFixed(1)}pp
              </div>
            )}
          </div>
          {hasUnder ? <EdgeBox modelProb={prob.under} bookOdds={parseFloat(underOdds)} otherSideOdds={hasOver ? parseFloat(overOdds) : null} bankroll={bankroll} portfolioFactor={portfolioFactorUnder} kellyFraction={kellyFraction} unitSize={unitSize} ladderMode={ladderMode} onLogBet={onLogBetUnder} side="under" historicalBias={historicalBiasUnder} /> : (
            <div style={{ marginTop: 6, fontSize: 9, color: "#475569", fontFamily: "'JetBrains Mono', monospace", textAlign: "center", fontStyle: "italic" }}>
              No under odds entered
            </div>
          )}
        </div>
      </div>
      <SensitivityBar sensitivity={sensitivity} bookOverProb={overBookProb} bookUnderProb={underBookProb} />
    </div>
  );
}

// ── Alt Line Ladder ──────────────────────────────────────────────────
function LadderTable({ statKey, mean, simValues, primaryLine, open, onToggle, overOdds = null, underOdds = null }) {
  if (!simValues || simValues.length === 0) return null;
  const rungs = getAltLines(statKey, mean);
  if (rungs.length === 0) return null;

  const interval =
    statKey === 'pts'                                           ? '2.5pt' :
    (statKey === 'pra' || statKey === 'pr' || statKey === 'pa') ? '2.5pt' :
    statKey === 'sb'                                            ? '0.5pt' : '1pt';
  const primaryLineNum = parseFloat(primaryLine);

  // Vig-free book implied probs for primary line (used when primary rung matches book line).
  // Alt lines without book odds default to -110/-110 (50% vig-free each side) as reference.
  const hasOver  = overOdds  != null && overOdds  !== "" && !isNaN(parseFloat(overOdds));
  const hasUnder = underOdds != null && underOdds !== "" && !isNaN(parseFloat(underOdds));
  const vfBook = (hasOver && hasUnder) ? vigFreeProb(parseFloat(overOdds), parseFloat(underOdds)) : null;

  // Edge at each rung: vs actual book (primary line only) or vs -110 reference (alt lines).
  // -110 vig-free = 50% each side, so edge = modelProb - 0.50.
  const computeEdge = (rung, modelOver, modelUnder) => {
    const isPrimary = !isNaN(primaryLineNum) && Math.abs(rung - primaryLineNum) < 0.01;
    if (isPrimary && vfBook) {
      // Use actual book vig-free probs for primary rung
      return { overEdge: (modelOver - vfBook.over) * 100, underEdge: (modelUnder - vfBook.under) * 100, vsRef: false };
    }
    // Reference: -110/-110 → 50% vig-free each side
    return { overEdge: (modelOver - 0.50) * 100, underEdge: (modelUnder - 0.50) * 100, vsRef: true };
  };

  const edgeColor = (e) => e >= 3 ? "#22c55e" : e >= 1 ? "#86efac" : e >= -1 ? "#64748b" : "#ef4444";

  return (
    <div style={{ marginBottom: 8, marginTop: -4 }}>
      {/* Toggle header */}
      <div
        onClick={onToggle}
        style={{
          display: "flex", alignItems: "center", gap: 6, padding: "4px 10px",
          cursor: "pointer", borderRadius: "0 0 6px 6px",
          backgroundColor: "rgba(15,23,42,0.35)",
          border: "1px solid rgba(148,163,184,0.20)", borderTop: "none",
        }}
      >
        <span style={{ fontSize: 8, fontWeight: 700, letterSpacing: 1, color: "#475569", fontFamily: "'JetBrains Mono', monospace" }}>
          {open ? "▲" : "▼"} ALT LINES · {interval} intervals
        </span>
        {open && (
          <span style={{ fontSize: 7, color: "#334155", fontFamily: "'JetBrains Mono', monospace", marginLeft: "auto" }}>
            EDGE vs {(hasOver && hasUnder) ? "book" : "-110"} · primary line highlighted
          </span>
        )}
      </div>

      {/* Ladder table */}
      {open && (
        <div style={{
          backgroundColor: "rgba(15,23,42,0.25)",
          border: "1px solid rgba(148,163,184,0.20)", borderTop: "none",
          borderRadius: "0 0 8px 8px", overflow: "hidden",
        }}>
          {/* Column headers */}
          <div style={{
            display: "grid", gridTemplateColumns: "55px 1fr 68px 1fr 68px 60px",
            padding: "4px 10px", borderBottom: "1px solid rgba(148,163,184,0.20)",
          }}>
            {["LINE", "OVER %", "FAIR", "UNDER %", "FAIR", "EDGE"].map((h, i) => (
              <div key={i} style={{ fontSize: 7, fontWeight: 700, color: i === 5 ? "#6366f1" : "#475569", fontFamily: "'JetBrains Mono', monospace", letterSpacing: 0.8, textAlign: i === 0 ? "left" : "center" }}>
                {h}
              </div>
            ))}
          </div>

          {/* Rung rows */}
          {rungs.map((rung) => {
            const p = calcProbability(simValues, rung);
            if (!p) return null;
            const isPrimary = !isNaN(primaryLineNum) && Math.abs(rung - primaryLineNum) < 0.01;
            const overColor  = getProbColor(p.over);
            const underColor = getProbColor(p.under);
            const { overEdge, underEdge, vsRef } = computeEdge(rung, p.over, p.under);
            const bestEdge = Math.max(overEdge, underEdge);
            const bestSideLabel = overEdge >= underEdge ? "O" : "U";
            const isGoodEdge = bestEdge >= 1;
            return (
              <div
                key={rung}
                style={{
                  display: "grid", gridTemplateColumns: "55px 1fr 68px 1fr 68px 60px",
                  padding: "4px 10px", alignItems: "center",
                  backgroundColor: isPrimary ? "rgba(99,102,241,0.10)" : isGoodEdge ? "rgba(34,197,94,0.03)" : "transparent",
                  borderBottom: "1px solid rgba(148,163,184,0.04)",
                  borderLeft: isPrimary ? "2px solid rgba(99,102,241,0.5)" : isGoodEdge ? "2px solid rgba(34,197,94,0.2)" : "2px solid transparent",
                }}
              >
                <div style={{ fontSize: 11, fontWeight: isPrimary ? 700 : 500, color: isPrimary ? "#a5b4fc" : "#94a3b8", fontFamily: "'JetBrains Mono', monospace" }}>
                  {rung.toFixed(1)}
                </div>
                <div style={{ textAlign: "center", fontSize: 11, fontWeight: 600, color: overColor, fontFamily: "'JetBrains Mono', monospace" }}>
                  {(p.over * 100).toFixed(1)}%
                </div>
                <div style={{ textAlign: "center", fontSize: 9, color: "#64748b", fontFamily: "'JetBrains Mono', monospace" }}>
                  {probToAmerican(p.over)}
                </div>
                <div style={{ textAlign: "center", fontSize: 11, fontWeight: 600, color: underColor, fontFamily: "'JetBrains Mono', monospace" }}>
                  {(p.under * 100).toFixed(1)}%
                </div>
                <div style={{ textAlign: "center", fontSize: 9, color: "#64748b", fontFamily: "'JetBrains Mono', monospace" }}>
                  {probToAmerican(p.under)}
                </div>
                <div style={{ textAlign: "center", fontFamily: "'JetBrains Mono', monospace" }}>
                  <span style={{ fontSize: 9, fontWeight: 700, color: edgeColor(bestEdge) }}>
                    {bestEdge >= 0 ? "+" : ""}{bestEdge.toFixed(1)}%
                  </span>
                  <span style={{ fontSize: 7, color: "#475569", display: "block" }}>
                    {bestSideLabel}{vsRef && !isPrimary ? "·-110" : ""}
                  </span>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Play Selector Component ─────────────────────────────────────────
// Session-aware slate builder that accumulates plays across projection runs.
function PlaySelector({ slate, overflow, config, setConfig, session, totalKelly, scaleFactor,
  waveKelly, onAddPlays, onNewRun, onLockSlate, onClearSlate, onLogSlate, locked, bankroll, gtdFlags }) {
  const mono = "'JetBrains Mono', monospace";
  const tier1 = slate.filter(p => p.tier === 1);
  const tier2 = slate.filter(p => p.tier === 2);
  const bank = parseFloat(bankroll) || 0;
  const maxSessions = 3;
  const waveCaps = [config.wave1Cap ?? 7, config.wave2Cap ?? 5, config.wave3Cap ?? 3];
  const waveCapSum = waveCaps.reduce((a, b) => a + b, 0);
  const capWarning = waveCapSum > (config.maxBankrollPct || 15);

  return (
    <div>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 6,
        padding: '8px 12px', borderRadius: 6, background: 'rgba(34,197,94,0.06)', border: '1px solid rgba(34,197,94,0.2)' }}>
        <span style={{ fontFamily: mono, fontSize: 10, fontWeight: 900, color: '#22c55e', letterSpacing: 1 }}>
          PLAY SELECTOR
        </span>
        <span style={{ fontFamily: mono, fontSize: 8, color: '#64748b' }}>
          Run #{session} · {slate.length} plays · {tier1.length} T1 · {tier2.length} T2
        </span>
        {scaleFactor < 1 && (
          <span style={{ fontFamily: mono, fontSize: 8, color: '#fb923c', fontWeight: 700 }}>
            SCALED {(scaleFactor * 100).toFixed(0)}%
          </span>
        )}
        <div style={{ display: 'flex', gap: 4, marginLeft: 'auto' }}>
          {!locked && (
            <button onClick={onAddPlays} style={{ padding: '3px 10px', borderRadius: 4,
              border: `1px solid ${config.addTier1Only ? 'rgba(251,191,36,0.6)' : 'rgba(34,197,94,0.5)'}`,
              background: config.addTier1Only ? 'rgba(251,191,36,0.12)' : 'rgba(34,197,94,0.12)',
              color: config.addTier1Only ? '#fbbf24' : '#22c55e',
              fontFamily: mono, fontWeight: 700, fontSize: 9, cursor: 'pointer' }}
              title={config.addTier1Only ? 'T1 ONLY MODE — adds Tier 1 plays only' : 'Adds Tier 1 + Tier 2 plays'}>
              + ADD PLAYS{config.addTier1Only ? ' (T1)' : ''}
            </button>
          )}
          {!locked && (
            <button onClick={onNewRun} style={{ padding: '3px 10px', borderRadius: 4,
              border: '1px solid rgba(99,102,241,0.4)', background: 'rgba(99,102,241,0.08)',
              color: '#a5b4fc', fontFamily: mono, fontWeight: 700, fontSize: 9, cursor: 'pointer' }}>
              NEW RUN
            </button>
          )}
          <button onClick={onLockSlate} style={{ padding: '3px 10px', borderRadius: 4,
            border: locked ? '1px solid rgba(251,146,60,0.5)' : '1px solid rgba(148,163,184,0.2)',
            background: locked ? 'rgba(251,146,60,0.12)' : 'rgba(15,23,42,0.4)',
            color: locked ? '#fb923c' : '#64748b', fontFamily: mono, fontWeight: 700, fontSize: 9, cursor: 'pointer' }}>
            {locked ? 'UNLOCK' : 'LOCK'}
          </button>
          <button onClick={onLogSlate} style={{ padding: '3px 10px', borderRadius: 4,
            border: '1px solid rgba(167,139,250,0.4)', background: 'rgba(167,139,250,0.08)',
            color: '#a78bfa', fontFamily: mono, fontWeight: 700, fontSize: 9, cursor: 'pointer' }}>
            LOG SLATE
          </button>
          <button onClick={onClearSlate} style={{ padding: '3px 10px', borderRadius: 4,
            border: '1px solid rgba(239,68,68,0.3)', background: 'rgba(239,68,68,0.06)',
            color: '#ef4444', fontFamily: mono, fontWeight: 700, fontSize: 9, cursor: 'pointer' }}>
            CLEAR
          </button>
        </div>
      </div>

      {/* Wave budget strip */}
      <div style={{ display: 'flex', gap: 6, alignItems: 'center', marginBottom: 6, flexWrap: 'wrap',
        padding: '5px 10px', borderRadius: 5, background: 'rgba(0,0,0,0.2)' }}>
        {[1, 2, 3].map(w => {
          const used = waveKelly?.[w] ?? 0;
          const cap  = waveCaps[w - 1] ?? 0;
          const pct  = cap > 0 ? used / cap : 0;
          const color = pct >= 1 ? '#ef4444' : pct >= 0.8 ? '#fb923c' : '#22c55e';
          return (
            <span key={w} style={{ fontFamily: mono, fontSize: 8, color: w === session ? '#e2e8f0' : '#64748b' }}>
              <span style={{ color: '#475569' }}>W{w} </span>
              <span style={{ color, fontWeight: w === session ? 700 : 400 }}>{used.toFixed(1)}%</span>
              <span style={{ color: '#475569' }}> / {cap}%</span>
              {w < 3 && <span style={{ color: '#1e293b', marginLeft: 6 }}>·</span>}
            </span>
          );
        })}
        <span style={{ color: '#475569', fontFamily: mono, fontSize: 8, marginLeft: 4 }}>|</span>
        <span style={{ fontFamily: mono, fontSize: 8, color: '#94a3b8' }}>
          TOTAL {totalKelly.toFixed(1)}% / {config.maxBankrollPct || 15}%
          {bank > 0 && <span style={{ color: '#64748b' }}> · ${Math.round(bank * totalKelly / 100)}</span>}
        </span>
        {capWarning && (
          <span style={{ fontFamily: mono, fontSize: 7, color: '#fb923c', fontWeight: 700 }}>⚠ W1+W2+W3 &gt; MAX</span>
        )}
      </div>

      {/* Config rows */}
      <div style={{ display: 'flex', gap: 10, alignItems: 'center', marginBottom: 4, flexWrap: 'wrap' }}>
        {[
          { label: 'MAX PLAYS', key: 'maxPlays', min: 8, max: 30 },
          { label: 'MAX/GAME', key: 'maxPerGame', min: 1, max: 6 },
          { label: 'MAX/PLAYER', key: 'maxPerPlayer', min: 1, max: 4 },
          { label: 'MAX ¼K%', key: 'maxBankrollPct', min: 5, max: 30 },
        ].map(({ label, key, min, max }) => (
          <div key={key} style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
            <span style={{ fontFamily: mono, fontSize: 7, color: '#64748b' }}>{label}</span>
            <input type="number" min={min} max={max} value={config[key]}
              onChange={e => setConfig(prev => ({ ...prev, [key]: parseInt(e.target.value) || min }))}
              style={{ width: 36, padding: '2px 4px', borderRadius: 3, border: '1px solid rgba(148,163,184,0.15)',
                background: 'rgba(15,23,42,0.6)', color: '#e2e8f0', fontFamily: mono, fontSize: 9, textAlign: 'center' }} />
          </div>
        ))}
      </div>
      <div style={{ display: 'flex', gap: 10, alignItems: 'center', marginBottom: 8, flexWrap: 'wrap' }}>
        {[
          { label: 'W1 CAP%', key: 'wave1Cap', min: 1, max: 20 },
          { label: 'W2 CAP%', key: 'wave2Cap', min: 1, max: 20 },
          { label: 'W3 CAP%', key: 'wave3Cap', min: 1, max: 20 },
        ].map(({ label, key, min, max }) => (
          <div key={key} style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
            <span style={{ fontFamily: mono, fontSize: 7, color: '#64748b' }}>{label}</span>
            <input type="number" min={min} max={max} value={config[key] ?? (key === 'wave1Cap' ? 7 : key === 'wave2Cap' ? 5 : 3)}
              onChange={e => setConfig(prev => ({ ...prev, [key]: parseInt(e.target.value) || min }))}
              style={{ width: 32, padding: '2px 4px', borderRadius: 3, border: '1px solid rgba(148,163,184,0.15)',
                background: 'rgba(15,23,42,0.6)', color: '#e2e8f0', fontFamily: mono, fontSize: 9, textAlign: 'center' }} />
          </div>
        ))}
        <button onClick={() => setConfig(prev => ({ ...prev, addTier1Only: !prev.addTier1Only }))}
          style={{ padding: '2px 8px', borderRadius: 3, fontSize: 8, fontFamily: mono, fontWeight: 700, cursor: 'pointer',
            border: config.addTier1Only ? '1px solid rgba(251,191,36,0.5)' : '1px solid rgba(148,163,184,0.2)',
            background: config.addTier1Only ? 'rgba(251,191,36,0.12)' : 'rgba(15,23,42,0.4)',
            color: config.addTier1Only ? '#fbbf24' : '#64748b' }}
          title="When on, ADD PLAYS only adds Tier 1 plays (36+ CV games, higher edge bar)">
          T1 ONLY ADD {config.addTier1Only ? '●' : '○'}
        </button>
      </div>

      {/* Empty state */}
      {slate.length === 0 && (
        <div style={{ padding: 24, textAlign: 'center', borderRadius: 6,
          border: '1px solid rgba(148,163,184,0.1)', background: 'rgba(15,23,42,0.4)' }}>
          <div style={{ fontFamily: mono, fontSize: 10, color: '#64748b', marginBottom: 4 }}>No plays in slate</div>
          <div style={{ fontFamily: mono, fontSize: 8, color: '#475569' }}>
            Run batch simulation then click "+ ADD PLAYS" to build your slate
          </div>
        </div>
      )}

      {/* Slate plays */}
      {slate.length > 0 && (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
          {slate.map((r, i) => {
            const edge = r.edgePct ?? r.edge ?? 0;
            const tierColor = r.tier === 1 ? '#22c55e' : '#fbbf24';
            const sideColor = r.side === 'OVER' ? '#4ade80' : '#f87171';
            const rankColor = i === 0 ? '#fb923c' : i < 3 ? '#fbbf24' : '#64748b';
            const status = getGameStatus(r.commenceTime);
            const isGtd = gtdFlags && (gtdFlags.has(r.player) || gtdFlags.has(r.team?.toUpperCase()));
            const statusColor = status === 'LIVE' ? '#fbbf24' : status === 'FINAL' ? '#4ade80' : '#64748b';

            return (
              <div key={r.betId ?? `${r.player}-${r.stat}-${r.side}`} style={{
                display: 'flex', alignItems: 'center', gap: 0, borderRadius: 5, overflow: 'hidden',
                borderLeft: `3px solid ${isGtd ? '#f59e0b' : tierColor}`,
                border: `1px solid ${status === 'LIVE' ? 'rgba(251,191,36,0.15)' : 'rgba(148,163,184,0.08)'}`,
                background: r._updated ? 'rgba(99,102,241,0.06)' : status === 'FINAL' ? 'rgba(15,23,42,0.3)' : 'rgba(15,23,42,0.5)',
                opacity: status === 'FINAL' ? 0.65 : 1,
              }}>
                {/* Rank */}
                <div style={{ width: 24, minWidth: 24, textAlign: 'center', padding: '8px 0',
                  background: 'rgba(0,0,0,0.2)' }}>
                  <span style={{ fontFamily: mono, fontSize: 8, fontWeight: 900, color: rankColor }}>#{i + 1}</span>
                </div>
                {/* Player */}
                <div style={{ flex: 1, minWidth: 0, padding: '4px 6px' }}>
                  <div style={{ fontSize: 9, fontFamily: mono, color: '#e2e8f0', fontWeight: 700,
                    overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                    {r.player}
                    {isGtd && <span style={{ fontSize: 7, color: '#f59e0b', marginLeft: 4 }}>⚠ GTD</span>}
                  </div>
                  <div style={{ fontSize: 7, fontFamily: mono, color: statusColor, marginTop: 1, display: 'flex', gap: 4, alignItems: 'center' }}>
                    {status && (
                      <span style={{ fontWeight: status === 'LIVE' ? 700 : 400 }}>
                        {status === 'LIVE' ? '● LIVE' : status === 'FINAL' ? '✓ FINAL' : ''}
                      </span>
                    )}
                    <span style={{ color: '#64748b' }}>
                      {r.team ?? ''}{r.commenceTime ? ` · ${new Date(r.commenceTime).toLocaleTimeString('en-US',
                        { hour: 'numeric', minute: '2-digit', timeZone: 'America/New_York' })} ET` : ''}
                    </span>
                  </div>
                </div>
                {/* Stat + Side */}
                <div style={{ padding: '4px 6px', textAlign: 'center', minWidth: 52 }}>
                  <div style={{ fontSize: 8, fontFamily: mono, color: '#94a3b8', fontWeight: 700 }}>
                    {r.statLabel ?? r.stat?.toUpperCase()}
                  </div>
                  <div style={{ fontSize: 8, fontFamily: mono, color: sideColor, fontWeight: 700 }}>
                    {r.side} {r.propLine}
                  </div>
                </div>
                {/* Odds */}
                <div style={{ padding: '4px 4px', textAlign: 'center', minWidth: 40 }}>
                  <div style={{ fontSize: 8, fontFamily: mono, color: '#94a3b8' }}>
                    {r.bookOdds > 0 ? `+${r.bookOdds}` : r.bookOdds}
                  </div>
                </div>
                {/* Edge */}
                <div style={{ padding: '4px 6px', textAlign: 'center', minWidth: 48 }}>
                  <div style={{ fontSize: 9, fontFamily: mono, color: getEdgeColor(edge), fontWeight: 700 }}>
                    {edge >= 0 ? '+' : ''}{edge.toFixed(1)}%
                  </div>
                  <div style={{ fontSize: 7, fontFamily: mono, color: '#475569' }}>{getEdgeLabel(edge)}</div>
                </div>
                {/* Kelly */}
                <div style={{ padding: '4px 6px', textAlign: 'center', minWidth: 40 }}>
                  <div style={{ fontSize: 8, fontFamily: mono, color: '#94a3b8' }}>
                    {(r.kellyPct || 0).toFixed(1)}%
                  </div>
                  {bank > 0 && (
                    <div style={{ fontSize: 7, fontFamily: mono, color: '#475569' }}>
                      ${Math.round(bank * (r.kellyPct || 0) / 100)}
                    </div>
                  )}
                </div>
                {/* Badges */}
                <div style={{ padding: '4px 6px', display: 'flex', gap: 3, alignItems: 'center', minWidth: 60 }}>
                  <span style={{ fontSize: 7, fontFamily: mono, padding: '1px 4px', borderRadius: 3,
                    background: r.tier === 1 ? 'rgba(34,197,94,0.15)' : 'rgba(251,191,36,0.15)',
                    color: r.tier === 1 ? '#4ade80' : '#fbbf24', fontWeight: 700 }}>
                    T{r.tier}
                  </span>
                  <span style={{ fontSize: 7, fontFamily: mono, padding: '1px 4px', borderRadius: 3,
                    background: 'rgba(99,102,241,0.1)', color: '#a5b4fc' }}>
                    W{r.session ?? 1}
                  </span>
                  {r._updated && (
                    <span style={{ fontSize: 6, fontFamily: mono, padding: '1px 3px', borderRadius: 2,
                      background: 'rgba(99,102,241,0.15)', color: '#818cf8', fontWeight: 700 }}>UPD</span>
                  )}
                  {r._scaled && (
                    <span style={{ fontSize: 6, fontFamily: mono, padding: '1px 3px', borderRadius: 2,
                      background: 'rgba(251,146,60,0.15)', color: '#fb923c' }}>SCL</span>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Overflow (cut plays) */}
      {overflow.length > 0 && (
        <details style={{ marginTop: 8 }}>
          <summary style={{ fontFamily: mono, fontSize: 8, color: '#475569', cursor: 'pointer' }}>
            {overflow.length} plays cut by exposure caps
          </summary>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 2, marginTop: 4 }}>
            {overflow.slice(0, 15).map((r, i) => (
              <div key={`ov-${i}`} style={{ display: 'flex', alignItems: 'center', gap: 6,
                padding: '3px 8px', borderRadius: 4, background: 'rgba(15,23,42,0.3)',
                opacity: 0.5 }}>
                <span style={{ fontFamily: mono, fontSize: 8, color: '#64748b', minWidth: 80 }}>
                  {r.player}
                </span>
                <span style={{ fontFamily: mono, fontSize: 7, color: '#475569' }}>
                  {r.statLabel ?? r.stat?.toUpperCase()} {r.side} {r.propLine}
                </span>
                <span style={{ fontFamily: mono, fontSize: 7, color: '#475569', marginLeft: 'auto' }}>
                  {r._cutReason}
                </span>
              </div>
            ))}
          </div>
        </details>
      )}
    </div>
  );
}

// ── Batch Results Table ──────────────────────────────────────────────
function BatchResultsTable({ results, sortCol, sortDir, onSort, minEdge, setMinEdge,
  statFilter, setStatFilter, positiveOnly, setPositiveOnly,
  bankroll, onExport, csvData, csvCopied, onCopyCsv,
  tracked, onToggleTrack, onTrackSelected, onLogAll, batchLogMsg,
  viewMode, setViewMode, gameData,
  lineShifts, gtdFlags, setGtdFlags,
  slate, slateOverflow, slateConfig, setSlateConfig, slateSession, slateTotalKelly, slateScaleFactor,
  slateWaveKelly, slateLocked, onAddPlays, onNewRun, onLockSlate, onClearSlate, onLogSlate }) {
  const { useMemo, useState } = React;
  const [strategyB, setStrategyB] = useState(false);
  const [strategyC, setStrategyC] = useState(false);
  const [showPlaySelector, setShowPlaySelector] = useState(false);

  // Build a fast lookup: "player|stat" → shift info
  const shiftMap = useMemo(() => {
    const m = {};
    (lineShifts || []).forEach(s => { m[`${s.player}|${s.stat}`] = s; });
    return m;
  }, [lineShifts]);

  const filtered = useMemo(() => {
    return results
      .filter(r =>
        (!positiveOnly || r.edge > 0) &&
        r.edge >= minEdge &&
        statFilter.has(r.stat) &&
        (!strategyB || STRATEGY_B_FILTER(r)) &&
        (!strategyC || STRATEGY_C_FILTER(r))
      )
      .sort((a, b) => {
        const mult = sortDir === 'desc' ? -1 : 1;
        const av = a[sortCol] ?? (typeof a[sortCol] === 'string' ? '' : -Infinity);
        const bv = b[sortCol] ?? (typeof b[sortCol] === 'string' ? '' : -Infinity);
        if (typeof av === 'string') return mult * av.localeCompare(bv);
        return mult * (av - bv);
      });
  }, [results, positiveOnly, minEdge, statFilter, sortCol, sortDir, strategyB, strategyC]);

  const trackedCount = tracked ? tracked.size : 0;
  const cols = [
    { key: '_track',    label: '✓',        style: { width: 22,    textAlign: 'center', flexShrink: 0 } },
    { key: 'player',    label: 'PLAYER',   style: { minWidth: 100, textAlign: 'left'   } },
    { key: 'team',      label: 'TM',       style: { width: 30,    textAlign: 'center' } },
    { key: 'statLabel', label: 'STAT',     style: { width: 32,    textAlign: 'center' } },
    { key: 'propLine',  label: 'LINE',     style: { width: 38,    textAlign: 'right'  } },
    { key: 'side',      label: 'SIDE',     style: { width: 40,    textAlign: 'center' } },
    { key: 'bookOdds',  label: 'ODDS',     style: { width: 42,    textAlign: 'right'  } },
    { key: 'modelProb', label: 'MODEL%',   style: { width: 52,    textAlign: 'right'  } },
    { key: 'edge',      label: 'EDGE%',    style: { width: 52,    textAlign: 'right'  } },
    { key: 'edgeLabel', label: 'RATING',   style: { width: 60,    textAlign: 'center' } },
    { key: 'kellyPct',  label: '¼K%',      style: { width: 42,    textAlign: 'right'  } },
    { key: 'gameTotal',  label: 'O/U',      style: { width: 40,    textAlign: 'right'  } },
    { key: 'spread',     label: 'SPRD',     style: { width: 44,    textAlign: 'right'  } },
    { key: 'projection', label: 'PROJ',     style: { width: 38,    textAlign: 'right'  } },
    { key: 'distModel',  label: 'MODEL',    style: { width: 46,    textAlign: 'center' } },
  ];

  const hdrStyle = {
    fontSize: 8, fontWeight: 700, color: '#64748b',
    fontFamily: "'JetBrains Mono', monospace", letterSpacing: 0.8,
    padding: '5px 4px', cursor: 'pointer', userSelect: 'none',
    borderBottom: '1px solid rgba(148,163,184,0.12)',
    position: 'sticky', top: 0,
    backgroundColor: 'rgba(11,15,26,0.97)',
    whiteSpace: 'nowrap',
  };
  const cellStyle = {
    fontSize: 10, fontFamily: "'JetBrains Mono', monospace",
    padding: '4px 4px', borderBottom: '1px solid rgba(148,163,184,0.04)',
    whiteSpace: 'nowrap', overflow: 'hidden',
  };

  const strongCount   = results.filter(r => r.edge >= 5).length;
  const solidCount    = results.filter(r => r.edge >= 3 && r.edge < 5).length;
  const marginalCount = results.filter(r => r.edge >= 1.5 && r.edge < 3).length;

  const allStats = ['pts','reb','ast','stl','blk','threes'];
  const statLabels = { pts:'PTS', reb:'REB', ast:'AST', stl:'STL', blk:'BLK', threes:'3PM' };

  return (
    <div>
      {/* Filter row */}
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 10, alignItems: 'center', marginBottom: 10 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <span style={{ fontSize: 9, color: '#64748b', fontFamily: "'JetBrains Mono', monospace", whiteSpace: 'nowrap' }}>
            MIN EDGE
          </span>
          <input type="range" min={-10} max={10} step={0.5} value={minEdge}
            onChange={e => setMinEdge(parseFloat(e.target.value))}
            style={{ width: 80, accentColor: '#6366f1' }} />
          <span style={{ fontSize: 9, color: '#94a3b8', fontFamily: "'JetBrains Mono', monospace", minWidth: 32 }}>
            {minEdge >= 0 ? '+' : ''}{minEdge.toFixed(1)}%
          </span>
        </div>
        <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
          {allStats.map(s => (
            <button key={s} onClick={() => {
              setStatFilter(prev => {
                const next = new Set(prev);
                if (next.has(s)) next.delete(s); else next.add(s);
                return next;
              });
            }} style={{
              padding: '2px 7px', borderRadius: 4, fontSize: 8, fontWeight: 700,
              fontFamily: "'JetBrains Mono', monospace", cursor: 'pointer',
              border: statFilter.has(s) ? '1px solid rgba(99,102,241,0.5)' : '1px solid rgba(148,163,184,0.15)',
              background: statFilter.has(s) ? 'rgba(99,102,241,0.15)' : 'rgba(15,23,42,0.4)',
              color: statFilter.has(s) ? '#a5b4fc' : '#475569',
            }}>{statLabels[s]}</button>
          ))}
        </div>
        <button onClick={() => setPositiveOnly(p => !p)} style={{
          padding: '2px 8px', borderRadius: 4, fontSize: 8, fontWeight: 700,
          fontFamily: "'JetBrains Mono', monospace", cursor: 'pointer',
          border: positiveOnly ? '1px solid rgba(34,197,94,0.4)' : '1px solid rgba(148,163,184,0.15)',
          background: positiveOnly ? 'rgba(34,197,94,0.1)' : 'rgba(15,23,42,0.4)',
          color: positiveOnly ? '#4ade80' : '#475569',
        }}>+EV ONLY</button>
        <button onClick={() => { setStrategyB(b => !b); setStrategyC(false); }} style={{
          padding: '2px 8px', borderRadius: 4, fontSize: 8, fontWeight: 700,
          fontFamily: "'JetBrains Mono', monospace", cursor: 'pointer',
          border: strategyB ? '1px solid rgba(167,139,250,0.5)' : '1px solid rgba(148,163,184,0.15)',
          background: strategyB ? 'rgba(167,139,250,0.15)' : 'rgba(15,23,42,0.4)',
          color: strategyB ? '#a78bfa' : '#475569',
        }}>STRATEGY B</button>
        <button onClick={() => { setStrategyC(c => !c); setStrategyB(false); }} style={{
          padding: '2px 8px', borderRadius: 4, fontSize: 8, fontWeight: 700,
          fontFamily: "'JetBrains Mono', monospace", cursor: 'pointer',
          border: strategyC ? '1px solid rgba(45,212,191,0.5)' : '1px solid rgba(148,163,184,0.15)',
          background: strategyC ? 'rgba(45,212,191,0.12)' : 'rgba(15,23,42,0.4)',
          color: strategyC ? '#2dd4bf' : '#475569',
        }}>STRATEGY C</button>
        <button onClick={() => { setShowPlaySelector(p => !p); setStrategyB(false); setStrategyC(false); }} style={{
          padding: '2px 8px', borderRadius: 4, fontSize: 8, fontWeight: 700,
          fontFamily: "'JetBrains Mono', monospace", cursor: 'pointer',
          border: showPlaySelector ? '1px solid rgba(34,197,94,0.6)' : '1px solid rgba(148,163,184,0.15)',
          background: showPlaySelector ? 'rgba(34,197,94,0.15)' : 'rgba(15,23,42,0.4)',
          color: showPlaySelector ? '#22c55e' : '#475569',
        }}>PLAY SELECTOR</button>
        {/* View mode toggle */}
        <div style={{ display: 'flex', gap: 2, marginLeft: 'auto' }}>
          {[['list','≡ LIST'],['game','⬡ GAME']].map(([mode, label]) => (
            <button key={mode} onClick={() => setViewMode && setViewMode(mode)} style={{
              padding: '2px 9px', borderRadius: 4, fontSize: 8, fontWeight: 700,
              fontFamily: "'JetBrains Mono', monospace", cursor: 'pointer',
              border: viewMode === mode ? '1px solid rgba(99,102,241,0.6)' : '1px solid rgba(148,163,184,0.15)',
              background: viewMode === mode ? 'rgba(99,102,241,0.18)' : 'rgba(15,23,42,0.4)',
              color: viewMode === mode ? '#a5b4fc' : '#475569',
            }}>{label}</button>
          ))}
        </div>
      </div>

      {/* Strategy criteria chip */}
      {strategyB && (
        <div style={{ marginBottom: 8, padding: '5px 10px', borderRadius: 5,
          background: 'rgba(167,139,250,0.06)', border: '1px solid rgba(167,139,250,0.15)',
          display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
          <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 8, color: '#a78bfa', letterSpacing: 0.5, fontWeight: 700 }}>
            STRATEGY B
          </span>
          <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 8, color: '#64748b' }}>
            UNDER only · CV-backed model (no Poisson/LogNormal)
          </span>
        </div>
      )}
      {strategyC && (
        <div style={{ marginBottom: 8, padding: '5px 10px', borderRadius: 5,
          background: 'rgba(45,212,191,0.05)', border: '1px solid rgba(45,212,191,0.2)',
          display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
          <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 8, color: '#2dd4bf', letterSpacing: 0.5, fontWeight: 700 }}>
            STRATEGY C
          </span>
          <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 8, color: '#64748b' }}>
            Exclude 55-60% model probability zone (max overconfidence band)
          </span>
        </div>
      )}

      {/* Summary + export row */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8, flexWrap: 'wrap', gap: 6 }}>
        <div style={{ display: 'flex', gap: 10, alignItems: 'center', flexWrap: 'wrap' }}>
          <span style={{ fontSize: 9, color: '#64748b', fontFamily: "'JetBrains Mono', monospace" }}>
            {filtered.length} rows
          </span>
          {strongCount > 0 && <span style={{ fontSize: 9, color: '#22c55e', fontFamily: "'JetBrains Mono', monospace", fontWeight: 700 }}>
            {strongCount} STRONG
          </span>}
          {solidCount > 0 && <span style={{ fontSize: 9, color: '#4ade80', fontFamily: "'JetBrains Mono', monospace", fontWeight: 700 }}>
            {solidCount} SOLID
          </span>}
          {marginalCount > 0 && <span style={{ fontSize: 9, color: '#86efac', fontFamily: "'JetBrains Mono', monospace" }}>
            {marginalCount} MARGINAL
          </span>}
          {trackedCount > 0 && (
            <span style={{ fontSize: 9, color: '#f59e0b', fontFamily: "'JetBrains Mono', monospace", fontWeight: 700 }}>
              {trackedCount} selected
            </span>
          )}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center', flexWrap: 'wrap' }}>
          {batchLogMsg && (
            <span style={{ fontSize: 9, color: '#94a3b8',
              fontFamily: "'JetBrains Mono', monospace" }}>
              {batchLogMsg}
            </span>
          )}
          {trackedCount > 0 && onTrackSelected && (
            <button onClick={onTrackSelected}
              style={{ padding: '4px 12px', borderRadius: 4, border: '1px solid rgba(245,158,11,0.4)',
                background: 'rgba(245,158,11,0.12)', color: '#f59e0b',
                fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 9,
                cursor: 'pointer' }}>
              + TRACK {trackedCount}
            </button>
          )}
          {onLogAll && (
            <button onClick={() => onLogAll(3)}
              style={{ padding: '4px 12px', borderRadius: 4, border: '1px solid rgba(168,85,247,0.4)',
                background: 'rgba(168,85,247,0.12)', color: '#c084fc',
                fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 9,
                cursor: 'pointer' }}
              title="Log all rows ≥ 3% edge. Skips any player/stat/side/line already recorded today.">
              LOG ALL ≥3%
            </button>
          )}
          <button onClick={onExport}
            style={{ padding: '4px 12px', borderRadius: 4, border: '1px solid rgba(148,163,184,0.2)',
              background: 'rgba(15,23,42,0.5)', color: '#94a3b8',
              fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 9,
              cursor: 'pointer' }}>
            EXPORT CSV
          </button>
        </div>
      </div>

      {/* Table or Game View */}
      {showPlaySelector ? (
        <PlaySelector
          slate={slate || []}
          overflow={slateOverflow || []}
          config={slateConfig}
          setConfig={setSlateConfig}
          session={slateSession}
          totalKelly={slateTotalKelly}
          scaleFactor={slateScaleFactor}
          waveKelly={slateWaveKelly}
          onAddPlays={onAddPlays}
          onNewRun={onNewRun}
          onLockSlate={onLockSlate}
          onClearSlate={onClearSlate}
          onLogSlate={onLogSlate}
          locked={slateLocked}
          bankroll={bankroll}
          gtdFlags={gtdFlags}
        />
      ) : viewMode === 'game' ? (
        <GameSlateView
          filtered={filtered}
          gameData={gameData}
          tracked={tracked}
          onToggleTrack={onToggleTrack}
        />
      ) : (
      <div style={{ overflowX: 'auto', borderRadius: 6, border: '1px solid rgba(148,163,184,0.20)' }}>
        <div style={{ minWidth: 680 }}>
          {/* Header */}
          <div style={{ display: 'flex' }}>
            {cols.map(c => (
              <div key={c.key} style={{ ...hdrStyle, ...c.style }} onClick={() => onSort(c.key)}>
                {c.label}{sortCol === c.key ? (sortDir === 'desc' ? ' ↓' : ' ↑') : ''}
              </div>
            ))}
          </div>
          {/* Body */}
          <div style={{ maxHeight: 520, overflowY: 'auto' }}>
            {filtered.length === 0 ? (
              <div style={{ padding: '20px', textAlign: 'center', fontSize: 10,
                color: '#475569', fontFamily: "'JetBrains Mono', monospace" }}>
                No results match current filters
              </div>
            ) : filtered.map((r, i) => {
              const edgeColor = getEdgeColor(r.edge);
              const isGtd = gtdFlags && (gtdFlags.has(r.player) || gtdFlags.has(r.team?.toUpperCase()));
              const rowBg = isGtd ? 'rgba(245,158,11,0.04)'
                : r.edge >= 5 ? 'rgba(34,197,94,0.07)'
                : r.edge >= 3 ? 'rgba(34,197,94,0.03)' : 'transparent';
              const isTracked = tracked && tracked.has(r.betId);
              const shift = shiftMap[`${r.player}|${r.stat}`];
              return (
                <div key={i} style={{ display: 'flex', backgroundColor: isTracked ? 'rgba(245,158,11,0.06)' : rowBg,
                  opacity: isGtd ? 0.55 : 1 }}>
                  <div style={{ ...cellStyle, ...cols[0].style }}
                    onClick={() => onToggleTrack && onToggleTrack(r.betId)}>
                    <div style={{
                      width: 12, height: 12, borderRadius: 2, margin: '0 auto',
