<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NBA Prop Simulator — Monte Carlo Engine</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏀</text></svg>" />
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useCallback, useMemo } = React;

// ── Monte Carlo Engine ──────────────────────────────────────────────
function randn() {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
}

function simulateStat(mean, stdDev, n) {
  const results = new Float64Array(n);
  for (let i = 0; i < n; i++) results[i] = Math.max(0, mean + stdDev * randn());
  return results;
}

// Log-normal: same mean/stdDev parameterization, but right-skewed and always non-negative.
// Better fit for pts/reb/ast/threes — matches empirical right skew in NBA game logs
// and substantially more accurate for alt lines beyond ~1.5 SD above the mean.
function simulateStatLogNormal(mean, stdDev, n) {
  const m = parseFloat(mean) || 0;
  const s = parseFloat(stdDev) || 0;
  if (m <= 0 || s <= 0) return new Float64Array(n);
  const cv2 = (s / m) ** 2;
  const sigmaL = Math.sqrt(Math.log(1 + cv2));
  const muL = Math.log(m) - (sigmaL * sigmaL) / 2;
  const results = new Float64Array(n);
  for (let i = 0; i < n; i++) results[i] = Math.exp(muL + sigmaL * randn());
  return results;
}

// Poisson: discrete rare-event model for stl/blk.
// Correct distribution for integer count data — avoids the ~10-15pp probability
// error that truncated normal produces on common 0.5-line props.
function randPoisson(lambda) {
  if (lambda <= 0) return 0;
  const L = Math.exp(-lambda);
  let k = 0, p = 1;
  do { k++; p *= Math.random(); } while (p > L);
  return k - 1;
}

function simulateStatPoisson(mean, n) {
  const lambda = Math.max(0, parseFloat(mean) || 0);
  const results = new Float64Array(n);
  for (let i = 0; i < n; i++) results[i] = randPoisson(lambda);
  return results;
}

// ── Negative Binomial sampler (Gamma-Poisson mixture) ────────────────────────
// NegBin(μ, r): mean = μ, variance = μ + μ²/r. Reduces to Poisson as r → ∞.
// Used for stl/blk/threes when CV mode is active and player is overdispersed
// (observed CV > 1/√mean). Captures the higher frequency of both zero-count
// games and outlier-high games that Poisson underestimates for variable players.
// Implementation: λ ~ Gamma(r, μ/r), count ~ Poisson(λ). Uses existing randGamma.
function randNegBin(mu, r) {
  const lambda = randGamma(r, mu / r);
  return randPoisson(lambda);
}

function simulateStatNegBin(mean, cvPct, n) {
  const mu = Math.max(0.01, parseFloat(mean) || 0);
  const cv = (parseFloat(cvPct) || 0) / 100;
  const poissonCV = 1 / Math.sqrt(mu);
  // Fall back to Poisson if underdispersed or Poisson-equivalent
  if (cv <= poissonCV) return simulateStatPoisson(mu, n);
  const r = 1 / (cv * cv - 1 / mu);
  const results = new Float64Array(n);
  for (let i = 0; i < n; i++) results[i] = randNegBin(mu, r);
  return results;
}

// ── Gamma distribution sampler (Marsaglia-Tsang 2000) ────────────────────────
// Used for pts when empirical KDE data is unavailable.
// Parameterization: shape α, scale β. Mean = α×β, Variance = α×β².
// For pts from CV: α = 1/CV², β = mean×CV².
// Validation vs 20 NBA players showed Gamma is better calibrated than log-normal
// for near-mean prop lines (MAE 4.56% vs 5.43%).
function randGamma(alpha, beta) {
  if (alpha <= 0 || beta <= 0) return 0;
  if (alpha < 1) return randGamma(1 + alpha, beta) * Math.pow(Math.random(), 1 / alpha);
  const d = alpha - 1 / 3;
  const c = 1 / Math.sqrt(9 * d);
  for (;;) {
    let x, v;
    do { x = randn(); v = 1 + c * x; } while (v <= 0);
    v = v * v * v;
    const u = Math.random();
    if (u < 1 - 0.0331 * (x * x) * (x * x)) return d * v * beta;
    if (Math.log(u) < 0.5 * x * x + d * (1 - v + Math.log(v))) return d * v * beta;
  }
}

function simulateStatGamma(mean, cvPct, n) {
  const m = parseFloat(mean) || 0;
  const cv = (parseFloat(cvPct) || 30) / 100;
  if (m <= 0 || cv <= 0) return new Float64Array(n);
  const alpha = 1 / (cv * cv);
  const beta  = m * cv * cv;
  const results = new Float64Array(n);
  for (let i = 0; i < n; i++) results[i] = randGamma(alpha, beta);
  return results;
}

// ── KDE hybrid sampler for pts ────────────────────────────────────────────────
// Primary pts model when historical raw game scores are available from cv_data.json.
// No parametric shape assumption — uses the player's actual empirical distribution.
//
// Per trial:
//   1. Pick a random historical score x_i (bootstrap)
//   2. Add Gaussian noise: bandwidth h via Silverman's rule
//   3. Multiplicative recentering: × (etrMean / historicalMean)
//
// Recentering preserves CV exactly: if raw scores have CV = σ/μ,
// scaled scores have CV = σ × (etrMean/μ) / etrMean = σ/μ — unchanged.
// This correctly anchors ETR's context-adjusted projection while keeping
// the player's empirical shape (skewness, kurtosis, clustering patterns).
//
// Returns null if inputs are invalid (triggers Gamma fallback in runSimulation).
function simulateStatKDE(etrMean, rawScores, historicalMean, n) {
  const m = parseFloat(etrMean) || 0;
  const hm = parseFloat(historicalMean) || 0;
  if (m <= 0 || hm <= 0 || !rawScores || rawScores.length < 5) return null;
  const k = rawScores.length;
  const scale = m / hm;
  // Silverman's rule: h = 1.06 × std(rawScores) × n^(-0.2)
  let mean_ = 0;
  for (let i = 0; i < k; i++) mean_ += rawScores[i];
  mean_ /= k;
  let variance = 0;
  for (let i = 0; i < k; i++) variance += (rawScores[i] - mean_) ** 2;
  const h = 1.06 * Math.sqrt(variance / (k - 1)) * Math.pow(k, -0.2);
  const results = new Float64Array(n);
  for (let i = 0; i < n; i++) {
    const xi = rawScores[Math.floor(Math.random() * k)];
    results[i] = Math.max(0, (xi + h * randn()) * scale);
  }
  return results;
}

// Distribution routing: which model each stat uses.
// pts/reb/ast use KDE hybrid (empirical) when raw data available, with parametric fallbacks.
// threes/stl/blk use Poisson (discrete integer counts). pts/reb/ast use KDE hybrid with parametric fallbacks.
const LOG_NORMAL_STATS = new Set([]);
const POISSON_STATS    = new Set(['stl', 'blk', 'threes']);
const KDE_STATS        = new Set(['pts', 'reb', 'ast']);

function runSimulation(stats, numSims, ptsRawData, rebRawData, astRawData) {
  const rawDataMap = { pts: ptsRawData, reb: rebRawData, ast: astRawData };
  const simResults = {};
  Object.keys(stats).forEach((key) => {
    const { mean, stdDev, cvMode, cvValue } = stats[key];
    if (POISSON_STATS.has(key)) {
      const cvPct = cvMode && cvValue ? parseFloat(cvValue) : null;
      simResults[key] = (cvPct > 0)
        ? simulateStatNegBin(mean, cvPct, numSims)
        : simulateStatPoisson(mean, numSims);
    } else if (KDE_STATS.has(key)) {
      // Fallback chain for pts/reb/ast:
      // 1. KDE hybrid — empirical shape from historical scores, recentered to ETR mean
      // 2. Gamma (pts) / log-normal (reb, ast) — parametric fallback
      const rawData = rawDataMap[key];
      if (rawData) {
        const kde = simulateStatKDE(mean, rawData.rawScores, rawData.historicalMean, numSims);
        if (kde !== null) { simResults[key] = kde; return; }
      }
      if (key === 'pts') {
        const cvPct = cvMode && cvValue ? parseFloat(cvValue) : STD_RATIOS['pts'] * 100;
        simResults[key] = simulateStatGamma(mean, cvPct, numSims);
      } else {
        simResults[key] = simulateStatLogNormal(mean, stdDev, numSims);
      }
    } else if (LOG_NORMAL_STATS.has(key)) {
      simResults[key] = simulateStatLogNormal(mean, stdDev, numSims);
    } else {
      simResults[key] = simulateStat(parseFloat(mean) || 0, parseFloat(stdDev) || 0, numSims);
    }
  });
  return simResults;
}

function calcProbability(simValues, propLine) {
  const line = parseFloat(propLine);
  if (isNaN(line) || simValues.length === 0) return null;
  let over = 0, push = 0;
  for (let i = 0; i < simValues.length; i++) {
    if (simValues[i] > line) over++;
    else if (simValues[i] === line) push++;
  }
  return {
    over: over / simValues.length,
    under: (simValues.length - over - push) / simValues.length,
    push: push / simValues.length,
  };
}

function calcCombo(simResults, keys) {
  const n = simResults[keys[0]]?.length || 0;
  const combined = new Float64Array(n);
  for (let i = 0; i < n; i++) {
    let sum = 0;
    for (const key of keys) sum += simResults[key]?.[i] || 0;
    combined[i] = sum;
  }
  return combined;
}

// Returns half-integer prop lines for the alt line ladder.
// Points: 5-unit intervals centred on mean. Others: 1-unit. STL/BLK: fixed 0.5–4.5.
function getAltLines(key, mean) {
  const m = parseFloat(mean) || 0;
  if (m <= 0) return [];
  if (key === 'pts') {
    const center = Math.round(m / 5) * 5;
    const lines = [];
    for (let l = Math.max(5, center - 15); l <= center + 20; l += 5) lines.push(l - 0.5);
    return lines;
  }
  if (key === 'stl' || key === 'blk') {
    return [0.5, 1.5, 2.5, 3.5, 4.5];
  }
  if (key === 'threes') {
    const top = Math.max(4.5, Math.ceil(m + 3) - 0.5);
    const lines = [];
    for (let l = 0.5; l <= top; l += 1) lines.push(parseFloat(l.toFixed(1)));
    return lines;
  }
  // reb, ast: 1-unit intervals, mean ±4
  const start = Math.max(0.5, Math.floor(m - 3) + 0.5);
  const end   = Math.floor(m + 5) + 0.5;
  const lines = [];
  for (let l = start; l <= end; l += 1) lines.push(parseFloat(l.toFixed(1)));
  return lines;
}

// ── Odds Utilities ──────────────────────────────────────────────────
function probToAmerican(prob) {
  if (prob <= 0 || prob >= 1) return "—";
  if (prob >= 0.5) return Math.round((-prob / (1 - prob)) * 100);
  return "+" + Math.round(((1 - prob) / prob) * 100);
}

function americanToProb(odds) {
  const o = parseFloat(odds);
  if (isNaN(o) || o === 0) return null;
  if (o < 0) return Math.abs(o) / (Math.abs(o) + 100);
  return 100 / (o + 100);
}

function americanToDecimal(odds) {
  const o = parseFloat(odds);
  if (isNaN(o) || o === 0) return null;
  if (o < 0) return 1 + (100 / Math.abs(o));
  return 1 + (o / 100);
}

function calcKelly(modelProb, americanOdds) {
  const dec = americanToDecimal(americanOdds);
  if (!dec || dec <= 1) return null;
  const b = dec - 1;
  const p = modelProb;
  const q = 1 - p;
  const kelly = (b * p - q) / b;
  return kelly > 0 ? kelly : 0;
}

function fmtOdds(o) {
  const n = parseFloat(o);
  if (isNaN(n)) return "";
  return n > 0 ? `+${n}` : `${n}`;
}

function getEdgeColor(edge) {
  if (edge >= 7) return "#22c55e";
  if (edge >= 4) return "#4ade80";
  if (edge >= 2) return "#86efac";
  if (edge >= 0) return "#94a3b8";
  return "#ef4444";
}

function getEdgeLabel(edge) {
  if (edge >= 7) return "STRONG";
  if (edge >= 4) return "SOLID";
  if (edge >= 2) return "MARGINAL";
  return "NO EDGE";
}

function getProbColor(prob) {
  if (prob >= 0.65) return "#22c55e";
  if (prob >= 0.55) return "#86efac";
  if (prob >= 0.45) return "#94a3b8";
  if (prob >= 0.35) return "#fca5a5";
  return "#ef4444";
}

// ── Std Dev Estimation ──────────────────────────────────────────────
const STD_RATIOS = { pts: 0.30, reb: 0.42, ast: 0.40, stl: 0.65, blk: 0.75, threes: 0.52 };

function estimateStdDev(statKey, mean) {
  const m = parseFloat(mean);
  if (isNaN(m) || m <= 0) return 0;
  return Math.round(m * (STD_RATIOS[statKey] || 0.35) * 10) / 10;
}

// ── Config ──────────────────────────────────────────────────────────
const STAT_CONFIG = [
  { key: "pts", label: "PTS", defaultMean: 24.5 },
  { key: "reb", label: "REB", defaultMean: 6.0 },
  { key: "ast", label: "AST", defaultMean: 5.5 },
  { key: "stl", label: "STL", defaultMean: 1.2 },
  { key: "blk", label: "BLK", defaultMean: 0.8 },
  { key: "threes", label: "3PM", defaultMean: 2.8 },
];

const COMBO_CONFIG = [
  { key: "pra", label: "PTS+REB+AST", parts: ["pts", "reb", "ast"] },
  { key: "pr", label: "PTS+REB", parts: ["pts", "reb"] },
  { key: "pa", label: "PTS+AST", parts: ["pts", "ast"] },
  { key: "ra", label: "REB+AST", parts: ["reb", "ast"] },
  { key: "sb", label: "STL+BLK", parts: ["stl", "blk"] },
];

// ── Distribution Bar ────────────────────────────────────────────────
function DistBar({ simValues, propLine }) {
  if (!simValues || simValues.length === 0) return null;
  const line = parseFloat(propLine);
  if (isNaN(line)) return null;
  const N = Math.min(simValues.length, 5000);
  let min = Infinity, max = -Infinity;
  for (let i = 0; i < N; i++) {
    if (simValues[i] < min) min = simValues[i];
    if (simValues[i] > max) max = simValues[i];
  }
  const buckets = 40, counts = new Array(buckets).fill(0), range = max - min || 1;
  for (let i = 0; i < N; i++) {
    const idx = Math.min(buckets - 1, Math.max(0, Math.floor(((simValues[i] - min) / range) * buckets)));
    counts[idx]++;
  }
  const maxC = Math.max(...counts);
  const linePos = Math.min(100, Math.max(0, ((line - min) / range) * 100));
  return (
    <div style={{ position: "relative", height: 32, width: "100%", display: "flex", alignItems: "flex-end", gap: 1 }}>
      {counts.map((c, i) => (
        <div key={i} style={{
          flex: 1, height: `${(c / maxC) * 100}%`, minHeight: c > 0 ? 2 : 0,
          backgroundColor: ((i / buckets) * range + min) > line ? "rgba(34,197,94,0.5)" : "rgba(239,68,68,0.35)",
          borderRadius: "1px 1px 0 0",
        }} />
      ))}
      <div style={{ position: "absolute", left: `${linePos}%`, top: 0, bottom: 0, width: 2, backgroundColor: "#f8fafc", opacity: 0.9 }} />
    </div>
  );
}

// ── Edge Box ────────────────────────────────────────────────────────
function EdgeBox({ modelProb, bookOdds, bankroll }) {
  const bookProb = americanToProb(bookOdds);
  if (!bookProb) return null;
  const edge = (modelProb - bookProb) * 100;
  const color = getEdgeColor(edge);
  const kelly = calcKelly(modelProb, bookOdds);
  const qKelly = kelly ? kelly * 0.25 : 0;
  const br = parseFloat(bankroll);
  const hasBankroll = !isNaN(br) && br > 0;
  return (
    <div style={{
      marginTop: 6, padding: "6px 8px",
      backgroundColor: edge >= 2 ? `${color}11` : "rgba(15,23,42,0.4)",
      border: `1px solid ${edge >= 2 ? color + "44" : "rgba(148,163,184,0.1)"}`,
      borderRadius: 5,
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ fontSize: 9, color: "#64748b", fontFamily: "'JetBrains Mono', monospace" }}>
          BOOK {fmtOdds(bookOdds)} → {(bookProb * 100).toFixed(1)}%
        </div>
        <div style={{ fontSize: 9, fontWeight: 800, letterSpacing: 1, color, fontFamily: "'JetBrains Mono', monospace" }}>
          {getEdgeLabel(edge)}
        </div>
      </div>
      <div style={{ display: "flex", alignItems: "baseline", gap: 6, marginTop: 3 }}>
        <span style={{ fontSize: 18, fontWeight: 800, fontFamily: "'JetBrains Mono', monospace", color: edge >= 2 ? color : "#475569" }}>
          {edge >= 0 ? "+" : ""}{edge.toFixed(1)}%
        </span>
        <span style={{ fontSize: 10, color: "#64748b", fontFamily: "'JetBrains Mono', monospace" }}>EDGE</span>
      </div>
      {kelly > 0 && (
        <div style={{ marginTop: 4, paddingTop: 4, borderTop: "1px solid rgba(148,163,184,0.08)" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 9, color: "#64748b", fontFamily: "'JetBrains Mono', monospace" }}>
              ¼K: {(qKelly * 100).toFixed(2)}%{hasBankroll ? ` → $${Math.round(br * qKelly)}` : ""}
            </span>
            <span style={{ fontSize: 8, color: "#475569", fontFamily: "'JetBrains Mono', monospace" }}>
              FULL: {(kelly * 100).toFixed(1)}%
            </span>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Result Row ──────────────────────────────────────────────────────
function ResultRow({ label, prob, propLine, simValues, overOdds, underOdds, bankroll }) {
  if (!prob) return null;
  const overPct = (prob.over * 100).toFixed(1);
  const underPct = (prob.under * 100).toFixed(1);

  const hasOver = overOdds !== "" && !isNaN(parseFloat(overOdds));
  const hasUnder = underOdds !== "" && !isNaN(parseFloat(underOdds));

  const overEdge = hasOver ? (prob.over - americanToProb(parseFloat(overOdds))) * 100 : null;
  const underEdge = hasUnder ? (prob.under - americanToProb(parseFloat(underOdds))) * 100 : null;
  const bestEdge = Math.max(overEdge ?? -999, underEdge ?? -999);
  const bestSide = (overEdge ?? -999) >= (underEdge ?? -999) ? "OVER" : "UNDER";

  return (
    <div style={{
      backgroundColor: "rgba(15,23,42,0.6)",
      border: bestEdge >= 4 ? `1px solid ${getEdgeColor(bestEdge)}33` : "1px solid rgba(148,163,184,0.12)",
      borderRadius: 8, padding: "12px 16px", marginBottom: 8,
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 13, color: "#e2e8f0", letterSpacing: 1 }}>
            {label}
          </span>
          <span style={{ fontSize: 12, color: "#64748b" }}>LINE {propLine}</span>
        </div>
        {bestEdge >= 2 && (
          <div style={{
            padding: "2px 8px", borderRadius: 4,
            backgroundColor: getEdgeColor(bestEdge) + "22",
            border: `1px solid ${getEdgeColor(bestEdge)}44`,
            fontSize: 10, fontWeight: 700, fontFamily: "'JetBrains Mono', monospace",
            color: getEdgeColor(bestEdge),
          }}>
            {bestSide} +{bestEdge.toFixed(1)}%
          </div>
        )}
      </div>

      <DistBar simValues={simValues} propLine={propLine} />

      <div style={{ display: "flex", gap: 12, marginTop: 10 }}>
        <div style={{ flex: 1 }}>
          <div style={{
            backgroundColor: "rgba(34,197,94,0.08)", border: `1px solid ${getProbColor(prob.over)}33`,
            borderRadius: 6, padding: "8px 12px", textAlign: "center",
          }}>
            <div style={{ fontSize: 11, color: "#94a3b8", marginBottom: 2, fontFamily: "'JetBrains Mono', monospace" }}>OVER</div>
            <div style={{ fontSize: 20, fontWeight: 700, color: getProbColor(prob.over), fontFamily: "'JetBrains Mono', monospace" }}>
              {overPct}%
            </div>
            <div style={{ fontSize: 12, color: "#94a3b8", fontFamily: "'JetBrains Mono', monospace" }}>
              Fair: {probToAmerican(prob.over)}
            </div>
          </div>
          {hasOver ? <EdgeBox modelProb={prob.over} bookOdds={parseFloat(overOdds)} bankroll={bankroll} /> : (
            <div style={{ marginTop: 6, fontSize: 9, color: "#475569", fontFamily: "'JetBrains Mono', monospace", textAlign: "center", fontStyle: "italic" }}>
              No over odds entered
            </div>
          )}
        </div>

        <div style={{ flex: 1 }}>
          <div style={{
            backgroundColor: "rgba(239,68,68,0.06)", border: `1px solid ${getProbColor(prob.under)}33`,
            borderRadius: 6, padding: "8px 12px", textAlign: "center",
          }}>
            <div style={{ fontSize: 11, color: "#94a3b8", marginBottom: 2, fontFamily: "'JetBrains Mono', monospace" }}>UNDER</div>
            <div style={{ fontSize: 20, fontWeight: 700, color: getProbColor(prob.under), fontFamily: "'JetBrains Mono', monospace" }}>
              {underPct}%
            </div>
            <div style={{ fontSize: 12, color: "#94a3b8", fontFamily: "'JetBrains Mono', monospace" }}>
              Fair: {probToAmerican(prob.under)}
            </div>
          </div>
          {hasUnder ? <EdgeBox modelProb={prob.under} bookOdds={parseFloat(underOdds)} bankroll={bankroll} /> : (
            <div style={{ marginTop: 6, fontSize: 9, color: "#475569", fontFamily: "'JetBrains Mono', monospace", textAlign: "center", fontStyle: "italic" }}>
              No under odds entered
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Alt Line Ladder ──────────────────────────────────────────────────
function LadderTable({ statKey, mean, simValues, primaryLine, open, onToggle }) {
  if (!simValues || simValues.length === 0) return null;
  const rungs = getAltLines(statKey, mean);
  if (rungs.length === 0) return null;

  const interval = statKey === 'pts' ? '5pt' : statKey === 'stl' || statKey === 'blk' ? '1pt' : '1pt';
  const primaryLineNum = parseFloat(primaryLine);

  return (
    <div style={{ marginBottom: 8, marginTop: -4 }}>
      {/* Toggle header */}
      <div
        onClick={onToggle}
        style={{
          display: "flex", alignItems: "center", gap: 6, padding: "4px 10px",
          cursor: "pointer", borderRadius: "0 0 6px 6px",
          backgroundColor: "rgba(15,23,42,0.35)",
          border: "1px solid rgba(148,163,184,0.08)", borderTop: "none",
        }}
      >
        <span style={{ fontSize: 8, fontWeight: 700, letterSpacing: 1, color: "#475569", fontFamily: "'JetBrains Mono', monospace" }}>
          {open ? "▲" : "▼"} ALT LINES · {interval} intervals
        </span>
      </div>

      {/* Ladder table */}
      {open && (
        <div style={{
          backgroundColor: "rgba(15,23,42,0.25)",
          border: "1px solid rgba(148,163,184,0.08)", borderTop: "none",
          borderRadius: "0 0 8px 8px", overflow: "hidden",
        }}>
          {/* Column headers */}
          <div style={{
            display: "grid", gridTemplateColumns: "60px 1fr 80px 1fr 80px",
            padding: "4px 10px", borderBottom: "1px solid rgba(148,163,184,0.08)",
          }}>
            {["LINE", "OVER %", "FAIR", "UNDER %", "FAIR"].map((h, i) => (
              <div key={i} style={{ fontSize: 7, fontWeight: 700, color: "#475569", fontFamily: "'JetBrains Mono', monospace", letterSpacing: 0.8, textAlign: i === 0 ? "left" : "center" }}>
                {h}
              </div>
            ))}
          </div>

          {/* Rung rows */}
          {rungs.map((rung) => {
            const p = calcProbability(simValues, rung);
            if (!p) return null;
            const isPrimary = !isNaN(primaryLineNum) && Math.abs(rung - primaryLineNum) < 0.01;
            const overColor  = getProbColor(p.over);
            const underColor = getProbColor(p.under);
            return (
              <div
                key={rung}
                style={{
                  display: "grid", gridTemplateColumns: "60px 1fr 80px 1fr 80px",
                  padding: "4px 10px", alignItems: "center",
                  backgroundColor: isPrimary ? "rgba(99,102,241,0.10)" : "transparent",
                  borderBottom: "1px solid rgba(148,163,184,0.04)",
                  borderLeft: isPrimary ? "2px solid rgba(99,102,241,0.5)" : "2px solid transparent",
                }}
              >
                <div style={{ fontSize: 11, fontWeight: isPrimary ? 700 : 500, color: isPrimary ? "#a5b4fc" : "#94a3b8", fontFamily: "'JetBrains Mono', monospace" }}>
                  {rung.toFixed(1)}
                </div>
                <div style={{ textAlign: "center", fontSize: 11, fontWeight: 600, color: overColor, fontFamily: "'JetBrains Mono', monospace" }}>
                  {(p.over * 100).toFixed(1)}%
                </div>
                <div style={{ textAlign: "center", fontSize: 9, color: "#64748b", fontFamily: "'JetBrains Mono', monospace" }}>
                  {probToAmerican(p.over)}
                </div>
                <div style={{ textAlign: "center", fontSize: 11, fontWeight: 600, color: underColor, fontFamily: "'JetBrains Mono', monospace" }}>
                  {(p.under * 100).toFixed(1)}%
                </div>
                <div style={{ textAlign: "center", fontSize: 9, color: "#64748b", fontFamily: "'JetBrains Mono', monospace" }}>
                  {probToAmerican(p.under)}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── CSV Export ───────────────────────────────────────────────────────
function buildCSV(playerName, numSims, statResults, comboResults, timestamp, bankroll) {
  const headers = [
    "Timestamp", "Date", "Player", "Stat", "Projection", "Std Dev", "SD Method", "CV %",
    "Prop Line", "Book Over Odds", "Book Under Odds",
    "Model Over %", "Model Under %",
    "Fair Over Odds", "Fair Under Odds",
    "Over Edge %", "Under Edge %",
    "Best Side", "Best Edge %", "Edge Rating",
    "Quarter Kelly %", "Stake $",
    "Simulations"
  ];

  const rows = [];
  const dateStr = new Date().toLocaleDateString("en-US");
  const br = parseFloat(bankroll);
  const hasBr = !isNaN(br) && br > 0;

  const addRow = (stat, label, prob, propLine, overOdds, underOdds, mean, std, stdMethod, cvValue) => {
    if (!prob) return;
    const overProb = prob.over;
    const underProb = prob.under;
    const bookOverProb = americanToProb(parseFloat(overOdds));
    const bookUnderProb = americanToProb(parseFloat(underOdds));
    const overEdge = bookOverProb ? ((overProb - bookOverProb) * 100) : "";
    const underEdge = bookUnderProb ? ((underProb - bookUnderProb) * 100) : "";
    const bestEdgeVal = Math.max(
      typeof overEdge === "number" ? overEdge : -999,
      typeof underEdge === "number" ? underEdge : -999
    );
    const bestSide = bestEdgeVal === -999 ? "" :
      (overEdge >= underEdge ? "OVER" : "UNDER");
    const bestEdgeStr = bestEdgeVal === -999 ? "" : bestEdgeVal.toFixed(1);
    const rating = bestEdgeVal >= 7 ? "STRONG" : bestEdgeVal >= 4 ? "SOLID" :
      bestEdgeVal >= 2 ? "MARGINAL" : "NO EDGE";

    // Kelly for best side
    let qKelly = "";
    let stake = "";
    if (bestSide === "OVER" && overOdds) {
      const k = calcKelly(overProb, parseFloat(overOdds));
      if (k && k > 0) { qKelly = (k * 25).toFixed(2); stake = hasBr ? Math.round(br * k * 0.25) : ""; }
    } else if (bestSide === "UNDER" && underOdds) {
      const k = calcKelly(underProb, parseFloat(underOdds));
      if (k && k > 0) { qKelly = (k * 25).toFixed(2); stake = hasBr ? Math.round(br * k * 0.25) : ""; }
    }

    rows.push([
      timestamp, dateStr, playerName, label,
      mean ?? "", std ?? "", stdMethod || "", cvValue || "",
      propLine, overOdds || "", underOdds || "",
      (overProb * 100).toFixed(1), (underProb * 100).toFixed(1),
      probToAmerican(overProb), probToAmerican(underProb),
      typeof overEdge === "number" ? overEdge.toFixed(1) : "",
      typeof underEdge === "number" ? underEdge.toFixed(1) : "",
      bestSide, bestEdgeStr, bestEdgeVal > -999 ? rating : "",
      qKelly, stake,
      numSims,
    ]);
  };

  if (statResults) {
    STAT_CONFIG.forEach(({ key, label }) => {
      const r = statResults[key];
      if (r) addRow(key, label, r.prob, r.propLine, r.overOdds, r.underOdds, r.mean, r.std, r.stdMethod, r.cvValue);
    });
  }
  if (comboResults) {
    COMBO_CONFIG.forEach(({ key, label }) => {
      const r = comboResults[key];
      if (r) addRow(key, label, r.prob, r.propLine, r.overOdds, r.underOdds, "", "", "Combo", "");
    });
  }

  const escape = (v) => {
    const s = String(v ?? "");
    return s.includes(",") || s.includes('"') ? `"${s.replace(/"/g, '""')}"` : s;
  };
  return [headers.map(escape).join(","), ...rows.map(r => r.map(escape).join(","))].join("\n");
}

// ── ETR Projections Parser ───────────────────────────────────────────
function parseETRProjections(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  if (lines.length < 2) return { error: "Need at least a header row and one data row." };

  // Detect delimiter: prefer tabs (TSV copy/paste) over commas (CSV)
  const firstLine = lines[0];
  const isTSV = (firstLine.match(/\t/g) || []).length >= (firstLine.match(/,/g) || []).length;

  const splitRow = isTSV
    ? (line) => line.split('\t').map(s => s.trim())
    : (line) => {
        const result = []; let inQ = false, cur = '';
        for (const ch of line) {
          if (ch === '"') { inQ = !inQ; }
          else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
          else { cur += ch; }
        }
        result.push(cur.trim());
        return result;
      };

  const headers = splitRow(lines[0]).map(h => h.toLowerCase().replace(/[^a-z0-9 ]/g, '').trim());
  const col = (...names) => {
    for (const name of names) {
      const idx = headers.findIndex(h => h.includes(name));
      if (idx >= 0) return idx;
    }
    return -1;
  };

  const idxPlayer = col('player'); const idxPts    = col('point');
  const idxReb    = col('rebound'); const idxAst    = col('assist');
  const idxStl    = col('steal');  const idxBlk    = col('block');
  const idxThrees = col('three');  const idxPRA    = col('pra');
  const idxMin    = col('minute'); const idxTeam   = col('team');
  const idxOpp    = col('opponent'); const idxPos  = col('position');

  if (idxPlayer < 0 || idxPts < 0) return { error: "Could not find Player or Points columns. Check format." };

  const players = [];
  for (let i = 1; i < lines.length; i++) {
    const row = splitRow(lines[i]);
    const name = row[idxPlayer] || '';
    if (!name || name.toLowerCase() === 'player') continue;
    const pts = parseFloat(row[idxPts]);
    if (isNaN(pts)) continue;
    players.push({
      name,
      team:   idxTeam   >= 0 ? (row[idxTeam]   || '') : '',
      opp:    idxOpp    >= 0 ? (row[idxOpp]    || '') : '',
      pos:    idxPos    >= 0 ? (row[idxPos]    || '') : '',
      pts,
      reb:    idxReb    >= 0 ? parseFloat(row[idxReb])    || 0 : 0,
      ast:    idxAst    >= 0 ? parseFloat(row[idxAst])    || 0 : 0,
      stl:    idxStl    >= 0 ? parseFloat(row[idxStl])    || 0 : 0,
      blk:    idxBlk    >= 0 ? parseFloat(row[idxBlk])    || 0 : 0,
      threes: idxThrees >= 0 ? parseFloat(row[idxThrees]) || 0 : 0,
      pra:    idxPRA    >= 0 ? parseFloat(row[idxPRA])    || 0 : 0,
      min:    idxMin    >= 0 ? parseFloat(row[idxMin])    || 0 : 0,
    });
  }
  if (players.length === 0) return { error: "No valid player rows found. Check that headers include Player and Points." };
  players.sort((a, b) => a.name.localeCompare(b.name));
  return { players };
}

// ── Main App ────────────────────────────────────────────────────────
function NBASimulator() {
  const [playerName, setPlayerName] = useState("Player Name");
  const [numSims, setNumSims] = useState(20000);
  const [stats, setStats] = useState(() => {
    const init = {};
    STAT_CONFIG.forEach(({ key, defaultMean }) => {
      init[key] = { mean: defaultMean, stdDev: estimateStdDev(key, defaultMean), propLine: "", overOdds: "", underOdds: "", stdOverride: false, cvMode: false, cvValue: "" };
    });
    return init;
  });
  const [comboLines, setComboLines] = useState(() => {
    const init = {};
    COMBO_CONFIG.forEach(({ key }) => { init[key] = { line: "", overOdds: "", underOdds: "" }; });
    return init;
  });
  const [results, setResults] = useState(null);
  const [simTime, setSimTime] = useState(null);
  const [simTimestamp, setSimTimestamp] = useState(null);
  const [csvData, setCsvData] = useState(null);
  const [copied, setCopied] = useState(false);
  const [includeHeaders, setIncludeHeaders] = useState(true);
  const [bankroll, setBankroll] = useState("");
  const [cvDatabase, setCvDatabase] = useState(null);
  const [cvWindow, setCvWindow] = useState("last20");
  const [praDirectCv, setPraDirectCv] = useState(null);
  const [ptsRawData, setPtsRawData] = useState(null); // { rawScores: number[], historicalMean: number } | null
  const [rebRawData, setRebRawData] = useState(null);
  const [astRawData, setAstRawData] = useState(null);
  const [cvLoadStatus, setCvLoadStatus] = useState(null); // "found" | "found_partial" | "notfound" | null
  const [projections, setProjections] = useState(null);   // parsed ETR slate
  const [projOpen, setProjOpen] = useState(false);
  const [projPasteText, setProjPasteText] = useState('');
  const [projError, setProjError] = useState(null);
  const [projUpdatedAt, setProjUpdatedAt] = useState(null);
  const [ladderOpen, setLadderOpen] = useState({});

  React.useEffect(() => {
    fetch('./cv_data.json')
      .then(r => r.json())
      .then(data => setCvDatabase(data.players))
      .catch(() => {}); // degrade gracefully — CV lookup is optional
  }, []);

  const updateStat = useCallback((key, field, value) => {
    setStats((prev) => {
      const updated = { ...prev, [key]: { ...prev[key], [field]: value } };
      if (field === "mean") {
        // Recalc auto std dev if not overridden and not in CV mode
        if (!prev[key].stdOverride && !prev[key].cvMode) {
          updated[key].stdDev = estimateStdDev(key, value);
        }
        // If in CV mode, recalc stdDev from CV × new mean
        if (prev[key].cvMode && prev[key].cvValue !== "") {
          const cv = parseFloat(prev[key].cvValue);
          const m = parseFloat(value);
          if (!isNaN(cv) && !isNaN(m)) updated[key].stdDev = Math.round(m * (cv / 100) * 10) / 10;
        }
      }
      if (field === "stdDev" && !prev[key].cvMode) updated[key].stdOverride = true;
      if (field === "cvValue") {
        const cv = parseFloat(value);
        const m = parseFloat(prev[key].mean);
        if (!isNaN(cv) && !isNaN(m) && m > 0) {
          updated[key].stdDev = Math.round(m * (cv / 100) * 10) / 10;
        }
      }
      return updated;
    });
  }, []);

  const toggleCvMode = useCallback((key) => {
    setStats((prev) => {
      const cur = prev[key];
      if (cur.cvMode) {
        // Switching OFF CV mode → back to auto
        return { ...prev, [key]: { ...cur, cvMode: false, cvValue: "", stdOverride: false, stdDev: estimateStdDev(key, cur.mean) } };
      } else {
        // Switching ON CV mode → compute CV from current std/mean as starting point
        const m = parseFloat(cur.mean);
        const s = parseFloat(cur.stdDev);
        const startCV = (m > 0 && s > 0) ? Math.round((s / m) * 100) : "";
        return { ...prev, [key]: { ...cur, cvMode: true, cvValue: String(startCV), stdOverride: false } };
      }
    });
  }, []);

  const resetStdDev = useCallback((key) => {
    setStats((prev) => ({
      ...prev, [key]: { ...prev[key], stdDev: estimateStdDev(key, prev[key].mean), stdOverride: false, cvMode: false, cvValue: "" },
    }));
  }, []);

  const handleLoadCv = useCallback(() => {
    if (!cvDatabase) return;
    const normalized = playerName.trim().normalize('NFD');
    const playerData = cvDatabase[normalized];
    if (!playerData) {
      setCvLoadStatus('notfound');
      return;
    }
    const win = cvWindow;
    const cvMin = playerData.cv_minutes?.[win]; // null if data predates cv_minutes field
    setStats(prev => {
      const updated = { ...prev };
      STAT_CONFIG.forEach(({ key }) => {
        const cvPer36 = playerData.cv?.[key]?.[win];
        if (cvPer36 == null) return;
        // Combine per-36 rate variance with minutes variance when available.
        // If cv_minutes absent (stale data), use per-36 CV alone — still far better than hardcoded ratios.
        const effectiveCV = (cvMin != null)
          ? Math.round(Math.sqrt(cvPer36 ** 2 + cvMin ** 2) * 10) / 10
          : Math.round(cvPer36 * 10) / 10;
        const m = parseFloat(prev[key].mean);
        const std = m > 0 ? Math.round(m * (effectiveCV / 100) * 10) / 10 : 0;
        updated[key] = { ...prev[key], cvMode: true, cvValue: String(effectiveCV), stdDev: std, stdOverride: false };
      });
      return updated;
    });
    // PRA: store effective CV for direct simulation (avoids independence assumption error)
    const cvPraPer36 = playerData.cv?.pra?.[win];
    if (cvPraPer36 != null) {
      const effectivePraCV = (cvMin != null)
        ? Math.round(Math.sqrt(cvPraPer36 ** 2 + cvMin ** 2) * 10) / 10
        : Math.round(cvPraPer36 * 10) / 10;
      setPraDirectCv(effectivePraCV);
    } else {
      setPraDirectCv(null);
    }
    // pts/reb/ast raw: load historical game scores for KDE hybrid sampler
    const loadRawData = (rawKey, meanKey, setter) => {
      const scores = playerData[rawKey]?.[win];
      const hMean  = playerData[meanKey]?.[win];
      if (scores != null && hMean != null && scores.length >= 5) {
        setter({ rawScores: scores, historicalMean: hMean });
      } else {
        setter(null);
      }
    };
    loadRawData('pts_raw', 'pts_mean_raw', setPtsRawData);
    loadRawData('reb_raw', 'reb_mean_raw', setRebRawData);
    loadRawData('ast_raw', 'ast_mean_raw', setAstRawData);
    setCvLoadStatus(cvMin != null ? 'found' : 'found_partial');
  }, [cvDatabase, cvWindow, playerName]);

  const handleParseProjections = useCallback((textOverride) => {
    const text = textOverride !== undefined ? textOverride : projPasteText;
    if (!text?.trim()) { setProjError("Paste or upload projection data first."); return; }
    const result = parseETRProjections(text);
    if (result.error) { setProjError(result.error); return; }
    setProjections(result.players);
    setProjError(null);
    setProjUpdatedAt(new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }));
    setProjOpen(false);
  }, [projPasteText]);

  const handleProjFile = useCallback((e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const text = ev.target.result;
      setProjPasteText(text);
      handleParseProjections(text);
    };
    reader.readAsText(file);
    e.target.value = ''; // allow re-uploading same file
  }, [handleParseProjections]);

  const handleSelectProjection = useCallback((name) => {
    const p = projections?.find(pl => pl.name === name);
    if (!p) return;
    setPlayerName(p.name);
    setCvLoadStatus(null);
    setPraDirectCv(null);
    setPtsRawData(null);
    setRebRawData(null);
    setAstRawData(null);
    setStats(prev => {
      const updated = { ...prev };
      ['pts', 'reb', 'ast', 'stl', 'blk', 'threes'].forEach(key => {
        const newMean = p[key];
        const cur = prev[key];
        if (cur.cvMode && cur.cvValue !== '') {
          // Preserve CV mode: recalc std from existing CV × new mean
          const cv = parseFloat(cur.cvValue);
          const std = !isNaN(cv) && newMean > 0 ? Math.round(newMean * (cv / 100) * 10) / 10 : 0;
          updated[key] = { ...cur, mean: String(newMean), stdDev: std };
        } else if (!cur.stdOverride) {
          updated[key] = { ...cur, mean: String(newMean), stdDev: estimateStdDev(key, newMean) };
        } else {
          updated[key] = { ...cur, mean: String(newMean) };
        }
      });
      return updated;
    });
  }, [projections]);

  const handleClearPlayer = useCallback(() => {
    setPlayerName("Player Name");
    setStats(() => {
      const init = {};
      STAT_CONFIG.forEach(({ key, defaultMean }) => {
        init[key] = { mean: "", stdDev: "", propLine: "", overOdds: "", underOdds: "", stdOverride: false, cvMode: false, cvValue: "" };
      });
      return init;
    });
    setComboLines(() => {
      const init = {};
      COMBO_CONFIG.forEach(({ key }) => { init[key] = { line: "", overOdds: "", underOdds: "" }; });
      return init;
    });
    setResults(null);
    setCsvData(null);
    setPraDirectCv(null);
    setPtsRawData(null);
    setRebRawData(null);
    setAstRawData(null);
    setCvLoadStatus(null);
    setLadderOpen({});
  }, []);

  const handleSimulate = useCallback(() => {
    const t0 = performance.now();
    const ts = new Date().toISOString();
    const simResults = runSimulation(stats, numSims, ptsRawData, rebRawData, astRawData);

    const statProbs = {};
    STAT_CONFIG.forEach(({ key }) => {
      if (stats[key].propLine !== "") {
        const cvPctForLabel = POISSON_STATS.has(key) && stats[key].cvMode && stats[key].cvValue ? parseFloat(stats[key].cvValue) : null;
        const poissonCVThreshold = POISSON_STATS.has(key) ? (1 / Math.sqrt(Math.max(0.01, parseFloat(stats[key].mean) || 0))) * 100 : null;
        const usingNegBin = cvPctForLabel > 0 && poissonCVThreshold !== null && cvPctForLabel > poissonCVThreshold;
        const distModel = POISSON_STATS.has(key) ? (usingNegBin ? "NegBin" : "Poisson")
          : key === 'pts' ? (ptsRawData ? "KDE" : "Gamma")
          : key === 'reb' ? (rebRawData ? "KDE" : "LogNormal")
          : key === 'ast' ? (astRawData ? "KDE" : "LogNormal")
          : LOG_NORMAL_STATS.has(key) ? "LogNormal" : "Normal";
        const method = POISSON_STATS.has(key) ? (usingNegBin ? `CV/${distModel}` : "Poisson")
          : stats[key].cvMode ? `CV/${distModel}` : stats[key].stdOverride ? `Manual/${distModel}` : `Auto/${distModel}`;
        statProbs[key] = {
          prob: calcProbability(simResults[key], stats[key].propLine),
          simValues: simResults[key],
          propLine: stats[key].propLine,
          overOdds: stats[key].overOdds,
          underOdds: stats[key].underOdds,
          mean: stats[key].mean,
          std: stats[key].stdDev,
          stdMethod: method,
          cvValue: stats[key].cvMode ? stats[key].cvValue : "",
        };
      }
    });

    const comboProbs = {};
    COMBO_CONFIG.forEach(({ key, parts }) => {
      if (comboLines[key].line !== "") {
        let comboVals;
        if (key === "pra" && praDirectCv != null) {
          // Direct PRA simulation: avoids the independence assumption error from summing
          // three separately drawn distributions. Uses empirical PRA CV from cv_data.json
          // (already captures within-game correlations) combined with minutes variance.
          const meanPRA = (parseFloat(stats.pts.mean) || 0)
                        + (parseFloat(stats.reb.mean) || 0)
                        + (parseFloat(stats.ast.mean) || 0);
          const stdPRA = meanPRA * (praDirectCv / 100);
          comboVals = simulateStatLogNormal(meanPRA, stdPRA, numSims);
        } else {
          comboVals = calcCombo(simResults, parts);
        }
        comboProbs[key] = {
          prob: calcProbability(comboVals, comboLines[key].line),
          simValues: comboVals,
          propLine: comboLines[key].line,
          overOdds: comboLines[key].overOdds,
          underOdds: comboLines[key].underOdds,
        };
      }
    });

    // Auto-open ladder for every stat that has a prop line entered
    const newLadderOpen = {};
    STAT_CONFIG.forEach(({ key }) => { newLadderOpen[key] = stats[key].propLine !== ""; });
    setLadderOpen(newLadderOpen);

    setSimTime(Math.round(performance.now() - t0));
    setSimTimestamp(ts);
    setResults({ stats: statProbs, combos: comboProbs });
  }, [stats, comboLines, numSims]);

  const handleExport = useCallback(() => {
    if (!results) return;
    const fullCsv = buildCSV(playerName, numSims, results.stats, results.combos, simTimestamp, bankroll);
    const csv = includeHeaders ? fullCsv : fullCsv.split("\n").slice(1).join("\n");
    setCsvData(csv);
    setCopied(false);
  }, [results, playerName, numSims, simTimestamp, includeHeaders, bankroll]);

  const handleCopyCSV = useCallback(() => {
    if (!csvData) return;
    navigator.clipboard.writeText(csvData).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    }).catch(() => {
      // Fallback: select the textarea
      const ta = document.getElementById("csv-output");
      if (ta) { ta.select(); document.execCommand("copy"); setCopied(true); setTimeout(() => setCopied(false), 2000); }
    });
  }, [csvData]);

  const hasAnyLine = useMemo(() => {
    return STAT_CONFIG.some(({ key }) => stats[key].propLine !== "") ||
           COMBO_CONFIG.some(({ key }) => comboLines[key].line !== "");
  }, [stats, comboLines]);

  const inputStyle = {
    backgroundColor: "rgba(15,23,42,0.8)", border: "1px solid rgba(148,163,184,0.2)",
    borderRadius: 6, padding: "7px 8px", color: "#e2e8f0",
    fontFamily: "'JetBrains Mono', 'Fira Code', monospace", fontSize: 13,
    width: "100%", outline: "none", boxSizing: "border-box",
  };

  const labelStyle = {
    fontSize: 10, fontWeight: 600, color: "#64748b", textTransform: "uppercase",
    letterSpacing: 1.2, marginBottom: 4, fontFamily: "'JetBrains Mono', monospace",
  };

  const tinyLabel = { ...labelStyle, fontSize: 7, marginBottom: 0, letterSpacing: 0.8 };

  return (
    <div style={{
      minHeight: "100vh",
      background: "linear-gradient(145deg, #0b0f1a 0%, #111827 40%, #0f172a 100%)",
      color: "#e2e8f0", fontFamily: "'Outfit', 'Inter', system-ui, sans-serif",

                return bookProb && (r.prob.over - bookProb) * 100 >= 2;
              });
              const underSignals = coreStats.filter(k => {
                const r = results.stats[k];
                if (!r || !r.underOdds || r.underOdds === "") return false;
                const bookProb = americanToProb(parseFloat(r.underOdds));
                return bookProb && (r.prob.under - bookProb) * 100 >= 2;
              });
              if (overSignals.length >= 3) {
                return (
                  <div style={{
                    marginBottom: 12, padding: "10px 14px", borderRadius: 8,
                    background: "linear-gradient(135deg, rgba(34,197,94,0.12), rgba(34,197,94,0.04))",
                    border: "1px solid rgba(34,197,94,0.3)",
                  }}>
                    <div style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 11, color: "#22c55e", letterSpacing: 1 }}>
                      ⚡ CORRELATED OVER SIGNAL — PTS + REB + AST
                    </div>
                    <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: "#86efac", marginTop: 3 }}>
                      All three core stats show over edge. Consider PRA combo or same-game parlay.
                    </div>
                  </div>
                );
              }
              if (underSignals.length >= 3) {
                return (
                  <div style={{
                    marginBottom: 12, padding: "10px 14px", borderRadius: 8,
                    background: "linear-gradient(135deg, rgba(239,68,68,0.12), rgba(239,68,68,0.04))",
                    border: "1px solid rgba(239,68,68,0.3)",
                  }}>
                    <div style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 11, color: "#f87171", letterSpacing: 1 }}>
                      ⚡ CORRELATED UNDER SIGNAL — PTS + REB + AST
                    </div>
                    <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: "#fca5a5", marginTop: 3 }}>
                      All three core stats show under edge. Consider PRA combo or same-game parlay.
                    </div>
                  </div>
                );
              }
              return null;
            })()}

            {STAT_CONFIG.map(({ key, label }, i) =>
              results.stats[key] ? (
                <div key={key} className="result-row" style={{ animationDelay: `${i * 60}ms` }}>
                  <ResultRow label={label} prob={results.stats[key].prob}
                    propLine={results.stats[key].propLine} simValues={results.stats[key].simValues}
                    overOdds={results.stats[key].overOdds} underOdds={results.stats[key].underOdds}
                    bankroll={bankroll} />
                  <LadderTable
                    statKey={key}
                    mean={results.stats[key].mean}
                    simValues={results.stats[key].simValues}
                    primaryLine={results.stats[key].propLine}
                    open={!!ladderOpen[key]}
                    onToggle={() => setLadderOpen(prev => ({ ...prev, [key]: !prev[key] }))}
                  />
                </div>
              ) : null
            )}

            {COMBO_CONFIG.map(({ key, label }, i) =>
              results.combos[key] ? (
                <div key={key} className="result-row" style={{ animationDelay: `${(STAT_CONFIG.length + i) * 60}ms` }}>
                  <ResultRow label={label} prob={results.combos[key].prob}
                    propLine={results.combos[key].propLine} simValues={results.combos[key].simValues}
                    overOdds={results.combos[key].overOdds} underOdds={results.combos[key].underOdds}
                    bankroll={bankroll} />
                </div>
              ) : null
            )}

            <div style={{
              marginTop: 24, padding: "12px 14px",
              backgroundColor: "rgba(15,23,42,0.3)", border: "1px solid rgba(148,163,184,0.06)",
              borderRadius: 8, fontSize: 10, color: "#475569", lineHeight: 1.8,
              fontFamily: "'JetBrains Mono', monospace",
            }}>
              <strong style={{ color: "#64748b" }}>Edge Scale:</strong>{" "}
              <span style={{ color: "#ef4444" }}>NO EDGE</span> {"< 2%  ·  "}
              <span style={{ color: "#86efac" }}>MARGINAL</span> 2-4%{" · "}
              <span style={{ color: "#4ade80" }}>SOLID</span> 4-7%{" · "}
              <span style={{ color: "#22c55e" }}>STRONG</span> 7%+
              <br />
              <strong style={{ color: "#64748b" }}>Edge</strong> = your model probability minus book implied probability (from raw odds).
              <br />
              <strong style={{ color: "#64748b" }}>¼K</strong> = quarter Kelly stake. Enter bankroll above to see dollar amounts.
              <br />
              Over and under odds are compared independently — use best available from any book.
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<NBASimulator />);
  </script>
</body>
</html>
