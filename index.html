const { useState, useCallback, useMemo } = React;

// ── Model Calibration Constants ────────────────────────────────────
// Derived from 2,211 logged bets (as of 2026-03-22). Update periodically as data grows.

const MODEL_VERSION = 2;  // Increment when model logic changes; tags logged bets for segmentation

// Hard ceiling on model probability. 75%+ bucket is -13.2pp overconfident (N=61).
const PROB_CEILING = 0.72;

// Empirical bias corrections (percentage points). Positive = model overestimates that side.
// Applied as: correctedProb = rawProb - bias/100. Zeroed values = no correction applied.
// PTS zeroed post-KDE+ fix (2026-03-21) — re-evaluate after 200+ new PTS bets.
const MODEL_BIAS = {
  pts:    { over: 0,   under: 0 },  // KDE+ fix just landed; zeroed pending new data
  reb:    { over: 3.0, under: 0 },  // OVER -4.6pp; conservative 3pp correction
  ast:    { over: 4.0, under: 0 },  // OVER -7.3pp; 4pp correction (preserve AST UNDER edge)
  stl:    { over: 6.0, under: 0 },  // OVER -12.1pp; 6pp (half the gap)
  blk:    { over: 0,   under: 0 },  // OVER -1.7pp; within noise
  threes: { over: 5.0, under: 0 },  // OVER -9.8pp; 5pp correction
};

// League-average CVs for NegBin fallback when player CV data unavailable.
// Replaces pure Poisson (which was -6.3pp, -4.6% ROI). From cv_data.json aggregates.
const LEAGUE_AVG_CV = { stl: 111, blk: 182, threes: 95 };

// Apply probability ceiling and bias correction to raw simulation probabilities.
// Returns { over, under, push } with corrections applied.
function applyModelCorrections(rawProb, statKey) {
  // 1. Cap each side at ceiling
  let over  = Math.min(rawProb.over,  PROB_CEILING);
  let under = Math.min(rawProb.under, PROB_CEILING);
  const push = rawProb.push;

  // Renormalize after ceiling cap
  const total1 = over + under + push;
  if (total1 > 0) { over /= total1; under /= total1; }

  // 2. Apply per-stat bias corrections
  const bias = MODEL_BIAS[statKey];
  if (bias) {
    over  = Math.max(0.01, over  - (bias.over  || 0) / 100);
    under = Math.max(0.01, under - (bias.under || 0) / 100);
  }

  // Renormalize after bias correction
  const total2 = over + under + push;
  if (total2 > 0) { over /= total2; under /= total2; }

  return { over, under, push };
}

// ── Monte Carlo Engine ──────────────────────────────────────────────
function randn() {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
}

function simulateStat(mean, stdDev, n) {
  const results = new Float64Array(n);
  for (let i = 0; i < n; i++) results[i] = Math.max(0, mean + stdDev * randn());
  return results;
}

// Log-normal: same mean/stdDev parameterization, but right-skewed and always non-negative.
// Better fit for pts/reb/ast/threes — matches empirical right skew in NBA game logs
// and substantially more accurate for alt lines beyond ~1.5 SD above the mean.
function simulateStatLogNormal(mean, stdDev, n) {
  const m = parseFloat(mean) || 0;
  const s = parseFloat(stdDev) || 0;
  if (m <= 0 || s <= 0) return new Float64Array(n);
  const cv2 = (s / m) ** 2;
  const sigmaL = Math.sqrt(Math.log(1 + cv2));
  const muL = Math.log(m) - (sigmaL * sigmaL) / 2;
  const results = new Float64Array(n);
  for (let i = 0; i < n; i++) results[i] = Math.exp(muL + sigmaL * randn());
  return results;
}

// Poisson: discrete rare-event model for stl/blk.
// Correct distribution for integer count data — avoids the ~10-15pp probability
// error that truncated normal produces on common 0.5-line props.
function randPoisson(lambda) {
  if (lambda <= 0) return 0;
  const L = Math.exp(-lambda);
  let k = 0, p = 1;
  do { k++; p *= Math.random(); } while (p > L);
  return k - 1;
}

function simulateStatPoisson(mean, n) {
  const lambda = Math.max(0, parseFloat(mean) || 0);
  const results = new Float64Array(n);
  for (let i = 0; i < n; i++) results[i] = randPoisson(lambda);
  return results;
}

// ── Negative Binomial sampler (Gamma-Poisson mixture) ────────────────────────
// NegBin(μ, r): mean = μ, variance = μ + μ²/r. Reduces to Poisson as r → ∞.
// Used for stl/blk/threes when CV mode is active and player is overdispersed
// (observed CV > 1/√mean). Captures the higher frequency of both zero-count
// games and outlier-high games that Poisson underestimates for variable players.
// Implementation: λ ~ Gamma(r, μ/r), count ~ Poisson(λ). Uses existing randGamma.
function randNegBin(mu, r) {
  const lambda = randGamma(r, mu / r);
  return randPoisson(lambda);
}

function simulateStatNegBin(mean, cvPct, n) {
  const mu = Math.max(0.01, parseFloat(mean) || 0);
  const cv = (parseFloat(cvPct) || 0) / 100;
  const poissonCV = 1 / Math.sqrt(mu);
  // Fall back to Poisson if underdispersed or Poisson-equivalent
  if (cv <= poissonCV) return simulateStatPoisson(mu, n);
  const r = 1 / (cv * cv - 1 / mu);
  const results = new Float64Array(n);
  for (let i = 0; i < n; i++) results[i] = randNegBin(mu, r);
  return results;
}

// ── Single-draw helpers + buildKDEModel (for projection uncertainty outer loop) ─
// buildKDEModel: precomputes the recency-weighted CDF and bandwidth once, so
// the projection uncertainty outer loop can reuse it without O(n²) rebuilding.
function buildKDEModel(etrMean, rawScores, historicalMean, targetStd) {
  const m = parseFloat(etrMean) || 0;
  const hm = parseFloat(historicalMean) || 0;
  if (m <= 0 || hm <= 0 || !rawScores || rawScores.length < 5) return null;
  const k = rawScores.length;
  const LAMBDA = 0.9;
  const cdf = new Float64Array(k);
  let wSum = 0;
  for (let i = 0; i < k; i++) { cdf[i] = Math.pow(LAMBDA, k - 1 - i); wSum += cdf[i]; }
  let cumul = 0;
  for (let i = 0; i < k; i++) { cumul += cdf[i] / wSum; cdf[i] = cumul; }
  let wMean = 0;
  for (let i = 0; i < k; i++) {
    const wi = i === 0 ? cdf[0] : cdf[i] - cdf[i - 1];
    wMean += wi * rawScores[i];
  }
  const scale = wMean > 0 ? m / wMean : m / hm;
  let wVar = 0;
  for (let i = 0; i < k; i++) {
    const wi = i === 0 ? cdf[0] : cdf[i] - cdf[i - 1];
    wVar += wi * (rawScores[i] - wMean) ** 2;
  }
  let wSqSum = 0;
  for (let i = 0; i < k; i++) wSqSum += Math.pow(LAMBDA, 2 * (k - 1 - i));
  const kEff = (wSum * wSum) / wSqSum;
  const hSilverman = 1.06 * Math.sqrt(wVar) * Math.pow(kEff, -0.2);
  let h = hSilverman;
  if (targetStd > 0) {
    const bootstrapVar = wVar * scale * scale;
    const targetVar    = targetStd * targetStd;
    if (targetVar > bootstrapVar) {
      const hCal = Math.sqrt(targetVar / (scale * scale) - wVar);
      h = Math.max(hCal, hSilverman);
    }
  }
  return { cdf, rawScores, scale, h, wMean };
}

function sampleSingleKDE(model) {
  const { cdf, rawScores, scale, h } = model;
  const k = rawScores.length;
  const u = Math.random();
  let lo = 0, hi = k - 1;
  while (lo < hi) { const mid = (lo + hi) >> 1; if (cdf[mid] < u) lo = mid + 1; else hi = mid; }
  return Math.max(0, (rawScores[lo] + h * randn()) * scale);
}

function sampleSingleLogNormal(mean, std) {
  if (mean <= 0 || std <= 0) return Math.max(0, mean);
  const cv  = std / mean;
  const mu  = Math.log(mean / Math.sqrt(1 + cv * cv));
  const sig = Math.sqrt(Math.log(1 + cv * cv));
  return Math.exp(mu + sig * randn());
}

function sampleSingleGamma(alpha, beta) {
  return randGamma(alpha) * beta;
}

// ── Gamma distribution sampler (Marsaglia-Tsang 2000) ────────────────────────
// Used for pts when empirical KDE data is unavailable.
// Parameterization: shape α, scale β. Mean = α×β, Variance = α×β².
// For pts from CV: α = 1/CV², β = mean×CV².
// Validation vs 20 NBA players showed Gamma is better calibrated than log-normal
// for near-mean prop lines (MAE 4.56% vs 5.43%).
function randGamma(alpha, beta) {
  if (alpha <= 0 || beta <= 0) return 0;
  if (alpha < 1) return randGamma(1 + alpha, beta) * Math.pow(Math.random(), 1 / alpha);
  const d = alpha - 1 / 3;
  const c = 1 / Math.sqrt(9 * d);
  for (;;) {
    let x, v;
    do { x = randn(); v = 1 + c * x; } while (v <= 0);
    v = v * v * v;
    const u = Math.random();
    if (u < 1 - 0.0331 * (x * x) * (x * x)) return d * v * beta;
    if (Math.log(u) < 0.5 * x * x + d * (1 - v + Math.log(v))) return d * v * beta;
  }
}

function simulateStatGamma(mean, cvPct, n) {
  const m = parseFloat(mean) || 0;
  const cv = (parseFloat(cvPct) || 30) / 100;
  if (m <= 0 || cv <= 0) return new Float64Array(n);
  const alpha = 1 / (cv * cv);
  const beta  = m * cv * cv;
  const results = new Float64Array(n);
  for (let i = 0; i < n; i++) results[i] = randGamma(alpha, beta);
  return results;
}

// ── KDE hybrid sampler for pts/reb/ast ───────────────────────────────────────
// Primary model when historical raw game scores are available from cv_data.json.
// No parametric shape assumption — uses the player's actual empirical distribution.
//
// Per trial:
//   1. Pick a random historical score x_i (bootstrap, recency-weighted)
//   2. Add Gaussian noise: bandwidth h (see below)
//   3. Multiplicative recentering: × (etrMean / wMean)
//
// Bandwidth calibration (targetStd):
//   Raw game totals (e.g. rebounds as integers 3,4,5...) have lower variance than
//   what the per-36 CV implies, because per-36 normalization amplifies game-to-game
//   rate differences via the minutes denominator. Silverman's rule on raw scores
//   would produce a bandwidth far too small, making the distribution unrealistically
//   peaked (e.g. 88% over 3.5 and 30% over 4.5 for a 4.3-mean player).
//
//   Output variance formula: Var(output) = scale² × (wVar + h²)
//   → h_calibrated = sqrt(max(0, targetStd²/scale² − wVar))
//
//   h = max(h_calibrated, h_silverman) so we never smooth less than Silverman.
//   If bootstrap variance already exceeds targetStd (rare), falls back to Silverman.
//
// Returns null if inputs are invalid (triggers parametric fallback in runSimulation).
function simulateStatKDE(etrMean, rawScores, historicalMean, n, targetStd) {
  const m = parseFloat(etrMean) || 0;
  const hm = parseFloat(historicalMean) || 0;
  if (m <= 0 || hm <= 0 || !rawScores || rawScores.length < 5) return null;
  const k = rawScores.length;
  const LAMBDA = 0.9; // recency decay — rawScores is oldest-first; index k-1 = most recent

  // Build exponential-decay weights and CDF (oldest score = lowest weight)
  const cdf = new Float64Array(k);
  let wSum = 0;
  for (let i = 0; i < k; i++) { cdf[i] = Math.pow(LAMBDA, k - 1 - i); wSum += cdf[i]; }
  // Normalize to CDF
  let cumul = 0;
  for (let i = 0; i < k; i++) { cumul += cdf[i] / wSum; cdf[i] = cumul; }

  // Weighted mean and variance.
  // scale uses wMean (recency-weighted) as the denominator — not the unweighted historicalMean —
  // because the bootstrap samples according to the same recency weights. Using the unweighted
  // mean would inflate the effective output mean whenever recent games diverge from the season
  // average (e.g. a player on a usage spike), violating E[output] = etrMean.
  let wMean = 0;
  for (let i = 0; i < k; i++) {
    const wi = i === 0 ? cdf[0] : cdf[i] - cdf[i - 1];
    wMean += wi * rawScores[i];
  }
  const scale = wMean > 0 ? m / wMean : m / hm;
  let wVar = 0;
  for (let i = 0; i < k; i++) {
    const wi = i === 0 ? cdf[0] : cdf[i] - cdf[i - 1];
    wVar += wi * (rawScores[i] - wMean) ** 2;
  }
  // Effective sample size: k_eff = (Σw)² / Σ(w²) — accounts for weight concentration
  let wSqSum = 0;
  for (let i = 0; i < k; i++) wSqSum += Math.pow(LAMBDA, 2 * (k - 1 - i));
  const kEff = (wSum * wSum) / wSqSum;
  const hSilverman = 1.06 * Math.sqrt(wVar) * Math.pow(kEff, -0.2);

  // Calibrate h to match targetStd (effective CV std dev) when provided.
  // Var(output) = scale²×(wVar + h²) → h_cal = sqrt(targetVar/scale² − wVar)
  let h = hSilverman;
  if (targetStd > 0) {
    const bootstrapVar = wVar * scale * scale; // variance from pure bootstrap (no noise)
    const targetVar    = targetStd * targetStd;
    if (targetVar > bootstrapVar) {
      const hCal = Math.sqrt(targetVar / (scale * scale) - wVar);
      h = Math.max(hCal, hSilverman);
    }
    // If bootstrapVar >= targetVar we cannot reduce h below 0; keep Silverman.
  }

  // Weighted bootstrap via CDF binary search
  const results = new Float64Array(n);
  for (let i = 0; i < n; i++) {
    const u = Math.random();
    let lo = 0, hi = k - 1;
    while (lo < hi) { const mid = (lo + hi) >> 1; if (cdf[mid] < u) lo = mid + 1; else hi = mid; }
    results[i] = Math.max(0, (rawScores[lo] + h * randn()) * scale);
  }
  return results;
}

// Distribution routing: which model each stat uses.
// pts/reb/ast use KDE hybrid (empirical) when raw data available, with parametric fallbacks.
// threes/stl/blk use Poisson (discrete integer counts). pts/reb/ast use KDE hybrid with parametric fallbacks.
const LOG_NORMAL_STATS = new Set([]);
const POISSON_STATS    = new Set(['stl', 'blk', 'threes']);
const KDE_STATS        = new Set(['pts', 'reb', 'ast']);

function runSimulation(stats, numSims, ptsRawData, rebRawData, astRawData, projSDs = {}, ptsRawDataAll = null, rebRawDataAll = null, astRawDataAll = null) {
  const rawDataMap    = { pts: ptsRawData,    reb: rebRawData,    ast: astRawData    };
  // Unfiltered raw data map — preferred for KDE when available.
  // Contains blowout/overtime/foul-trouble games stripped by the situation filter.
  const rawDataMapAll = { pts: ptsRawDataAll, reb: rebRawDataAll, ast: astRawDataAll };
  const simResults = {};
  Object.keys(stats).forEach((key) => {
    const { mean, stdDev, cvMode, cvValue } = stats[key];
    // Guard: a manually-entered stdDev of 0 produces a degenerate distribution where every
    // sample equals the mean, collapsing all probability mass to a single point and returning
    // 0% for any line that isn't exactly the mean. Fall back to auto estimate instead.
    const effectiveStd = parseFloat(stdDev) > 0 ? parseFloat(stdDev) : estimateStdDev(key, mean);
    const sigmaProj = projSDs && projSDs[key] > 0 ? projSDs[key] : 0;

    // Projection Uncertainty: sample μ ~ N(ETR, σ_proj) in 50 chunks.
    // Each chunk uses a perturbed mean, approximating the Bayesian mixture
    // P(X) = ∫ P(X|μ) P(μ) dμ. Performance: 50 sampler calls vs numSims—negligible overhead.
    if (sigmaProj > 0) {
      const etrMean = parseFloat(mean) || 0;
      const CHUNKS = 50;
      const chunkSize = Math.ceil(numSims / CHUNKS);
      const combined = new Float64Array(numSims);
      let offset = 0;
      // Precompute KDE model for reuse across chunks (avoids O(n²) CDF rebuilding).
      // Prefer unfiltered raw data (_raw_all) for PTS/REB/AST — same rationale as the
      // non-uncertainty path: unfiltered data includes tail games and captures rate-minutes
      // covariance. Falls back to situation-filtered data with 1.25× PTS multiplier.
      const rawDataAll = rawDataMapAll[key];
      const rawData    = rawDataMap[key];
      const empiricalStd_pu = (KDE_STATS.has(key) && rawDataAll)
        ? computeEmpiricalStd(rawDataAll.rawScores, etrMean)
        : null;
      const useUnfiltered_pu = empiricalStd_pu !== null;
      const kdeSource_pu    = useUnfiltered_pu ? rawDataAll : rawData;
      const kdeTargetStd_pu = useUnfiltered_pu
        ? empiricalStd_pu
        : (key === 'pts' ? effectiveStd * 1.25 : effectiveStd);
      const kdeModel = (KDE_STATS.has(key) && kdeSource_pu)
        ? buildKDEModel(etrMean, kdeSource_pu.rawScores, kdeSource_pu.historicalMean, kdeTargetStd_pu)
        : null;
      const cvPct_nb = cvMode && cvValue ? parseFloat(cvValue) : null;
      for (let c = 0; c < CHUNKS && offset < numSims; c++) {
        const mu_i = Math.max(0, etrMean + sigmaProj * randn());
        const n_c  = Math.min(chunkSize, numSims - offset);
        let chunk;
        if (POISSON_STATS.has(key)) {
          // THREES: same r=2.0 minimum overdispersion floor as the non-uncertainty path.
          if (key === 'threes' && mu_i > 0) {
            const floorCv_pu = Math.sqrt(1 / mu_i + 0.5) * 100;
            const effectiveCvPct_pu = Math.max(cvPct_nb || 0, floorCv_pu);
            chunk = simulateStatNegBin(mu_i, effectiveCvPct_pu, n_c);
          } else {
            // League-avg NegBin fallback instead of Poisson (Poisson was -6.3pp calibration)
            const effectiveCv_pu = (cvPct_nb > 0) ? cvPct_nb : (LEAGUE_AVG_CV[key] || 100);
            chunk = simulateStatNegBin(mu_i, effectiveCv_pu, n_c);
          }
        } else if (KDE_STATS.has(key)) {
          if (kdeModel) {
            chunk = new Float64Array(n_c);
            // Build a scaled KDE model for this perturbed mean
            const scaledModel = { ...kdeModel, scale: kdeModel.wMean > 0 ? mu_i / kdeModel.wMean : kdeModel.scale };
            for (let j = 0; j < n_c; j++) chunk[j] = sampleSingleKDE(scaledModel);
          } else if (key === 'pts' || key === 'ast' || key === 'reb') {
            // Gamma for pts, ast, and reb — same rationale as the non-uncertainty path.
            const cvP = cvMode && cvValue ? parseFloat(cvValue) : STD_RATIOS[key] * 100;
            chunk = simulateStatGamma(mu_i, cvP, n_c);
          } else {
            chunk = simulateStatLogNormal(mu_i, Math.max(0.001, mu_i * (effectiveStd / Math.max(etrMean, 0.001))), n_c);
          }
        } else {
          chunk = simulateStatLogNormal(mu_i, Math.max(0.001, mu_i * (effectiveStd / Math.max(etrMean, 0.001))), n_c);
        }
        combined.set(chunk, offset);
        offset += n_c;
      }
      // Fisher-Yates shuffle for uniform blending across chunks
      for (let i = numSims - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const tmp = combined[i]; combined[i] = combined[j]; combined[j] = tmp;
      }
      simResults[key] = combined;
      return;
    }

    if (POISSON_STATS.has(key)) {
      const cvPct = cvMode && cvValue ? parseFloat(cvValue) : null;
      const mu = parseFloat(mean) || 0;
      // THREES: enforce minimum NegBin overdispersion corresponding to r = 2.0, applied even
      // when no CV data is loaded. Per-36 CV blending consistently underestimates game-level
      // THREES variance — calibration data shows THREES OVER hits 10-15pp below Poisson
      // predictions at typical 2.5–3.5 lines. Pure Poisson with λ=2.5 gives P(X≥3) = 54%
      // while observed hit rate is ~43%. r=2.0 (empirically calibrated minimum) gives
      // P(X≥3) ≈ 40%, matching observed rates. CV floor derivation: NegBin variance =
      // μ + μ²/r, so CV = sqrt(1/μ + 1/r). At r=2: floorCV = sqrt(1/μ + 0.5) × 100.
      // STL/BLK are unaffected — their NegBin is well-calibrated and should not be floored.
      if (key === 'threes' && mu > 0) {
        const floorCv = Math.sqrt(1 / mu + 0.5) * 100;
        const effectiveCvPct = Math.max(cvPct || 0, floorCv);
        simResults[key] = simulateStatNegBin(mean, effectiveCvPct, numSims);
      } else {
        // Use player CV when available; fall back to league-average NegBin (not Poisson).
        // Poisson fallback was -6.3pp, -4.6% ROI in calibration. League-avg NegBin is strictly better.
        const effectiveCv = (cvPct > 0) ? cvPct : (LEAGUE_AVG_CV[key] || 100);
        simResults[key] = simulateStatNegBin(mean, effectiveCv, numSims);
      }
    } else if (KDE_STATS.has(key)) {
      // Fallback chain for pts/reb/ast:
      // 1. KDE hybrid (unfiltered) — empirical shape from all played games (MIN ≥ 5),
      //    targetStd derived from the empirical raw CV of those scores. This captures
      //    blowout/foul-trouble/overtime tails that the situation-filtered pts_raw misses,
      //    and correctly accounts for the positive rate-minutes covariance that the
      //    Pythagorean sqrt(cvPer36² + cvMin²) formula underestimates for PTS.
      // 2. KDE hybrid (filtered) — situation-filtered scores; PTS gets 1.25× targetStd
      //    as a partial correction for the missing tail games (legacy fallback for older
      //    cv_data.json lacking _raw_all fields).
      // 3. Gamma (pts, ast) / LogNormal (reb) — parametric fallback when no raw data.
      const rawDataAll = rawDataMapAll[key];
      const rawData    = rawDataMap[key];
      const etrMean    = parseFloat(mean) || 0;

      // Path 1: unfiltered KDE with empirically-derived targetStd
      if (rawDataAll) {
        const empiricalStd = computeEmpiricalStd(rawDataAll.rawScores, etrMean);
        // empiricalStd may be null if rawScores is thin; fall through to path 2 if so.
        if (empiricalStd !== null) {
          const kde = simulateStatKDE(etrMean, rawDataAll.rawScores, rawDataAll.historicalMean, numSims, empiricalStd);
          if (kde !== null) {
            simResults[key] = kde;
            return;
          }
        }
      }

      // Path 2: situation-filtered KDE (legacy / missing _raw_all)
      if (rawData) {
        // PTS: 1.25× multiplier partially compensates for the missing tail games when
        // unfiltered data is unavailable. This was the primary model prior to the
        // unfiltered-data fix. REB/AST are well-calibrated; no multiplier applied.
        const kdeTargetStd = key === 'pts' ? effectiveStd * 1.25 : effectiveStd;
        const kde = simulateStatKDE(etrMean, rawData.rawScores, rawData.historicalMean, numSims, kdeTargetStd);
        if (kde !== null) {
          simResults[key] = kde;
          return;
        }
      }
      if (key === 'pts' || key === 'ast' || key === 'reb') {
        // Gamma for pts, ast, and reb: reduces the structural under-bias that log-normal
        // creates when lines fall at or near the mean (log-normal median < mean by ~σ²/2,
        // producing P(under) ≈ 58% at CV=40% even at a fair 50/50 line).
        // Gamma at the same CV gives P(under) ≈ 53%, much closer to the true 50%.
        // Reb shares the same rationale as pts/ast — right-skewed count stat where
        // log-normal's excess skewness creates the same near-mean bias.
        const cvPct = cvMode && cvValue ? parseFloat(cvValue) : STD_RATIOS[key] * 100;
        simResults[key] = simulateStatGamma(mean, cvPct, numSims);
      } else {
        simResults[key] = simulateStatLogNormal(mean, effectiveStd, numSims);
      }
    } else if (LOG_NORMAL_STATS.has(key)) {
      simResults[key] = simulateStatLogNormal(mean, effectiveStd, numSims);
    } else {
      simResults[key] = simulateStat(parseFloat(mean) || 0, parseFloat(stdDev) || 0, numSims);
    }
  });
  return simResults;
}

function calcProbability(simValues, propLine) {
  const line = parseFloat(propLine);
  if (isNaN(line) || simValues.length === 0) return null;
  let over = 0, push = 0;
  for (let i = 0; i < simValues.length; i++) {
    if (simValues[i] > line) over++;
    else if (simValues[i] === line) push++;
  }
  return {
    over: over / simValues.length,
    under: (simValues.length - over - push) / simValues.length,
    push: push / simValues.length,
  };
}

// Counts simulation trials where every leg hits simultaneously.
// legs: array of { simValues: Float64Array, propLine: number, side: 'over'|'under' }
// Returns joint probability as a fraction in [0,1].
// Uses trial-level correlation already embedded in the Float64Arrays (same game per trial).
function calcParlayProb(legs) {
  if (!legs.length) return null;
  const n = legs[0].simValues?.length;
  if (!n) return null;
  let hits = 0;
  for (let i = 0; i < n; i++) {
    let allHit = true;
    for (const { simValues, propLine, side } of legs) {
      const v = simValues[i];
      if (side === 'over' ? v <= propLine : v >= propLine) { allHit = false; break; }
    }
    if (allHit) hits++;
  }
  return hits / n;
}

function calcCombo(simResults, keys) {
  const n = simResults[keys[0]]?.length || 0;
  const combined = new Float64Array(n);
  for (let i = 0; i < n; i++) {
    let sum = 0;
    for (const key of keys) sum += simResults[key]?.[i] || 0;
    combined[i] = sum;
  }
  return combined;
}

// ── Discrete Distribution Helper ─────────────────────────────────────
// For count stats (STL/BLK/THREES), returns exact integer probabilities
// from the simulation Float64Array. These are far more decision-relevant
// than continuous histogram buckets for pricing 0.5-line props.
function calcDiscreteDist(simValues, maxK = 6) {
  if (!simValues || simValues.length === 0) return null;
  const counts = new Array(maxK + 1).fill(0);
  const n = simValues.length;
  for (let i = 0; i < n; i++) {
    const v = Math.round(simValues[i]);
    if (v < 0) continue;
    if (v >= maxK) counts[maxK]++;
    else counts[v]++;
  }
  const result = {};
  for (let k = 0; k < maxK; k++) result[k] = counts[k] / n;
  result[`${maxK}+`] = counts[maxK] / n;
  return result;
}

// ── Projection Sensitivity Helper ────────────────────────────────────
// Answers: "what if ETR is X% wrong?" by re-evaluating P(over) on existing
// simValues at adjusted effective lines. No resimulation required.
// "ETR 5% too high" ≈ propLine + mean*0.05 → over% will be lower.
function calcSensitivity(simValues, propLine, mean) {
  if (!simValues || simValues.length === 0) return null;
  const line = parseFloat(propLine);
  const m = parseFloat(mean);
  if (isNaN(line) || isNaN(m) || m <= 0) return null;
  return {
    m10: calcProbability(simValues, line + m * 0.10).over,
    m5:  calcProbability(simValues, line + m * 0.05).over,
    base: calcProbability(simValues, line).over,
    p5:  calcProbability(simValues, line - m * 0.05).over,
    p10: calcProbability(simValues, line - m * 0.10).over,
  };
}

// ── Empirical game-level std from raw (unfiltered) scores ────────────────────
// Used when pts_raw_all is available to derive KDE targetStd from actual game
// outcomes rather than the Pythagorean per-36 + minutes approximation.
//
// Why: The situation filter excludes blowout/foul-trouble/overtime games from
// pts_raw. The Pythagorean combination sqrt(cvPer36² + cvMin²) also misses the
// positive covariance between rate and minutes (stars play more AND score better
// in close games). Both effects make effectiveStd systematically too narrow for PTS.
//
// The raw unfiltered scores natively capture all four variance components:
//   1. Per-36 rate variance       (efficiency changes game to game)
//   2. Minutes variance            (playing time fluctuations)
//   3. Rate × minutes covariance   (more minutes → higher usage, often better rate)
//   4. Tail events                 (blowout rest, foul trouble, overtime)
//
// Scaling: proportionally maps the historical std to the ETR mean via scale = etrMean / rawMean.
// This preserves the CV shape while centering on the current projection.
function computeEmpiricalStd(rawScores, etrMean) {
  if (!rawScores || rawScores.length < 5) return null;
  const n = rawScores.length;
  const rawMean = rawScores.reduce((a, b) => a + b, 0) / n;
  if (rawMean <= 0) return null;
  const variance = rawScores.reduce((a, x) => a + (x - rawMean) ** 2, 0) / (n - 1);
  const scale = etrMean / rawMean;
  return Math.sqrt(variance) * scale;
}

// Returns half-integer prop lines for the alt line ladder.
// Points: 5-unit intervals centred on mean. Others: 1-unit. STL/BLK: fixed 0.5–4.5.
function getAltLines(key, mean) {
  const m = parseFloat(mean) || 0;
  if (m <= 0) return [];
  if (key === 'pts') {
    // 2.5pt intervals (books offer alt PTS lines at 2.5pt steps; 5pt was too sparse)
    const center = Math.round(m / 2.5) * 2.5;
    const lines = [];
    for (let l = Math.max(2.5, center - 15); l <= center + 17.5; l += 2.5) lines.push(parseFloat((l - 0.5).toFixed(1)));
    return lines;
  }
  if (key === 'stl' || key === 'blk') {
    // Dynamic: start at 0.5, extend to at least 4.5 or higher for elite players
    const end = Math.max(4.5, Math.floor(m + 2.5) + 0.5);
    const lines = [];
    for (let l = 0.5; l <= end; l += 1) lines.push(parseFloat(l.toFixed(1)));
    return lines;
  }
  if (key === 'threes') {
    const top = Math.max(4.5, Math.ceil(m + 3) - 0.5);
    const lines = [];
    for (let l = 0.5; l <= top; l += 1) lines.push(parseFloat(l.toFixed(1)));
    return lines;
  }
  // Combo props
  if (key === 'pra' || key === 'pr' || key === 'pa') {
    // Wide combos (typical range 20–60): 2.5pt intervals, ±5 rungs from rounded center
    const center = Math.round(m / 2.5) * 2.5;
    const lines = [];
    for (let i = -5; i <= 5; i++) { const v = center + i * 2.5; if (v > 0) lines.push(v - 0.5); }
    return lines;
  }
  if (key === 'ra') {
    // Medium combo (typical range 6–20): 1pt intervals, mean ±4
    const start = Math.max(0.5, Math.floor(m - 3) + 0.5);
    const end   = Math.floor(m + 5) + 0.5;
    const lines = [];
    for (let l = start; l <= end; l += 1) lines.push(parseFloat(l.toFixed(1)));
    return lines;
  }
  if (key === 'sb') {
    // SB = STL+BLK, so wider range; extend to at least 5.5 or higher
    const end = Math.max(5.5, Math.floor(m + 2.5) + 0.5);
    const lines = [];
    for (let l = 0.5; l <= end; l += 1) lines.push(parseFloat(l.toFixed(1)));
    return lines;
  }
  // reb, ast: 1-unit intervals, mean ±4
  const start = Math.max(0.5, Math.floor(m - 3) + 0.5);
  const end   = Math.floor(m + 5) + 0.5;
  const lines = [];
  for (let l = start; l <= end; l += 1) lines.push(parseFloat(l.toFixed(1)));
  return lines;
}

// ── Odds Utilities ──────────────────────────────────────────────────
function probToAmerican(prob) {
  if (prob <= 0 || prob >= 1) return "—";
  if (prob >= 0.5) return Math.round((-prob / (1 - prob)) * 100);
  return "+" + Math.round(((1 - prob) / prob) * 100);
}

function americanToProb(odds) {
  const o = parseFloat(odds);
  if (isNaN(o) || o === 0) return null;
  if (o < 0) return Math.abs(o) / (Math.abs(o) + 100);
  return 100 / (o + 100);
}

// Returns vig-free implied probabilities by normalizing both sides to sum to 1.0.
// When both over and under odds are provided, removes the book's vig.
// Falls back to raw americanToProb when only one side is available.
// Example: -110/-110 raw → 52.38%/52.38%; vig-free → 50%/50%.
function vigFreeProb(overOdds, underOdds) {
  const overRaw  = americanToProb(overOdds);
  const underRaw = americanToProb(underOdds);
  if (overRaw && underRaw) {
    const total = overRaw + underRaw;
    return { over: overRaw / total, under: underRaw / total };
  }
  return { over: overRaw, under: underRaw };
}

function americanToDecimal(odds) {
  const o = parseFloat(odds);
  if (isNaN(o) || o === 0) return null;
  if (o < 0) return 1 + (100 / Math.abs(o));
  return 1 + (o / 100);
}

function calcKelly(modelProb, americanOdds) {
  const dec = americanToDecimal(americanOdds);
  if (!dec || dec <= 1) return null;
  const b = dec - 1;
  const p = modelProb;
  const q = 1 - p;
  const kelly = (b * p - q) / b;
  return kelly > 0 ? kelly : 0;
}

// Simultaneous independent-event Kelly: stake_i = κ_i × kf × ∏(1 − κ_j × kf, j≠i)
// Uses planned fractional-Kelly bet sizes (kelly × kellyFraction) in the product, not
// full Kelly. Reason: the portfolio interaction depends on what you *actually* plan to
// bet. Full Kelly in the product collapses all other stakes toward $0 whenever any
// single bet has a large Kelly fraction (e.g. 80%+ full Kelly from a high-prob input).
// allBets: array of { key, side, kelly } for each active (best-edge, positive-Kelly) bet.
// Returns { 'key_side': portfolioFactor } where portfolioFactor = ∏(1−κ_j×kf, j≠i).
function calcPortfolioFactors(allBets, kellyFraction = 0.25) {
  if (allBets.length === 0) return {};
  const totalProd = allBets.reduce((p, { kelly }) => p * (1 - kelly * kellyFraction), 1.0);
  const factors = {};
  allBets.forEach(({ key, side, kelly }) => {
    factors[`${key}_${side}`] = totalProd / (1 - kelly * kellyFraction);
  });
  return factors;
}

// ── Game Status & Line Shift Helpers ────────────────────────────────
// Returns 'PRE' | 'LIVE' | 'FINAL' based on commenceTime vs now.
// LIVE = within 3h of tip; FINAL = 3h+ past tip (approximate).
function getGameStatus(commenceTime) {
  if (!commenceTime) return null;
  const tip = new Date(commenceTime).getTime();
  const now = Date.now();
  if (now < tip) return 'PRE';
  if (now < tip + 3 * 60 * 60 * 1000) return 'LIVE';
  return 'FINAL';
}

// Returns true if the game has already tipped (not PRE).
function gameIsActive(commenceTime) {
  if (!commenceTime) return false;
  return new Date(commenceTime).getTime() <= Date.now();
}

// Compares two oddsIndex snapshots; returns array of detected shifts.
// Each shift: { player, stat, prevLine, currLine, lineDelta, prevOdds, currOdds, oddsDelta }
const LINE_SHIFT_LINE_THRESHOLD = 0.5;  // point change on the line
const LINE_SHIFT_ODDS_THRESHOLD = 15;   // American odds point change
function computeLineShifts(prevOdds, newOdds) {
  if (!prevOdds || !newOdds) return [];
  const shifts = [];
  for (const [player, stats] of Object.entries(newOdds)) {
    const prev = prevOdds[player];
    if (!prev) continue;
    for (const [stat, curr] of Object.entries(stats)) {
      const p = prev[stat];
      if (!p || curr.line == null || p.line == null) continue;
      const lineDelta = curr.line - p.line;
      const prevOv = p.overOdds ?? null;
      const currOv = curr.overOdds ?? null;
      const oddsDelta = (prevOv != null && currOv != null) ? currOv - prevOv : 0;
      if (Math.abs(lineDelta) >= LINE_SHIFT_LINE_THRESHOLD || Math.abs(oddsDelta) >= LINE_SHIFT_ODDS_THRESHOLD) {
        shifts.push({ player, stat, prevLine: p.line, currLine: curr.line, lineDelta,
          prevOdds: prevOv, currOdds: currOv, oddsDelta });
      }
    }
  }
  return shifts;
}

function normalizeOddsName(name) {
  return (name || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .toLowerCase().trim()
    .replace(/\bjr\.?$/i, 'jr').replace(/\bsr\.?$/i, 'sr')
    .replace(/\bii$/i, 'ii').replace(/\biii$/i, 'iii').replace(/\biv$/i, 'iv');
}

function bigramSimilarity(a, b) {
  if (a.length < 2 || b.length < 2) return a === b ? 1 : 0;
  const bigrams = s => { const set = new Set(); for (let i = 0; i < s.length - 1; i++) set.add(s.slice(i, i + 2)); return set; };
  const ab = bigrams(a), bb = bigrams(b);
  let intersection = 0;
  ab.forEach(g => { if (bb.has(g)) intersection++; });
  return (2 * intersection) / (ab.size + bb.size);
}

function findFuzzyOddsMatch(oddsIndex, normName, threshold = 0.72) {
  let best = null, bestScore = 0;
  for (const key of Object.keys(oddsIndex)) {
    const score = bigramSimilarity(key, normName);
    if (score > bestScore) { bestScore = score; best = key; }
  }
  return bestScore >= threshold ? oddsIndex[best] : null;
}

// Best American odds = numerically highest price (higher = better value for bettor)
function bestAmericanOdds(prices) {
  if (!prices || prices.length === 0) return null;
  return prices.reduce((best, p) => {
    if (!best) return p;
    const curr = parseFloat(p.price), b = parseFloat(best.price);
    return (!isNaN(curr) && (isNaN(b) || curr > b)) ? p : best;
  }, null);
}

async function fetchNbaGames(apiKey) {
  const now = new Date();
  const from = now.toISOString().slice(0, 10) + 'T00:00:00Z';
  const to = new Date(now.getTime() + 30 * 60 * 60 * 1000).toISOString().slice(0, 19) + 'Z';
  const url = `${ODDS_API_BASE}/sports/basketball_nba/events?apiKey=${apiKey}&commenceTimeFrom=${from}&commenceTimeTo=${to}`;
  const r = await fetch(url);
  if (!r.ok) { const txt = await r.text().catch(() => ''); throw new Error(`Odds API ${r.status}: ${txt.slice(0, 120)}`); }
  return { games: await r.json(), remainingRequests: r.headers.get('x-requests-remaining') };
}

async function fetchGameLines(apiKey, eventIds) {
  if (!eventIds || eventIds.length === 0) return { lines: {}, remainingRequests: null };
  const url = `${ODDS_API_BASE}/sports/basketball_nba/odds?apiKey=${apiKey}&regions=us&markets=spreads,totals&oddsFormat=american&eventIds=${eventIds.join(',')}`;
  const r = await fetch(url);
  if (!r.ok) return { lines: {}, remainingRequests: null };
  const data = await r.json();
  const lines = {};
  data.forEach(event => {
    let total = null, spread = null, favoriteTeam = null;
    (event.bookmakers || []).forEach(bk => {
      (bk.markets || []).forEach(mkt => {
        if (mkt.key === 'totals' && total == null) {
          const ov = mkt.outcomes?.find(o => o.name === 'Over');
          if (ov) total = ov.point;
        }
        if (mkt.key === 'spreads' && spread == null) {
          const away = mkt.outcomes?.find(o => o.name === event.away_team);
          if (away) { spread = away.point; favoriteTeam = away.point < 0 ? event.away_team : event.home_team; }
        }
      });
    });
    lines[event.id] = { total, spread, favoriteTeam, homeTeam: event.home_team, awayTeam: event.away_team };
  });
  return { lines, remainingRequests: r.headers.get('x-requests-remaining') };
}

async function fetchEventProps(apiKey, eventId) {
  const markets = Object.values(ODDS_MARKET_MAP).join(',');
  const url = `${ODDS_API_BASE}/sports/basketball_nba/events/${eventId}/odds?apiKey=${apiKey}&regions=us&markets=${markets}&oddsFormat=american`;
  const r = await fetch(url);
  if (!r.ok) return { bookmakers: [], remainingRequests: null };
  const data = await r.json();
  return { bookmakers: data.bookmakers || [], remainingRequests: r.headers.get('x-requests-remaining') };
}

// ── ESPN Public API (no key required, CORS-open) ─────────────────────
// Convert a UTC ISO commence_time → YYYYMMDD in Eastern Time (UTC-5 safe offset)
// NBA games tip off no earlier than 12:30pm ET, so subtracting 5h always lands on the correct ET date.
function commenceTimeToEspnDate(isoStr) {
  const d = new Date(Date.parse(isoStr) - 5 * 3600 * 1000);
  const y = d.getUTCFullYear();
  const m = String(d.getUTCMonth() + 1).padStart(2, '0');
  const dy = String(d.getUTCDate()).padStart(2, '0');
  return `${y}${m}${dy}`;
}

// Returns array of { id, completed, homeTeam, awayTeam } for a given YYYYMMDD date.
async function fetchEspnScoreboard(dateStr) {
  try {
    const url = `https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard?dates=${dateStr}`;
    const r = await fetch(url);
    if (!r.ok) return [];
    const data = await r.json();
    return (data.events || []).map(ev => ({
      id: ev.id,
      completed: ev.status?.type?.completed ?? false,
      state: ev.status?.type?.state ?? 'pre',
      homeTeam: ev.competitions?.[0]?.competitors?.find(c => c.homeAway === 'home')?.team?.displayName ?? '',
      awayTeam: ev.competitions?.[0]?.competitors?.find(c => c.homeAway === 'away')?.team?.displayName ?? '',
    }));
  } catch { return []; }
}

// Returns array of { playerName, pts, reb, ast, stl, blk, threes } from ESPN box score.
async function fetchEspnBoxScore(espnEventId) {
  try {
    const url = `https://site.api.espn.com/apis/site/v2/sports/basketball/nba/summary?event=${espnEventId}`;
    const r = await fetch(url);
    if (!r.ok) return [];
    const data = await r.json();
    const players = [];
    (data.boxscore?.players ?? []).forEach(teamBlock => {
      (teamBlock.statistics ?? []).forEach(statBlock => {
        const names = statBlock.names ?? statBlock.labels ?? [];
        // Find column indices by header name
        const idx = (label) => names.findIndex(n => n === label);
        const iMin  = idx('MIN');
        const iPts  = idx('PTS');
        const iReb  = idx('REB');
        const iAst  = idx('AST');
        const iStl  = idx('STL');
        const iBlk  = idx('BLK');
        const i3pt  = idx('3PT');  // "2-6" format → first number is 3PM
        (statBlock.athletes ?? []).forEach(a => {
          if (!a.athlete || !a.stats) return;
          const st = a.stats;
          // Skip DNP rows (stats array is empty or has 'DNP')
          if (!st.length || st[0] === 'DNP' || st[0] === 'DND') return;
          const parse = (i) => i >= 0 && i < st.length ? (parseFloat(st[i]) || 0) : 0;
          const parse3pt = () => {
            if (i3pt < 0 || i3pt >= st.length) return 0;
            const made = parseInt((st[i3pt] || '0').split('-')[0], 10);
            return isNaN(made) ? 0 : made;
          };
          players.push({
            playerName: a.athlete.displayName ?? '',
            shortName:  a.athlete.shortName ?? '',
            pts:    parse(iPts),
            reb:    parse(iReb),
            ast:    parse(iAst),
            stl:    parse(iStl),
            blk:    parse(iBlk),
            threes: parse3pt(),
          });
        });
      });
    });
    return players;
  } catch { return []; }
}

// Resolve actual stat value for an entry's stat key (handles combo keys).
function resolveActualStat(statKey, playerRow) {
  switch (statKey) {
    case 'pts':    return playerRow.pts;
    case 'reb':    return playerRow.reb;
    case 'ast':    return playerRow.ast;
    case 'stl':    return playerRow.stl;
    case 'blk':    return playerRow.blk;
    case 'threes': return playerRow.threes;
    case 'pra':    return playerRow.pts + playerRow.reb + playerRow.ast;
    case 'pr':     return playerRow.pts + playerRow.reb;
    case 'pa':     return playerRow.pts + playerRow.ast;
    case 'ra':     return playerRow.reb + playerRow.ast;
    case 'sb':     return playerRow.stl + playerRow.blk;
    default:       return null;
  }
}

// Builds { normalizedPlayerName → { pts: { line, overOdds, underOdds, overBook, underBook, allBooks[] }, ... } }
function buildOddsIndex(allPropsData, selectedBooks) {
  const index = {};
  allPropsData.forEach(({ bookmakers }) => {
    (bookmakers || []).forEach(bk => {
      if (selectedBooks.length > 0 && !selectedBooks.includes(bk.key)) return;
      (bk.markets || []).forEach(mkt => {
        const statKey = Object.keys(ODDS_MARKET_MAP).find(k => ODDS_MARKET_MAP[k] === mkt.key);
        if (!statKey) return;
        (mkt.outcomes || []).forEach(outcome => {
          const normName = normalizeOddsName(outcome.description || '');
          if (!normName) return;
          if (!index[normName]) index[normName] = {};
          if (!index[normName][statKey]) index[normName][statKey] = { allBooks: [] };
          const entry = index[normName][statKey];
          const side = (outcome.name || '').toLowerCase();
          entry.allBooks.push({ book: bk.key, bookLabel: bk.title, price: outcome.price, point: outcome.point, side });
        });
      });
    });
  });
  Object.keys(index).forEach(player => {
    Object.keys(index[player]).forEach(statKey => {
      const entry = index[player][statKey];
      // Determine principal line: the point value most frequently offered across all books/sides.
      // This ensures entry.line, entry.overOdds, and entry.underOdds all refer to the same line.
      const pointCounts = {};
      entry.allBooks.forEach(b => {
        if (b.point != null) {
          const k = String(b.point);
          pointCounts[k] = (pointCounts[k] || 0) + 1;
        }
      });
      const sortedPoints = Object.keys(pointCounts).sort((a, b) => {
        const diff = pointCounts[b] - pointCounts[a]; // descending by count
        return diff !== 0 ? diff : parseFloat(a) - parseFloat(b); // ascending by value on tie
      });
      const principalLine = sortedPoints.length > 0 ? parseFloat(sortedPoints[0]) : null;
      entry.line = principalLine;
      // Only compare odds at the principal line so prices and line always match
      const overPrices  = entry.allBooks.filter(b => b.side === 'over'  && b.point === principalLine);
      const underPrices = entry.allBooks.filter(b => b.side === 'under' && b.point === principalLine);
      const bestOver  = bestAmericanOdds(overPrices);
      const bestUnder = bestAmericanOdds(underPrices);
      if (bestOver)  { entry.overOdds  = bestOver.price;  entry.overBook  = bestOver.bookLabel;  }
      if (bestUnder) { entry.underOdds = bestUnder.price; entry.underBook = bestUnder.bookLabel; }
    });
  });
  return index;
}

// Maps team abbreviation → { opponent, total, spread, favoriteTeam, homeTeam, awayTeam }
function buildGameIndex(games, gameLines) {
  const index = {};
  games.forEach(game => {
    const toAbbr = t => NBA_TEAM_ABBR[t] || (t || '').split(' ').pop().toUpperCase();
    const homeAbbr = toAbbr(game.home_team), awayAbbr = toAbbr(game.away_team);
    const gl = gameLines[game.id] || {};
    const favAbbr = gl.favoriteTeam ? toAbbr(gl.favoriteTeam) : null;
    const ctx = { homeTeam: homeAbbr, awayTeam: awayAbbr, total: gl.total, spread: gl.spread, favoriteTeam: favAbbr, eventId: game.id, commenceTime: game.commence_time };
    if (homeAbbr) index[homeAbbr] = { ...ctx, opponent: awayAbbr };
    if (awayAbbr) index[awayAbbr] = { ...ctx, opponent: homeAbbr };
  });
  return index;
}

async function fetchFullSlate(apiKey, selectedBooks) {
  const { games, remainingRequests: rr0 } = await fetchNbaGames(apiKey);
  if (!games || games.length === 0) throw new Error('No NBA games found for today — lines may not be posted yet.');
  const { lines: gameLines } = await fetchGameLines(apiKey, games.map(g => g.id));
  const allPropsData = [];
  let lastRR = rr0;
  for (const game of games) {
    const { bookmakers, remainingRequests } = await fetchEventProps(apiKey, game.id);
    allPropsData.push({ gameId: game.id, bookmakers });
    if (remainingRequests != null) lastRR = remainingRequests;
    await new Promise(res => setTimeout(res, 150));
  }
  return {
    oddsIndex: buildOddsIndex(allPropsData, selectedBooks),
    gameIndex:  buildGameIndex(games, gameLines),
    remainingRequests: lastRR != null ? parseInt(lastRR) : null,
    gamesCount: games.length,
  };
}

// ── Std Dev Estimation ──────────────────────────────────────────────
const STD_RATIOS = { pts: 0.30, reb: 0.42, ast: 0.40, stl: 0.65, blk: 0.75, threes: 0.52 };

function estimateStdDev(statKey, mean) {
  const m = parseFloat(mean);
  if (isNaN(m) || m <= 0) return 0;
  return Math.round(m * (STD_RATIOS[statKey] || 0.35) * 10) / 10;
}
