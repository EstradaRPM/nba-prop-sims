name: Nightly CV Update

on:
  schedule:
    - cron: '0 22 * * *'  # 6 PM ET (EDT) / 10 PM ET (EST) — laptop likely on
  workflow_dispatch:

jobs:
  update-cv:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install nba_api

      - name: Run compute_cv.py
        run: python scripts/compute_cv.py

      - name: Commit and push cv_data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cv_data.json
          if git diff --staged --quiet; then
            echo "No changes to cv_data.json — skipping commit"
          else
            git commit -m "chore: update cv_data.json (nightly, $(date -u +%Y-%m-%d))"
            git push origin main
          fi
