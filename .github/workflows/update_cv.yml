name: Nightly CV Update

on:
  schedule:
    - cron: '0 11 * * *'  # 6 AM ET (EST) / 7 AM ET (EDT) — all games finalized
  workflow_dispatch:

jobs:
  update-cv:
    runs-on: self-hosted
    permissions:
      contents: write

    env:
      PYTHONUTF8: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install nba_api

      - name: Run compute_cv.py
        run: python scripts/compute_cv.py

      - name: Commit and push cv_data.json
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cv_data.json
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            $date = (Get-Date -AsUTC -Format "yyyy-MM-dd")
            git commit -m "chore: update cv_data.json (nightly, $date)"
            git push origin main
          } else {
            Write-Output "No changes to cv_data.json, skipping commit"
          }
