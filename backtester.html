<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NBA Prop Backtester</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useMemo, useCallback } = React;

// ── Constants ────────────────────────────────────────────────────────
const MONO = "'JetBrains Mono', monospace";
const SANS = "'Outfit', sans-serif";

const C = {
  bg:       '#0b0f1a',
  card:     'rgba(15,23,42,0.6)',
  cardAlt:  'rgba(15,23,42,0.4)',
  border:   'rgba(148,163,184,0.15)',
  borderMd: 'rgba(148,163,184,0.25)',
  muted3:   '#475569',
  muted2:   '#64748b',
  muted1:   '#94a3b8',
  text:     '#e2e8f0',
  textHi:   '#f8fafc',
  green:    '#22c55e',
  greenDim: 'rgba(34,197,94,0.12)',
  greenBdr: 'rgba(34,197,94,0.35)',
  red:      '#ef4444',
  redDim:   'rgba(239,68,68,0.12)',
  redBdr:   'rgba(239,68,68,0.35)',
  amber:    '#f59e0b',
  amberDim: 'rgba(245,158,11,0.12)',
  purple:   '#a78bfa',
  purpleDim:'rgba(167,139,250,0.12)',
  cyan:     '#22d3ee',
};

// ── CSV parsing ───────────────────────────────────────────────────────
// Parses the calibration export CSV produced by handleExportCalibration in index.html.
// Headers: ID, Logged At, Player, Stat, Side, Line, Book Odds, Model Prob%,
//          Fair Odds, Edge%, Edge Label, Kelly Stake $, Unit Stake $, Event ID,
//          Result, Closing Odds, Closing Line, Game Start, Projection, CV%,
//          Dist Model, Games (CV), Game Total, Spread, Other Side Odds, Proj Minutes
function parseCalibrationCSV(raw) {
  const lines = raw.trim().split('\n');
  if (lines.length < 2) throw new Error('CSV must have a header row and at least one data row.');

  // Simple CSV split respecting quoted fields
  const splitRow = line => {
    const out = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; continue; }
      if (ch === ',' && !inQ) { out.push(cur.trim()); cur = ''; continue; }
      cur += ch;
    }
    out.push(cur.trim());
    return out;
  };

  const headers = splitRow(lines[0]).map(h => h.toLowerCase().trim());
  const idx = h => headers.indexOf(h);

  const parseOdds = s => {
    if (!s || s === '' || s === '-') return null;
    const n = parseFloat(s.replace(/[^0-9.\-+]/g, ''));
    return isNaN(n) ? null : n;
  };
  const parseNum = s => { const n = parseFloat(s); return isNaN(n) ? null : n; };

  const bets = [];
  for (let i = 1; i < lines.length; i++) {
    const row = splitRow(lines[i]);
    if (row.length < 3) continue;

    const get = h => (row[idx(h)] ?? '').trim();
    const modelProbPct = parseNum(get('model prob%'));
    const edgePct      = parseNum(get('edge%'));

    bets.push({
      id:              get('id') || `csv_${i}`,
      loggedAt:        get('logged at'),
      player:          get('player'),
      stat:            get('stat').toLowerCase().replace(/\s+/g, '').replace('points','pts').replace('rebounds','reb').replace('assists','ast').replace('steals','stl').replace('blocks','blk').replace('3-pointersmade','threes').replace('threesmade','threes'),
      statLabel:       get('stat'),
      side:            get('side').toUpperCase(),
      propLine:        parseNum(get('line')),
      bookOdds:        parseOdds(get('book odds')),
      otherSideOdds:   parseOdds(get('other side odds')),
      modelProb:       modelProbPct != null ? modelProbPct / 100 : null,
      fairOdds:        parseOdds(get('fair odds')),
      edgePct:         edgePct,
      edgeLabel:       get('edge label'),
      kellyStake:      parseNum(get('kelly stake $')),
      unitStake:       parseNum(get('unit stake $')),
      eventId:         get('event id') || null,
      result:          get('result') || null,
      closingOdds:     parseOdds(get('closing odds')),
      closingLine:     parseNum(get('closing line')),
      commenceTime:    get('game start') || null,
      projection:      parseNum(get('projection')),
      cvValue:         parseNum(get('cv%')),
      distModel:       get('dist model') || null,
      gamesAvailable:  parseNum(get('games (cv)')),
      gameTotal:       parseNum(get('game total')),
      spread:          parseNum(get('spread')),
      projectedMinutes:parseNum(get('proj minutes')),
      _source: 'csv',
    });
  }
  if (bets.length === 0) throw new Error('No valid bet rows found in CSV.');
  return bets;
}

// Parses raw JSON from localStorage (nbaSimCalibration key) — array of bet objects.
function parseCalibrationJSON(raw) {
  const arr = JSON.parse(raw);
  if (!Array.isArray(arr)) throw new Error('Expected a JSON array of bet entries.');
  if (arr.length === 0) throw new Error('Array is empty — no bets to load.');
  // Validate a few required fields on the first entry
  const first = arr[0];
  if (!first.player && !first.stat && !first.side) throw new Error('JSON does not look like a calibration log. Expected fields: player, stat, side.');
  // Normalise result casing
  return arr.map(e => ({ ...e, result: e.result ? e.result.toLowerCase() : null, _source: 'json' }));
}

// ── Strategy Filters (mirrored verbatim from index.html) ─────────────
const STRATEGY_B_FILTER = e => {
  const edge  = e.edgePct ?? e.edge ?? 0;
  const games = e.gamesAvailable ?? 0;
  const odds  = e.bookOdds ?? 0;
  if (games < 36)                               return false;
  if (e.side === 'OVER' && edge < 5)            return false;
  if (e.stat === 'pts'  && edge < 5)            return false;
  if (odds >= 176)                              return false;
  if (odds >= -135 && odds <= -121 && edge < 5) return false;
  return true;
};
const STRATEGY_C_FILTER = e => {
  if (!STRATEGY_B_FILTER(e))                 return false;
  if (e.stat === 'pts')                      return false;
  if (e.side === 'OVER' && e.stat !== 'reb') return false;
  return true;
};
const STRATEGY_D_FILTER = e => {
  if (!STRATEGY_C_FILTER(e))               return false;
  if (e.distModel !== 'NegBin')            return false;
  if ((e.edgePct ?? e.edge ?? 0) < 3)      return false;
  if ((e.bookOdds ?? 0) <= -170)           return false;
  return true;
};

// Human-readable descriptors shown under each preset button
const PRESET_DESCRIPTORS = {
  b: ['games ≥ 36','OVER edge ≥ 5%','PTS edge ≥ 5%','no odds ≥ +176','−135/−121 range gate'],
  c: ['inherits B','no PTS','UNDER only','REB OVER exempt'],
  d: ['inherits C','NegBin only','edge ≥ 3%','no chalk ≤ −170','note: slate caps not applied in backtester'],
};

// ── Custom Filter ─────────────────────────────────────────────────────
const ALL_STATS  = ['pts','reb','ast','stl','blk','threes','pra','pr','pa','ra','sb'];
const STAT_LABEL = { pts:'PTS',reb:'REB',ast:'AST',stl:'STL',blk:'BLK',threes:'3PM',pra:'PRA',pr:'PR',pa:'PA',ra:'RA',sb:'SB' };
const ALL_MODELS = ['KDE+','KDE','LogNormal','NegBin','Poisson','Direct','Summed'];

const makeDefaultCustom = () => ({
  minEdge:    0,
  minGames:   0,
  side:       'both',
  stats:      new Set(ALL_STATS),
  edgeLabels: new Set(['MARGINAL','SOLID','STRONG']),
  distModels: new Set(ALL_MODELS),
  results:    new Set(['won','lost','push','open']),
  oddsMin:    -9999,
  oddsMax:    9999,
  dateFrom:   '',
  dateTo:     '',
});

function applyCustomFilter(e, c) {
  const edge = e.edgePct ?? e.edge ?? 0;
  if (edge < c.minEdge) return false;
  if ((e.gamesAvailable ?? 0) < c.minGames) return false;
  if (c.side !== 'both' && e.side.toLowerCase() !== c.side) return false;
  if (!c.stats.has(e.stat)) return false;
  if (e.edgeLabel && !c.edgeLabels.has(e.edgeLabel)) return false;
  if (e.distModel && !c.distModels.has(e.distModel)) return false;
  const res = e.result ? e.result.toLowerCase() : 'open';
  if (!c.results.has(res)) return false;
  if (e.bookOdds != null && (e.bookOdds < c.oddsMin || e.bookOdds > c.oddsMax)) return false;
  const date = (e.loggedAt || '').slice(0, 10);
  if (c.dateFrom && date < c.dateFrom) return false;
  if (c.dateTo   && date > c.dateTo)   return false;
  return true;
}

function applyFilter(bet, mode, custom) {
  if (mode === 'all')    return true;
  if (mode === 'b')      return STRATEGY_B_FILTER(bet);
  if (mode === 'c')      return STRATEGY_C_FILTER(bet);
  if (mode === 'd')      return STRATEGY_D_FILTER(bet);
  if (mode === 'custom') return applyCustomFilter(bet, custom);
  return true;
}

// ── DataImporter component ────────────────────────────────────────────
function DataImporter({ onImport, importedCount }) {
  const [open,    setOpen]    = useState(true);
  const [mode,    setMode]    = useState('json'); // 'json' | 'csv'
  const [text,    setText]    = useState('');
  const [error,   setError]   = useState(null);
  const [success, setSuccess] = useState(false);

  const handleLoad = useCallback(() => {
    setError(null); setSuccess(false);
    if (!text.trim()) { setError('Paste your data above first.'); return; }
    try {
      const bets = mode === 'csv' ? parseCalibrationCSV(text) : parseCalibrationJSON(text);
      onImport(bets);
      setSuccess(true);
      setText('');
      setOpen(false);
    } catch (e) {
      setError(e.message);
    }
  }, [mode, text, onImport]);

  const tab = active => ({
    padding: '5px 14px', borderRadius: '4px 4px 0 0', cursor: 'pointer',
    fontFamily: MONO, fontSize: 9, fontWeight: 700, letterSpacing: 0.8,
    background: active ? C.card : 'transparent',
    border: active ? `1px solid ${C.border}` : '1px solid transparent',
    borderBottom: active ? `1px solid ${C.card}` : `1px solid ${C.border}`,
    color: active ? C.text : C.muted2,
  });

  return (
    <div style={{ backgroundColor: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 20, marginBottom: 16 }}>
      {/* Header — click to collapse */}
      <div onClick={() => setOpen(o => !o)}
        style={{ display: 'flex', alignItems: 'center', marginBottom: open ? 14 : 0,
          cursor: 'pointer', userSelect: 'none' }}>
        <span style={{ fontFamily: MONO, fontSize: 8, color: C.muted3, marginRight: 6 }}>
          {open ? '▼' : '▶'}
        </span>
        <span style={{ fontFamily: MONO, fontSize: 10, fontWeight: 700, color: C.muted1, letterSpacing: 1.5 }}>
          IMPORT BET LOG
        </span>
        {importedCount > 0 && (
          <span style={{ marginLeft: 10, fontFamily: MONO, fontSize: 9, color: C.green }}>
            ✓ {importedCount} bets loaded
          </span>
        )}
      </div>

      {open && (<>
      {/* Mode tabs */}
      <div style={{ display: 'flex', gap: 4, marginBottom: -1, position: 'relative', zIndex: 1 }}>
        <div style={tab(mode === 'json')} onClick={() => { setMode('json'); setError(null); setSuccess(false); }}>JSON (LOCALSTORAGE)</div>
        <div style={tab(mode === 'csv')}  onClick={() => { setMode('csv');  setError(null); setSuccess(false); }}>CSV EXPORT</div>
      </div>

      <div style={{ border: `1px solid ${C.border}`, borderRadius: '0 8px 8px 8px', padding: 16, background: 'rgba(0,0,0,0.2)' }}>
        {mode === 'json' ? (
          <div style={{ fontSize: 11, color: C.muted2, fontFamily: MONO, marginBottom: 10, lineHeight: 1.6 }}>
            In your browser console on the simulator tab:<br />
            <span style={{ color: C.cyan }}>copy(localStorage.getItem('nbaSimCalibration'))</span><br />
            Then paste the result below.
          </div>
        ) : (
          <div style={{ fontSize: 11, color: C.muted2, fontFamily: MONO, marginBottom: 10, lineHeight: 1.6 }}>
            In the simulator: open Bet Journal → click <span style={{ color: C.cyan }}>EXPORT CSV</span>.<br />
            Paste the clipboard contents below.
          </div>
        )}

        <textarea
          value={text}
          onChange={e => { setText(e.target.value); setError(null); setSuccess(false); }}
          placeholder={mode === 'json' ? '[{"id":"bet_abc123",...}]' : 'ID,Logged At,Player,...'}
          style={{
            width: '100%', minHeight: 100, background: 'rgba(0,0,0,0.35)',
            border: `1px solid ${error ? C.redBdr : C.border}`,
            borderRadius: 6, padding: '8px 10px', color: C.text,
            fontFamily: MONO, fontSize: 10, outline: 'none',
          }}
        />

        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginTop: 10 }}>
          <button
            onClick={handleLoad}
            style={{
              padding: '8px 20px', borderRadius: 6, cursor: 'pointer', fontFamily: MONO,
              fontWeight: 700, fontSize: 10, letterSpacing: 1,
              background: C.greenDim, border: `1px solid ${C.greenBdr}`, color: C.green,
            }}
          >
            LOAD DATA
          </button>
          {error   && <span style={{ fontFamily: MONO, fontSize: 10, color: C.red }}>⚠ {error}</span>}
          {success && <span style={{ fontFamily: MONO, fontSize: 10, color: C.green }}>✓ Imported successfully</span>}
        </div>
      </div>
      </>)}
    </div>
  );
}

// ── BetSummaryStrip ───────────────────────────────────────────────────
function BetSummaryStrip({ bets }) {
  const settled  = bets.filter(b => b.result && b.result !== 'open');
  const open     = bets.filter(b => !b.result || b.result === 'open');
  const won      = settled.filter(b => b.result === 'won').length;
  const lost     = settled.filter(b => b.result === 'lost').length;
  const pushed   = settled.filter(b => b.result === 'push').length;
  const dates    = bets.map(b => (b.loggedAt || b.commenceTime || '').slice(0, 10)).filter(Boolean).sort();
  const dateRange = dates.length ? `${dates[0]} → ${dates[dates.length - 1]}` : '—';

  const chip = (label, value, color = C.muted1) => (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2 }}>
      <span style={{ fontFamily: MONO, fontSize: 16, fontWeight: 700, color }}>{value}</span>
      <span style={{ fontFamily: MONO, fontSize: 9, color: C.muted3, letterSpacing: 0.5 }}>{label}</span>
    </div>
  );

  const divider = <div style={{ width: 1, height: 36, background: C.border }} />;

  return (
    <div style={{
      backgroundColor: C.cardAlt, border: `1px solid ${C.border}`, borderRadius: 10,
      padding: '12px 20px', marginBottom: 16,
      display: 'flex', alignItems: 'center', gap: 20, flexWrap: 'wrap',
    }}>
      {chip('TOTAL BETS',  bets.length,     C.textHi)}
      {divider}
      {chip('SETTLED',     settled.length,  C.muted1)}
      {chip('WON',         won,             C.green)}
      {chip('LOST',        lost,            C.red)}
      {chip('PUSH',        pushed,          C.muted2)}
      {divider}
      {chip('OPEN',        open.length,     C.amber)}
      {divider}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
        <span style={{ fontFamily: MONO, fontSize: 9, color: C.muted3, letterSpacing: 0.5 }}>DATE RANGE</span>
        <span style={{ fontFamily: MONO, fontSize: 11, color: C.muted1 }}>{dateRange}</span>
      </div>
    </div>
  );
}

// ── FilterPanel ───────────────────────────────────────────────────────
function FilterPanel({ mode, setMode, custom, setCustom, total, passing }) {
  const [bodyOpen, setBodyOpen] = useState(true);
  const toggleSet = (field, val) => setCustom(prev => {
    const next = new Set(prev[field]);
    if (next.has(val)) next.delete(val); else next.add(val);
    return { ...prev, [field]: next };
  });

  // Base chip style; callers supply active colors
  const chip = (active, color, borderColor, bgColor) => ({
    padding: '3px 9px', borderRadius: 4, cursor: 'pointer', userSelect: 'none',
    fontFamily: MONO, fontSize: 9, fontWeight: 700, letterSpacing: 0.5,
    background: active ? bgColor  : 'rgba(0,0,0,0.2)',
    border:     `1px solid ${active ? borderColor : C.border}`,
    color:      active ? color    : C.muted3,
  });
  const purpleChip = active => chip(active, C.purple, 'rgba(167,139,250,0.45)', C.purpleDim);

  const RESULT_COLORS = {
    won:  [C.green,  'rgba(34,197,94,0.4)',    C.greenDim],
    lost: [C.red,    'rgba(239,68,68,0.4)',     C.redDim],
    push: [C.muted1, 'rgba(148,163,184,0.3)',   'rgba(148,163,184,0.08)'],
    open: [C.amber,  'rgba(245,158,11,0.4)',    C.amberDim],
  };

  const fieldLabel = s => (
    <div style={{ fontFamily: MONO, fontSize: 9, color: C.muted3, letterSpacing: 0.5, marginBottom: 5 }}>{s}</div>
  );
  const smallInput = (val, onChange, opts = {}) => (
    <input type={opts.type || 'number'} value={val} onChange={e => onChange(e.target.value)}
      placeholder={opts.placeholder} min={opts.min} step={opts.step}
      style={{ width: opts.width || 64, background: 'rgba(0,0,0,0.3)',
        border: `1px solid ${C.border}`, borderRadius: 4,
        color: C.text, fontFamily: MONO, fontSize: 10, padding: '4px 7px', outline: 'none',
        colorScheme: 'dark' }} />
  );

  return (
    <div style={{ backgroundColor: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 18, marginBottom: 12 }}>
      {/* Header — click to collapse */}
      <div onClick={() => setBodyOpen(o => !o)}
        style={{ display: 'flex', alignItems: 'center', marginBottom: bodyOpen ? 12 : 0,
          cursor: 'pointer', userSelect: 'none' }}>
        <span style={{ fontFamily: MONO, fontSize: 8, color: C.muted3, marginRight: 6 }}>
          {bodyOpen ? '▼' : '▶'}
        </span>
        <span style={{ fontFamily: MONO, fontSize: 10, fontWeight: 700, color: C.muted1, letterSpacing: 1.5 }}>FILTER</span>
        <span style={{ marginLeft: 'auto', fontFamily: MONO, fontSize: 12, fontWeight: 700,
          color: passing < total ? C.purple : C.muted2 }}>
          {passing} <span style={{ fontSize: 10, color: C.muted3 }}>/ {total} bets pass</span>
        </span>
      </div>

      {bodyOpen && (<>
      {/* Preset pills */}
      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 10 }}>
        {[['all','ALL'],['b','STRATEGY B'],['c','STRATEGY C'],['d','STRATEGY D'],['custom','CUSTOM ▾']].map(([key, label]) => (
          <div key={key} onClick={() => setMode(key)} style={purpleChip(mode === key)}>
            {label}
          </div>
        ))}
      </div>

      {/* Preset descriptor chips */}
      {PRESET_DESCRIPTORS[mode] && (
        <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap', paddingBottom: 10,
          borderBottom: `1px solid ${C.border}`, marginBottom: 12 }}>
          {PRESET_DESCRIPTORS[mode].map((d, i) => (
            <span key={i} style={{ fontFamily: MONO, fontSize: 9, color: C.muted2,
              background: 'rgba(148,163,184,0.07)', border: `1px solid ${C.border}`,
              borderRadius: 3, padding: '2px 6px' }}>{d}</span>
          ))}
        </div>
      )}

      {/* Custom controls — only visible in custom mode */}
      {mode === 'custom' && (
        <div>
          {/* Row 1: numeric gates + date range */}
          <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', marginBottom: 12 }}>
            <div>
              {fieldLabel('MIN EDGE %')}
              {smallInput(custom.minEdge, v => setCustom(p => ({ ...p, minEdge: parseFloat(v) || 0 })),
                { min: 0, step: 0.5, width: 60 })}
            </div>
            <div>
              {fieldLabel('MIN CV GAMES')}
              {smallInput(custom.minGames, v => setCustom(p => ({ ...p, minGames: parseInt(v) || 0 })),
                { min: 0, step: 1, width: 60 })}
            </div>
            <div>
              {fieldLabel('BOOK ODDS')}
              <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
                {smallInput(custom.oddsMin === -9999 ? '' : custom.oddsMin,
                  v => setCustom(p => ({ ...p, oddsMin: v === '' ? -9999 : parseFloat(v) || -9999 })),
                  { placeholder: 'min', width: 56 })}
                <span style={{ color: C.muted3, fontFamily: MONO, fontSize: 9 }}>–</span>
                {smallInput(custom.oddsMax === 9999 ? '' : custom.oddsMax,
                  v => setCustom(p => ({ ...p, oddsMax: v === '' ? 9999 : parseFloat(v) || 9999 })),
                  { placeholder: 'max', width: 56 })}
              </div>
            </div>
            <div>
              {fieldLabel('DATE RANGE')}
              <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
                {smallInput(custom.dateFrom, v => setCustom(p => ({ ...p, dateFrom: v })),
                  { type: 'date', width: 130 })}
                <span style={{ color: C.muted3, fontFamily: MONO, fontSize: 9 }}>→</span>
                {smallInput(custom.dateTo, v => setCustom(p => ({ ...p, dateTo: v })),
                  { type: 'date', width: 130 })}
              </div>
            </div>
          </div>

          {/* Side */}
          <div style={{ marginBottom: 10 }}>
            {fieldLabel('SIDE')}
            <div style={{ display: 'flex', gap: 5 }}>
              {['over','both','under'].map(s => (
                <div key={s} onClick={() => setCustom(p => ({ ...p, side: s }))} style={purpleChip(custom.side === s)}>
                  {s.toUpperCase()}
                </div>
              ))}
            </div>
          </div>

          {/* Stats */}
          <div style={{ marginBottom: 10 }}>
            <div style={{ display: 'flex', gap: 6, alignItems: 'center', marginBottom: 5 }}>
              {fieldLabel('STATS')}
              <div onClick={() => setCustom(p => ({ ...p, stats: new Set(ALL_STATS) }))}
                style={{ ...purpleChip(false), padding: '2px 7px', fontSize: 8 }}>ALL</div>
              <div onClick={() => setCustom(p => ({ ...p, stats: new Set() }))}
                style={{ ...purpleChip(false), padding: '2px 7px', fontSize: 8 }}>NONE</div>
            </div>

// ── BetTable utilities ────────────────────────────────────────────────
function calcPnL(bet) {
  if (!bet.result || bet.result === 'open') return null;
  if (bet.result === 'push') return 0;
  const odds = bet.bookOdds;
  if (bet.result === 'won') return odds > 0 ? odds / 100 : 100 / (-odds);
  if (bet.result === 'lost') return -1;
  return null;
}

function edgeColor(edge) {
  if (edge >= 5)   return '#22c55e';
  if (edge >= 3)   return '#4ade80';
  if (edge >= 1.5) return '#86efac';
  return '#ef4444';
}

function fmtOdds(o) {
  if (o == null) return '—';
  return o > 0 ? `+${o}` : String(o);
}

// ── BetTable ──────────────────────────────────────────────────────────
const PAGE_SIZE = 50;

const COLUMNS = [
  { key: 'loggedAt',       label: 'DATE',   width: '80px',   align: 'left'   },
  { key: 'player',         label: 'PLAYER', width: '1fr',    align: 'left'   },
  { key: 'stat',           label: 'STAT',   width: '40px',   align: 'center' },
  { key: 'side',           label: 'SIDE',   width: '50px',   align: 'center' },
  { key: 'propLine',       label: 'LINE',   width: '42px',   align: 'right'  },
  { key: 'bookOdds',       label: 'ODDS',   width: '50px',   align: 'right'  },
  { key: 'modelProb',      label: 'MDL%',   width: '46px',   align: 'right'  },
  { key: 'edgePct',        label: 'EDGE',   width: '46px',   align: 'right'  },
  { key: 'distModel',      label: 'DIST',   width: '58px',   align: 'center' },
  { key: 'gamesAvailable', label: 'CV N',   width: '38px',   align: 'right'  },
  { key: 'result',         label: 'RESULT', width: '52px',   align: 'center' },
  { key: '_pnl',           label: 'P/L u',  width: '54px',   align: 'right'  },
];

const GRID = COLUMNS.map(c => c.width).join(' ');

function sortValue(bet, key) {
  if (key === '_pnl') return calcPnL(bet) ?? -Infinity;
  const v = bet[key];
  if (v == null) return key === 'loggedAt' ? '' : -Infinity;
  return v;
}

function BetTable({ bets }) {
  const [open,      setOpen]      = useState(true);
  const [sortField, setSortField] = useState('loggedAt');
  const [sortDir,   setSortDir]   = useState('desc');
  const [page,      setPage]      = useState(0);

  // Reset to page 0 whenever the bet list changes
  React.useEffect(() => { setPage(0); }, [bets]);

  const sorted = useMemo(() => {
    return [...bets].sort((a, b) => {
      const va = sortValue(a, sortField);
      const vb = sortValue(b, sortField);
      if (va === vb) return 0;
      const cmp = va < vb ? -1 : 1;
      return sortDir === 'asc' ? cmp : -cmp;
    });
  }, [bets, sortField, sortDir]);

  const totalPages = Math.ceil(sorted.length / PAGE_SIZE);
  const pageSlice  = sorted.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);

  const handleSort = key => {
    if (key === sortField) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortField(key); setSortDir('desc'); }
    setPage(0);
  };

  // ── Cell renderers ──
  const renderCell = (bet, key, idx) => {
    switch (key) {
      case 'loggedAt': {
        const d = (bet.loggedAt || bet.commenceTime || '').slice(0, 10);
        const parts = d.split('-');
        return parts.length === 3 ? `${parts[1]}/${parts[2]}` : d || '—';
      }
      case 'player':
        return <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
          display: 'block', maxWidth: '100%' }}>{bet.player || '—'}</span>;
      case 'stat':
        return STAT_LABEL[bet.stat] ?? bet.stat ?? '—';
      case 'side': {
        const isOver = bet.side === 'OVER';
        return (
          <span style={{
            background: isOver ? 'rgba(34,197,94,0.12)' : 'rgba(99,102,241,0.12)',
            color:      isOver ? '#4ade80' : '#a5b4fc',
            border:     `1px solid ${isOver ? 'rgba(34,197,94,0.3)' : 'rgba(99,102,241,0.3)'}`,
            borderRadius: 3, padding: '1px 5px', fontSize: 8, fontWeight: 700, letterSpacing: 0.4,
          }}>{bet.side}</span>
        );
      }
      case 'propLine':
        return bet.propLine ?? '—';
      case 'bookOdds':
        return <span style={{ color: C.muted1 }}>{fmtOdds(bet.bookOdds)}</span>;
      case 'modelProb':
        return bet.modelProb != null
          ? <span style={{ color: C.muted1 }}>{(bet.modelProb * 100).toFixed(1)}</span>
          : '—';
      case 'edgePct':
        return bet.edgePct != null
          ? <span style={{ color: edgeColor(bet.edgePct), fontWeight: 700 }}>
              {bet.edgePct > 0 ? '+' : ''}{bet.edgePct.toFixed(1)}
            </span>
          : '—';
      case 'distModel':
        return bet.distModel
          ? <span style={{ fontSize: 8, color: C.muted2, background: 'rgba(148,163,184,0.08)',
              border: `1px solid ${C.border}`, borderRadius: 3, padding: '1px 4px' }}>
              {bet.distModel}
            </span>
          : '—';
      case 'gamesAvailable':
        return bet.gamesAvailable != null
          ? <span style={{ color: bet.gamesAvailable >= 36 ? C.muted1 : C.muted3 }}>{bet.gamesAvailable}</span>
          : '—';
      case 'result': {
        const r = bet.result || 'open';
        const cfg = {
          won:  { bg: 'rgba(34,197,94,0.12)',   border: 'rgba(34,197,94,0.35)',   color: C.green,  label: 'WON'  },
          lost: { bg: 'rgba(239,68,68,0.12)',   border: 'rgba(239,68,68,0.35)',   color: C.red,    label: 'LOST' },
          push: { bg: 'rgba(148,163,184,0.08)', border: 'rgba(148,163,184,0.25)', color: C.muted1, label: 'PUSH' },
          open: { bg: 'rgba(245,158,11,0.10)',  border: 'rgba(245,158,11,0.35)',  color: C.amber,  label: 'OPEN' },
        }[r] ?? { bg: 'transparent', border: C.border, color: C.muted2, label: r.toUpperCase() };
        return <span style={{ fontSize: 8, fontWeight: 700, letterSpacing: 0.4,
          background: cfg.bg, border: `1px solid ${cfg.border}`, color: cfg.color,
          borderRadius: 3, padding: '1px 5px' }}>{cfg.label}</span>;
      }
      case '_pnl': {
        const pnl = calcPnL(bet);
        if (pnl === null) return <span style={{ color: C.muted3 }}>—</span>;
        const sign = pnl > 0 ? '+' : '';
        const color = pnl > 0 ? C.green : pnl < 0 ? C.red : C.muted2;
        const dollarPart = bet.unitStake != null
          ? <span style={{ fontSize: 8, color: C.muted3, marginLeft: 2 }}>
              ({pnl >= 0 ? '+' : ''}${(pnl * bet.unitStake).toFixed(0)})
            </span>
          : null;
        return <span style={{ color, fontWeight: 700 }}>{sign}{pnl.toFixed(2)}u{dollarPart}</span>;
      }
      default: return '—';
    }
  };

  const sectionHeader = (
    <div onClick={() => setOpen(o => !o)}
      style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '9px 16px',
        borderBottom: open ? `1px solid ${C.border}` : 'none',
        cursor: 'pointer', userSelect: 'none', background: 'rgba(255,255,255,0.01)' }}>
      <span style={{ fontFamily: MONO, fontSize: 8, color: C.muted3, width: 8, flexShrink: 0 }}>
        {open ? '▼' : '▶'}
      </span>
      <span style={{ fontFamily: MONO, fontSize: 9, fontWeight: 700, letterSpacing: 1,
        color: C.muted1, flex: 1 }}>BET TABLE</span>
      <span style={{ fontFamily: MONO, fontSize: 8, color: C.muted3 }}>{bets.length} bets</span>
    </div>
  );

  if (bets.length === 0) {
    return (
      <div style={{ backgroundColor: C.card, border: `1px solid ${C.border}`, borderRadius: 12,
        marginBottom: 12, overflow: 'hidden' }}>
        {sectionHeader}
        {open && (
          <div style={{ padding: 40, textAlign: 'center' }}>
            <span style={{ fontFamily: MONO, fontSize: 11, color: C.muted3 }}>
              No bets match the current filter.
            </span>
          </div>
        )}
      </div>
    );
  }

  return (
    <div style={{ backgroundColor: C.card, border: `1px solid ${C.border}`, borderRadius: 12,
      marginBottom: 12, overflow: 'hidden' }}>
      {sectionHeader}

      {open && (<>
      {/* Table header */}
      <div style={{ display: 'grid', gridTemplateColumns: GRID, gap: 0,
        borderBottom: `1px solid ${C.border}`, padding: '0 12px' }}>
        {COLUMNS.map(col => (
          <div key={col.key} onClick={() => handleSort(col.key)}
            style={{ padding: '9px 4px', fontFamily: MONO, fontSize: 8, fontWeight: 700,
              letterSpacing: 0.8, color: sortField === col.key ? C.purple : C.muted3,
              textAlign: col.align, cursor: 'pointer', userSelect: 'none',
              display: 'flex', alignItems: 'center',
              justifyContent: col.align === 'right' ? 'flex-end' : col.align === 'center' ? 'center' : 'flex-start',
              gap: 3, whiteSpace: 'nowrap' }}>
            {col.label}
            {sortField === col.key && (
              <span style={{ fontSize: 7 }}>{sortDir === 'asc' ? '▲' : '▼'}</span>
            )}
          </div>
        ))}
      </div>

      {/* Rows */}
      <div>
        {pageSlice.map((bet, idx) => (
          <div key={bet.id || idx}
            style={{ display: 'grid', gridTemplateColumns: GRID, gap: 0,
              padding: '0 12px',
              background: idx % 2 === 1 ? 'rgba(255,255,255,0.015)' : 'transparent',
              borderBottom: `1px solid rgba(148,163,184,0.06)` }}>
            {COLUMNS.map(col => (
              <div key={col.key}
                style={{ padding: '7px 4px', fontFamily: MONO, fontSize: 10,
                  color: C.muted1, textAlign: col.align, overflow: 'hidden',
                  display: 'flex', alignItems: 'center',
                  justifyContent: col.align === 'right' ? 'flex-end' : col.align === 'center' ? 'center' : 'flex-start' }}>
                {renderCell(bet, col.key, idx)}
              </div>
            ))}
          </div>
        ))}
      </div>

      {/* Pagination */}
      {totalPages > 1 && (
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center',
          gap: 16, padding: '10px 16px', borderTop: `1px solid ${C.border}` }}>
          <button onClick={() => setPage(p => Math.max(0, p - 1))} disabled={page === 0}
            style={{ background: 'none', border: `1px solid ${C.border}`, borderRadius: 4,
              color: page === 0 ? C.muted3 : C.muted1, fontFamily: MONO, fontSize: 9,
              padding: '4px 10px', cursor: page === 0 ? 'default' : 'pointer' }}>◀</button>
          <span style={{ fontFamily: MONO, fontSize: 9, color: C.muted2 }}>
            {page * PAGE_SIZE + 1}–{Math.min((page + 1) * PAGE_SIZE, sorted.length)} of {sorted.length}
          </span>
          <button onClick={() => setPage(p => Math.min(totalPages - 1, p + 1))} disabled={page >= totalPages - 1}
            style={{ background: 'none', border: `1px solid ${C.border}`, borderRadius: 4,
              color: page >= totalPages - 1 ? C.muted3 : C.muted1, fontFamily: MONO, fontSize: 9,
              padding: '4px 10px', cursor: page >= totalPages - 1 ? 'default' : 'pointer' }}>▶</button>
        </div>
      )}
      </>)}
    </div>
  );
}

// ── Analysis Dashboard utilities ─────────────────────────────────────
function computeStats(bets) {
  const settled = bets.filter(b => b.result && b.result !== 'open');
  const won     = settled.filter(b => b.result === 'won').length;
  const lost    = settled.filter(b => b.result === 'lost').length;
  const push    = settled.filter(b => b.result === 'push').length;
  const open    = bets.filter(b => !b.result || b.result === 'open').length;
  const totalPnl = settled.reduce((s, b) => s + (calcPnL(b) ?? 0), 0);
  const roi     = settled.length > 0 ? (totalPnl / settled.length) * 100 : null;
  const winPct  = settled.length > 0 ? (won / settled.length) * 100 : null;
  return { n: bets.length, settled: settled.length, won, lost, push, open, totalPnl, roi, winPct };
}

              textAlign: 'right', fontWeight: 700 }}>
              {s.roi != null ? `${s.roi >= 0 ? '+' : ''}${s.roi.toFixed(1)}%` : '—'}

}

// ── CalibrationChart ──────────────────────────────────────────────────
function CalibrationChart({ buckets }) {
  return (
    <div style={{ backgroundColor: 'rgba(15,23,42,0.5)', border: `1px solid ${C.border}`,
      borderRadius: 10, overflow: 'hidden' }}>
      <div style={{ padding: '7px 12px', borderBottom: `1px solid ${C.border}`,
        background: 'rgba(167,139,250,0.06)', display: 'flex', alignItems: 'center',
        justifyContent: 'space-between' }}>
        <span style={{ fontFamily: MONO, fontSize: 8.5, fontWeight: 700, letterSpacing: 1,
          color: C.purple }}>CALIBRATION CURVE</span>
        <span style={{ fontFamily: MONO, fontSize: 7.5, color: C.muted3 }}>
          model prob vs actual hit rate · white tick = expected midpoint
        </span>
      </div>
      <div style={{ padding: '12px 16px' }}>
        {buckets.map((b, i) => {
          const hitPct = b.hitRate != null ? b.hitRate * 100 : null;
          const diff   = hitPct != null ? hitPct - b.midpoint : null;
          const color  = hitPct != null ? (hitPct >= b.midpoint ? C.green : C.red) : C.muted3;
          const label  = b.lo === 0 ? `< ${b.hi}%` : b.hi === 100 ? `≥ ${b.lo}%` : `${b.lo}–${b.hi}%`;
          return (
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 7 }}>
              <div style={{ width: 58, fontFamily: MONO, fontSize: 8.5, color: C.muted2,
                flexShrink: 0 }}>{label}</div>
              <div style={{ flex: 1, height: 16, background: 'rgba(148,163,184,0.07)',
                borderRadius: 2, position: 'relative', minWidth: 60 }}>
                {hitPct != null && (
                  <div style={{ width: `${Math.min(100, hitPct)}%`, height: '100%',
                    background: `${color}40`, borderRadius: 2 }} />
                )}
                <div style={{ position: 'absolute', top: 0, bottom: 0,
                  left: `${b.midpoint}%`, width: 1, background: 'rgba(255,255,255,0.3)' }} />
              </div>
              <div style={{ width: 32, fontFamily: MONO, fontSize: 8, color: C.muted3,
                textAlign: 'right', flexShrink: 0 }}>n={b.n}</div>
              <div style={{ width: 46, fontFamily: MONO, fontSize: 9, color,
                fontWeight: 700, textAlign: 'right', flexShrink: 0 }}>
                {hitPct != null ? `${hitPct.toFixed(1)}%` : '—'}
              </div>
              <div style={{ width: 46, fontFamily: MONO, fontSize: 8, textAlign: 'right',
                flexShrink: 0,
                color: diff != null ? (diff >= 0 ? C.green : C.red) : C.muted3 }}>
                {diff != null ? `${diff >= 0 ? '+' : ''}${diff.toFixed(1)}pp` : ''}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── AnalysisDashboard ─────────────────────────────────────────────────
function AnalysisDashboard({ bets, filterLabel = 'ALL BETS' }) {
  const [open,   setOpen]   = useState(true);
  const [copied, setCopied] = useState(false);

  if (!bets.length) {
    return (
      <div style={{ backgroundColor: C.card, border: `1px solid ${C.border}`, borderRadius: 12,
        padding: 40, textAlign: 'center', marginBottom: 12 }}>
        <span style={{ fontFamily: MONO, fontSize: 11, color: C.muted3 }}>
          Import data to see analysis.
        </span>
      </div>
    );
  }

  const overall = computeStats(bets);

  const statKeys = ['pts','reb','ast','stl','blk','threes','pra','pr','pa','ra','sb'];
  const byStat = statKeys
    .map(k => ({ label: STAT_LABEL[k] || k, stats: computeStats(bets.filter(b => b.stat === k)) }))
    .filter(r => r.stats.n > 0);

  const bySide = ['OVER','UNDER']
    .map(s => ({ label: s, stats: computeStats(bets.filter(b => b.side === s)) }))
    .filter(r => r.stats.n > 0);

  const byCv = [
    { label: '< 20',  fn: b => (b.gamesAvailable ?? 0) < 20 },
    { label: '20–35', fn: b => { const g = b.gamesAvailable ?? 0; return g >= 20 && g < 36; } },
    { label: '36+',   fn: b => (b.gamesAvailable ?? 0) >= 36 },
    { label: 'N/A',   fn: b => b.gamesAvailable == null },
  ].map(({ label, fn }) => ({ label, stats: computeStats(bets.filter(fn)) }))
   .filter(r => r.stats.n > 0);

  const byEdge = ['MARGINAL','SOLID','STRONG']
    .map(e => ({ label: e, stats: computeStats(bets.filter(b => b.edgeLabel === e)) }))
    .filter(r => r.stats.n > 0);

  const distModels = [...new Set(bets.map(b => b.distModel).filter(Boolean))].sort();
  const byDist = distModels.map(m => ({ label: m, stats: computeStats(bets.filter(b => b.distModel === m)) }));

  const ODDS_RANGES = [
    { label: '≤ -175',    fn: b => b.bookOdds != null && b.bookOdds <= -175 },
    { label: '-174→-136', fn: b => b.bookOdds != null && b.bookOdds > -175 && b.bookOdds <= -136 },
    { label: '-135→-106', fn: b => b.bookOdds != null && b.bookOdds > -136 && b.bookOdds <= -106 },
    { label: '-105→+100', fn: b => b.bookOdds != null && b.bookOdds > -106 && b.bookOdds <= 100 },
    { label: '+101→+175', fn: b => b.bookOdds != null && b.bookOdds > 100 && b.bookOdds <= 175 },
    { label: '≥ +176',    fn: b => b.bookOdds != null && b.bookOdds >= 176 },
  ];
  const byOdds = ODDS_RANGES
    .map(({ label, fn }) => ({ label, stats: computeStats(bets.filter(fn)) }))
    .filter(r => r.stats.n > 0);

  const CAL_BUCKETS = [[0,40],[40,45],[45,50],[50,55],[55,60],[60,65],[65,70],[70,100]];
  const calBuckets = CAL_BUCKETS.map(([lo, hi]) => {
    const inBucket = bets.filter(b => {
      const p = (b.modelProb ?? 0) * 100;
      return p >= lo && (hi === 100 ? p <= 100 : p < hi);
    });
    const settled = inBucket.filter(b => b.result && b.result !== 'open');
    const won = settled.filter(b => b.result === 'won').length;
    return { lo, hi, n: settled.length,
      hitRate: settled.length > 0 ? won / settled.length : null,
      midpoint: (lo + hi) / 2 };
  }).filter(b => b.n > 0);

  const winColor = overall.winPct == null ? C.muted2
    : overall.winPct >= 55 ? C.green : overall.winPct >= 52 ? '#86efac'
    : overall.winPct >= 48 ? C.amber : C.red;
  const roiColor = overall.roi == null ? C.muted2 : overall.roi >= 0 ? C.green : C.red;

  const chip = (label, value, color) => (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 3, alignItems: 'center' }}>
      <span style={{ fontFamily: MONO, fontSize: 18, fontWeight: 700, color }}>{value}</span>
      <span style={{ fontFamily: MONO, fontSize: 7.5, color: C.muted3, letterSpacing: 0.7 }}>{label}</span>
    </div>
  );
  const vdiv = <div style={{ width: 1, height: 36, background: C.border }} />;

  const fmt = (s, n = 10) => String(s).padEnd(n);
  const fmtRow = ({ label, stats: s }) =>
    `  ${fmt(label, 9)} N=${String(s.settled).padStart(4)}  ` +
    `Win%=${s.winPct != null ? s.winPct.toFixed(1).padStart(5) + '%' : '   —  '}`  +
    `  ROI=${s.roi != null ? (s.roi >= 0 ? '+' : '') + s.roi.toFixed(1) + '%' : '  —  '}`   +
    `  P/L=${s.settled > 0 ? (s.totalPnl >= 0 ? '+' : '') + s.totalPnl.toFixed(2) + 'u' : '—'}`;

  const buildExportText = () => {
    const dates = bets.map(b => (b.loggedAt || '').slice(0, 10)).filter(Boolean).sort();
    const dateRange = dates.length ? `${dates[0]} → ${dates[dates.length - 1]}` : '—';
    const lines = [
      'NBA PROP BACKTESTER ANALYSIS',
      `Generated : ${new Date().toISOString().slice(0, 16).replace('T', ' ')}`,
      `Filter    : ${filterLabel}`,
      `Bets      : ${bets.length} total · ${overall.settled} settled · ${overall.open} open`,
      `Date range: ${dateRange}`,
      '',
      '═══ OVERALL ═══',
      `Win%: ${overall.winPct != null ? overall.winPct.toFixed(1) + '%' : '—'}  |  ` +
        `1U ROI: ${overall.roi != null ? (overall.roi >= 0 ? '+' : '') + overall.roi.toFixed(1) + '%' : '—'}  |  ` +
        `P/L: ${overall.settled > 0 ? (overall.totalPnl >= 0 ? '+' : '') + overall.totalPnl.toFixed(2) + 'u' : '—'}`,
      `Won: ${overall.won}  Lost: ${overall.lost}  Push: ${overall.push}  Open: ${overall.open}`,
      '',
      '═══ BY STAT ═══',
      ...byStat.map(fmtRow),
      '',
      '═══ BY SIDE ═══',
      ...bySide.map(fmtRow),
      '',
      '═══ BY CV GAMES ═══',
      ...byCv.map(fmtRow),
      '',
      '═══ BY EDGE LABEL ═══',
      ...byEdge.map(fmtRow),
      '',
      '═══ BY DIST MODEL ═══',
      ...byDist.map(fmtRow),
      '',
      '═══ BY BOOK ODDS ═══',
      ...byOdds.map(fmtRow),
      '',
      '═══ CALIBRATION ═══',
      '  Bucket    n     Expected  Actual    Diff',
      ...calBuckets.map(b => {
        const hitPct  = b.hitRate != null ? (b.hitRate * 100).toFixed(1) + '%' : '—';
        const diffStr = b.hitRate != null
          ? (b.hitRate * 100 - b.midpoint >= 0 ? '+' : '') + (b.hitRate * 100 - b.midpoint).toFixed(1) + 'pp'
          : '—';
        const lbl = b.lo === 0 ? `< ${b.hi}%` : b.hi === 100 ? `≥ ${b.lo}%` : `${b.lo}–${b.hi}%`;
        return `  ${fmt(lbl, 9)} n=${String(b.n).padStart(3)}   ${String(b.midpoint + '%').padEnd(9)} ${hitPct.padEnd(9)} ${diffStr}`;
      }),
    ];
    return lines.join('\n');
  };

  const handleCopy = () => {
    navigator.clipboard.writeText(buildExportText()).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  return (
    <div style={{ backgroundColor: C.card, border: `1px solid ${C.border}`, borderRadius: 12,
      marginBottom: 12, overflow: 'hidden' }}>
      {/* Header — click chevron area to collapse; export button stops propagation */}
      <div style={{ padding: '10px 16px', borderBottom: open ? `1px solid ${C.border}` : 'none',
        display: 'flex', alignItems: 'center', gap: 8,
        background: 'rgba(167,139,250,0.04)', cursor: 'pointer', userSelect: 'none' }}
        onClick={() => setOpen(o => !o)}>
        <span style={{ fontFamily: MONO, fontSize: 8, color: C.muted3, flexShrink: 0 }}>
          {open ? '▼' : '▶'}
        </span>
        <span style={{ fontFamily: MONO, fontSize: 10, fontWeight: 700, letterSpacing: 1,
          color: C.purple, flex: 1 }}>ANALYSIS DASHBOARD</span>
        <span style={{ fontFamily: MONO, fontSize: 8, color: C.muted3 }}>
          {bets.length} bets · {overall.settled} settled
        </span>
        <button onClick={e => { e.stopPropagation(); handleCopy(); }}
          style={{ marginLeft: 8, padding: '4px 10px', borderRadius: 4, cursor: 'pointer',
            fontFamily: MONO, fontSize: 8, fontWeight: 700, letterSpacing: 0.5,
            background: copied ? C.greenDim : 'rgba(167,139,250,0.12)',
            border: `1px solid ${copied ? C.greenBdr : 'rgba(167,139,250,0.4)'}`,
            color: copied ? C.green : C.purple, flexShrink: 0 }}>
          {copied ? '✓ COPIED' : 'COPY ANALYSIS'}
        </button>
      </div>

      {open && (<>
      {/* KPI strip */}
      <div style={{ display: 'flex', gap: 24, flexWrap: 'wrap', padding: '14px 20px',
        borderBottom: `1px solid ${C.border}`, alignItems: 'center' }}>
        {chip('SETTLED',   overall.settled, C.textHi)}
        {vdiv}
        {chip('WIN%',
          overall.winPct != null ? `${overall.winPct.toFixed(1)}%` : '—', winColor)}
        {chip('1U ROI',
          overall.roi != null ? `${overall.roi >= 0 ? '+' : ''}${overall.roi.toFixed(1)}%` : '—',
          roiColor)}
        {chip('P/L UNITS',
          overall.settled > 0 ? `${overall.totalPnl >= 0 ? '+' : ''}${overall.totalPnl.toFixed(2)}u` : '—',
          overall.totalPnl >= 0 ? C.green : C.red)}
        {vdiv}
        {chip('WON / LOST', `${overall.won} / ${overall.lost}`, C.muted1)}
        {chip('PUSH',  overall.push, C.muted2)}
        {chip('OPEN',  overall.open, C.amber)}
      </div>

      <div style={{ padding: 12, display: 'flex', flexDirection: 'column', gap: 12 }}>
        {/* Row 1: By Stat + (By Side + By CV Games stacked) */}
        <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'flex-start' }}>
          <div style={{ flex: '2 1 280px' }}>
            <BreakdownTable title="BY STAT" rows={byStat} />
          </div>
          <div style={{ flex: '1 1 200px', display: 'flex', flexDirection: 'column', gap: 12 }}>
            <BreakdownTable title="BY SIDE"     rows={bySide} />
            <BreakdownTable title="BY CV GAMES" rows={byCv} />
          </div>
        </div>

        {/* Row 2: Edge Label + Dist Model + Odds Bucket */}
        <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'flex-start' }}>
          <BreakdownTable title="BY EDGE LABEL" rows={byEdge} />
          <BreakdownTable title="BY MODEL"      rows={byDist} />
          <BreakdownTable title="BY BOOK ODDS"  rows={byOdds} />
        </div>

        {/* Calibration curve */}
        {calBuckets.length > 0 && <CalibrationChart buckets={calBuckets} />}
      </div>
      </>)}
    </div>
  );
}

// ── Root App ──────────────────────────────────────────────────────────
function Backtester() {
  const [allBets,      setAllBets]      = useState([]);
  const [filterMode,   setFilterMode]   = useState('all');
  const [customFilters,setCustomFilters]= useState(() => makeDefaultCustom());

  const filteredBets = useMemo(
    () => allBets.filter(b => applyFilter(b, filterMode, customFilters)),
    [allBets, filterMode, customFilters]
  );

  const handleImport = useCallback(bets => {
    setAllBets(prev => {
      const map = new Map(prev.map(b => [b.id, b]));
      bets.forEach(b => map.set(b.id, b));
      return Array.from(map.values()).sort((a, b) => (b.loggedAt || '') > (a.loggedAt || '') ? 1 : -1);
    });
  }, []);

  const handleClear = useCallback(() => {
    if (window.confirm('Clear all imported bets?')) { setAllBets([]); setFilterMode('all'); }
  }, []);

  return (
    <div style={{ minHeight: '100vh', background: 'linear-gradient(180deg, #0b0f1a 0%, #111827 100%)' }}>
      <div style={{ maxWidth: 900, margin: '0 auto', padding: '24px 16px 80px' }}>

        {/* Header */}
        <div style={{ marginBottom: 28, paddingTop: 8 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 4 }}>
            <div style={{ width: 8, height: 8, borderRadius: '50%', background: 'linear-gradient(135deg, #a78bfa, #7c3aed)', boxShadow: '0 0 8px rgba(167,139,250,0.5)' }} />
            <span style={{ fontSize: 11, fontWeight: 600, color: C.purple, letterSpacing: 2, fontFamily: MONO }}>BACKTESTER</span>
            <a href="index.html" style={{ marginLeft: 'auto', fontSize: 10, color: C.muted2, fontFamily: MONO,
              textDecoration: 'none', border: `1px solid ${C.border}`, borderRadius: 4, padding: '3px 8px' }}>
              ← SIMULATOR
            </a>
          </div>
          <h1 style={{ fontSize: 26, fontWeight: 800, margin: 0, letterSpacing: -0.5,
            background: 'linear-gradient(135deg, #f8fafc, #94a3b8)',
            WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>
            NBA Prop Backtester
          </h1>
          <p style={{ color: C.muted3, fontSize: 13, margin: '6px 0 0' }}>
            Import your bet log · apply updated filters · see what P/L would have been
          </p>
        </div>

        {/* Import */}
        <DataImporter onImport={handleImport} importedCount={allBets.length} />

        {/* Content — only shown once bets are loaded */}
        {allBets.length > 0 && (
          <>
            <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 8 }}>
              <button onClick={handleClear}
                style={{ background: 'none', border: `1px solid ${C.border}`, borderRadius: 4,
                  color: C.muted2, fontFamily: MONO, fontSize: 9, padding: '4px 10px',
                  cursor: 'pointer', letterSpacing: 0.5 }}>
                CLEAR ALL
              </button>
            </div>

            {/* Filter Panel */}
            <FilterPanel
              mode={filterMode}
              setMode={setFilterMode}
              custom={customFilters}
              setCustom={setCustomFilters}
              total={allBets.length}
              passing={filteredBets.length}
            />

            {/* Summary strip — shows filtered bets */}
            <BetSummaryStrip bets={filteredBets} />

            {/* Bet Table */}
            <BetTable bets={filteredBets} />

            {/* Analysis Dashboard */}
            <AnalysisDashboard bets={filteredBets} filterLabel={
              filterMode === 'all' ? 'ALL BETS'
              : filterMode === 'b' ? 'STRATEGY B'
              : filterMode === 'c' ? 'STRATEGY C'
              : filterMode === 'd' ? 'STRATEGY D'
              : 'CUSTOM FILTER'
            } />
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Backtester />);
  </script>
</body>
